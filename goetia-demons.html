<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>七十二柱魔神 | Ars Goetia - 所罗门七十二柱魔神全鉴</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

:root {
  --bg: #0a0a0a;
  --bg2: #111111;
  --bg3: #1a1a1a;
  --bg4: #222222;
  --gold: #d4a843;
  --gold-dim: #a07830;
  --gold-glow: rgba(212, 168, 67, 0.3);
  --crimson: #c41e3a;
  --crimson-glow: rgba(196, 30, 58, 0.3);
  --text: #e8e0d0;
  --text-dim: #8a7e6a;
  --border: #2a2a1a;
  --card-bg: rgba(17, 17, 17, 0.9);
  --card-border: rgba(212, 168, 67, 0.15);
  --font-title: 'Ma Shan Zheng', serif;
  --font-body: 'Noto Serif SC', 'SimSun', serif;
  --font-eng: 'Cinzel', serif;
}

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(100, 60, 30, 0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 50%, rgba(196, 30, 58, 0.03) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 0%, rgba(212, 168, 67, 0.02) 0%, transparent 50%);
  background-attachment: fixed;
  line-height: 1.7;
}

/* ===== OCCULT BACKGROUND PATTERN ===== */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(212,168,67,0.015) 40px, rgba(212,168,67,0.015) 41px),
    repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(212,168,67,0.015) 40px, rgba(212,168,67,0.015) 41px);
  pointer-events: none;
  z-index: 0;
}

/* ===== HEXAGRAM OVERLAY ===== */
.occult-bg {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
  opacity: 0.03;
}
.occult-bg svg { position: absolute; }

/* ===== HEADER ===== */
header {
  position: relative;
  z-index: 1;
  padding: 40px 20px 30px;
  text-align: center;
  border-bottom: 1px solid var(--card-border);
  background: linear-gradient(180deg, rgba(10,10,10,0.95) 0%, transparent 100%);
}
header::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.header-sigil {
  width: 80px; height: 80px;
  margin: 0 auto 16px;
  display: block;
}
.header-sigil canvas { width: 80px; height: 80px; }
h1 {
  font-family: var(--font-title);
  font-size: 3.2em;
  color: var(--gold);
  text-shadow: 0 0 30px var(--gold-glow), 0 0 60px rgba(212,168,67,0.1);
  letter-spacing: 8px;
  margin-bottom: 4px;
}
h1 small {
  display: block;
  font-family: var(--font-eng);
  font-size: 0.3em;
  letter-spacing: 12px;
  color: var(--text-dim);
  text-shadow: none;
  margin-top: 4px;
}
.subtitle {
  font-size: 1em;
  color: var(--text-dim);
  margin-top: 8px;
  letter-spacing: 4px;
}
.subtitle span {
  color: var(--crimson);
}

/* ===== NAV ===== */
nav {
  position: relative;
  z-index: 1;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 6px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  background: rgba(10,10,10,0.8);
}
nav a {
  color: var(--text-dim);
  text-decoration: none;
  font-size: 0.82em;
  padding: 6px 16px;
  border: 1px solid transparent;
  border-radius: 4px;
  transition: all 0.3s;
  letter-spacing: 1px;
}
nav a:hover, nav a.active {
  color: var(--gold);
  border-color: var(--card-border);
  background: rgba(212,168,67,0.05);
}
nav a.active {
  color: var(--gold);
  border-color: var(--gold-dim);
  background: rgba(212,168,67,0.1);
}

/* ===== CONTROLS ===== */
.controls {
  position: relative;
  z-index: 1;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  padding: 20px;
  max-width: 1200px;
  margin: 0 auto;
  align-items: center;
  justify-content: center;
}
.controls input, .controls select {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 16px;
  font-size: 0.9em;
  border-radius: 6px;
  outline: none;
  transition: border-color 0.3s;
  font-family: var(--font-body);
}
.controls input:focus, .controls select:focus {
  border-color: var(--gold);
  box-shadow: 0 0 12px var(--gold-glow);
}
.controls input { flex: 1; min-width: 200px; max-width: 400px; }
.controls select { min-width: 120px; }
.control-stats {
  font-size: 0.85em;
  color: var(--text-dim);
  margin-left: auto;
}

/* ===== VIEW TOGGLE ===== */
.view-toggle {
  display: flex;
  gap: 4px;
  background: var(--bg2);
  border-radius: 6px;
  padding: 3px;
  border: 1px solid var(--border);
}
.view-toggle button {
  background: transparent;
  border: none;
  color: var(--text-dim);
  padding: 8px 14px;
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.3s;
  font-size: 0.85em;
}
.view-toggle button.active {
  background: var(--gold-dim);
  color: #fff;
}
.view-toggle button:hover:not(.active) {
  color: var(--gold);
}

/* ===== DEMON GRID ===== */
.demon-grid {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
  padding: 20px;
  max-width: 1400px;
  margin: 0 auto;
}
.demon-grid.list-view {
  grid-template-columns: 1fr;
  max-width: 1000px;
}
.demon-grid.list-view .demon-card {
  flex-direction: row;
}
.demon-grid.list-view .demon-card .card-seal {
  width: 100px; height: 100px;
  min-width: 100px;
}
.demon-grid.list-view .demon-card .card-body {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 20px;
  flex: 1;
}
.demon-grid.list-view .demon-card .card-desc {
  display: none;
}
.demon-grid.list-view .demon-card .card-meta {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.demon-grid.list-view .demon-card .card-header h3 {
  font-size: 1.1em;
}
.demon-grid.list-view .demon-card .card-header .rank-badge {
  font-size: 0.75em;
}

/* ===== DEMON CARD ===== */
.demon-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  position: relative;
}
.demon-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0;
  transition: opacity 0.4s;
}
.demon-card:hover {
  transform: translateY(-6px);
  border-color: var(--gold);
  box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 30px var(--gold-glow);
}
.demon-card:hover::before { opacity: 1; }
.demon-card .card-inner {
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.demon-card .card-seal {
  width: 120px; height: 120px;
  margin: 0 auto;
  display: block;
  border-radius: 50%;
  background: rgba(10,10,10,0.5);
  border: 1px solid rgba(212,168,67,0.2);
  transition: all 0.4s;
}
.demon-card:hover .card-seal {
  border-color: var(--gold);
  box-shadow: 0 0 20px var(--gold-glow);
}
.demon-card .card-seal canvas {
  width: 120px; height: 120px;
  border-radius: 50%;
}
.demon-card .card-header {
  text-align: center;
}
.demon-card .card-header .demon-number {
  font-family: var(--font-eng);
  font-size: 0.8em;
  color: var(--gold-dim);
  letter-spacing: 2px;
}
.demon-card .card-header h3 {
  font-family: var(--font-title);
  font-size: 1.4em;
  color: var(--gold);
  margin: 4px 0;
}
.demon-card .card-header .name-en {
  font-family: var(--font-eng);
  font-size: 0.85em;
  color: var(--text-dim);
  letter-spacing: 1px;
}
.demon-card .card-header .rank-badge {
  display: inline-block;
  padding: 3px 12px;
  border-radius: 12px;
  font-size: 0.8em;
  letter-spacing: 1px;
  margin-top: 6px;
  border: 1px solid;
}
.rank-king { border-color: var(--gold) !important; color: var(--gold); background: rgba(212,168,67,0.1); }
.rank-duke { border-color: #8a6d3b !important; color: #c4a35a; background: rgba(138,109,59,0.1); }
.rank-prince { border-color: #6b5b8a !important; color: #9b8fc4; background: rgba(107,91,138,0.1); }
.rank-marquis { border-color: #5a7a5a !important; color: #8ab88a; background: rgba(90,122,90,0.1); }
.rank-count { border-color: #7a5a5a !important; color: #b88a8a; background: rgba(122,90,90,0.1); }
.rank-president { border-color: #5a6a8a !important; color: #8aa0c4; background: rgba(90,106,138,0.1); }
.rank-knight { border-color: #8a7a5a !important; color: #c4b08a; background: rgba(138,122,90,0.1); }

.demon-card .card-meta {
  display: flex;
  justify-content: center;
  gap: 16px;
  font-size: 0.78em;
  color: var(--text-dim);
}
.demon-card .card-meta span {
  display: flex;
  align-items: center;
  gap: 4px;
}
.demon-card .card-desc {
  font-size: 0.88em;
  color: var(--text-dim);
  line-height: 1.6;
  border-top: 1px solid var(--border);
  padding-top: 10px;
  max-height: 60px;
  overflow: hidden;
  transition: max-height 0.4s;
}
.demon-card .card-abilities {
  display: none;
  font-size: 0.85em;
  color: var(--text-dim);
  line-height: 1.6;
  border-top: 1px solid var(--border);
  padding-top: 10px;
}
.demon-card .card-abilities strong {
  color: var(--gold);
}

/* ===== EXPANDED CARD ===== */
.demon-card.expanded {
  border-color: var(--gold);
  box-shadow: 0 12px 50px rgba(0,0,0,0.6), 0 0 40px var(--gold-glow);
  grid-column: span 1;
}
.demon-grid.list-view .demon-card.expanded {
  grid-column: 1 / -1;
}
.demon-card.expanded .card-desc {
  max-height: none;
}
.demon-card.expanded .card-abilities {
  display: block;
}
.demon-card.expanded .card-seal {
  width: 160px; height: 160px;
  border-color: var(--gold);
  box-shadow: 0 0 30px var(--gold-glow);
}
.demon-card.expanded .card-seal canvas {
  width: 160px; height: 160px;
}
.demon-card .expand-icon {
  text-align: center;
  color: var(--gold-dim);
  font-size: 0.8em;
  transition: transform 0.3s;
}
.demon-card.expanded .expand-icon {
  transform: rotate(180deg);
}

/* ===== TABLE VIEW ===== */
.table-container {
  position: relative;
  z-index: 1;
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px;
  display: none;
  overflow-x: auto;
}
.table-container.active { display: block; }
.demon-grid.active { display: none; }
.demon-grid.active.grid-view { display: grid; }
.demon-grid.active.list-view { display: grid; }

table {
  width: 100%;
  border-collapse: collapse;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  overflow: hidden;
  font-size: 0.85em;
}
thead {
  background: linear-gradient(180deg, rgba(212,168,67,0.08), transparent);
}
th {
  padding: 14px 12px;
  text-align: left;
  font-family: var(--font-eng);
  color: var(--gold);
  letter-spacing: 1px;
  cursor: pointer;
  user-select: none;
  border-bottom: 1px solid var(--card-border);
  white-space: nowrap;
  position: relative;
}
th:hover { color: #fff; }
th::after {
  content: '⇅';
  margin-left: 6px;
  font-size: 0.7em;
  opacity: 0.4;
}
th.sort-asc::after { content: '↑'; opacity: 1; }
th.sort-desc::after { content: '↓'; opacity: 1; }
td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--text-dim);
  transition: background 0.2s;
}
tr:hover td {
  background: rgba(212,168,67,0.03);
}
td.demon-name-cell {
  color: var(--gold);
  font-family: var(--font-title);
  font-size: 1.1em;
  cursor: pointer;
}
td.demon-name-cell:hover {
  text-shadow: 0 0 10px var(--gold-glow);
}
.table-seal {
  width: 40px; height: 40px;
  vertical-align: middle;
}
.table-seal canvas {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1px solid rgba(212,168,67,0.15);
}
.no-results {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
  font-size: 1.1em;
  grid-column: 1 / -1;
}

/* ===== PLANET ICONS ===== */
.planet-icon { font-size: 0.9em; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  h1 { font-size: 2em; }
  h1 small { font-size: 0.25em; letter-spacing: 6px; }
  .demon-grid { grid-template-columns: 1fr; padding: 12px; }
  .controls { flex-direction: column; align-items: stretch; }
  .controls input { max-width: none; }
  .control-stats { margin-left: 0; text-align: center; }
  .demon-card.expanded .card-seal { width: 120px; height: 120px; }
  .demon-card.expanded .card-seal canvas { width: 120px; height: 120px; }
  nav a { font-size: 0.75em; padding: 5px 10px; }
}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.demon-card { animation: fadeIn 0.5s ease forwards; }
.demon-card:nth-child(1) { animation-delay: 0s; }
.demon-card:nth-child(2) { animation-delay: 0.03s; }
.demon-card:nth-child(3) { animation-delay: 0.06s; }
/* additional delays set by JS */

@keyframes pulse-gold {
  0%, 100% { box-shadow: 0 0 10px var(--gold-glow); }
  50% { box-shadow: 0 0 25px var(--gold-glow); }
}
.demon-card:hover .card-seal {
  animation: pulse-gold 2s infinite;
}

/* ===== DETAIL MODAL ===== */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  z-index: 1000;
  justify-content: center;
  align-items: center;
  padding: 20px;
  backdrop-filter: blur(8px);
}
.modal-overlay.active { display: flex; }
.modal-content {
  background: var(--bg2);
  border: 1px solid var(--gold-dim);
  border-radius: 16px;
  max-width: 700px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  padding: 30px;
  position: relative;
  box-shadow: 0 20px 80px rgba(0,0,0,0.8), 0 0 60px var(--gold-glow);
}
.modal-close {
  position: absolute;
  top: 16px; right: 16px;
  background: transparent;
  border: none;
  color: var(--text-dim);
  font-size: 1.5em;
  cursor: pointer;
  transition: color 0.3s;
  width: 40px; height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
}
.modal-close:hover { color: var(--crimson); background: rgba(196,30,58,0.1); }
.modal-header {
  display: flex;
  gap: 24px;
  margin-bottom: 24px;
  align-items: flex-start;
}
.modal-seal {
  width: 140px; height: 140px;
  flex-shrink: 0;
  border-radius: 50%;
  border: 2px solid var(--gold);
  box-shadow: 0 0 30px var(--gold-glow);
}
.modal-seal canvas { width: 140px; height: 140px; border-radius: 50%; }
.modal-title h2 {
  font-family: var(--font-title);
  font-size: 2em;
  color: var(--gold);
}
.modal-title .name-en {
  font-family: var(--font-eng);
  color: var(--text-dim);
  letter-spacing: 1px;
  font-size: 0.9em;
}
.modal-title .rank-badge {
  display: inline-block;
  margin-top: 8px;
  padding: 4px 16px;
  border-radius: 12px;
  font-size: 0.85em;
  border: 1px solid;
}
.modal-body { color: var(--text-dim); line-height: 1.8; }
.modal-body p { margin-bottom: 12px; }
.modal-body strong { color: var(--gold); }
.modal-body .info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 16px 0;
}
.modal-body .info-item {
  background: rgba(212,168,67,0.04);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
}
.modal-body .info-item .label {
  font-size: 0.75em;
  color: var(--text-dim);
  letter-spacing: 2px;
  text-transform: uppercase;
}
.modal-body .info-item .value {
  font-size: 1em;
  color: var(--gold);
  margin-top: 4px;
}
@media (max-width: 600px) {
  .modal-header { flex-direction: column; align-items: center; text-align: center; }
  .modal-body .info-grid { grid-template-columns: 1fr; }
}

/* Navigation bar */
.nav-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  gap: 0.3rem;
  padding: 0 1rem;
  height: 48px;
  background: rgba(10,10,10,0.85);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #2a2a2a;
  overflow-x: auto;
  white-space: nowrap;
}
.nav-bar .nav-brand {
  font-family: "Ma Shan Zheng", cursive;
  font-size: 1.2rem;
  color: #d4a843;
  margin-right: 0.5rem;
  flex-shrink: 0;
}
.nav-bar .nav-link {
  color: #8a7e6e;
  text-decoration: none;
  font-size: 0.85rem;
  padding: 0.3rem 0.5rem;
  border-radius: 3px;
  transition: all 0.2s;
  flex-shrink: 0;
}
.nav-bar .nav-link:hover { color: #d4a843; background: rgba(212,168,67,0.1); }
.nav-bar .nav-link.active { color: #d4a843; }
html { padding-top: 48px; }


/* ====== ENHANCED ANIMATION SYSTEM ====== */
@keyframes floatGlow {
  0%,100%{transform:translateY(0);filter:drop-shadow(0 0 5px rgba(212,168,67,0.3));}
  50%{transform:translateY(-6px);filter:drop-shadow(0 0 20px rgba(212,168,67,0.6));}
}
@keyframes spinGlow {
  0%{transform:rotate(0deg);filter:drop-shadow(0 0 8px rgba(212,168,67,0.3));}
  50%{filter:drop-shadow(0 0 30px rgba(212,168,67,0.7));}
  100%{transform:rotate(360deg);filter:drop-shadow(0 0 8px rgba(212,168,67,0.3));}
}
@keyframes borderPulse {
  0%,100%{border-color:rgba(212,168,67,0.3);box-shadow:0 0 5px rgba(212,168,67,0.05);}
  50%{border-color:rgba(212,168,67,0.7);box-shadow:0 0 25px rgba(212,168,67,0.2);}
}
@keyframes shimmerText {
  0%{background-position:-200% center;}
  100%{background-position:200% center;}
}
@keyframes breatheScale {
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.04);}
}
@keyframes slideUpReveal {
  0%{opacity:0;transform:translateY(30px);}
  100%{opacity:1;transform:translateY(0);}
}
@keyframes goldSparkle {
  0%,100%{opacity:0;transform:scale(0) rotate(0deg);}
  50%{opacity:1;transform:scale(1) rotate(180deg);}
}
@keyframes rippleIn {
  0%{transform:scale(0);opacity:0.8;}
  100%{transform:scale(2);opacity:0;}
}
@keyframes rotateIn3D {
  0%{transform:perspective(800px) rotateY(90deg);opacity:0;}
  100%{transform:perspective(800px) rotateY(0deg);opacity:1;}
}
.gold-shimmer-text{

// SEAL DRAWING ENGINE
// ============================================================
function drawSeal(canvas, params, size) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const cx = w / 2, cy = h / 2;
  const r = (size || Math.min(w, h) / 2) - 8;
  ctx.clearRect(0, 0, w, h);

  // colors
  const gold = '#d4a843';
  const goldDim = '#a07830';
  const cream = '#e8dcc0';

  function drawRing(radius, width, color) {
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.strokeStyle = color;
    ctx.lineWidth = width || 1;
    ctx.stroke();
  }

  function drawPolygon(n, radius, rotation, color) {
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const a = (i / n) * Math.PI * 2 + (rotation || 0);
      const x = cx + Math.cos(a) * radius;
      const y = cy + Math.sin(a) * radius;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = color || gold;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  function drawStar(points, outerR, innerR, rotation, color) {
    ctx.beginPath();
    for (let i = 0; i <= points * 2; i++) {
      const a = (i / (points * 2)) * Math.PI * 2 + (rotation || 0);
      const rad = i % 2 === 0 ? outerR : innerR;
      const x = cx + Math.cos(a) * rad;
      const y = cy + Math.sin(a) * rad;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = color || gold;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  function drawLine(a1, a2, radius, color) {
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a1) * radius, cy + Math.sin(a1) * radius);
    ctx.lineTo(cx + Math.cos(a2) * radius, cy + Math.sin(a2) * radius);
    ctx.strokeStyle = color || gold;
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  function drawCross(size, color) {
    const s = size || r * 0.3;
    ctx.strokeStyle = color || gold;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-s, 0); ctx.lineTo(s, 0);
    ctx.moveTo(0, -s); ctx.lineTo(0, s);
    ctx.stroke();
  }

  function drawArc(startAngle, endAngle, radius, color) {
    ctx.beginPath();
    ctx.arc(cx, cy, radius, startAngle, endAngle);
    ctx.strokeStyle = color || goldDim;
    ctx.lineWidth = 1.2;
    ctx.stroke();
  }

  function drawTriangle(outerR, rotation, color) {
    ctx.beginPath();
    for (let i = 0; i < 3; i++) {
      const a = (i / 3) * Math.PI * 2 + (rotation || 0);
      const x = cx + Math.cos(a) * outerR;
      const y = cy + Math.sin(a) * outerR;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = color || gold;
    ctx.lineWidth = 1.2;
    ctx.stroke();
  }

  function drawSpiral(color) {
    ctx.beginPath();
    let x0 = cx, y0 = cy;
    for (let t = 0; t < Math.PI * 6; t += 0.1) {
      const rad = r * 0.05 + (t / (Math.PI * 6)) * r * 0.5;
      const x = cx + Math.cos(t) * rad;
      const y = cy + Math.sin(t) * rad;
      t === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.strokeStyle = color || goldDim;
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Draw outer ring
  drawRing(r, 2, gold);
  if (params.rings >= 2) drawRing(r * 0.78, 1.2, goldDim);
  if (params.rings >= 3) drawRing(r * 0.55, 1, goldDim);
  if (params.rings >= 4) drawRing(r * 0.35, 0.8, goldDim);

  // Draw inner ring
  const innerR = r * (params.inner || 0.3);
  drawRing(innerR, 1, gold);

  // Draw star polygon
  if (params.star) {
    const starOuter = r * 0.72;
    const starInner = r * 0.3;
    drawStar(params.points, starOuter, starInner, (params.rotation || 0) * Math.PI / 180);
  }

  // Draw polygon outline
  const polyR = r * 0.75;
  const rot = (params.rotation || 0) * Math.PI / 180;
  drawPolygon(params.points, polyR, rot, goldDim);

  // Draw triangles
  if (params.triangles) {
    for (let i = 0; i < params.triangles; i++) {
      const triRot = rot + (i / params.triangles) * Math.PI * 2;
      drawTriangle(r * 0.6, triRot, goldDim);
    }
  }

  // Draw crosses
  if (params.crosses) {
    const cSize = r * 0.15;
    for (let i = 0; i < params.crosses; i++) {
      const a = (i / params.crosses) * Math.PI * 2 + rot;
      ctx.save();
      ctx.translate(cx + Math.cos(a) * r * 0.45, cy + Math.sin(a) * r * 0.45);
      ctx.rotate(a);
      drawCross(cSize, goldDim);
      ctx.restore();
    }
  }

  // Draw arcs
  if (params.arcs) {
    for (let i = 0; i < params.arcs; i++) {
      const start = (i / params.arcs) * Math.PI * 2 + rot;
      const end = start + Math.PI * 0.6;
      drawArc(start, end, r * 0.85, goldDim);
    }
  }

  // Draw spiral
  if (params.spiral) {
    drawSpiral(goldDim);
  }

  // Center dot
  ctx.beginPath();
  ctx.arc(cx, cy, 2, 0, Math.PI * 2);
  ctx.fillStyle = gold;
  ctx.fill();

  // Outer decorative dots
  const dotCount = params.points * (params.rings + 1);
  for (let i = 0; i < dotCount; i++) {
    const a = (i / dotCount) * Math.PI * 2;
    ctx.beginPath();
    ctx.arc(cx + Math.cos(a) * r, cy + Math.sin(a) * r, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = goldDim;
    ctx.fill();
  }
}

// ============================================================
// RANK HELPER
// ============================================================
function getRankClass(rank) {
  const map = { 'King':'rank-king','Duke':'rank-duke','Prince':'rank-prince',
    'Marquis':'rank-marquis','Count':'rank-count','President':'rank-president','Knight':'rank-knight' };
  return map[rank] || '';
}

function getPlanetIcon(planet) {
  const icons = { 'Sun':'☉','Moon':'☽','Mercury':'☿','Venus':'♀','Mars':'♂','Jupiter':'♃','Saturn':'♄' };
  return icons[planet] || '';
}

function getPlanetCn(planet) {
  const names = { 'Sun':'太阳','Moon':'月亮','Mercury':'水星','Venus':'金星','Mars':'火星','Jupiter':'木星','Saturn':'土星' };
  return names[planet] || planet;
}

function getRankCn(rank) {
  const map = { 'King':'君王','Duke':'公爵','Prince':'王子','Marquis':'侯爵','Count':'伯爵','President':'统领','Knight':'骑士' };
  return map[rank] || rank;
}

// ============================================================
// RENDER CARDS
// ============================================================
let currentView = 'grid';
let currentSort = { key: 'number', dir: 'asc' };

function getFilteredDemons() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const rank = document.getElementById('rankFilter').value;
  const planet = document.getElementById('planetFilter').value;
  return DEMONS.filter(d => {
    if (search && !d.name.includes(search) && !d.nameEn.toLowerCase().includes(search) &&
        !String(d.id).includes(search) && !d.rank.toLowerCase().includes(search)) return false;
    if (rank && d.rank !== rank) return false;
    if (planet && d.planet !== planet) return false;
    return true;
  });
}

function render() {
  const filtered = getFilteredDemons();
  const grid = document.getElementById('demonGrid');
  const tableBody = document.getElementById('tableBody');
  const tableContainer = document.getElementById('tableContainer');
  const stats = document.getElementById('statsDisplay');

  stats.textContent = `显示 ${filtered.length} / ${DEMONS.length} 柱`;

  // Sort
  const sk = currentSort.key;
  const sd = currentSort.dir;
  filtered.sort((a, b) => {
    let va = sk === 'number' ? a.id : sk === 'name' ? a.nameEn : sk === 'rank' ? a.rank : sk === 'planet' ? a.planet : a.desc;
    let vb = sk === 'number' ? b.id : sk === 'name' ? b.nameEn : sk === 'rank' ? b.rank : sk === 'planet' ? b.planet : b.desc;
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (va < vb) return sd === 'asc' ? -1 : 1;
    if (va > vb) return sd === 'asc' ? 1 : -1;
    return 0;
  });

  // --- Grid/List view ---
  grid.innerHTML = '';
  if (currentView === 'table') {
    grid.classList.remove('active');
    tableContainer.classList.add('active');
  } else {
    grid.classList.add('active');
    grid.classList.toggle('grid-view', currentView === 'grid');
    grid.classList.toggle('list-view', currentView === 'list');
    tableContainer.classList.remove('active');

    if (filtered.length === 0) {
      grid.innerHTML = '<div class="no-results">没有找到匹配的魔神</div>';
    } else {
      filtered.forEach((d, idx) => {
        const card = document.createElement('div');
        card.className = 'demon-card';
        card.style.animationDelay = `${(idx % 20) * 0.03}s`;
        card.dataset.id = d.id;
        card.innerHTML = `
          <div class="card card-tilt-inner">
            <div class="card card-tilt-seal"><canvas width="240" height="240"></canvas></div>
            <div class="card card-tilt-header">
              <div class="demon-number">#${String(d.id).padStart(2,'0')}</div>
              <h3>${d.name}</h3>
              <div class="name-en">${d.nameEn}</div>
              <div class="rank-badge ${getRankClass(d.rank)}">${getRankCn(d.rank)} ${d.rank}</div>
            </div>
            <div class="card card-tilt-meta">
              <span class="planet-icon">${getPlanetIcon(d.planet)} ${getPlanetCn(d.planet)}</span>
              <span>${d.appearance}</span>
            </div>
            <div class="card card-tilt-desc">${d.desc}</div>
            <div class="card card-tilt-abilities">
              <strong>能力：</strong>${d.abilities}
            </div>
            <div class="expand-icon">&#9660;</div>
          </div>
        `;
        card.addEventListener('click', () => toggleExpand(card, d));
        grid.appendChild(card);

        // Draw seal on the card canvas
        const canvas = card.querySelector('canvas');
        drawSeal(canvas, d.seal);
      });
    }
  }

  // --- Table view ---
  tableBody.innerHTML = '';
  if (currentView === 'table') {
    if (filtered.length === 0) {
      tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-dim);">没有找到匹配的魔神</td></tr>';
    } else {
      filtered.forEach(d => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="font-family:var(--font-eng);color:var(--gold-dim);">#${String(d.id).padStart(2,'0')}</td>
          <td class="demon-name-cell" data-id="${d.id}">${d.name}<br><span style="font-family:var(--font-eng);font-size:0.8em;color:var(--text-dim);">${d.nameEn}</span></td>
          <td><span class="rank-badge ${getRankClass(d.rank)}" style="font-size:0.75em;">${getRankCn(d.rank)}</span></td>
          <td class="planet-icon">${getPlanetIcon(d.planet)} ${getPlanetCn(d.planet)}</td>
          <td style="font-size:0.85em;">${d.desc}</td>
        `;
        tr.querySelector('.demon-name-cell').addEventListener('click', () => openModal(d));
        tr.addEventListener('dblclick', () => openModal(d));
        tableBody.appendChild(tr);
      });
    }
  }
}

// ============================================================
// EXPAND / COLLAPSE
// ============================================================
function toggleExpand(card, demon) {
  const wasExpanded = card.classList.contains('expanded');
  // Collapse all others
  document.querySelectorAll('.demon-card.expanded').forEach(c => c.classList.remove('expanded'));
  if (!wasExpanded) {
    card.classList.add('expanded');
    // Redraw seal at larger size
    const canvas = card.querySelector('.card-seal canvas');
    drawSeal(canvas, demon.seal);
  }
}

// ============================================================
// MODAL
// ============================================================
function openModal(demon) {
  const modal = document.getElementById('detailModal');
  document.getElementById('modalNameCn').textContent = `#${String(demon.id).padStart(2,'0')} ${demon.name}`;
  document.getElementById('modalNameEn').textContent = demon.nameEn;
  const rankEl = document.getElementById('modalRank');
  rankEl.textContent = `${getRankCn(demon.rank)} (${demon.rank})`;
  rankEl.className = `rank-badge ${getRankClass(demon.rank)}`;

  const body = document.getElementById('modalBody');
  body.innerHTML = `
    <div class="info-grid">
      <div class="info-item">
        <div class="label">编号</div>
        <div class="value" style="font-family:var(--font-eng);">#${String(demon.id).padStart(2,'0')}</div>
      </div>
      <div class="info-item">
        <div class="label">位阶</div>
        <div class="value">${getRankCn(demon.rank)} (${demon.rank})</div>
      </div>
      <div class="info-item">
        <div class="label">星象关联</div>
        <div class="value planet-icon">${getPlanetIcon(demon.planet)} ${getPlanetCn(demon.planet)}</div>
      </div>
      <div class="info-item">
        <div class="label">统领军团</div>
        <div class="value">${demon.abilities.match(/\d+/)?.[0] || '—'} 个</div>
      </div>
    </div>
    <p><strong>形态外貌</strong><br>${demon.appearance}</p>
    <p><strong>外观描述</strong><br>${demon.desc}</p>
    <p><strong>魔法能力</strong><br>${demon.abilities}</p>
  `;

  // Draw seal in modal
  const modalCanvas = document.querySelector('#modalSeal canvas');
  drawSeal(modalCanvas, demon.seal);

  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('active');
  document.body.style.overflow = '';
}

// ============================================================
// HEADER SIGIL
// ============================================================
function drawHeaderSigil() {
  const canvas = document.querySelector('#headerSigil canvas');
  drawSeal(canvas, DEMONS[0].seal);
}

// ============================================================
// OCCULT BACKGROUND
// ============================================================
function drawOccultBg() {
  const container = document.getElementById('occultBg');
  // Add hexagram SVGs
  for (let i = 0; i < 5; i++) {
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('width', '200');
    svg.setAttribute('height', '200');
    svg.setAttribute('viewBox', '0 0 200 200');
    svg.style.position = 'absolute';
    svg.style.left = `${10 + Math.sin(i * 1.3) * 40}%`;
    svg.style.top = `${10 + Math.cos(i * 1.7) * 40}%`;
    svg.style.opacity = '0.15';
    svg.style.transform = `rotate(${i * 37}deg)`;
    svg.innerHTML = `
      <polygon points="100,10 170,190 30,190" fill="none" stroke="#d4a843" stroke-width="1"/>
      <polygon points="100,190 170,10 30,10" fill="none" stroke="#d4a843" stroke-width="1"/>
      <circle cx="100" cy="100" r="60" fill="none" stroke="#d4a843" stroke-width="0.5"/>
    `;
    container.appendChild(svg);
  }
}

// ============================================================
// EVENT LISTENERS
// ============================================================
document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('rankFilter').addEventListener('change', render);
document.getElementById('planetFilter').addEventListener('change', render);

document.querySelectorAll('.view-toggle button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    render();
  });
});

// Table sort
document.querySelectorAll('th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.sort;
    document.querySelectorAll('th[data-sort]').forEach(t => t.classList.remove('sort-asc', 'sort-desc'));
    if (currentSort.key === key) {
      currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
    } else {
      currentSort.key = key;
      currentSort.dir = 'asc';
    }
    th.classList.add(currentSort.dir === 'asc' ? 'sort-asc' : 'sort-desc');
    render();
  });
});

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('detailModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// ============================================================
// INIT
// ============================================================
drawHeaderSigil();
drawOccultBg();
render();
</script>
</body>
</html>
