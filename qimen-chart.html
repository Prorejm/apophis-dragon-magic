(function() {
  const c = document.getElementById('particleCanvas');
  const ctx = c.getContext('2d');
  let w, h, particles = [];
  function resize() { w = c.width = window.innerWidth; h = c.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  for (let i = 0; i < 50; i++) {
    particles.push({
      x: Math.random() * w, y: Math.random() * h,
      r: Math.random() * 1.5 + 0.5,
      vx: (Math.random() - 0.5) * 0.2,
      vy: (Math.random() - 0.5) * 0.2,
      a: Math.random() * 0.3 + 0.1
    });
  }
  function draw() {
    ctx.clearRect(0, 0, w, h);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
      if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(212,168,67,${p.a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ===== CANVAS SETUP =====
const canvas = document.getElementById('qimenCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const cx = W / 2, cy = H / 2 + 10;
const maxR = 260;

// Ring radii
const outerR = maxR;
const middleR = maxR * 0.72;
const innerR = maxR * 0.44;
const centerR = maxR * 0.18;

// Rotation state
let rotations = [0, 0, 0]; // [inner, middle, outer] in radians
let targetRotations = [0, 0, 0];
let speedMultiplier = 1;
let paused = false;
let isDragging = false;
let dragRing = -1;
let dragStartAngle = 0;
let dragStartRotation = 0;
let selectedSegment = null; // {ring, index}

// Colors
const colors = {
  inner: { stroke: '#d4a843', fill: 'rgba(212,168,67,0.08)', text: '#d4a843', highlight: 'rgba(212,168,67,0.2)' },
  middle: { stroke: '#c41e3a', fill: 'rgba(196,30,58,0.06)', text: '#c41e3a', highlight: 'rgba(196,30,58,0.18)' },

};

// ===== DRAWING =====
function getAngleForIndex(index, total, rotation) {
  return (index / total) * Math.PI * 2 - Math.PI / 2 + rotation;
}

function drawRing(ringIdx, data, rInner, rOuter, rotation, colorSet) {
  const total = data.length;
  const segAngle = (Math.PI * 2) / total;

  for (let i = 0; i < total; i++) {
    const startAngle = getAngleForIndex(i, total, rotation);
    const endAngle = startAngle + segAngle;
    const midAngle = startAngle + segAngle / 2;

    const isSelected = selectedSegment && selectedSegment.ring === ringIdx && selectedSegment.index === i;

    // Draw segment
    ctx.beginPath();
    ctx.arc(cx, cy, rOuter, startAngle, endAngle);
    ctx.arc(cx, cy, rInner, endAngle, startAngle, true);
    ctx.closePath();

    ctx.fillStyle = isSelected ? colorSet.highlight : colorSet.fill;
    ctx.fill();
    ctx.strokeStyle = colorSet.stroke;
    ctx.lineWidth = isSelected ? 1.5 : 0.5;
    ctx.globalAlpha = isSelected ? 1 : 0.4;
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Draw text
    const textR = (rInner + rOuter) / 2;
    const tx = cx + Math.cos(midAngle) * textR;
    const ty = cy + Math.sin(midAngle) * textR;

    const name = data[i].name || data[i];
    // Calculate font size based on ring
    let fontSize = ringIdx === 0 ? 13 : (ringIdx === 1 ? 11 : 9);
    if (isSelected) fontSize += 2;

    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(midAngle + Math.PI / 2);
    ctx.font = `${fontSize}px "Noto Serif SC", serif`;
    ctx.fillStyle = isSelected ? '#f0e8d8' : colorSet.text;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(name, 0, 0);
    ctx.restore();

    // Inner ring: draw trigram symbol
    if (ringIdx === 0 && data[i].symbol) {
      const symR = rInner + (rOuter - rInner) * 0.3;
      const sx = cx + Math.cos(midAngle) * symR;
      const sy = cy + Math.sin(midAngle) * symR;
      ctx.font = '12px serif';
      ctx.fillStyle = isSelected ? '#f0e8d8' : 'rgba(212,168,67,0.5)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(data[i].symbol, sx, sy);
    }
  }

  // Ring border lines
  ctx.beginPath();
  ctx.arc(cx, cy, rOuter, 0, Math.PI * 2);
  ctx.strokeStyle = colorSet.stroke;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.25;
  ctx.stroke();
  ctx.globalAlpha = 1;

  ctx.beginPath();
  ctx.arc(cx, cy, rInner, 0, Math.PI * 2);
  ctx.strokeStyle = colorSet.stroke;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.15;
  ctx.stroke();
  ctx.globalAlpha = 1;
}

function drawChart() {
  ctx.clearRect(0, 0, W, H);

  // Background - ink-wash paper texture
  const gradient = ctx.createRadialGradient(cx, cy, 10, cx, cy, maxR + 40);
  gradient.addColorStop(0, '#141210');
  gradient.addColorStop(0.5, '#0f0f0e');
  gradient.addColorStop(1, '#0a0a09');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, W, H);

  // Paper texture dots
  ctx.fillStyle = 'rgba(212,168,67,0.015)';
  for (let i = 0; i < 200; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    const r = Math.random() * 1 + 0.3;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // Decorative concentric circles
  for (let r = 40; r <= maxR + 20; r += 20) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(212,168,67,0.02)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Draw rings from outer to inner
  ctx.save();
  drawRing(2, solarTerms, middleR, outerR, rotations[2], colors.outer);
  drawRing(1, earthlyBranches, innerR, middleR, rotations[1], colors.middle);
  drawRing(0, trigrams, centerR, innerR, rotations[0], colors.inner);
  ctx.restore();

  // Center circle
  const cGrad = ctx.createRadialGradient(cx, cy, 2, cx, cy, centerR);
  cGrad.addColorStop(0, '#1a1814');
  cGrad.addColorStop(1, '#0f0f0e');
  ctx.beginPath();
  ctx.arc(cx, cy, centerR, 0, Math.PI * 2);
  ctx.fillStyle = cGrad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(212,168,67,0.2)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Center text
  ctx.font = '14px "Ma Shan Zheng", cursive';
  ctx.fillStyle = '#d4a843';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('风后', cx, cy - 8);
  ctx.font = '11px "Ma Shan Zheng", cursive';
  ctx.fillStyle = '#c41e3a';
  ctx.fillText('奇门', cx, cy + 12);

  // Direction labels (fixed)
  const dirs = [
    { label: '北', angle: -Math.PI / 2 },
    { label: '南', angle: Math.PI / 2 },
    { label: '东', angle: 0 },
    { label: '西', angle: Math.PI }
  ];
  dirs.forEach(d => {
    const dx = cx + Math.cos(d.angle) * (maxR + 18);
    const dy = cy + Math.sin(d.angle) * (maxR + 18);
    ctx.font = '11px "Noto Serif SC", serif';
    ctx.fillStyle = 'rgba(138,126,106,0.4)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(d.label, dx, dy);
  });
}

// ===== ANIMATION LOOP =====
function animate() {
  if (!paused) {
    const speeds = [0.15, 0.08, 0.04]; // inner, middle, outer
    for (let i = 0; i < 3; i++) {
      rotations[i] += speeds[i] * speedMultiplier * 0.01;
    }
  }
  drawChart();
  requestAnimationFrame(animate);
}
animate();

// ===== CLICK / HIT TESTING =====
function getRingAtAngle(angle, r) {
  const dist = Math.abs(r);
  if (dist < centerR) return -1;
  if (dist < innerR) return 0;
  if (dist < middleR) return 1;
  if (dist < outerR) return 2;
  return -1;
}

function getSegmentIndex(angle, total, rotation) {
  // Normalize angle
  let a = angle - rotation;
  a = ((a % (Math.PI * 2)) + (Math.PI * 2)) % (Math.PI * 2);
  const idx = Math.floor((a + Math.PI / 2 + Math.PI * 2) / (Math.PI * 2) * total) % total;
  return idx;
}

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  const dx = mx - cx, dy = my - cy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const angle = Math.atan2(dy, dx);

  let ringIdx = -1;
  if (dist >= centerR && dist < innerR) ringIdx = 0;
  else if (dist >= innerR && dist < middleR) ringIdx = 1;
  else if (dist >= middleR && dist < outerR) ringIdx = 2;

  if (ringIdx >= 0) {
    const data = [trigrams, earthlyBranches, solarTerms][ringIdx];
    const idx = getSegmentIndex(angle, data.length, rotations[ringIdx]);
    selectedSegment = { ring: ringIdx, index: idx };
    showInfo(ringIdx, idx);
  }
});

// ===== DRAG TO ROTATE =====
let dragStart = null;
canvas.addEventListener('mousedown', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const my = (e.clientY - rect.top) * (canvas.height / rect.height);
  const dx = mx - cx, dy = my - cy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const angle = Math.atan2(dy, dx);

  let ringIdx = -1;
  if (dist >= centerR && dist < innerR) ringIdx = 0;
  else if (dist >= innerR && dist < middleR) ringIdx = 1;
  else if (dist >= middleR && dist < outerR) ringIdx = 2;

  if (ringIdx >= 0) {
    isDragging = true;
    dragRing = ringIdx;
    dragStartAngle = angle;
    dragStartRotation = rotations[ringIdx];
    paused = true;
    document.getElementById('pauseBtn').textContent = '&#9654; 暂停';
    document.getElementById('pauseBtn').classList.add('paused');
  }
});

window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const my = (e.clientY - rect.top) * (canvas.height / rect.height);
  const dx = mx - cx, dy = my - cy;
  const angle = Math.atan2(dy, dx);
  const diff = angle - dragStartAngle;
  rotations[dragRing] = dragStartRotation + diff;
});

window.addEventListener('mouseup', () => {
  if (isDragging) {
    isDragging = false;
    dragRing = -1;
  }
});

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const mx = (touch.clientX - rect.left) * (canvas.width / rect.width);
  const my = (touch.clientY - rect.top) * (canvas.height / rect.height);
  const dx = mx - cx, dy = my - cy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const angle = Math.atan2(dy, dx);

  let ringIdx = -1;
  if (dist >= centerR && dist < innerR) ringIdx = 0;
  else if (dist >= innerR && dist < middleR) ringIdx = 1;
  else if (dist >= middleR && dist < outerR) ringIdx = 2;

  if (ringIdx >= 0) {
    isDragging = true;
    dragRing = ringIdx;
    dragStartAngle = angle;
    dragStartRotation = rotations[ringIdx];
    paused = true;
    document.getElementById('pauseBtn').textContent = '&#9654; 暂停';
    document.getElementById('pauseBtn').classList.add('paused');
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!isDragging) return;
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const mx = (touch.clientX - rect.left) * (canvas.width / rect.width);
  const my = (touch.clientY - rect.top) * (canvas.height / rect.height);
  const dx = mx - cx, dy = my - cy;
  const angle = Math.atan2(dy, dx);
  const diff = angle - dragStartAngle;
  rotations[dragRing] = dragStartRotation + diff;
}, { passive: false });

canvas.addEventListener('touchend', () => {
  isDragging = false;
  dragRing = -1;
});

// ===== CONTROLS =====
// Speed buttons
document.querySelectorAll('[data-speed]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-speed]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    speedMultiplier = parseFloat(btn.dataset.speed);
  });
});

// Pause button
document.getElementById('pauseBtn').addEventListener('click', () => {
  paused = !paused;
  const btn = document.getElementById('pauseBtn');
  if (paused) {
    btn.textContent = '&#9654; 继续';
    btn.classList.add('paused');
  } else {
    btn.textContent = '&#10074;&#10074; 暂停';
    btn.classList.remove('paused');
  }
});

// Reset button
document.getElementById('resetBtn').addEventListener('click', () => {
  rotations = [0, 0, 0];
  selectedSegment = null;
  document.getElementById('infoContent').style.display = 'none';
  document.getElementById('infoPlaceholder').style.display = 'block';
});

// ===== INFO DISPLAY =====
function showInfo(ringIdx, idx) {
  const placeholder = document.getElementById('infoPlaceholder');
  const content = document.getElementById('infoContent');
  placeholder.style.display = 'none';
  content.style.display = 'block';

  const ringNames = ['八卦', '十二地支', '二十四节气'];
  const ringName = ringNames[ringIdx];

  let html = '<div class="info-section-title">' + ringName + ' · 详情</div>';

  if (ringIdx === 0) {
    const t = trigrams[idx];
    html += `
      <div class="info-row"><span class="label">卦名</span><span class="value">${t.symbol} ${t.name}</span></div>
      <div class="info-row"><span class="label">五行</span><span class="value">${t.element}</span></div>
      <div class="info-row"><span class="label">方位</span><span class="value">${t.direction}</span></div>
      <div class="info-row"><span class="label">家庭成员</span><span class="value">${t.family}</span></div>
      <div class="info-row"><span class="label">对应身体</span><span class="value">${t.body}</span></div>
      <div class="info-desc">${t.desc}</div>
    `;
  } else if (ringIdx === 1) {
    const b = earthlyBranches[idx];
    html += `
      <div class="info-row"><span class="label">地支</span><span class="value">${b.name}</span></div>
      <div class="info-row"><span class="label">生肖</span><span class="value">${b.animal}</span></div>
      <div class="info-row"><span class="label">时辰</span><span class="value">${b.hour}</span></div>
      <div class="info-row"><span class="label">方位</span><span class="value">${b.direction}</span></div>
      <div class="info-row"><span class="label">五行</span><span class="value">${b.element}</span></div>
      <div class="info-desc">${b.desc}</div>
    `;
  } else {
    const s = solarTerms[idx];
    html += `
      <div class="info-row"><span class="label">节气</span><span class="value">${s.name}</span></div>
      <div class="info-row"><span class="label">日期</span><span class="value">${s.date}</span></div>
      <div class="info-row"><span class="label">含义</span><span class="value">${s.meaning}</span></div>
      <div class="info-row"><span class="label">顺序</span><span class="value">第${s.order}个节气</span></div>
      <div class="info-section-title">农事意义</div>
      <div class="info-desc">${s.agriculture}</div>
    `;
  }

  content.innerHTML = html;
}
</script>
