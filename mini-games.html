    if (neighbors.indexOf(idx) === -1) return;

    if (!timerRunning) timerRunning = true;

    tiles[emptyIdx] = tiles[idx];
    tiles[idx] = 8;
    emptyIdx = idx;
    moves++;
    updateHUD(0, '移动: ' + moves + ' 时间: ' + Math.floor(timer) + 's');
    flashFeedback(true);

    // Check win
    var solved = true;
    for (var i = 0; i < 8; i++) {
      if (tiles[i] !== i) { solved = false; break; }
    }
    if (solved && emptyIdx === 8) {
      won = true;
      alive = false;
      var finalScore = Math.max(100, 3000 - moves * 5 - Math.floor(timer) * 3);
      gameOver(finalScore);
    }
  }

  function drawSigilTile(ctx, tileIdx, cx, cy, size) {
    // Each tile is a portion of the sigil pattern
    var tx = tileIdx % SIZE;
    var ty = Math.floor(tileIdx / SIZE);

    // Background circle
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx + size/2, cy + size/2, size * 0.4, 0, Math.PI * 2);
    ctx.fillStyle = sigilColors[tileIdx];
    ctx.shadowColor = sigilColors[tileIdx];
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.shadowBlur = 0;

    // Inner symbol
    ctx.fillStyle = '#fff';
    ctx.font = (size * 0.35) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    var symbols = ['✦', '☯', '⚜', '☽', '♄', '♃', '♂', '♀', '✧'];
    ctx.fillText(symbols[tileIdx], cx + size/2, cy + size/2 + 1);

    // Decorative lines based on position
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    if (tx > 0) {
      ctx.beginPath(); ctx.moveTo(cx, cy + size*0.2); ctx.lineTo(cx, cy + size*0.8); ctx.stroke();
    }
    if (ty > 0) {
      ctx.beginPath(); ctx.moveTo(cx + size*0.2, cy); ctx.lineTo(cx + size*0.8, cy); ctx.stroke();
    }
    ctx.restore();
  }

  function update() {
    if (!started || !alive || paused) { frameId = requestAnimationFrame(update); return; }
    if (timerRunning) timer += 1/60;
    draw();
    frameId = requestAnimationFrame(update);
  }

  function draw() {
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    calcLayout();

    for (var i = 0; i < 9; i++) {
      var val = tiles[i];
      var row = Math.floor(i / SIZE);
      var col = i % SIZE;
      var x = offsetX + col * cellSize;
      var y = offsetY + row * cellSize;

      if (val === 8) {
        // Empty space
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(x, y, cellSize, cellSize);
        ctx.strokeStyle = '#1a1a1a';
        ctx.lineWidth = 1;
        ctx.strokeRect(x, y, cellSize, cellSize);
      } else {
        // Sigil tile
        ctx.shadowColor = won ? 'rgba(0,255,0,0.3)' : 'rgba(212,168,67,0.2)';
        ctx.shadowBlur = won ? 8 : 4;
        ctx.fillStyle = '#151515';
        ctx.fillRect(x + 1, y + 1, cellSize - 2, cellSize - 2);
        ctx.strokeStyle = won ? '#00ff00' : '#d4a843';
        ctx.lineWidth = won ? 2 : 1.5;
        ctx.strokeRect(x + 1, y + 1, cellSize - 2, cellSize - 2);
        ctx.shadowBlur = 0;

        drawSigilTile(ctx, val, x, y, cellSize);
      }
    }

    // Reference image in top-right corner
    var refSize = 60;
    var refX = canvas.width - refSize - 15;
    var refY = 15;
    ctx.fillStyle = 'rgba(10,10,10,0.9)';
    ctx.strokeStyle = '#d4a843';
    ctx.lineWidth = 1;
    ctx.fillRect(refX - 2, refY - 2, refSize + 4, refSize + 4);
    ctx.strokeRect(refX - 2, refY - 2, refSize + 4, refSize + 4);

    var refCell = refSize / SIZE;
    for (var r = 0; r < SIZE; r++) {
      for (var c = 0; c < SIZE; c++) {
        var idx = r * SIZE + c;
        var rx = refX + c * refCell;
        var ry = refY + r * refCell;
        ctx.fillStyle = sigilColors[idx];
        ctx.fillRect(rx, ry, refCell, refCell);
        ctx.fillStyle = '#fff';
        ctx.font = (refCell * 0.3) + 'px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        var refSym = ['✦', '☯', '⚜', '☽', '♄', '♃', '♂', '♀', ''];
        ctx.fillText(refSym[idx] || '', rx + refCell/2, ry + refCell/2 + 1);
      }
    }

    ctx.fillStyle = '#8a7e6e';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('参考', refX + refSize/2, refY + refSize + 12);

    // Info
    ctx.fillStyle = '#8a7e6e';
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('移动: ' + moves + '  时间: ' + Math.floor(timer) + 's', canvas.width/2, canvas.height - 8);

    // Shuffle button
    var btnX = canvas.width - 100;
    var btnY = canvas.height - 35;
    ctx.fillStyle = '#1a1a1a';
    ctx.strokeStyle = '#2a2a2a';
    ctx.lineWidth = 1;
    ctx.fillRect(btnX, btnY, 80, 26);
    ctx.strokeRect(btnX, btnY, 80, 26);
    ctx.fillStyle = '#8a7e6e';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('重新打乱', btnX + 40, btnY + 13);
  }

  canvas.addEventListener('click', function(e) {
    if (!started || !alive || paused) return;
    var rect = canvas.getBoundingClientRect();
    var mx = (e.clientX - rect.left) * (canvas.width / rect.width);
    var my = (e.clientY - rect.top) * (canvas.height / rect.height);

    // Check shuffle button
    var btnX = canvas.width - 100;
    var btnY = canvas.height - 35;
    if (mx >= btnX && mx <= btnX + 80 && my >= btnY && my <= btnY + 26) {
      shuffleTiles();
      draw();
      return;
    }

    var col = Math.floor((mx - offsetX) / cellSize);
    var row = Math.floor((my - offsetY) / cellSize);
    if (col < 0 || col >= SIZE || row < 0 || row >= SIZE) return;
    var idx = row * SIZE + col;
    if (tiles[idx] !== 8) moveTile(idx);
  });

  calcLayout();
  shuffleTiles();
  draw();

  window.startGame = function() {
    started = true;
    frameId = requestAnimationFrame(update);
  };
  window.onPauseChange = function(p) {
    if (!p && alive) { frameId = requestAnimationFrame(update); }
  };
  window.destroyGame = function() {
    if (frameId) cancelAnimationFrame(frameId);
  };
}

// ==========================================
// ======== 游戏 12: 颜色试炼 ==============
// ==========================================
function initColorReaction(canvas) {
  var ctx = canvas.getContext('2d');
  var COLORS = [
    {name: '红', value: '#c41e3a'},
    {name: '蓝', value: '#1e90ff'},
    {name: '绿', value: '#228b22'},
    {name: '黄', value: '#d4a843'},
    {name: '紫', value: '#8a2be2'},
    {name: '橙', value: '#ff8c00'}
  ];
  var currentColor = null;
  var options = [];
  var correctIdx = -1;
  var score = 0;
  var streak = 0;
  var maxStreak = 0;
  var timeLeft = 30;
  var started = false;
  var alive = true;
  var frameId = null;
  var circleX, circleY, circleR;
  var btnW = 100, btnH = 45;
  var btnY;

  function calcLayout() {
    circleX = canvas.width / 2;
    circleY = canvas.height * 0.28;
    circleR = Math.min(canvas.width, canvas.height) * 0.12;
    circleR = Math.max(30, Math.min(circleR, 60));
    btnW = Math.min(110, (canvas.width - 40) / 4);
    btnH = Math.min(45, (canvas.height - circleY - circleR - 40) / 2);
    btnY = circleY + circleR + 30;
  }

  function generateQuestion() {
    // Pick a random color for the circle
    var ci = Math.floor(Math.random() * COLORS.length);
    currentColor = COLORS[ci];
    correctIdx = Math.floor(Math.random() * 4);

    // Generate 4 options
    options = [];
    var used = {};
    for (var i = 0; i < 4; i++) {
      if (i === correctIdx) {
        options.push({
          label: currentColor.name,
          textColor: COLORS[Math.floor(Math.random() * COLORS.length)].value
        });
        used[currentColor.name] = true;
      } else {
        var name;
        do {
          name = COLORS[Math.floor(Math.random() * COLORS.length)].name;
        } while (used[name] || name === currentColor.name);
        used[name] = true;
        options.push({
          label: name,
          textColor: COLORS[Math.floor(Math.random() * COLORS.length)].value
        });
      }
    }
  }

  function handleClick(btnIdx) {
    if (!started || !alive || paused) return;
    if (btnIdx === correctIdx) {
      score++;
      streak++;
      if (streak > maxStreak) maxStreak = streak;
      flashFeedback(true);
    } else {
      streak = 0;
      flashFeedback(false);
    }
    updateHUD(score, '连击: ' + streak + ' 时间: ' + Math.ceil(timeLeft) + 's');
    generateQuestion();
  }

  function update() {
    if (!started || !alive || paused) { frameId = requestAnimationFrame(update); return; }
    timeLeft -= 1/60;
    if (timeLeft <= 0) {
      timeLeft = 0;
      alive = false;
      var finalScore = score * 100 + maxStreak * 50;
      gameOver(finalScore);
      return;
    }
    updateHUD(score, '连击: ' + streak + ' 剩余: ' + Math.ceil(timeLeft) + 's');
    draw();
    frameId = requestAnimationFrame(update);
  }

  function draw() {
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    calcLayout();

    // Colored circle
    ctx.shadowColor = currentColor.value;
    ctx.shadowBlur = 20;
    ctx.fillStyle = currentColor.value;
    ctx.beginPath();
    ctx.arc(circleX, circleY, circleR, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Circle border
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Prompt text
    ctx.fillStyle = '#8a7e6e';
    ctx.font = '16px "Ma Shan Zheng", serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('选择与圆圈颜色匹配的文字', canvas.width/2, circleY - circleR - 20);

    // 4 buttons
    var totalW = btnW * 4 + 10 * 3;
    var btnStartX = (canvas.width - totalW) / 2;

    for (var i = 0; i < 4; i++) {
      var bx = btnStartX + i * (btnW + 10);
      var by = btnY;

      // Button background
      ctx.fillStyle = '#151515';
      ctx.strokeStyle = '#2a2a2a';
      ctx.lineWidth = 1.5;
      ctx.fillRect(bx, by, btnW, btnH);
      ctx.strokeRect(bx, by, btnW, btnH);

      // Button text (with potentially different color)
      ctx.fillStyle = options[i].textColor;
      ctx.font = 'bold ' + (btnH * 0.4) + 'px "Ma Shan Zheng", serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(options[i].label, bx + btnW/2, by + btnH/2 + 1);
    }

    // Timer bar at top
    var barW = 200;
    var barX = (canvas.width - barW) / 2;
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(barX, 8, barW, 6);
    ctx.fillStyle = timeLeft > 10 ? '#d4a843' : '#c41e3a';
    ctx.fillRect(barX, 8, barW * (timeLeft / 30), 6);

    // Score display
    ctx.fillStyle = '#d4a843';
    ctx.font = '14px "Ma Shan Zheng", serif';
    ctx.textAlign = 'center';
    ctx.fillText('得分: ' + score + '  连击: ' + streak, canvas.width/2, circleY - circleR - 45);
  }

  canvas.addEventListener('click', function(e) {
    if (!started || !alive || paused) return;
    var rect = canvas.getBoundingClientRect();
    var mx = (e.clientX - rect.left) * (canvas.width / rect.width);
    var my = (e.clientY - rect.top) * (canvas.height / rect.height);

    var totalW = btnW * 4 + 10 * 3;
    var btnStartX = (canvas.width - totalW) / 2;

    for (var i = 0; i < 4; i++) {
      var bx = btnStartX + i * (btnW + 10);
      var by = btnY;
      if (mx >= bx && mx <= bx + btnW && my >= by && my <= by + btnH) {
        handleClick(i);
        return;
      }
    }
  });

  calcLayout();
  generateQuestion();
  updateHUD(0, '连击: 0 剩余: 30s');

  window.startGame = function() {
    started = true;
    frameId = requestAnimationFrame(update);
  };
  window.onPauseChange = function(p) {
    if (!p && alive) { frameId = requestAnimationFrame(update); }
  };
  window.destroyGame = function() {
    if (frameId) cancelAnimationFrame(frameId);
  };
}

// ==========================================
// ========= 游戏初始化调度器 ==============
// ==========================================
function initGame(gameId, canvas) {
  // 清除之前的 game-specific 全局变量
  if (typeof destroyGame === 'function') destroyGame();
  window.startGame = undefined;
  window.onPauseChange = undefined;
  window.handleKeyDown = undefined;
  window.handleKeyUp = undefined;
  window.destroyGame = undefined;

  switch(gameId) {
    case 'snake': initSnake(canvas); break;
    case 'plane': initPlane(canvas); break;
    case 'whack': initWhack(canvas); break;
    case 'match3': initMatch3(canvas); break;
    case 'tetris': initTetris(canvas); break;
    case 'dino': initDino(canvas); break;
    case 'memory': initMemory(canvas); break;
    case 'slide': initSlide(canvas); break;
    case 'maze': initMaze(canvas); break;
    case 'minesweeper': initMinesweeper(canvas); break;
    case 'sigilpuzzle': initSigilPuzzle(canvas); break;
    case 'color': initColorReaction(canvas); break;
  }
}
