<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>魔法生成器工坊 — Apophis Dragon Magic</title>
<meta name="description" content="魔法生成器工坊 - 魔法名生成、行星符印、咒语生成、占卜随机、仪式时间计算、元素平衡测试、龙语翻译、塔罗占卜、药水调配、星盘命轮、符印增强、梦境解析、符印塔罗、龙之符文占卜、混沌天气模拟、灵魂动物向导">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0a;
  --bg2:#111;
  --bg3:#1a1a1a;
  --ink:#e8e0d4;
  --muted:#8a7e6e;
  --accent:#c41e3a;
  --accent2:#d4a843;
  --accent3:#f0c860;
  --rule:#2a2a2a;
  --rule2:#d4a84333;
  --font:'Noto Serif SC','Songti SC','SimSun',serif;
  --font-display:'Ma Shan Zheng','Noto Serif SC',cursive;
}
html{scroll-behavior:smooth;font-size:16px}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--ink);
  line-height:1.8;
  overflow-x:hidden;
}
#particleCanvas{
  position:fixed;
  top:0;left:0;
  width:100vw;height:100vh;
  z-index:0;
  pointer-events:none;
}

/* ── Navigation ── */
.nav-bar{
  position:fixed;
  top:0;left:0;right:0;
  background:rgba(10,10,10,0.92);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--rule);
  z-index:999;
  padding:0.6rem 1.5rem;
  display:flex;
  align-items:center;
  gap:1.2rem;
  overflow-x:auto;
  scrollbar-width:none;
  -ms-overflow-style:none;
}
.nav-bar::-webkit-scrollbar{display:none}
.nav-brand{
  color:var(--accent2);
  font-weight:700;
  font-size:0.85rem;
  white-space:nowrap;
  letter-spacing:0.1em;
}
.nav-link{
  color:var(--muted);
  text-decoration:none;
  font-size:0.8rem;
  white-space:nowrap;
  padding:0.3rem 0.6rem;
  border-radius:4px;
  transition:all 0.3s ease;
}
.nav-link:hover,.nav-link.active{color:var(--accent2);background:rgba(212,168,67,0.1);}

/* ── Container ── */
.container{
  position:relative;
  z-index:1;
  max-width:1200px;
  margin:0 auto;
  padding:6rem 1.2rem 4rem;
}

/* ── Header ── */
.page-header{text-align:center;margin-bottom:2.5rem}
.page-header h1{
  font-family:var(--font-display);
  font-size:3rem;
  color:var(--accent2);
  font-weight:400;
  text-shadow:0 0 40px rgba(212,168,67,0.3);
}
.page-header p{color:var(--muted);font-size:0.95rem;margin-top:0.5rem}

/* ── Tab Navigation ── */
.tab-nav{
  display:flex;
  flex-wrap:wrap;
  gap:0.4rem;
  justify-content:center;
  margin-bottom:2.5rem;
  border-bottom:1px solid var(--rule2);
  padding-bottom:0.8rem;
}
.tab-btn{
  background:transparent;
  border:1px solid var(--rule2);
  color:var(--muted);
  padding:0.5rem 1rem;
  border-radius:8px;
  cursor:pointer;
  font-family:var(--font);
  font-size:0.85rem;
  transition:all 0.3s ease;
}
.tab-btn:hover{color:var(--accent2);border-color:var(--accent2);background:rgba(212,168,67,0.08);}
.tab-btn.active{color:var(--accent2);border-color:var(--accent2);background:rgba(212,168,67,0.15);box-shadow:0 0 20px rgba(212,168,67,0.1);}

/* ── Generator Sections ── */
.generator-panel{display:none;animation:fadeIn 0.5s ease}
.generator-panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.gen-card{
  background:var(--bg2);
  border:1px solid var(--rule2);
  border-radius:12px;
  padding:1.8rem;
  margin-bottom:1.5rem;
}
.gen-card h2{
  font-family:var(--font-display);
  font-size:1.8rem;
  color:var(--accent2);
  font-weight:400;
  margin-bottom:0.3rem;
}
.gen-card .desc{color:var(--muted);font-size:0.9rem;margin-bottom:1.5rem;}

.controls-row{
  display:flex;
  flex-wrap:wrap;
  gap:1rem;
  align-items:flex-end;
  margin-bottom:1.2rem;
}
.ctrl-group{
  display:flex;
  flex-direction:column;
  gap:0.3rem;
  min-width:140px;
  flex:1;
}
.ctrl-group label{font-size:0.8rem;color:#aaa;font-weight:600;}
.ctrl-group select,.ctrl-group input[type="text"],.ctrl-group input[type="date"]{
  background:var(--bg3);
  border:1px solid #333;
  color:var(--ink);
  padding:0.55rem 0.8rem;
  border-radius:6px;
  font-family:var(--font);
  font-size:0.9rem;
  outline:none;
  transition:border-color 0.3s;
}
.ctrl-group select:focus,.ctrl-group input:focus{border-color:var(--accent2);}
.ctrl-group select option{background:#222;}

.btn{
  background:linear-gradient(135deg,var(--accent2),#b8922e);
  border:none;
  color:#0a0a0a;
  font-family:var(--font);
  font-size:0.9rem;
  font-weight:600;
  padding:0.55rem 1.5rem;
  border-radius:8px;
  cursor:pointer;
  transition:all 0.3s ease;
  white-space:nowrap;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(212,168,67,0.3);}
.btn-sm{padding:0.4rem 1rem;font-size:0.8rem;}
.btn-secondary{
  background:transparent;
  border:1px solid var(--accent2);
  color:var(--accent2);
}
.btn-secondary:hover{background:rgba(212,168,67,0.1);box-shadow:none;}

.result-box{
  background:var(--bg3);
  border:1px solid #333;
  border-radius:8px;
  padding:1.2rem;
  margin-top:1rem;
  min-height:60px;
  transition:all 0.3s ease;
}
.result-box .label{color:var(--muted);font-size:0.8rem;margin-bottom:0.3rem;}
.result-box .value{font-size:1.1rem;color:var(--accent2);}

/* ── Canvas ── */
canvas.gen-canvas{
  display:block;
  margin:1rem auto;
  border-radius:8px;
  max-width:100%;
}

/* ── Responsive ── */
@media(max-width:768px){
  .page-header h1{font-size:2rem;}
  .gen-card{padding:1.2rem;}
  .controls-row{flex-direction:column;}
  .ctrl-group{min-width:100%;}
  .tab-btn{font-size:0.75rem;padding:0.4rem 0.7rem;}
}
@media(max-width:480px){
  .nav-bar{padding:0.4rem 0.8rem;gap:0.6rem;}
  .nav-link{font-size:0.7rem;}
  .container{padding:5rem 0.8rem 2rem;}
}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#555}

/* ── Elemental Test ── */
.question-card{
  background:var(--bg3);
  border:1px solid #333;
  border-radius:8px;
  padding:1.2rem;
  margin-bottom:1rem;
}
.question-card .q-title{color:var(--accent2);font-weight:600;margin-bottom:0.8rem;font-size:0.95rem;}
.elem-option{
  display:flex;align-items:center;gap:0.8rem;padding:0.5rem 0.8rem;
  margin-bottom:0.4rem;border-radius:6px;cursor:pointer;
  transition:all 0.2s;border:1px solid transparent;
}
.elem-option:hover{background:rgba(212,168,67,0.08);border-color:var(--rule2);}
.elem-option.selected{background:rgba(212,168,67,0.15);border-color:var(--accent2);}
.elem-option input[type="radio"]{accent-color:var(--accent2);}
.elem-option .elem-label{font-size:0.88rem;}

/* ── Score Bar ── */
.score-container{display:flex;flex-direction:column;gap:0.8rem;margin:1rem 0;}
.score-bar-wrap{display:flex;align-items:center;gap:0.8rem;}
.score-bar-label{width:30px;font-weight:700;text-align:center;font-size:1rem;}
.score-bar-track{flex:1;height:24px;background:#222;border-radius:4px;overflow:hidden;position:relative;}
.score-bar-fill{height:100%;border-radius:4px;transition:width 1s ease;position:relative;}
.score-bar-fill span{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:0.75rem;color:#0a0a0a;font-weight:700;}
.score-bar-value{width:40px;text-align:right;font-size:0.9rem;color:var(--muted);}

/* ── Sigil Canvas ── */
.sigil-container{text-align:center;}
.sigil-container canvas{border:1px solid #333;background:#0a0a0a;}

/* ── Divination ── */
.divination-display{text-align:center;padding:2rem 1rem;}
.divination-symbol{font-size:4rem;margin-bottom:1rem;transition:all 0.5s ease;}
.divination-name{font-size:1.4rem;color:var(--accent2);margin-bottom:0.5rem;}
.divination-meaning{color:var(--muted);font-size:0.9rem;max-width:500px;margin:0 auto;}

/* ── Reveal Animation ── */
.reveal-overlay{
  position:relative;
  cursor:pointer;
  user-select:none;
}
.reveal-overlay .reveal-cover{
  position:absolute;inset:0;
  background:linear-gradient(135deg,#1a1a2e,#16213e);
  display:flex;align-items:center;justify-content:center;
  border-radius:8px;
  font-size:2rem;
  color:var(--accent2);
  transition:opacity 0.8s ease;
  z-index:2;
}
.reveal-overlay.revealed .reveal-cover{opacity:0;pointer-events:none;}

/* ── Incantation ── */
.incantation-text{
  font-size:1.8rem;
  text-align:center;
  color:var(--accent2);
  font-family:var(--font-display);
  margin:1rem 0;
  line-height:1.4;
  text-shadow:0 0 30px rgba(212,168,67,0.2);
}
.incantation-phonetic{text-align:center;color:#aaa;font-size:0.9rem;margin-bottom:1rem;font-style:italic;}
.incantation-meaning{text-align:center;color:var(--ink);font-size:0.95rem;margin-bottom:0.5rem;}

/* ── Ritual Result ── */
.ritual-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:1rem;
  margin:1rem 0;
}
.ritual-item{
  background:var(--bg3);
  border:1px solid #333;
  border-radius:8px;
  padding:1rem;
  text-align:center;
}
.ritual-item .ri-label{color:var(--muted);font-size:0.8rem;}
.ritual-item .ri-value{color:var(--accent2);font-size:1.1rem;font-weight:600;margin-top:0.3rem;}
.ritual-verdict{
  text-align:center;
  padding:1rem;
  border-radius:8px;
  font-size:1.2rem;
  font-weight:600;
  margin-top:1rem;
}
.ritual-verdict.auspicious{background:rgba(212,168,67,0.15);border:1px solid var(--accent2);color:var(--accent2);}
.ritual-verdict.inauspicious{background:rgba(196,30,58,0.15);border:1px solid var(--accent);color:var(--accent);}

/* ── Name Result ── */
.name-result{text-align:center;padding:1.5rem;}
.name-title{font-size:0.85rem;color:var(--muted);margin-bottom:0.3rem;}
.name-generated{font-size:2.2rem;color:var(--accent2);font-family:var(--font-display);margin-bottom:1rem;}
.name-breakdown{text-align:left;max-width:400px;margin:0 auto;}
.name-breakdown .nb-item{padding:0.4rem 0;border-bottom:1px solid #222;display:flex;justify-content:space-between;}
.name-breakdown .nb-item:last-child{border-bottom:none;}
.name-breakdown .nb-label{color:var(--muted);font-size:0.85rem;}
.name-breakdown .nb-value{color:var(--ink);font-size:0.9rem;}

/* ── Planetary Seal ── */
.seal-svg-wrap{text-align:center;margin:1rem 0;}
.seal-svg-wrap svg{max-width:200px;height:auto;filter:drop-shadow(0 0 10px rgba(212,168,67,0.3));}

/* ── Test complete screen ── */
.test-complete{text-align:center;padding:1.5rem;}
.test-complete .result-title{font-size:1.5rem;color:var(--accent2);margin-bottom:1rem;}

/* ════════════════════════════════════════
   TAB 7: DRAGON LANGUAGE TRANSLATOR
   ════════════════════════════════════════ */
.draconic-script{font-size:2.5rem;text-align:center;color:var(--accent2);font-family:var(--font-display);letter-spacing:0.3em;margin:1rem 0;text-shadow:0 0 30px rgba(212,168,67,0.3);}
.power-level{display:inline-block;padding:0.2rem 1rem;border-radius:20px;font-size:0.8rem;font-weight:600;}
.power-low{background:rgba(74,127,181,0.2);color:#4a7fb5;border:1px solid #4a7fb5;}
.power-medium{background:rgba(212,168,67,0.2);color:var(--accent2);border:1px solid var(--accent2);}
.power-high{background:rgba(196,30,58,0.2);color:#c41e3a;border:1px solid #c41e3a;}
.power-ancient{background:rgba(180,100,200,0.2);color:#b464c8;border:1px solid #b464c8;}
.translation-breakdown{margin:1rem 0;}
.translation-breakdown .tb-item{display:flex;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid #222;}
.translation-breakdown .tb-item:last-child{border-bottom:none;}
.translation-breakdown .tb-word{color:var(--accent2);font-weight:600;}
.translation-breakdown .tb-draconic{color:var(--ink);font-family:var(--font-display);}
.translation-breakdown .tb-meaning{color:var(--muted);font-size:0.85rem;}
.history-list{max-height:150px;overflow-y:auto;margin-top:0.5rem;}
.history-list .hl-item{padding:0.3rem 0.6rem;border-bottom:1px solid #222;font-size:0.85rem;display:flex;justify-content:space-between;color:var(--muted);}

/* ════════════════════════════════════════
   TAB 8: TAROT / ORACLE CARDS
   ════════════════════════════════════════ */
.card-container{perspective:1200px;display:flex;justify-content:center;gap:1.5rem;flex-wrap:wrap;margin:1.5rem 0;}
.card-3d{width:180px;height:270px;position:relative;transform-style:preserve-3d;transition:transform 0.8s cubic-bezier(0.4,0,0.2,1);cursor:pointer;}
.card-3d.flipped{transform:rotateY(180deg);}
.card-face{position:absolute;inset:0;border-radius:12px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem;border:2px solid var(--rule2);box-shadow:0 4px 20px rgba(0,0,0,0.5);}
.card-back{background:linear-gradient(135deg,#1a1a2e,#16213e);z-index:2;}
.card-back .sigil-mark{font-size:3rem;color:var(--accent2);opacity:0.6;text-shadow:0 0 20px rgba(212,168,67,0.3);}
.card-back .card-back-text{color:var(--muted);font-size:0.7rem;margin-top:0.5rem;letter-spacing:0.15em;}
.card-front{background:linear-gradient(180deg,#1a1a2e,#0a0a0a);transform:rotateY(180deg);z-index:1;}
.card-front .card-number{color:var(--muted);font-size:0.7rem;position:absolute;top:8px;left:12px;}
.card-front .card-title-zh{font-family:var(--font-display);font-size:1.3rem;color:var(--accent2);text-align:center;}
.card-front .card-element{font-size:0.75rem;color:#aaa;margin-top:0.3rem;}
.card-front .card-meaning{font-size:0.75rem;color:var(--muted);text-align:center;margin-top:0.5rem;line-height:1.4;}
.card-spread{display:flex;justify-content:center;gap:2rem;flex-wrap:wrap;margin:1.5rem 0;}
.card-spread-position{text-align:center;}
.card-spread-position .sp-label{color:var(--muted);font-size:0.8rem;margin-bottom:0.5rem;}

/* ════════════════════════════════════════
   TAB 9: POTION MIXER
   ════════════════════════════════════════ */
.ingredient-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:0.6rem;margin:1rem 0;}
.ingredient-btn{background:var(--bg3);border:1px solid #333;color:var(--ink);padding:0.6rem 0.4rem;border-radius:8px;cursor:pointer;text-align:center;transition:all 0.3s;font-family:var(--font);font-size:0.8rem;}
.ingredient-btn:hover{border-color:var(--accent2);background:rgba(212,168,67,0.1);}
.ingredient-btn.selected{border-color:var(--accent2);background:rgba(212,168,67,0.2);box-shadow:0 0 15px rgba(212,168,67,0.2);}
.ingredient-btn .ing-icon{font-size:1.5rem;display:block;margin-bottom:0.3rem;}
.cauldron-wrap{text-align:center;margin:1rem 0;position:relative;}
.cauldron-wrap canvas{border-radius:50%;background:#0a0a0a;border:2px solid #333;}
.potion-result{display:flex;align-items:center;gap:1rem;padding:1rem;background:var(--bg3);border-radius:8px;border:1px solid #333;margin-top:1rem;}
.potion-color-sample{width:50px;height:50px;border-radius:50%;border:2px solid #555;flex-shrink:0;}
.potion-info{flex:1;}
.potion-info .pi-name{font-size:1.2rem;color:var(--accent2);font-family:var(--font-display);}
.potion-info .pi-effect{color:var(--ink);font-size:0.9rem;margin-top:0.3rem;}
.potion-info .pi-stars{color:var(--accent3);font-size:0.9rem;margin-top:0.2rem;}
.potion-info .pi-use{color:var(--muted);font-size:0.8rem;margin-top:0.2rem;}

/* ════════════════════════════════════════
   TAB 10: ASTROLOGICAL CHART
   ════════════════════════════════════════ */
.chart-wrap{text-align:center;margin:1rem 0;}
.chart-wrap canvas{border-radius:50%;background:#0a0a0a;border:2px solid #333;max-width:100%;}
.chart-reading{margin-top:1rem;padding:1rem;background:var(--bg3);border-radius:8px;border:1px solid #333;line-height:1.8;}
.chart-reading .cr-title{color:var(--accent2);font-family:var(--font-display);font-size:1.2rem;margin-bottom:0.5rem;}
.chart-reading .cr-line{color:var(--ink);font-size:0.9rem;}

/* ════════════════════════════════════════
   TAB 11: ADVANCED SIGIL FORGE
   ════════════════════════════════════════ */
.sigil-method-select{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem;}
.sigil-method-btn{background:var(--bg3);border:1px solid #333;color:var(--muted);padding:0.5rem 1rem;border-radius:8px;cursor:pointer;font-family:var(--font);font-size:0.85rem;transition:all 0.3s;}
.sigil-method-btn:hover{border-color:var(--accent2);color:var(--accent2);}
.sigil-method-btn.active{border-color:var(--accent2);background:rgba(212,168,67,0.15);color:var(--accent2);}
.sigil-controls-row{display:flex;flex-wrap:wrap;gap:1rem;align-items:center;margin-bottom:1rem;}
.sigil-controls-row label{color:#aaa;font-size:0.8rem;}
.sigil-controls-row input[type="color"]{width:40px;height:40px;border:1px solid #333;border-radius:6px;background:transparent;cursor:pointer;padding:2px;}
.sigil-canvas-wrap{text-align:center;position:relative;margin:1rem 0;}
.sigil-canvas-wrap canvas{border:1px solid #333;background:#0a0a0a;border-radius:8px;max-width:100%;}
.particle-burst{position:absolute;pointer-events:none;top:50%;left:50%;}
.sigil-interpretation{margin-top:1rem;padding:1rem;background:var(--bg3);border-radius:8px;border:1px solid #333;}

/* ════════════════════════════════════════
   TAB 12: DREAM ORACLE
   ════════════════════════════════════════ */
.dream-tags{display:flex;flex-wrap:wrap;gap:0.5rem;margin:0.5rem 0;}
.dream-tag{background:var(--bg3);border:1px solid #333;color:var(--muted);padding:0.3rem 0.8rem;border-radius:20px;cursor:pointer;font-size:0.85rem;transition:all 0.3s;font-family:var(--font);}
.dream-tag:hover{border-color:var(--accent2);color:var(--accent2);}
.dream-tag.selected{background:rgba(212,168,67,0.15);border-color:var(--accent2);color:var(--accent2);}
.dream-type-badge{display:inline-block;padding:0.2rem 1rem;border-radius:20px;font-size:0.8rem;font-weight:600;margin-right:0.5rem;}
.dream-type-预言{background:rgba(212,168,67,0.2);color:var(--accent2);border:1px solid var(--accent2);}
.dream-type-警告{background:rgba(196,30,58,0.2);color:#c41e3a;border:1px solid #c41e3a;}
.dream-type-启示{background:rgba(74,127,181,0.2);color:#4a7fb5;border:1px solid #4a7fb5;}
.dream-type-考验{background:rgba(180,100,200,0.2);color:#b464c8;border:1px solid #b464c8;}
.dream-type-回忆{background:rgba(139,105,20,0.2);color:#8B6914;border:1px solid #8B6914;}
.dream-symbol-item{padding:0.6rem;background:var(--bg3);border-radius:8px;border:1px solid #333;margin-bottom:0.5rem;}
.dream-symbol-item .ds-word{color:var(--accent2);font-weight:600;}
.dream-symbol-item .ds-interp{color:var(--ink);font-size:0.9rem;margin-top:0.3rem;}

.numero-card{background:var(--bg3);border:1px solid #333;border-radius:10px;padding:1rem;text-align:center;transition:all 0.3s;}

.numero-card .nc-element.water{background:rgba(74,127,181,0.2);color:#4a7fb5;border:1px solid #4a7fb5;}
.numero-card .nc-element.spirit{background:rgba(180,100,200,0.2);color:#b464c8;border:1px solid #b464c8;}
.numero-interp{margin-top:1rem;padding:1.2rem;background:var(--bg3);border-radius:8px;border:1px solid var(--rule2);}

.numero-tarot .nt-value{color:var(--accent2);font-family:var(--font-display);font-size:1.1rem;}

.pathworking-read .pr-text{color:var(--ink);font-size:0.9rem;line-height:1.7;}

/* =====================================================================
   PARTICLE BACKGROUND
   ===================================================================== */
(function(){
  const c=document.getElementById('particleCanvas');
  const ctx=c.getContext('2d');
  let w,h,particles=[];
  function resize(){w=c.width=window.innerWidth;h=c.height=window.innerHeight;}
  window.addEventListener('resize',resize);resize();
  const count=80;
  for(let i=0;i<count;i++){
    particles.push({
      x:Math.random()*w,y:Math.random()*h,
      vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,
      r:Math.random()*2+0.5,o:Math.random()*0.5+0.1
    });
  }
  function draw(){
    ctx.clearRect(0,0,w,h);
    for(let i=0;i<count;i++){
      const p=particles[i];
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=w;if(p.x>w)p.x=0;
      if(p.y<0)p.y=h;if(p.y>h)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(212,168,67,${p.o})`;ctx.fill();
    }
    for(let i=0;i<count;i++){
      for(let j=i+1;j<count;j++){
        const dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<120){
          ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);
          ctx.lineTo(particles[j].x,particles[j].y);
          ctx.strokeStyle=`rgba(212,168,67,${0.06*(1-dist/120)})`;
          ctx.lineWidth=0.5;ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

function generateSigil(){
  const key=document.getElementById('planetSelect').value;
  const data=planetaryData[key];
  if(!data)return;
  const canvas=document.getElementById('sigilCanvas');
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);

  const size=data.size;
  const margin=40;
  const cellW=(W-margin*2)/size;
  const cellH=(H-margin*2)/size;

  // Draw Kamea grid
  ctx.strokeStyle='#333';
  ctx.lineWidth=1;
  for(let i=0;i<=size;i++){
    const x=margin+i*cellW;
    ctx.beginPath();ctx.moveTo(x,margin);ctx.lineTo(x,H-margin);ctx.stroke();
  }
  for(let i=0;i<=size;i++){
    const y=margin+i*cellH;
    ctx.beginPath();ctx.moveTo(margin,y);ctx.lineTo(W-margin,y);ctx.stroke();
  }

  // Draw numbers
  ctx.fillStyle='#8a7e6e';
  ctx.font='13px "Noto Serif SC",serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(let r=0;r<size;r++){
    for(let c=0;c<size;c++){
      const x=margin+c*cellW+cellW/2;
      const y=margin+r*cellH+cellH/2;
      ctx.fillText(data.kamea[r][c],x,y);
    }
  }

  // Draw sigil from seed (using planet name as seed)
  const seed=key;
  const numSeq=[];
  for(let i=0;i<seed.length;i++){
    const code=seed.charCodeAt(i);
    const num=(code%81)+1;
    if(!numSeq.includes(num))numSeq.push(num);
  }
  // Ensure we have enough points
  while(numSeq.length<4){
    numSeq.push(Math.floor(Math.random()*81)+1);
  }
  // Map numbers to positions on Kamea
  const positions=[];
  for(let n of numSeq.slice(0,8)){
    let found=false;
    for(let r=0;r<size;r++){
      for(let c=0;c<size;c++){
        if(data.kamea[r][c]===n){
          positions.push({x:margin+c*cellW+cellW/2,y:margin+r*cellH+cellH/2});
          found=true;break;
        }
      }
      if(found)break;
    }
  }

  // Draw sigil lines
  if(positions.length>1){
    ctx.strokeStyle='#d4a843';
    ctx.lineWidth=2.5;
    ctx.shadowColor='rgba(212,168,67,0.5)';
    ctx.shadowBlur=10;
    ctx.beginPath();
    ctx.moveTo(positions[0].x,positions[0].y);
    for(let i=1;i<positions.length;i++){
      ctx.lineTo(positions[i].x,positions[i].y);
    }
    ctx.stroke();
    ctx.shadowBlur=0;

    // Draw nodes
    for(let p of positions){
      ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);
      ctx.fillStyle='#d4a843';
      ctx.shadowColor='rgba(212,168,67,0.6)';
      ctx.shadowBlur=8;
      ctx.fill();
      ctx.shadowBlur=0;
    }
  }

  // Draw border
  ctx.strokeStyle='#d4a84344';
  ctx.lineWidth=1;
  ctx.strokeRect(margin-5,margin-5,W-margin*2+10,H-margin*2+10);

  // Draw Seal SVG
  drawSeal(data);
}

function generateIncantation(){
  const intent=document.getElementById('intentSelect').value;
  const style=document.getElementById('styleSelect').value;
  const intentInfo=intentMap[intent];
  const styleInfo=incantData.styles[style];

  // Build incantation phrase
  const parts=[];
  const numWords=3+Math.floor(Math.random()*3);
  for(let i=0;i<numWords;i++){
    let word='';
    const sylCount=2+Math.floor(Math.random()*2);
    for(let j=0;j<sylCount;j++){
      word+=incantData.latinSyls[Math.floor(Math.random()*incantData.latinSyls.length)];
    }
    if(i===0){
      word=intentInfo.prefix+word.slice(0,3);
    }
    if(Math.random()>0.5)word+=styleInfo.suffix;
    parts.push(word);
  }

  const glue=styleInfo.glue[Math.floor(Math.random()*styleInfo.glue.length)];
  const incantation=parts.join(' '+glue+' ');

  // Phonetic pronunciation
  const phonetic=parts.map(w=>{
    return w.replace(/([aeiou])/g,'$1 ').trim().split(' ').map(s=>s.toUpperCase()).join('-');
  }).join(' ‧ ');

  // Meaning
  const styleNames={majestic:'庄严',ancient:'远古',chaos:'混沌',dragon:'龙语'};
  const meaning=`${styleNames[style]}风格的${intentInfo.keywords[Math.floor(Math.random()*intentInfo.keywords.length)]}咒语 · 蕴含${intentInfo.energy} · 咏唱时需集中意念于${intentInfo.keywords[Math.floor(Math.random()*intentInfo.keywords.length)]}之意图`;

  document.getElementById('incantText').textContent=incantation;
  document.getElementById('incantPhonetic').textContent=`发音：${phonetic}`;
  document.getElementById('incantMeaning').textContent=`释义：${meaning}`;
}

const dayRulers=['太阳','月亮','火星','水星','木星','金星','土星'];
const dayRulerZH=['日曜日 — 太阳','月曜日 — 月亮','火曜日 — 火星','水曜日 — 水星','木曜日 — 木星','金曜日 — 金星','土曜日 — 土星'];

function calculateRitualTime(){
  const birthStr=document.getElementById('birthDate').value;
  const targetStr=document.getElementById('targetDate').value;
  if(!birthStr||!targetStr){
    document.getElementById('ritualResult').innerHTML='<div style="color:var(--accent);text-align:center;">请选择出生日期和目标日期。</div>';
    return;
  }

  const birth=new Date(birthStr);
  const target=new Date(targetStr);
  const diffDays=Math.floor((target-birth)/86400000);
  const birthYear=birth.getFullYear();

  // Moon phase calculation (simplified)
  const knownNewMoon=new Date(2000,0,6,18,14,0);
  const daysSince=Math.floor((target-knownNewMoon)/86400000);
  const lunarCycle=29.53058867;
  const moonAge=((daysSince%lunarCycle)+lunarCycle)%lunarCycle;
  const moonPhase=moonAge/lunarCycle; // 0=new, 0.5=full

  let phaseName,phaseDesc,phaseFavorable;
  if(moonPhase<0.0625||moonPhase>0.9375){
    phaseName='🌑 新月';phaseDesc='新的开始，适合播种与开启新仪式';phaseFavorable=true;
  }else if(moonPhase<0.1875){
    phaseName='🌒 蛾眉月';phaseDesc='初生之力，适合成长型魔法';phaseFavorable=true;
  }else if(moonPhase<0.3125){
    phaseName='🌓 上弦月';phaseDesc='力量增长，适合建设性仪式';phaseFavorable=true;
  }else if(moonPhase<0.4375){
    phaseName='🌔 盈凸月';phaseDesc='力量充沛，适合大多数魔法工作';phaseFavorable=true;
  }else if(moonPhase<0.5625){
    phaseName='🌕 满月';phaseDesc='力量巅峰，适合强力仪式与召唤';phaseFavorable=true;
  }else if(moonPhase<0.6875){
    phaseName='🌖 亏凸月';phaseDesc='力量衰退，适合驱散与净化';phaseFavorable=false;
  }else if(moonPhase<0.8125){
    phaseName='🌗 下弦月';phaseDesc='力量减弱，适合结束与释放';phaseFavorable=false;
  }else{
    phaseName='🌘 残月';phaseDesc='黑暗时期，适合深层冥想与封印';phaseFavorable=false;
  }

  // Day of week ruler
  const dayOfWeek=target.getDay(); // 0=Sun
  const ruler=dayRulers[dayOfWeek];
  const rulerZH=dayRulerZH[dayOfWeek];

  // Planetary hour (simplified - based on day ruler)
  const hour=target.getHours();
  const planetaryHours=['土星','木星','火星','太阳','金星','水星','月亮'];
  const dayStart=dayOfWeek;
  const planetaryHourIndex=(dayStart+(hour%24))%7;
  const currentPlanetaryHour=planetaryHours[planetaryHourIndex];

  // Auspicious calculation
  let score=0;
  if(phaseFavorable)score+=2;
  if(dayOfWeek===0||dayOfWeek===4)score+=1; // Sun or Jupiter day
  if(moonPhase>0.25&&moonPhase<0.75)score+=1;
  if(planetaryHourIndex===0||planetaryHourIndex===3||planetaryHourIndex===4)score+=1; // Saturn/Sun/Venus hours
  const auspicious=score>=3;

  // Personal day number
  const personalDay=((diffDays%9)+9)%9+1;
  const personalDayMeanings=[
    '新的开始','合作与平衡','创造力表达','稳定与建设','变化与自由','责任与和谐','灵性探索','力量与成就','完成与释放'
  ];

  document.getElementById('ritualResult').innerHTML=`
    <div class="ritual-grid">
      <div class="ritual-item">
        <div class="ri-label">月相</div>
        <div class="ri-value">${phaseName}</div>
        <div style="color:#aaa;font-size:0.8rem;margin-top:0.3rem;">${phaseDesc}</div>
      </div>
      <div class="ritual-item">
        <div class="ri-label">星期主宰</div>
        <div class="ri-value">${rulerZH}</div>
      </div>
      <div class="ritual-item">
        <div class="ri-label">当前行星时</div>
        <div class="ri-value">${currentPlanetaryHour}</div>
      </div>
      <div class="ritual-item">
        <div class="ri-label">个人日数</div>
        <div class="ri-value">${personalDay}</div>
        <div style="color:#aaa;font-size:0.8rem;margin-top:0.3rem;">${personalDayMeanings[personalDay-1]}</div>
      </div>
      <div class="ritual-item">
        <div class="ri-label">月龄</div>
        <div class="ri-value">${moonAge.toFixed(1)}天</div>
      </div>
      <div class="ritual-item">
        <div class="ri-label">出生后天数</div>
        <div class="ri-value">${diffDays}天</div>
      </div>
    </div>
    <div class="ritual-verdict ${auspicious?'auspicious':'inauspicious'}">
      ${auspicious?'✦ 此日宜行仪式 — 能量充沛，诸事顺遂 ✦':'✧ 此日宜静修 — 适合冥想与内在工作 ✧'}
      <div style="font-size:0.85rem;margin-top:0.4rem;font-weight:400;">
        ${auspicious?'月相有利，行星时契合，建议在'+currentPlanetaryHour+'时进行主要仪式工作。':'能量较为收敛，建议进行净化和冥想类工作。'}
      </div>
    </div>
  `;
}

function submitElementTest(){
  const scores={fire:0,water:0,earth:0,air:0};
  let answered=0;
  for(let i=0;i<elementQuestions.length;i++){
    const sel=document.querySelector(`input[name="q${i}"]:checked`);
    if(sel){scores[sel.value]++;answered++;}
  }
  if(answered<elementQuestions.length){
    alert(`请回答所有问题（已答 ${answered}/${elementQuestions.length} 题）`);
    return;
  }

  const maxVal=Math.max(...Object.values(scores));
  const minVal=Math.min(...Object.values(scores));
  const dominant=Object.keys(scores).find(k=>scores[k]===maxVal);
  const weakest=Object.keys(scores).find(k=>scores[k]===minVal);
  const dominantInfo=elementInfo[dominant];
  const weakestInfo=elementInfo[weakest];

  // Canvas bar chart
  const barCanvas=document.createElement('canvas');
  barCanvas.width=500;barCanvas.height=260;
  barCanvas.style.maxWidth='100%';
  barCanvas.style.margin='1rem auto';
  barCanvas.style.display='block';
  barCanvas.style.borderRadius='8px';
  barCanvas.style.background='#111';

  const bctx=barCanvas.getContext('2d');
  const barData=[
    {label:'火',score:scores.fire,color:'#c41e3a'},
    {label:'水',score:scores.water,color:'#4a7fb5'},
    {label:'土',score:scores.earth,color:'#8B6914'},
    {label:'风',score:scores.air,color:'#b0b0c8'}
  ];
  const maxScore=Math.max(scores.fire,scores.water,scores.earth,scores.air,1);
  const barW=70;const gap=30;const startX=60;const startY=210;const maxH=160;

  bctx.clearRect(0,0,500,260);
  bctx.fillStyle='#222';bctx.font='11px "Noto Serif SC",serif';
  bctx.textAlign='center';

  barData.forEach((item,i)=>{
    const x=startX+i*(barW+gap);
    const h=(item.score/maxScore)*maxH;
    const y=startY-h;

    // Bar shadow
    bctx.shadowColor=item.color+'44';
    bctx.shadowBlur=12;

    // Gradient
    const grad=bctx.createLinearGradient(x,startY,x,y);
    grad.addColorStop(0,item.color+'88');
    grad.addColorStop(1,item.color);
    bctx.fillStyle=grad;
    bctx.beginPath();
    const r=4;
    bctx.moveTo(x+r,startY);
    bctx.lineTo(x+barW-r,startY);
    bctx.quadraticCurveTo(x+barW,startY,x+barW,startY-r);
    bctx.lineTo(x+barW,y+r);
    bctx.quadraticCurveTo(x+barW,y,x+barW-r,y);
    bctx.lineTo(x+r,y);
    bctx.quadraticCurveTo(x,y,x,y+r);
    bctx.lineTo(x,startY-r);
    bctx.quadraticCurveTo(x,startY,x+r,startY);
    bctx.closePath();
    bctx.fill();
    bctx.shadowBlur=0;

    // Label
    bctx.fillStyle='#aaa';
    bctx.font='13px "Noto Serif SC",serif';
    bctx.fillText(item.label,x+barW/2,startY+18);
    bctx.fillStyle=item.color;
    bctx.font='bold 15px "Noto Serif SC",serif';
    bctx.fillText(item.score.toFixed(0),x+barW/2,y-8);
  });

function reduceNumber(n, allowMaster=true) {
  if (allowMaster && (n === 11 || n === 22 || n === 33)) return n;
  while (n > 9) {
    let s = 0;
    while (n > 0) { s += n % 10; n = Math.floor(n / 10); }
    n = s;
    if (allowMaster && (n === 11 || n === 22 || n === 33)) break;
  }
  return n;
}

function calculateNumerology() {
  const dateStr = document.getElementById('numeroBirthDate').value;
  if (!dateStr) {
    document.getElementById('numeroResult').innerHTML = '<div style="color:var(--accent);text-align:center;">请选择出生日期。</div>';
    return;
  }
  const parts = dateStr.split('-');
  const year = parseInt(parts[0]);
  const month = parseInt(parts[1]);
  const day = parseInt(parts[2]);

  // Life Path Number: sum of all digits
  const allDigits = dateStr.replace(/-/g, '').split('').map(Number);
  const lpSum = allDigits.reduce((a, b) => a + b, 0);
  const lifePath = reduceNumber(lpSum);

  // Expression Number: sum of reduced month + reduced day + reduced year
  const exprSum = reduceNumber(month, false) + reduceNumber(day, false) + reduceNumber(year, false);
  const expression = reduceNumber(exprSum);

  // Soul Urge (Heart's Desire): based on day (inner self)
  const soulUrge = reduceNumber(day, false);

  // Personality Number: based on month + year
  const persSum = reduceNumber(month, false) + reduceNumber(year, false);
  const personality = reduceNumber(persSum);

  const numbers = [
    { name: '生命路径', key: 'lifePath', value: lifePath },
    { name: '表达', key: 'expression', value: expression },

  const mainMeaning = numeroMeanings[lifePath] || numeroMeanings[reduceNumber(lifePath, false)];

function drawTreeOfLife(highlightSephirah) {
  const canvas = document.getElementById('treeCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);

  // Draw 3 pillars guides (column lines)
  ctx.strokeStyle = 'rgba(212,168,67,0.04)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4,6]);
  // Left pillar (Chokmah, Chesed, Netzach)
  ctx.beginPath(); ctx.moveTo(150, 0); ctx.lineTo(120, 600); ctx.stroke();
  // Center pillar (Keter, Tiferet, Yesod, Malkuth)
  ctx.beginPath(); ctx.moveTo(250, 0); ctx.lineTo(250, 600); ctx.stroke();
  // Right pillar (Binah, Gevurah, Hod)
  ctx.beginPath(); ctx.moveTo(350, 0); ctx.lineTo(380, 600); ctx.stroke();
  ctx.setLineDash([]);

  // Draw paths (lines between sephiroth)
  treePaths.forEach(path => {
    const from = treeLayout[path[0]];
    const to = treeLayout[path[1]];
    ctx.beginPath();
    ctx.moveTo(from.x, from.y);
    ctx.lineTo(to.x, to.y);
    ctx.strokeStyle = 'rgba(212,168,67,0.15)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  });

  // Draw Sephiroth
  Object.keys(sephirothData).forEach(key => {
    const data = sephirothData[key];
    const pos = treeLayout[key];
    const isHighlight = key === highlightSephirah;

    // Glow
    const grad = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, 35);
    grad.addColorStop(0, isHighlight ? 'rgba(255,215,0,0.3)' : 'rgba(212,168,67,0.08)');
    grad.addColorStop(1, 'rgba(212,168,67,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(pos.x, pos.y, 35, 0, Math.PI*2); ctx.fill();

    // Circle
    ctx.beginPath(); ctx.arc(pos.x, pos.y, 20, 0, Math.PI*2);
    ctx.strokeStyle = isHighlight ? '#ffd700' : 'rgba(212,168,67,0.6)';
    ctx.lineWidth = isHighlight ? 3 : 1.5;
    ctx.stroke();
    ctx.fillStyle = isHighlight ? 'rgba(255,215,0,0.15)' : 'rgba(212,168,67,0.05)';
    ctx.fill();

    // Number
    ctx.fillStyle = 'rgba(212,168,67,0.4)';
    ctx.font = '10px "Noto Serif SC",serif';
    ctx.textAlign = 'center';
    ctx.fillText(data.num, pos.x, pos.y - 28);

    // Name
    ctx.fillStyle = isHighlight ? '#ffd700' : '#d4a843';
    ctx.font = '13px "Ma Shan Zheng",cursive';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(data.name, pos.x, pos.y);
    ctx.textBaseline = 'alphabetic';
  });

  // Title
  ctx.fillStyle = 'rgba(212,168,67,0.2)';
  ctx.font = '12px "Noto Serif SC",serif';
  ctx.textAlign = 'center';
  ctx.fillText('עץ החיים · 卡巴拉生命之树', 250, 590);
}

// Canvas click handler for tree
document.addEventListener('DOMContentLoaded', function() {
  const canvas = document.getElementById('treeCanvas');
  if (!canvas) return;
  canvas.addEventListener('click', function(e) {
    const rect = this.getBoundingClientRect();
    const scaleX = this.width / rect.width;
    const scaleY = this.height / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;

    // Find closest sephirah
    let closest = null, minDist = 30;
    Object.keys(treeLayout).forEach(key => {
      const pos = treeLayout[key];
      const dist = Math.sqrt((mx - pos.x)**2 + (my - pos.y)**2);
      if (dist < minDist) { minDist = dist; closest = key; }
    });
    if (closest) showSephirahInfo(closest);
  });
});

    </div>
  `;
}

let currentRuneType = 'norse';
let runeCanvasClickHandler = null;

function setRuneType(type) {
  currentRuneType = type;
  document.querySelectorAll('.rune-type-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.rune-type-btn[data-rune-type="${type}"]`).classList.add('active');
  drawRunicCircle(null);
  document.getElementById('runeDetailPanel').classList.remove('visible');
}

function drawRunicCircle(hoverIndex) {
  const canvas = document.getElementById('runicCircleCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2;
  const outerR = Math.min(W, H)/2 - 30;
  const innerR = outerR - 60;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);

  const runes = runeSets[currentRuneType].runes;
  const count = runes.length;
  const angleStep = (Math.PI * 2) / count;

  // Outer circle
  ctx.beginPath(); ctx.arc(cx, cy, outerR + 10, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(212,168,67,0.2)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Inner circle
  ctx.beginPath(); ctx.arc(cx, cy, innerR - 10, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(212,168,67,0.1)';
  ctx.lineWidth = 1;
  ctx.setLineDash([3,5]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Center mark
  ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(212,168,67,0.3)';
  ctx.fill();

  // Radial lines
  for (let i = 0; i < count; i++) {
    const angle = -Math.PI/2 + i * angleStep;
    const r1x = cx + innerR * Math.cos(angle);
    const r1y = cy + innerR * Math.sin(angle);
    const r2x = cx + outerR * Math.cos(angle);
    const r2y = cy + outerR * Math.sin(angle);
    ctx.beginPath(); ctx.moveTo(r1x, r1y); ctx.lineTo(r2x, r2y);
    ctx.strokeStyle = 'rgba(212,168,67,0.08)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Draw runes
  runes.forEach((rune, i) => {
    const angle = -Math.PI/2 + i * angleStep;
    const r = (innerR + outerR) / 2;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    const isHover = i === hoverIndex;

    // Background circle
    ctx.beginPath(); ctx.arc(x, y, isHover ? 28 : 22, 0, Math.PI*2);
    ctx.fillStyle = isHover ? 'rgba(255,215,0,0.12)' : 'rgba(212,168,67,0.03)';
    ctx.fill();
    ctx.strokeStyle = isHover ? '#ffd700' : 'rgba(212,168,67,0.25)';
    ctx.lineWidth = isHover ? 2 : 1;
    ctx.stroke();

    // Rune symbol
    ctx.fillStyle = isHover ? '#ffd700' : '#d4a843';
    ctx.font = isHover ? '24px "Noto Serif SC",serif' : '20px "Noto Serif SC",serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(rune.symbol, x, y - 6);

    // Name
    ctx.fillStyle = isHover ? '#ccc' : 'rgba(212,168,67,0.6)';
    ctx.font = '8px "Noto Serif SC",serif';
    ctx.fillText(rune.zh, x, y + 12);
  });

  // Title
  ctx.fillStyle = 'rgba(212,168,67,0.15)';
  ctx.font = '11px "Noto Serif SC",serif';
  ctx.textAlign = 'center';
  ctx.fillText(runeSets[currentRuneType].name + ' · 符文魔法阵', cx, H - 8);

  // Click handler
  if (runeCanvasClickHandler) {
    canvas.removeEventListener('click', runeCanvasClickHandler);
  }
  runeCanvasClickHandler = function(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;
    const cx2 = canvas.width/2, cy2 = canvas.height/2;
    const r = (innerR + outerR) / 2;

    let closest = -1, minDist = 30;
    runes.forEach((_, i) => {
      const angle = -Math.PI/2 + i * angleStep;
      const rx = cx2 + r * Math.cos(angle);
      const ry = cy2 + r * Math.sin(angle);
      const dist = Math.sqrt((mx - rx)**2 + (my - ry)**2);
      if (dist < minDist) { minDist = dist; closest = i; }
    });
    if (closest >= 0) showRuneDetail(closest);
  };
  canvas.addEventListener('click', runeCanvasClickHandler);
}

function showRuneDetail(index) {
  const runes = runeSets[currentRuneType].runes;

  const runes = runeSets[currentRuneType].runes;
  const indices = [];

  const positions = ['过去', '现在', '未来'];
  const elemMap = {fire:'🔥',earth:'🌍',air:'🌪️',water:'💧',spirit:'✨'};

  let cardsHtml = indices.map((idx, i) => {

    return `<div class="rune-cast-card">
      <div class="rcc-symbol">${r.symbol}</div>
      <div class="rcc-name">${r.zh}</div>
      <div class="rcc-pos">${positions[i]}</div>

function getIntentKey(intent) {
  const map = {
    '保护':'protection','防护':'protection','护盾':'protection','防御':'protection','结界':'protection',
    '财富':'wealth','金钱':'wealth','丰盛':'wealth','富足':'wealth','繁荣':'wealth',
    '智慧':'wisdom','知识':'wisdom','学习':'wisdom','启迪':'wisdom','开悟':'wisdom',
    '爱情':'love','爱':'love','感情':'love','关系':'love','浪漫':'love',
    '力量':'strength','勇气':'strength','力量':'strength','强大':'strength','意志':'strength',
    '治愈':'healing','疗愈':'healing','健康':'healing','治疗':'healing','康复':'healing'
  };
  for (const [key, val] of Object.entries(map)) {
    if (intent.includes(key)) return val;
  }
  return 'general';
}

function exportChaosRitual() {

    lines.join('\n') + '\n\n' +

function translateDragon() {
  var input = document.getElementById('dragonInput').value.trim();
  if(!input){document.getElementById('dragonResult').innerHTML='<div style="color:var(--accent);text-align:center;">请输入文字</div>';return;}
  var words = input.replace(/[，。！？、；：""''（）\s]/g,' ').split(' ');
  var translated = [];
  words.forEach(function(w){
    if(!w)return;
    var found = dragonVocab.find(function(v){return v.zh===w;});
    if(found) translated.push(found.draconic);
    else translated.push('['+w+']');
  });
  var result = translated.join(' ‧ ');
  // Draw draconic script on canvas
  var canvas = document.getElementById('dragonScriptCanvas');
  canvas.style.display = 'block';
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle = '#d4a843'; ctx.lineWidth = 2;
  var cx = canvas.width/2, cy = canvas.height/2;
  for(var i=0;i<result.length;i++){
    var angle = (i/result.length)*Math.PI*2;
    var r = 30+Math.sin(i)*15;
    var x = cx+Math.cos(angle)*r;
    var y = cy+Math.sin(angle)*r*0.6;
    ctx.beginPath(); ctx.arc(x,y,3+Math.sin(i*0.5)*2,0,Math.PI*2); ctx.fillStyle = '#d4a843'; ctx.fill();
    if(i>0){var pa = (i-1)/result.length*Math.PI*2; var px=cx+Math.cos(pa)*r, py=cy+Math.sin(pa)*r*0.6; ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(x,y); ctx.stroke();}
  }
  ctx.font = '20px "Ma Shan Zheng",cursive'; ctx.fillStyle = '#d4a843'; ctx.textAlign = 'center';
  ctx.fillText('✦ 龙语符文 ✦',cx,cy+5);
  document.getElementById('dragonResult').innerHTML = '<div style="padding:1rem;"><div class="name-generated" style="font-size:1.3rem;">'+result+'</div><div style="color:#aaa;font-size:0.85rem;margin-top:0.5rem;">龙语符文已绘制于上方</div></div>';
  // Save to history
  var history = safeGetItem('af_dragon_history','[]');
  history.unshift({input:input,result:result,time:new Date().toLocaleString()});
  if(history.length>10)history.pop();
  safeSetItem('af_dragon_history',history);
  renderDragonHistory();
}

  var birth = new Date(dateStr+'T'+(timeStr||'12:00'));

  if(!document.getElementById('chartCanvas')){canvas.id='chartCanvas';canvas.className='gen-canvas';canvas.width=500;canvas.height=500;document.querySelector('#tab-chart .controls-row').after(canvas);}
  var w=500,h=500,cx=250,cy=250;
  ctx.clearRect(0,0,w,h);
  // Draw zodiac wheel
  var signs = ['♈白羊','♉金牛','♊双子','♋巨蟹','♌狮子','♍处女','♎天秤','♏天蝎','♐射手','♑摩羯','♒水瓶','♓双鱼'];
  for(var i=0;i<12;i++){
    var a1=i*Math.PI/6-Math.PI/2,a2=(i+1)*Math.PI/6-Math.PI/2;
    ctx.beginPath(); ctx.moveTo(cx+Math.cos(a1)*160,cy+Math.sin(a1)*160);
    ctx.arc(cx,cy,160,a1,a2); ctx.strokeStyle='#333'; ctx.lineWidth=1; ctx.stroke();
    var mx=cx+Math.cos((a1+a2)/2)*140, my=cy+Math.sin((a1+a2)/2)*140;
    ctx.fillStyle='#d4a843'; ctx.font='12px "Noto Serif SC",serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(signs[i],mx,my);
  }
  // Draw inner circles
  for(var r=80;r<161;r+=40){ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='rgba(212,168,67,0.1)';ctx.lineWidth=0.5;ctx.stroke();}
  // Center
  ctx.fillStyle='#d4a843'; ctx.font='16px "Ma Shan Zheng",cursive'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('星盘',cx,cy-10);
  ctx.fillStyle='#666'; ctx.font='10px "Noto Serif SC",serif';
  ctx.fillText(birth.toLocaleDateString('zh-CN'),cx,cy+15);
  // Planets
  var planets = ['☉太阳','☽月亮','♂火星','♀金星','☿水星','♃木星','♄土星'];
  var colors = ['#d4a843','#c0c0d0','#c41e3a','#c8a0c8','#8ab8d0','#b8a040','#5a4a3a'];
  for(var i=0;i<planets.length;i++){
    var ang = (i/planets.length)*Math.PI*2 + birth.getDate()*0.1;
    var dist = 80+Math.sin(i*2.5)*40;
    var px=cx+Math.cos(ang)*dist, py=cy+Math.sin(ang)*dist;
    ctx.beginPath(); ctx.arc(px,py,6,0,Math.PI*2); ctx.fillStyle=colors[i]; ctx.fill();
    ctx.fillStyle='#eee'; ctx.font='8px sans-serif'; ctx.textAlign='center'; ctx.fillText(planets[i].split(' ')[0],px,py+15);
  }
  // Reading
  var moonPhase = ['新月','蛾眉月','上弦月','盈凸月','满月','亏凸月','下弦月','残月'][Math.floor((birth.getDate()%29.53)/3.69)];
  var rising = signs[birth.getHours()%12];
  document.getElementById('chartResult').innerHTML =
    '<div class="chart-reading"><div class="cr-title">✦ 星盘解读 ✦</div><div class="cr-line">上升星座：'+rising+'</div><div class="cr-line">月相：'+moonPhase+'</div><div class="cr-line">行星布局：'+planets.length+'颗行星</div><div class="cr-line" style="color:#aaa;margin-top:0.5rem;">出生时间：'+birth.toLocaleString('zh-CN')+'</div><div class="cr-line" style="color:#aaa;">本命盘显示了个人的先天潜能与人生课题。</div></div>';
}

function generateAdvSigil(){
  var canvas = document.getElementById('advSigilCanvas');
  var ctx = canvas.getContext('2d');
  var w = 400, h = 400;
  ctx.clearRect(0,0,w,h);
  var color = document.getElementById('sigilColor').value;
  var planet = document.getElementById('advPlanetSelect').value;
  // Draw base shape
  ctx.strokeStyle = color; ctx.lineWidth = 2;
  if(sigilMethod==='circle'){
    for(var i=0;i<8;i++){var a=i*Math.PI/4;ctx.beginPath();ctx.moveTo(w/2+Math.cos(a)*180,w/2+Math.sin(a)*180);ctx.lineTo(w/2-Math.cos(a)*40,w/2-Math.sin(a)*40);ctx.stroke();}
    ctx.beginPath();ctx.arc(w/2,h/2,180,0,Math.PI*2);ctx.stroke();
  }else if(sigilMethod==='square'){
    var s = 160; ctx.strokeRect(w/2-s/2,h/2-s/2,s,s);
    ctx.beginPath();ctx.moveTo(w/2-s/2,h/2-s/2);ctx.lineTo(w/2+s/2,h/2+s/2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(w/2+s/2,h/2-s/2);ctx.lineTo(w/2-s/2,h/2+s/2);ctx.stroke();
    for(var i=0;i<4;i++){var x=w/2-s/2+i*s/4;var y=h/2-s/2+i*s/4;ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();}
  }else{
    for(var i=0;i<6;i++){var a=i*Math.PI/3-Math.PI/2;var x=w/2+Math.cos(a)*150,y=h/2+Math.sin(a)*150;ctx.lineTo(x,y);}
    ctx.closePath();ctx.stroke();
    ctx.beginPath();ctx.arc(w/2,h/2,80,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.arc(w/2,h/2,40,0,Math.PI*2);ctx.stroke();
    for(var i=0;i<6;i++){var a=i*Math.PI/3-Math.PI/2;var x=w/2+Math.cos(a)*120,y=h/2+Math.sin(a)*120;ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();}
  }
  // Planet symbol
  var symbols = {saturn:'♄',jupiter:'♃',mars:'♂',sun:'☉',venus:'♀',mercury:'☿',moon:'☽'};
  ctx.fillStyle = color; ctx.font = '30px "Noto Serif SC",serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(symbols[planet]||'✦',w/2,h/2);
  // Interpretation
  var interp = document.getElementById('sigilInterpretation');
  var names = {saturn:'土星',jupiter:'木星',mars:'火星',sun:'太阳',venus:'金星',mercury:'水星',moon:'月亮'};
  var powers = {saturn:'约束与结构',jupiter:'扩张与丰盛',mars:'力量与勇气',sun:'生命与荣耀',venus:'爱与美',mercury:'智慧与沟通',moon:'直觉与梦境'};
  interp.innerHTML = '<div style="color:var(--accent2);font-family:var(--font-display);font-size:1.2rem;margin-bottom:0.3rem;">'+names[planet]+' · '+powers[planet]+'</div><div style="color:var(--ink);font-size:0.85rem;">此法轮已唤醒'+names[planet]+'的'+powers[planet]+'之力。建议在'+names[planet]+'的时辰佩戴或放置于祭坛上。</div>';
}

const weatherData = {
  tornado:{name:'龙卷风',icon:'🌪',color:'#5a4a3a',particles:50,duration:'2-5分钟',significance:'混沌力量的集中爆发，预示变故与清洗',planet:'火星'},
  thunderstorm:{name:'雷暴',icon:'⛈',color:'#c41e3a',particles:80,duration:'10-30分钟',significance:'元素力量的激荡，适合进行雷霆魔法工作',planet:'木星'},
  mist:{name:'迷雾',icon:'🌫',color:'#8a8a9a',particles:30,duration:'15-60分钟',significance:'面纱变薄，适合占卜与灵视工作',planet:'月亮'},
  meteor:{name:'流星雨',icon:'☄',color:'#d4a843',particles:100,duration:'数小时',significance:'天象大吉，适合许愿与重大仪式',planet:'金星'},
  eclipse:{name:'日食',icon:'🌑',color:'#2a2a3a',particles:40,duration:'2-5分钟',significance:'阴阳交会，适合深层转化仪式',planet:'太阳/月亮'},
  bloodmoon:{name:'月食',icon:'🔴',color:'#c41e3a',particles:60,duration:'1-3小时',significance:'血月当空，适合左路魔法与召唤',planet:'火星/月亮'},
};
var weatherAnimId = null;
function simulateWeather(type) {
  var data = weatherData[type];
  if(!data) return;
  document.querySelectorAll('.weather-btn').forEach(function(b){b.classList.remove('active');});
  document.querySelector('.weather-btn[data-weather="'+type+'"]').classList.add('active');
  var canvas = document.getElementById('weatherCanvas');
  var ctx = canvas.getContext('2d');
  var w = canvas.width, h = canvas.height;
  if(weatherAnimId){cancelAnimationFrame(weatherAnimId);weatherAnimId=null;}
  // Create particles
  var particles = [];
  for(var i=0;i<data.particles;i++){
    particles.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-0.5)*3,vy:-Math.random()*2-1,size:Math.random()*4+1,alpha:Math.random()*0.5+0.2});
  }
  function drawWeather() {
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle = data.color+'88'; ctx.fillRect(0,0,w,h);
    if(type==='tornado'){
      for(var i=0;i<particles.length;i++){
        var p = particles[i]; p.x += Math.sin(p.y*0.05)*2; p.y -= 1;
        if(p.y<-10){p.y=h+10;p.x=Math.random()*w;}
        ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle = 'rgba(212,168,67,'+p.alpha+')'; ctx.fill();
      }
    }else if(type==='thunderstorm'){
      for(var i=0;i<particles.length;i++){
        var p = particles[i]; p.y += 4; p.x += (Math.random()-0.5)*2;
        if(p.y>h+10){p.y=-10;p.x=Math.random()*w;}
        ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle = 'rgba(196,30,58,'+p.alpha+')'; ctx.fill();
        ctx.strokeStyle = 'rgba(212,168,67,0.1)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x-2,p.y+15); ctx.stroke();
      }
      // Lightning flash
      if(Math.random()<0.05){ctx.fillStyle='rgba(255,255,200,0.3)';ctx.fillRect(0,0,w,h);setTimeout(function(){ctx.clearRect(0,0,w,h);},50);}
    }else if(type==='mist'){
      for(var i=0;i<particles.length;i++){
        var p = particles[i]; p.x += (Math.random()-0.5)*0.5; p.y += (Math.random()-0.5)*0.3;
        if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.size*3,0,Math.PI*2);
        ctx.fillStyle = 'rgba(180,180,200,'+(p.alpha*0.3)+')'; ctx.fill();
      }
    }else if(type==='meteor'){
      for(var i=0;i<particles.length;i++){
        var p = particles[i]; p.x += 5; p.y += 3; p.alpha -= 0.005;
        if(p.alpha<=0||p.x>w+10){p.x=-10;p.y=Math.random()*h*0.5;p.alpha=Math.random()*0.5+0.3;}
        ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle = 'rgba(212,168,67,'+p.alpha+')'; ctx.fill();
        ctx.strokeStyle = 'rgba(212,168,67,'+(p.alpha*0.5)+')'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x-15,p.y-10); ctx.stroke();
      }
    }else if(type==='eclipse'){
      ctx.fillStyle = '#0a0a0a'; ctx.beginPath(); ctx.arc(w/2,h/2,60,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#d4a84388'; ctx.beginPath(); ctx.arc(w/2+10,h/2,55,0,Math.PI*2); ctx.fill();
      for(var i=0;i<particles.length;i++){var p=particles[i];p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fillStyle='rgba(212,168,67,'+(p.alpha*0.3)+')';ctx.fill();}
    }else if(type==='bloodmoon'){
      ctx.fillStyle = '#1a0a0a'; ctx.beginPath(); ctx.arc(w/2,h/2,60,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#c41e3a88'; ctx.beginPath(); ctx.arc(w/2,h/2,55,0,Math.PI*2); ctx.fill();
      ctx.shadowColor = '#c41e3a'; ctx.shadowBlur = 30; ctx.fillStyle='#c41e3a44'; ctx.beginPath(); ctx.arc(w/2,h/2,65,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
      for(var i=0;i<particles.length;i++){var p=particles[i];p.x+=Math.sin(p.y*0.02)*0.5;p.y+=0.5;if(p.y>h+10){p.y=-10;p.x=Math.random()*w;}ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fillStyle='rgba(196,30,58,'+(p.alpha*0.4)+')';ctx.fill();}
    }
    weatherAnimId = requestAnimationFrame(drawWeather);
  }
  drawWeather();
  document.getElementById('weatherInfo').style.display = 'block';
  document.getElementById('weatherInfo').innerHTML = '<div class="wi-name">'+data.icon+' '+data.name+'</div><div class="wi-duration">持续时间：'+data.duration+'</div><div class="wi-significance">'+data.significance+'</div><div class="wi-planet">关联行星：'+data.planet+'</div>';
}
simulateWeather('tornado');
