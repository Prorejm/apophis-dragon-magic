<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Noto Serif SC', serif;
  background-color: #0a0a0a;
  color: #d4c5a9;
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.8;
}

/* ===== ANIMATED BACKGROUND ===== */
.occult-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

.occult-bg::before {
  content: '';
  position: absolute;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(212, 168, 67, 0.03) 0%, transparent 70%);
  top: -200px;
  right: -200px;
  animation: glowPulse 8s ease-in-out infinite;
}

.occult-bg::after {
  content: '';
  position: absolute;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(196, 30, 58, 0.03) 0%, transparent 70%);
  bottom: -150px;
  left: -150px;
  animation: glowPulse 10s ease-in-out infinite reverse;
}

@keyframes glowPulse {
  0%, 100% { opacity: 0.3; transform: scale(1); }
  50% { opacity: 0.8; transform: scale(1.3); }
}

/* ===== STARFIELD ===== */
.starfield {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: #d4a843;
  border-radius: 50%;
  animation: twinkle var(--duration, 3s) ease-in-out infinite;
  opacity: 0;
}

@keyframes twinkle {
  0%, 100% { opacity: 0; }
  50% { opacity: 0.8; }
}

/* ===== MAIN CONTAINER ===== */
.container {
  position: relative;
  z-index: 1;
  max-width: 780px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}

/* ===== HEADER ===== */
.header {
  text-align: center;
  padding: 60px 20px 40px;
  border-bottom: 1px solid rgba(212, 168, 67, 0.15);
  margin-bottom: 40px;
}

.header-icon {
  font-size: 48px;
  margin-bottom: 16px;
  display: block;
  opacity: 0.7;
}

h1 {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  color: #d4a843;
  letter-spacing: 6px;
  text-shadow: 0 0 30px rgba(212, 168, 67, 0.2);

}

.header-subtitle {

}

/* ===== NAVIGATION BAR ===== */

  padding: 16px 0;
  margin-bottom: 8px;
}

.nav-link {
  color: #8a7e6a;
  text-decoration: none;
  font-size: 0.85rem;
  letter-spacing: 2px;
  transition: color 0.3s;
  position: relative;
}

.nav-link::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 0;
  width: 0;
  height: 1px;
  background: #d4a843;
  transition: width 0.3s;
}

.nav-link:hover {
  color: #d4a843;
}

.nav-link:hover::after {
  width: 100%;
}

.nav-link.active {
  color: #d4a843;
}

.nav-link.active::after {
  width: 100%;
}

/* ===== START SCREEN ===== */
.screen {
  display: none;
  animation: fadeIn 0.6s ease;
}

.screen.active {

}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(40px); }
  to { opacity: 1; transform: translateX(0); }
}

.start-screen {
  text-align: center;
  padding: 40px 20px;
}

.start-screen .sigil {

  height: 120px;

  border: 1px solid rgba(212, 168, 67, 0.2);

  align-items: center;

}

.start-screen .sigil svg {

}

.start-description {

}

}

.test-stats {

}

.stat-item {

}

.stat-number {

  font-size: 2rem;
  color: #d4a843;

}

.stat-label {
  font-size: 0.8rem;
  color: #8a7e6a;
  letter-spacing: 1px;
}

/* ===== BUTTONS ===== */
.btn {
  display: inline-block;
  padding: 14px 48px;
  border: 1px solid #d4a843;
  background: transparent;
  color: #d4a843;
  font-family: 'Noto Serif SC', serif;
  font-size: 1rem;
  letter-spacing: 3px;
  cursor: pointer;
  transition: all 0.4s;
  text-decoration: none;
}

.btn:hover {
  background: rgba(212, 168, 67, 0.1);

}

.btn-crimson {
  border-color: #c41e3a;

}

.btn-crimson:hover {
  background: rgba(196, 30, 58, 0.1);

}

.btn-small {
  padding: 10px 28px;
  font-size: 0.85rem;
}

.btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.btn-muted {
  opacity: 0.35;
  cursor: not-allowed;
  border-color: rgba(212, 168, 67, 0.2);
  color: rgba(212, 168, 67, 0.4);
}

/* ===== PROGRESS BAR ===== */
.progress-container {
  margin-bottom: 36px;
}

.progress-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.progress-label {
  font-size: 0.8rem;
  color: #8a7e6a;
  letter-spacing: 1px;
}

.progress-percent {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 1rem;
  color: #d4a843;
}

.progress-track {
  width: 100%;
  height: 3px;
  background: rgba(212, 168, 67, 0.1);
  position: relative;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #c41e3a, #d4a843);
  transition: width 0.5s ease;
  width: 0%;
  position: relative;
}

.progress-fill::after {
  content: '';
  position: absolute;
  right: 0;
  top: -1px;
  width: 6px;
  height: 5px;
  background: #d4a843;
  box-shadow: 0 0 8px rgba(212, 168, 67, 0.6);
}

/* =====QUESTION AREA ===== */
.question-area {
  min-height: 400px;
}

.question-card {
  background: rgba(10, 10, 10, 0.6);
  border: 1px solid rgba(212, 168, 67, 0.12);
  padding: 40px 36px;
  animation: slideIn 0.45s ease;
}

.question-number {

  font-size: 1rem;
  color: #c41e3a;
  margin-bottom: 8px;

}

.question-text {
  font-size: 1.2rem;
  color: #d4c5a9;
  margin-bottom: 32px;
  line-height: 1.7;
  font-weight: 600;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.option {
  display: flex;
  align-items: center;
  padding: 14px 20px;
  border: 1px solid rgba(212, 168, 67, 0.1);
  background: rgba(212, 168, 67, 0.02);
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
}

.option:hover {
  border-color: rgba(212, 168, 67, 0.3);
  background: rgba(212, 168, 67, 0.05);
}

.option.selected {
  border-color: #d4a843;
  background: rgba(212, 168, 67, 0.08);
}

.option.selected::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: linear-gradient(180deg, #c41e3a, #d4a843);
}

.option input[type="radio"] {
  display: none;
}

.option-marker {
  width: 20px;
  height: 20px;
  border: 1px solid rgba(212, 168, 67, 0.3);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: 16px;
  transition: all 0.3s;
}

.option.selected .option-marker {
  border-color: #d4a843;
  background: #d4a843;
}

.option-marker::after {
  content: '';
  width: 8px;
  height: 8px;
  background: #0a0a0a;
  opacity: 0;
  transition: opacity 0.3s;
}

.option.selected .option-marker::after {
  opacity: 1;
}

.option-text {
  font-size: 0.92rem;
  color: #b0a48e;
  transition: color 0.3s;
}

.option.selected .option-text {
  color: #d4c5a9;
}

/* ===== NAVIGATION BUTTONS ===== */
.nav-buttons {
  display: flex;
  justify-content: space-between;
  margin-top: 32px;
  gap: 16px;
}

.nav-buttons .btn {
  min-width: 120px;
}

.nav-buttons .btn:first-child {
  margin-right: auto;
}

/* ===== RESULT SCREEN ===== */
.result-screen {
  text-align: center;
  padding: 20px 0;
}

.result-header {
  margin-bottom: 40px;
}

.result-level {

  font-size: 2.8rem;
  color: #d4a843;

  margin-bottom: 8px;
  letter-spacing: 4px;
  text-shadow: 0 0 40px rgba(212, 168, 67, 0.15);
}

.result-score {
  display: inline-block;
  padding: 12px 40px;
  border: 1px solid rgba(212, 168, 67, 0.2);
  font-size: 1.1rem;
  color: #8a7e6a;
  letter-spacing: 2px;
  margin-top: 12px;
}

.result-score span {
  color: #d4a843;
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 1.5rem;
}

/* ===== RESULT CARD ===== */
.result-card {
  background: rgba(10, 10, 10, 0.6);
  border: 1px solid rgba(212, 168, 67, 0.12);
  padding: 40px 36px;
  text-align: left;
  margin-bottom: 36px;
  animation: fadeIn 0.8s ease;
}

.result-card h3 {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 1.4rem;
  color: #d4a843;
  margin-bottom: 16px;
  letter-spacing: 2px;
}

.result-card p {
  font-size: 0.92rem;
  color: #b0a48e;
  line-height: 2;
  margin-bottom: 12px;
}

.result-card .trait-list {
  margin: 16px 0;
  padding: 0;
  list-style: none;
}

.result-card .trait-list li {
  padding: 8px 0 8px 24px;
  position: relative;
  font-size: 0.9rem;
  color: #b0a48e;
  line-height: 1.7;
}

.result-card .trait-list li::before {
  content: '◆';
  position: absolute;
  left: 0;
  color: #c41e3a;
  font-size: 0.6rem;
  top: 10px;
}

/* ===== RESULT BREAKDOWN ===== */
.breakdown-section {
  margin-bottom: 36px;
  text-align: left;
}

.breakdown-section h3 {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 1.2rem;
  color: #d4a843;
  margin-bottom: 20px;
  letter-spacing: 2px;
  text-align: center;
}

.breakdown-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 12px;
}

.breakdown-item {
  text-align: center;
  padding: 16px 10px;
  border: 1px solid rgba(212, 168, 67, 0.08);
  background: rgba(212, 168, 67, 0.02);
}

.breakdown-label {
  font-size: 0.75rem;
  color: #8a7e6a;
  letter-spacing: 1px;
  display: block;
  margin-bottom: 6px;
}

.breakdown-value {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 1.3rem;
  color: #d4a843;
  display: block;
}

.breakdown-max {
  font-size: 0.7rem;
  color: #5a5040;
}

/* ===== RESULT ACTIONS ===== */
.result-actions {
  display: flex;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-top: 36px;
}

/* ===== LEVEL BADGE ANIMATION ===== */
.level-badge {
  width: 140px;
  height: 140px;
  margin: 0 auto 24px;
  border: 2px solid #d4a843;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  animation: badgeReveal 1s ease;
}

.level-badge svg {
  width: 80px;
  height: 80px;
}

.level-badge::before {
  content: '';
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  border: 1px solid rgba(212, 168, 67, 0.15);
  animation: rotate 20s linear infinite;
}

.level-badge::after {
  content: '';
  position: absolute;
  inset: -12px;
  border-radius: 50%;
  border: 1px dashed rgba(212, 168, 67, 0.08);
  animation: rotate 30s linear infinite reverse;
}

@keyframes badgeReveal {
  from { transform: scale(0) rotate(-180deg); opacity: 0; }
  to { transform: scale(1) rotate(0deg); opacity: 1; }
}

@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(10, 10, 10, 0.95);
  border: 1px solid rgba(212, 168, 67, 0.3);
  padding: 14px 32px;
  color: #d4c5a9;
  font-size: 0.85rem;
  letter-spacing: 1px;
  opacity: 0;
  transition: all 0.5s;
  z-index: 100;
  white-space: nowrap;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 640px) {
  .container { padding: 20px 16px 60px; }
  .header { padding: 40px 16px 30px; }
  .question-card { padding: 28px 20px; }
  .result-card { padding: 28px 20px; }
  .nav-buttons { flex-wrap: wrap; justify-content: center; }
  .nav-buttons .btn:first-child { margin-right: 0; }
  .result-actions { flex-direction: column; align-items: center; }
  .nav-bar { gap: 20px; flex-wrap: wrap; }
  .breakdown-grid { grid-template-columns: repeat(3, 1fr); }
}

/* ===== QUOTE ===== */
.quote-block {
  border-left: 2px solid rgba(212, 168, 67, 0.2);
  padding: 16px 24px;
  margin: 24px 0;
  font-size: 0.88rem;
  color: #8a7e6a;
  font-style: italic;
  line-height: 1.9;
}

.quote-block cite {
  display: block;
  margin-top: 8px;
  color: #5a5040;
  font-size: 0.8rem;
  font-style: normal;
}

/* ===== FOOTER ===== */
.footer {
  text-align: center;
  padding: 40px 0;
  border-top: 1px solid rgba(212, 168, 67, 0.08);
  margin-top: 40px;
}

.footer p {
  font-size: 0.78rem;
  color: #5a5040;
  letter-spacing: 1px;

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #0a0a0a; }

::-webkit-scrollbar-thumb:hover { background: rgba(212, 168, 67, 0.3); }

/* Selection */
::selection { background: rgba(212, 168, 67, 0.3); color: #fff; }
</style>

// ===== STATE =====
let state = {
  currentQuestion: 0,
  answers: {},
  started: false,
  completed: false
};

// ===== INIT =====
function init() {
  createStars();
  loadState();
  if (state.started && !state.completed) {
    showScreen('screen-quiz');
    renderQuestion();
  } else if (state.completed) {
    showScreen('screen-result');
    renderResult();
  } else {
    showScreen('screen-start');
  }
  document.getElementById('questionCountDisplay').textContent = questions.length;
}

// ===== STARFIELD =====
function createStars() {
  const container = document.getElementById('starfield');
  for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.setProperty('--duration', (3 + Math.random() * 4) + 's');
    star.style.animationDelay = (Math.random() * 4) + 's';
    star.style.width = (1 + Math.random() * 2) + 'px';
    star.style.height = star.style.width;
    container.appendChild(star);
  }
}

// ===== SCREEN MANAGEMENT =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== TEST CONTROL =====
function startTest() {
  state.started = true;
  state.currentQuestion = 0;
  state.answers = {};
  state.completed = false;
  saveState();
  showScreen('screen-quiz');
  renderQuestion();
}

// ===== RENDER QUESTION =====
function renderQuestion() {
  const q = questions[state.currentQuestion];
  const total = questions.length;
  const num = state.currentQuestion + 1;

  document.getElementById('progressLabel').textContent = `第 ${num} / ${total} 题`;
  const pct = Math.round((num / total) * 100);
  document.getElementById('progressPercent').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';

  const area = document.getElementById('questionArea');

  let html = '<div class="question-card">';
  html += `<div class="question-number">问题 ${num} / ${total}</div>`;
  html += `<div class="question-text">${q.text}</div>`;
  html += '<div class="options">';

  q.options.forEach((opt, idx) => {
    const selected = state.answers[q.id] === idx;
    html += `<label class="option${selected ? ' selected' : ''}" data-qid="${q.id}" data-oidx="${idx}">`;
    html += `<input type="radio" name="q${q.id}" value="${idx}" ${selected ? 'checked' : ''}>`;
    html += `<span class="option-marker"></span>`;
    html += `<span class="option-text">${opt.text}</span>`;
    html += '</label>';
  });

  html += '</div>';

  html += '<div class="nav-buttons">';
  if (num > 1) {
    html += '<button class="btn btn-small" onclick="prevQuestion()">← 上一题</button>';
  } else {
    html += '<button class="btn btn-small" onclick="prevQuestion()" disabled>← 上一题</button>';
  }
  if (num < total) {
    const canNext = state.answers[q.id] !== undefined;
    html += `<button class="btn btn-small ${canNext ? '' : 'btn-muted'}" onclick="nextQuestion()" ${canNext ? '' : 'disabled'}>下一题 →</button>`;
  } else {
    const canSubmit = state.answers[q.id] !== undefined;
    html += `<button class="btn btn-small ${canSubmit ? '' : 'btn-muted'}" onclick="submitTest()" ${canSubmit ? '' : 'disabled'}>查看结果</button>`;
  }
  html += '</div>';
  html += '</div>';

  area.innerHTML = html;

  // Add event listeners to options
  area.querySelectorAll('.option').forEach(el => {
    el.addEventListener('click', function() {
      const qid = parseInt(this.dataset.qid);
      const oidx = parseInt(this.dataset.oidx);
      selectOption(qid, oidx);
    });
  });
}

// ===== SELECT OPTION =====
function selectOption(qid, oidx) {
  state.answers[qid] = oidx;
  saveState();

  // Update UI
  const card = document.querySelector('.question-card');
  card.querySelectorAll('.option').forEach(el => {
    const eqid = parseInt(el.dataset.qid);
    const eoidx = parseInt(el.dataset.oidx);
    el.classList.toggle('selected', eqid === qid && eoidx === oidx);
    if (eqid === qid && eoidx === oidx) {
      el.querySelector('input[type="radio"]').checked = true;
    }
  });

  // Update nav buttons
  const total = questions.length;
  const num = state.currentQuestion + 1;
  const navDiv = card.querySelector('.nav-buttons');
  if (num < total || num === total) {
    const nextBtn = navDiv.querySelector('button:last-child');
    if (num < total) {
      nextBtn.textContent = '下一题 →';
      nextBtn.onclick = nextQuestion;
      nextBtn.className = 'btn btn-small';
      nextBtn.disabled = false;
    } else {
      nextBtn.textContent = '查看结果';
      nextBtn.onclick = submitTest;
      nextBtn.className = 'btn btn-small';
      nextBtn.disabled = false;
    }
  }
}

// ===== NAVIGATION =====
function nextQuestion() {
  if (state.currentQuestion < questions.length - 1) {
    state.currentQuestion++;
    renderQuestion();
  }
}

function prevQuestion() {
  if (state.currentQuestion > 0) {
    state.currentQuestion--;
    renderQuestion();
  }
}

// ===== SUBMIT =====
function submitTest() {
  const total = questions.length;
  const answered = Object.keys(state.answers).length;
  if (answered < total) {
    showToast(`还有 ${total - answered} 道题未回答`);
    return;
  }

  state.completed = true;
  saveState();
  showScreen('screen-result');
  renderResult();
}

// ===== CALCULATE RESULT =====
function calculateResult() {
  let totalScore = 0;
  const maxPossible = questions.length * 3;

  questions.forEach(q => {
    const ansIdx = state.answers[q.id];
    if (ansIdx !== undefined) {
      totalScore += q.options[ansIdx].score;
    }
  });

  let resultIndex = results.length - 1;
  for (let i = 0; i < results.length; i++) {
    if (totalScore <= results[i].maxScore) {
      resultIndex = i;
      break;
    }
  }

  // Category breakdown
  const categories = [
    { label: '反权威', questions: [0, 5] },
    { label: '独处自省', questions: [1, 8] },
    { label: '个人力量', questions: [2, 6, 11] },
    { label: '死亡转变', questions: [4, 12] },
    { label: '禁忌接纳', questions: [3, 7] },
    { label: '个人主义', questions: [9, 13, 14] }
  ];

  const breakdown = categories.map(cat => {
    let sum = 0;
    let max = 0;
    cat.questions.forEach(qIdx => {
      const q = questions[qIdx];
      const ansIdx = state.answers[q.id];
      if (ansIdx !== undefined) {
        sum += q.options[ansIdx].score;
      }
      max += 3;
    });
    return { label: cat.label, value: sum, max: max };
  });

  return {
    score: totalScore,
    maxScore: maxPossible,
    result: results[resultIndex],
    index: resultIndex,
    breakdown: breakdown
  };
}

// ===== RENDER RESULT =====
function renderResult() {
  const data = calculateResult();
  const r = data.result;

  let html = '';

  // Badge
  html += '<div class="level-badge">';
  html += `<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">`;
  html += `<circle cx="50" cy="50" r="45" stroke="#d4a843" stroke-width="0.5" opacity="0.3"/>`;
  html += `<path d="${r.svgPath}" fill="none" stroke="#d4a843" stroke-width="1.5" opacity="0.8"/>`;
  html += `<circle cx="50" cy="50" r="3" fill="#c41e3a"/>`;
  html += '</svg>';
  html += '</div>';

  // Level
  html += '<div class="result-header">';
  html += `<span class="result-level">${r.level}</span>`;
  html += `<span class="result-score">得分 <span>${data.score}</span> / ${data.maxScore}</span>`;
  html += '</div>';

  // Result card
  html += '<div class="result-card">';
  html += `<h3>${r.title} · ${r.subtitle}</h3>`;
  html += `<p>${r.description}</p>`;
  html += `<p>${r.interpretation}</p>`;

  html += '<ul class="trait-list">';
  r.traits.forEach(t => {
    html += `<li>${t}</li>`;
  });
  html += '</ul>';

  html += `<p><strong style="color:#d4a843;">建议：</strong>${r.advice}</p>`;
  html += '</div>';

  // Breakdown
  html += '<div class="breakdown-section">';
  html += '<h3>特质维度分析</h3>';
  html += '<div class="breakdown-grid">';
  data.breakdown.forEach(b => {
    const pct = Math.round((b.value / b.max) * 100);
    html += '<div class="breakdown-item">';
    html += `<span class="breakdown-label">${b.label}</span>`;
    html += `<span class="breakdown-value">${b.value}</span>`;
    html += `<span class="breakdown-max">/ ${b.max} (${pct}%)</span>`;
    html += '</div>';
  });
  html += '</div>';
  html += '</div>';

  // Quote
  const quotes = [
    '"将自己从宇宙子宫中撕裂出来是一项意志和英雄主义的实践，这些品质只有通过激烈的斗争才能获得。" —— 《阿波菲斯——龙之魔法》',
    '"Xeper：我已生成。" —— 塞特之格言',
    '"爱是律法，爱受意志引导。" —— 阿莱斯特·克劳利',
    '"龙之魔法毫无疑问是左手路径的一个学派。它教导个体心灵的永生化和神化。" —— 《阿波菲斯——龙之魔法》',
    '"每个男人和每个女人都是一颗星。" —— 阿莱斯特·克劳利'
  ];
  const quote = quotes[data.index % quotes.length];
  html += '<div class="quote-block">';
  html += `<p>${quote}</p>`;
  html += '</div>';

  // Actions
  html += '<div class="result-actions">';
  html += '<button class="btn btn-small" onclick="retakeTest()">重新测试</button>';
  html += '<button class="btn btn-small btn-crimson" onclick="shareResult()">分享结果</button>';
  html += '<button class="btn btn-small" onclick="scrollToTop()">返回顶部</button>';
  html += '</div>';

  document.getElementById('resultContent').innerHTML = html;
}

// ===== ACTIONS =====
function retakeTest() {
  state.started = false;
  state.currentQuestion = 0;
  state.answers = {};
  state.completed = false;
  localStorage.removeItem('lhp_test_state');
  showScreen('screen-start');
}

function shareResult() {
  const data = calculateResult();
  const r = data.result;

  const text = [
    '═══ 左路魔法心理测试 ═══',
    '',
    `等级：${r.level}（${r.title}）`,
    `得分：${data.score} / ${data.maxScore}`,
    '',
    `"${r.subtitle}"`,
    '',
    '在 apophis-dragon-magic/lhp-test.html 测试'
  ].join('\n');

  // Try Web Share API
  if (navigator.share) {
    navigator.share({ text: text }).catch(() => {});
  } else {
    // Fallback: copy to clipboard
    navigator.clipboard.writeText(text).then(() => {
      showToast('结果已复制到剪贴板');
    }).catch(() => {
      // Final fallback
      const textarea = document.createElement('textarea');
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      showToast('结果已复制到剪贴板');
    });
  }
}

function scrollToTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== TOAST =====
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ===== KEYBOARD SUPPORT =====
document.addEventListener('keydown', function(e) {
  const quizScreen = document.getElementById('screen-quiz');
  if (!quizScreen.classList.contains('active')) return;

  if (e.key === 'ArrowRight' || e.key === 'Enter') {
    const total = questions.length;
    const num = state.currentQuestion + 1;
    if (num < total) {
      nextQuestion();
    } else {
      submitTest();
    }
  } else if (e.key === 'ArrowLeft') {
    prevQuestion();
  } else if (e.key >= '1' && e.key <= '4') {
    const idx = parseInt(e.key) - 1;
    const q = questions[state.currentQuestion];
    if (idx < q.options.length) {
      selectOption(q.id, idx);
    }
  }
});

// ===== LOCAL STORAGE =====
function saveState() {
  try {
    localStorage.setItem('lhp_test_state', JSON.stringify(state));
  } catch (e) {}
}

function loadState() {
  try {
    const saved = localStorage.getItem('lhp_test_state');
    if (saved) {
      const parsed = JSON.parse(saved);
      state.currentQuestion = parsed.currentQuestion || 0;
      state.answers = parsed.answers || {};
      state.started = parsed.started || false;
      state.completed = parsed.completed || false;
    }
  } catch (e) {}
}

// ===== INIT ON LOAD =====
document.addEventListener('DOMContentLoaded', init);
</script>
