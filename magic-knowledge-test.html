// ============================================================
// 粒子背景

(function(){
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [], w, h;
  function resize(){ w=canvas.width=window.innerWidth; h=canvas.height=window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  class Particle {
    constructor(){ this.reset(); }
    reset(){ this.x=Math.random()*w; this.y=Math.random()*h; this.size=Math.random()*2+0.3; this.speedX=(Math.random()-0.5)*0.3; this.speedY=(Math.random()-0.5)*0.3; this.opacity=Math.random()*0.4+0.1; }
    update(){ this.x+=this.speedX; this.y+=this.speedY; if(this.x<0||this.x>w||this.y<0||this.y>h) this.reset(); }
    draw(){ ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fillStyle='rgba(212,168,67,'+this.opacity+')'; ctx.fill(); }
  }
  for(let i=0;i<80;i++) particles.push(new Particle());
  function animate(){
    ctx.clearRect(0,0,w,h);
    particles.forEach(p=>{p.update();p.draw();});
    for(let i=0;i<particles.length;i++) for(let j=i+1;j<particles.length;j++){
      const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y, dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<150){ ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y); ctx.strokeStyle='rgba(212,168,67,'+(0.06*(1-dist/150))+')'; ctx.lineWidth=0.5; ctx.stroke(); }
    }
    requestAnimationFrame(animate);
  }
  animate();
})();

  { id:28, difficulty:'A2', category:'行星魔法', question:'在行星对应中，土星(Saturn)对应的颜色是什么？', options:['红色','黑色/深蓝','白色','绿色'], correct:1, explanation:'土星在魔法对应中通常与黑色/深蓝色相关联，代表限制、结构与时间。' },
  { id:29, difficulty:'A2', category:'仪式魔法', question:'魔法圆(Magic Circle)在仪式中的主要用途是什么？', options:['装饰空间','保护魔法师免受负面能量侵害','画着玩','存储魔法工具'], correct:1, explanation:'魔法圆在仪式中的主要用途是创造一个受保护的神圣空间，保护魔法师免受外部干扰。' },
  { id:30, difficulty:'A2', category:'符印与象征', question:'在龙之魔法中，血作为材料使用时代表什么？', options:['生命的本质和意志的力量','恐惧','死亡的象征','献祭'], correct:0, explanation:'在龙之魔法中，血代表生命的本质和魔法师意志的力量，是最强大的个人魔法材料。' },
  { id:31, difficulty:'A2', category:'仪式魔法', question:'仪式中的"驱逐"(Banishing)仪式最主要的目的什么？', options:['消灭敌人','清理空间能量，移除干扰','召唤神灵','制作符印'], correct:1, explanation:'驱逐仪式用于清理和净化魔法空间的能量，移除不需要的影响和干扰。' },
  { id:32, difficulty:'A2', category:'符印与象征', question:'启动符印(Charging a Sigil)时常用的方法不包括以下哪项？', options:['冥想集中','舞蹈/吟唱','手机拍照','性高潮/极端情绪'], correct:2, explanation:'符印启动常通过冥想集中、舞蹈吟唱、性高潮或极端情绪等达到意识状态改变的方法激活。' },
  { id:33, difficulty:'A2', category:'所罗门之钥', question:'在格提亚(Goetia)传统中，召唤恶魔时的常见保护方法是什么？', options:['佩戴十字架','站在魔法圆内并使用神圣名号','躲在床下','佩戴太阳镜'], correct:1, explanation:'召唤恶魔时，魔法师通常站在魔法圆内，使用神圣名号和封印进行保护。' },
  { id:34, difficulty:'A2', category:'行星魔法', question:'行星小时表中，每周的周期是几天？', options:['5天','7天','10天','12天'], correct:1, explanation:'行星小时表遵循行星的迦勒底排序(Chaldean Order)，每周七天的排列对应七颗古典行星。' },
  { id:35, difficulty:'A2', category:'七首', question:'七首中第六首"怒吼的狮子"的对应行星是什么？', options:['火星','木星','金星','水星'], correct:1, explanation:'第六首"怒吼的狮子"对应木星(Jupiter)，代表扩张、权力和权威。' },
  { id:36, difficulty:'A2', category:'行星魔法', question:'在行星仪式中，火星(Mars)对应的颜色和金属搭配正确的是？', options:['蓝色和银','红色和铁','绿色和铜','金色和黄铜'], correct:1, explanation:'火星在魔法对应中为红色和铁，代表战斗、能量和斩断。' },
  { id:37, difficulty:'A2', category:'符印与象征', question:'龙之魔法中，"克苏鲁"(Cthulhu)象征什么？', options:['海神','深渊的守护者/虚空中的碎片意识','太阳神','智慧之神'], correct:1, explanation:'在以诺魔法的象征意义中，克苏鲁代表深渊的守护者，与阿佩普作为虚空意识的角色对应。' },
  { id:38, difficulty:'A2', category:'龙之魔法基础', question:'龙之魔法中提到的"欲望魔法"(Magic of Desire)是指什么？', options:['使用色欲施展魔法','以个人意志和欲望为驱动力的魔法过程','追求财富的魔法','爱情魔法'], correct:1, explanation:'欲望魔法是迈克尔·凯利提出的概念，指以个人深层欲望和意志为驱动力的魔法过程。' },
  { id:39, difficulty:'A2', category:'仪式魔法', question:'魔法仪式中最常用的四大元素工具不包括以下哪个？', options:['圣杯(水)','魔杖(火)','电脑(科技)','圣铃(以太)'], correct:2, explanation:'四大元素工具通常包括圣杯(水)、魔杖(火)、圣剑/匕首(风)和五芒星(土)，以及圣铃(以太)。' },
  { id:40, difficulty:'A2', category:'符印与象征', question:'在符印工坊中，符印的"毁灭"操作(destruction of the sigil)的目的是什么？', options:['彻底消除愿望','将符印能量从意识释放到潜意识','惩罚自己','重新制作'], correct:1, explanation:'符印的毁灭操作旨在将符印能量从意识层面释放到潜意识，从而启动魔法过程。' },
  // ====== B1 (Intermediate) - 20 questions ======
  { id:41, difficulty:'B1', category:'七首', question:'七首中第五首"鬣狗"(Hyena)的对应行星和金属分别是什么？', options:['金星 / 铜','火星 / 铁','木星 / 锡','土星 / 铅'], correct:1, explanation:'第五首对应火星，金属为铁，代表战斗、斩断和激烈的变革力量。' },
  { id:42, difficulty:'B1', category:'魔法方阵', question:'在魔法方阵(Magic Square)体系中，土星(Saturn)的方阵是几乘几？', options:['3x3','4x4','5x5','6x6'], correct:0, explanation:'土星的魔法方阵是3x3，共9个格子，各行列对角线之和为15。' },
  { id:43, difficulty:'B1', category:'魔法方阵', question:'木星(Jupiter)的魔法方阵是几乘几？各行列之和为多少？', options:['3x3, 15','4x4, 34','5x5, 65','6x6, 111'], correct:1, explanation:'木星的魔法方阵是4x4，每行每列及对角线之和为34。' },
  { id:44, difficulty:'B1', category:'所罗门之钥', question:'在格提亚(Goetia)中，第一位恶魔是谁？', options:['拜蒙(Paimon)','巴力(Bael)','阿加雷斯(Agares)','阿斯摩太(Asmodeus)'], correct:1, explanation:'格提亚中第一位恶魔是巴力(Bael)，他以三种形态出现：猫、蟾蜍和人，或这些的组合。' },
  { id:45, difficulty:'B1', category:'魔法方阵', question:'太阳(Sol)的魔法方阵总和(各行之和)是多少？', options:['15','34','111','260'], correct:2, explanation:'太阳的魔法方阵是6x6，总行和/列和为111。' },
  { id:46, difficulty:'B1', category:'七首', question:'七首中第五首"鬣狗"的魔法对应不包括以下哪个？', options:['斩断旧的依恋','清除陈旧激情','增强财富运势','带来激烈变革'], correct:2, explanation:'第五首鬣狗(火星)代表斩断旧有依恋、清除陈旧激情和带来激烈变革，而非财富。' },
  { id:47, difficulty:'B1', category:'所罗门之钥', question:'《所罗门的小钥匙》中，72位恶魔的排列基于什么占星方案？', options:['黄道十二宫','行星小时顺序','迦勒底占星体系','中国二十八宿'], correct:0, explanation:'72位恶魔的排列基于传统的占星方案，按黄道十二宫和行星对应分类。' },
  { id:48, difficulty:'B1', category:'龙之魔法基础', question:'龙之魔法传统中，"食尸鬼/古尔"(Ghoul)在象征上代表什么？', options:['友善的灵魂','埋葬的欲望和隐藏的恐惧','财富的象征','守护天使'], correct:1, explanation:'食尸鬼在龙之魔法中代表埋葬的欲望、隐藏的恐惧以及潜意识中被压抑的内容。' },
  { id:49, difficulty:'B1', category:'七首', question:'七首中第三首"雷霆"的对应金属和星期几分别是？', options:['铁/星期二','铜/星期五','水银/汞/星期三','锡/星期四'], correct:2, explanation:'第三首雷霆对应水星，金属为水银/汞，星期为星期三。' },
  { id:50, difficulty:'B1', category:'龙之魔法基础', question:'龙之魔法中的"永世"(Aeon)概念主要由谁引入现代魔法？', options:['迈克尔·凯利','阿莱斯特·克劳利','肯尼斯·格兰特','奥斯汀·斯佩尔'], correct:1, explanation:'永世概念由阿莱斯特·克劳利引入当代魔法，作为理解魔法潮流时期的重要工具。' },
  { id:51, difficulty:'B1', category:'所罗门之钥', question:'在格提亚中，恶魔拜蒙(Paimon)是第几位？', options:['第一位','第六位','第九位','第廿五位'], correct:2, explanation:'拜蒙(Paimon)是格提亚中的第九位恶魔，拥有超过200个灵体的军团。' },
  { id:52, difficulty:'B1', category:'龙之魔法基础', question:'龙之魔法中，"Xeper"在塞特传统中的含义是什么？', options:['我爱','我已生成/我已存在','我毁灭','我祝福'], correct:1, explanation:'Xeper是塞特传统的核心格言，意为"我已生成"(I have come into being)。' },
  { id:53, difficulty:'B1', category:'七首', question:'七首中第七首"提丰"(Typhon)在对应关系中代表什么？', options:['开始和诞生','终结、限制和超越','爱情与美','智慧与沟通'], correct:1, explanation:'第七首提丰对应土星，代表终结、限制、结构以及超越物质界限的力量。' },
  { id:54, difficulty:'B1', category:'易经基础', question:'易经八卦中，代表"天/创造"的卦是什么？', options:['坤卦','乾卦','震卦','离卦'], correct:1, explanation:'乾卦(qian)代表天/创造，由三个阳爻组成，象征刚健和创始。' },
  { id:55, difficulty:'B1', category:'易经基础', question:'易经六十四卦中，第一卦是什么？', options:['坤卦(地)','屯卦(创生)','乾卦(天)','蒙卦(启蒙)'], correct:2, explanation:'六十四卦的第一卦是乾卦(天)，卦象为六个阳爻。' },
  { id:56, difficulty:'B1', category:'魔法方阵', question:'在魔法方阵中，火星的方阵是几乘几？', options:['3x3','4x4','5x5','6x6'], correct:2, explanation:'火星的魔法方阵是5x5，共25个格子，各行列对角线之和为65。' },
  { id:57, difficulty:'B1', category:'所罗门之钥', question:'格提亚中，恶魔的等级头衔通常包括以下哪些？', options:['公爵、侯爵、伯爵','国王、公爵、王子、侯爵、伯爵、总统','天使、大天使、主','主教、神父、执事'], correct:1, explanation:'格提亚中恶魔的等级头衔包括：国王(King)、公爵(Duke)、王子(Prince)、侯爵(Marquis)、伯爵(Earl)和总统(President)。' },
  { id:58, difficulty:'B1', category:'七首', question:'七首中第四首"蛇"的对应行星和象征力量分别是什么？', options:['金星 / 爱与美','太阳 / 催眠凝视和感知','火星 / 战争','水星 / 沟通'], correct:1, explanation:'第四首蛇对应太阳，象征阿佩普的催眠力量和蛇之眼的凝视。' },
  { id:59, difficulty:'B1', category:'易经基础', question:'易经中，阳爻(Yang line)和阴爻(Yin line)的表示方式分别是什么？', options:['阳=实线(---), 阴=断线(- -)','阳=断线(- -), 阴=实线(---)','阳=圆, 阴=方','阳=三角, 阴=圆形'], correct:0, explanation:'易经中阳爻用实线(---)表示，阴爻用断线(- -)表示。' },
  { id:60, difficulty:'B1', category:'龙之魔法基础', question:'在龙之魔法传统中，"梅林"(Merlin)象征魔法师的什么特质？', options:['青春和天真','野人与顾问的双重面具','王权与统治','爱情与浪漫'], correct:1, explanation:'梅林代表魔法师的双重面具：作为野人隐入森林避开人群，以及作为顾问行使幕后权力。' },
  // ====== A3 (Advanced) - 10 questions ======
  { id:61, difficulty:'A3', category:'仪式魔法', question:'在完整的格提亚召唤仪式中，以下哪个步骤是必须的？', options:['使用魔法圆、神圣名号、封印和召唤咒','只念诵恶魔的名字三次','使用黑弥撒','饮用致幻药剂'], correct:0, explanation:'完整的格提亚召唤仪式需要魔法圆保护、神圣名号、恶魔封印以及正式的召唤咒语。' },
  { id:62, difficulty:'A3', category:'行星魔法', question:'行星小时按迦勒底顺序分配，这个顺序的起始行星是？', options:['太阳','月亮','土星','木星'], correct:2, explanation:'迦勒底顺序(Chaldean Order)的起始行星是土星，顺序为：土星、木星、火星、太阳、金星、水星、月亮。' },
  { id:63, difficulty:'A3', category:'七首', question:'七首工作的正确顺序对于龙之魔法入门者而言，本质上是什么过程？', options:['随机的灵感冒险','从潜意识到超意识的逐步心灵整合与提升','简单的知识学习','体能训练'], correct:1, explanation:'七首工作是从第一首(月亮/潜意识)到第七首(土星/超越)逐步提升心灵层次的过程。' },
  { id:64, difficulty:'A3', category:'所罗门之钥', question:'《所罗门的大钥匙》与《小钥匙》的主要区别是什么？', options:['大钥匙是完全不同的书','大钥匙主要涉及行星魔法/召唤天使；小钥匙主要涉及召唤恶魔','大钥匙内容更多但格式相同','没有区别'], correct:1, explanation:'大钥匙涉及行星魔法、召唤天使和神圣仪式；小钥匙(格提亚)涉及72位恶魔的召唤。' },
  { id:65, difficulty:'A3', category:'所罗门之钥', question:'在格提亚系统中，如何区分日间恶魔和夜间恶魔？', options:['根据恶魔的名字长度','根据恶魔的等级和对应行星的时辰','根据恶魔的颜色','根据恶魔的年龄'], correct:1, explanation:'日间和夜间恶魔的区分基于其对应的行星和该行星掌管的白天/夜晚时辰。' },
  { id:66, difficulty:'A3', category:'仪式魔法', question:'五芒星驱逐仪式的标准步骤不包括以下哪项？', options:['绘制五芒星方位','念诵神圣名号','跳大神舞蹈','宣告四方位大天使'], correct:2, explanation:'五芒星驱逐仪式包括绘制五芒星、念诵神圣名号和宣告四方位大天使，不涉及跳大神舞蹈。' },
  { id:67, difficulty:'A3', category:'龙之魔法基础', question:'在阿佩普教团的仪式中，"利维坦之眼"作为符号使用时的主要功能是什么？', options:['装饰圣坛','作为意识和意志集中的焦点','驱邪避灾','显示教团地位'], correct:1, explanation:'利维坦之眼在仪式中作为意识集中和意志投射的焦点，以符号形式包含龙之魔法的全部秘密。' },
  { id:68, difficulty:'A3', category:'行星魔法', question:'恶魔的对应行星、星座和月份协调中，其分类基于什么原则？', options:['随机分配','等级头衔对应行星、星座决定特性、季节决定力量强弱','按字母顺序','按恶魔的年龄'], correct:1, explanation:'恶魔对应关系遵循等级头衔对应行星、星座决定特性、季节决定力量强弱的综合原则。' },
  { id:69, difficulty:'A3', category:'龙之魔法基础', question:'龙之魔法中魔法师的本体/本质(Essence)概念指的是什么？', options:['肉体','持续存在的个体意识核心','灵魂','精神'], correct:1, explanation:'龙之魔法中，本质是个体持续存在的意识核心，是超越肉体存在、通过再显化实现不朽的关键。' },
  { id:70, difficulty:'A3', category:'七首', question:'七首工作的时辰对应中，每首在什么时间效果最佳？', options:['任意时间','根据对应行星的行星小时和月相阶段','全部在午夜','全部在日出时'], correct:1, explanation:'每首的工作应选择在其对应行星的行星小时以及合适的月相阶段进行。' },
  // ====== A4 (Expert) - 15 questions ======
  { id:71, difficulty:'A4', category:'所罗门之钥', question:'72位恶魔的编制体系主要与什么占星系统对应？', options:['12星座 × 6个等级','7行星 × 10个等级+2','24节气×3种类型','36旬星×2种类型'], correct:0, explanation:'72位恶魔按传统占星方案排列，12星座各对应6位恶魔，安排在不同等级头衔之下。' },
  { id:72, difficulty:'A4', category:'所罗门之钥', question:'恶魔阿斯摩太(Asmodeus)的对应行星和能力特性是什么？', options:['金星/爱情','火星/战斗和破坏','太阳/王权','月亮/梦境'], correct:1, explanation:'阿斯摩太对应火星，是最具破坏力的恶魔之一，掌管战斗、破坏和复仇。' },

// ============================================================
// 考试系统
// ============================================================
const S = { allQuestions:QUESTION_BANK, filteredQuestions:[...QUESTION_BANK], currentQuestions:[], currentIndex:0, answers:[], isExamMode:false, isTimed:false, timerInterval:null, timeRemaining:60, isReviewMode:false };
const $ = id=>document.getElementById(id);
const C = { container:$('questionContainer'), filterGroup:$('filterGroup'), examStatus:$('examStatus'), progressText:$('progressText'), correctCount:$('correctCount'), wrongCount:$('wrongCount'), scoreText:$('scoreText'), progressContainer:$('progressContainer'), progressFill:$('progressFill'), timerBar:$('timerBar'), timerFill:$('timerFill'), resultPanel:$('resultPanel'), gradeDisplay:$('gradeDisplay'), gradeText:$('gradeText'), scoreStats:$('scoreStats'), diffStats:$('diffStats'), reviewBtn:$('reviewBtn'), reviewList:$('reviewList'), reviewContent:$('reviewContent'), timedCheckbox:$('timedMode'), resetBtn:$('resetBtn'), pageStats:$('pageStats') };
function shuffle(a){ const r=[...a]; for(let i=r.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [r[i],r[j]]=[r[j],r[i]]; } return r; }
function dLabel(d){ return {A1:'入门',A2:'初级',B1:'中级',A3:'高级',A4:'专家'}[d]||d; }
function renderPageStats(){ const all=QUESTION_BANK, cnt={}; all.forEach(q=>{ cnt[q.difficulty]=(cnt[q.difficulty]||0)+1; }); let h='<span class="stat-pill">全部 <strong>'+all.length+'</strong> 题</span>'; ['A1','A2','B1','A3','A4'].forEach(d=>{ h+='<span class="stat-pill">'+d+' <strong>'+(cnt[d]||0)+'</strong> 题</span>'; }); C.pageStats.innerHTML=h; }
function applyFilter(diff){ document.querySelectorAll('.filter-btn').forEach(b=>{ b.className='filter-btn'; if(b.dataset.diff===diff) b.classList.add('active','active-'+diff); }); S.filteredQuestions=diff==='all'?[...QUESTION_BANK]:QUESTION_BANK.filter(q=>q.difficulty===diff); if(!S.isExamMode) renderAll(); }
function renderAll(){ S.isExamMode=false; S.isReviewMode=false; stopTimer(); C.examStatus.style.display='none'; C.progressContainer.style.display='none'; C.timerBar.classList.remove('active'); C.resultPanel.classList.remove('show'); C.reviewList.classList.remove('show'); const qs=S.filteredQuestions; if(!qs.length){ C.container.innerHTML='<div class="empty-state"><div class="icon">&#128214;</div><p>该分类下暂无题目</p></div>'; return; } let h=''; qs.forEach(q=>{ h+=rCard(q,false); }); C.container.innerHTML=h; }
function rCard(q,sc){ const lt=['A','B','C','D']; let oh=''; q.options.forEach((o,i)=>{ let c='option-item disabled'; if(sc&&i===q.correct)c+=' correct'; oh+='<div class="'+c+'"><span class="radio-circle"></span><span class="option-letter">'+lt[i]+'.</span><span>'+o+'</span></div>'; }); const eh=sc?'<div class="explanation-box show"><div class="exp-label">&#128220; 解析</div>'+q.explanation+'</div>':''; const badge='<span class="difficulty-badge">'+q.difficulty+' '+dLabel(q.difficulty)+'</span>'; return '<div class="question-card card card-tilt-animate diff-'+q.difficulty+'"><div class="question-header"><span class="question-number">#'+q.id+' &middot; <span class="category-tag">'+q.category+'</span></span>'+badge+'</div><div class="question-text">'+q.question+'</div><div class="options-list">'+oh+'</div>'+eh+'</div>'; }
function startExam(count){ if(S.isExamMode)return; const pool=S.filteredQuestions; if(!pool.length){alert('当前筛选条件下没有题目。');return;} let sel=count==='all'?shuffle(pool):shuffle(pool).slice(0,Math.min(parseInt(count),pool.length)); S.currentQuestions=sel; S.currentIndex=0; S.answers=sel.map(()=>({selected:null,correct:false})); S.isExamMode=true; S.isReviewMode=false; S.isTimed=C.timedCheckbox.checked; C.resultPanel.classList.remove('show'); C.reviewList.classList.remove('show'); C.examStatus.style.display='flex'; C.progressContainer.style.display='block'; upStatus(); showQ(); }
function showQ(){ stopTimer(); const q=S.currentQuestions[S.currentIndex], a=S.answers[S.currentIndex]; const lt=['A','B','C','D']; let oh=''; q.options.forEach((o,i)=>{ let c='option-item'; if(a.selected!==null){c+=' disabled';if(i===q.correct)c+=' correct';if(i===a.selected&&i!==q.correct)c+=' wrong';} if(a.selected===i)c+=' selected'; oh+='<div class="'+c+'" data-opt="'+i+'" onclick="selOpt('+i+')"><span class="radio-circle"></span><span class="option-letter">'+lt[i]+'.</span><span>'+o+'</span></div>'; }); const eh=a.selected!==null?'<div class="explanation-box show"><div class="exp-label">&#128220; 解析</div>'+q.explanation+'</div>':''; const badge='<span class="difficulty-badge">'+q.difficulty+' '+dLabel(q.difficulty)+'</span>'; const sh=a.selected===null?'<div class="submit-row"><button class="submit-btn primary" onclick="cfmAns()">确认答案</button></div>':'<div class="submit-row"><button class="submit-btn" onclick="nxtQ()">'+(S.currentIndex<S.currentQuestions.length-1?'下一题':'查看结果')+'</button></div>'; C.container.innerHTML='<div class="question-card card card-tilt-animate diff-'+q.difficulty+'"><div class="question-header"><span class="question-number">第'+(S.currentIndex+1)+'/'+S.currentQuestions.length+'题 &middot; <span class="category-tag">'+q.category+'</span></span>'+badge+'</div><div class="question-text">'+q.question+'</div><div class="options-list">'+oh+'</div>'+eh+sh+'</div>'; upStatus(); if(S.isTimed&&a.selected===null)startTimer(); }
function selOpt(idx){ const a=S.answers[S.currentIndex]; if(a.selected!==null)return; document.querySelectorAll('.option-item').forEach(el=>{el.classList.toggle('selected',parseInt(el.dataset.opt)===idx);}); }
function cfmAns(){ let sel=null; document.querySelectorAll('.option-item').forEach(el=>{if(el.classList.contains('selected'))sel=parseInt(el.dataset.opt);}); if(sel===null){alert('请先选择一个选项');return;} const a=S.answers[S.currentIndex]; a.selected=sel; a.correct=(sel===S.currentQuestions[S.currentIndex].correct); stopTimer();showQ();upStatus(); }
function nxtQ(){ S.currentIndex<S.currentQuestions.length-1?(S.currentIndex++,showQ()):finish(); }
function startTimer(){ S.timeRemaining=60; C.timerBar.classList.add('active'); C.timerFill.style.width='100%'; C.timerFill.className='timer-fill'; S.timerInterval=setInterval(()=>{S.timeRemaining--;const p=(S.timeRemaining/60)*100;C.timerFill.style.width=p+'%';if(S.timeRemaining<=10)C.timerFill.className='timer-fill danger';else if(S.timeRemaining<=20)C.timerFill.className='timer-fill warning';if(S.timeRemaining<=0){stopTimer();autoSbm();}},1000); }
function stopTimer(){if(S.timerInterval){clearInterval(S.timerInterval);S.timerInterval=null;}C.timerBar.classList.remove('active');}
function autoSbm(){const a=S.answers[S.currentIndex];if(a.selected===null){a.selected=-1;a.correct=false;}showQ();upStatus();}
function upStatus(){const t=S.currentQuestions.length,ans=S.answers.filter(x=>x.selected!==null).length,cr=S.answers.filter(x=>x.selected!==null&&x.correct).length,wr=ans-cr,p=ans>0?Math.round((cr/ans)*100):0; C.progressText.textContent=ans+'/'+t; C.correctCount.textContent=cr; C.wrongCount.textContent=wr; C.scoreText.textContent=p+'%'; C.progressFill.style.width=(t>0?(ans/t)*100:0)+'%'; }
function finish(){ stopTimer();S.isExamMode=false;const t=S.currentQuestions.length,cr=S.answers.filter(a=>a.correct).length,wr=t-cr,p=t>0?Math.round((cr/t)*100):0; let g,gc,gd; if(p>=90){g='S';gc='grade-S';gd='超凡入圣 — 你已掌握龙之魔法的精髓。';}else if(p>=80){g='A';gc='grade-A';gd='卓越非凡 — 你对魔法知识有深刻理解。';}else if(p>=70){g='B';gc='grade-B';gd='扎实稳健 — 继续努力学习更高深的奥秘。';}else if(p>=60){g='C';gc='grade-C';gd='初窥门径 — 仍需加深对基础的理解。';}else{g='F';gc='grade-F';gd='尚需磨砺 — 回到书本，重新出发。';} C.gradeDisplay.textContent=g; C.gradeDisplay.className='grade-display '+gc; C.gradeText.textContent=gd; C.scoreStats.innerHTML='<div class="stat-box"><div class="stat-number gold">'+p+'%</div><div class="stat-desc">得分</div></div><div class="stat-box"><div class="stat-number green">'+cr+'</div><div class="stat-desc">正确</div></div><div class="stat-box"><div class="stat-number red">'+wr+'</div><div class="stat-desc">错误</div></div><div class="stat-box"><div class="stat-number muted">'+t+'</div><div class="stat-desc">总题</div></div>'; const dd={}; S.currentQuestions.forEach((q,i)=>{const d=q.difficulty;if(!dd[d])dd[d]={total:0,correct:0};dd[d].total++;if(S.answers[i].correct)dd[d].correct++;}); let dh=''; Object.keys(dd).sort().forEach(d=>{dh+='<div class="diff-stat"><span class="label">'+d+':</span><span class="value correct">'+dd[d].correct+'</span><span class="value muted">/</span><span class="value total">'+dd[d].total+'</span></div>';}); C.diffStats.innerHTML=dh; C.resultPanel.classList.add('show'); C.reviewList.classList.remove('show'); C.examStatus.style.display='none'; C.progressContainer.style.display='none'; C.container.innerHTML=''; }
function showReview(){ C.reviewList.classList.toggle('show'); if(!C.reviewList.classList.contains('show'))return; const lt=['A','B','C','D']; let h=''; S.currentQuestions.forEach((q,i)=>{const a=S.answers[i],crt=a.correct; let oh=''; q.options.forEach((o,j)=>{let c='option-item disabled';if(j===q.correct)c+=' correct';if(j===a.selected&&j!==q.correct)c+=' wrong';oh+='<div class="'+c+'"><span class="radio-circle"></span><span class="option-letter">'+lt[j]+'.</span><span>'+o+'</span></div>';}); const si=crt?'<span style="color:var(--correct);font-weight:700;">&#10004; 正确</span>':'<span style="color:var(--accent);font-weight:700;">&#10008; 错误</span>'; const badge='<span class="difficulty-badge">'+q.difficulty+'</span>'; h+='<div class="question-card card card-tilt-animate diff-'+q.difficulty+'"><div class="question-header"><span class="question-number">#'+q.id+' &middot; <span class="category-tag">'+q.category+'</span> '+si+'</span>'+badge+'</div><div class="question-text">'+q.question+'</div><div class="options-list">'+oh+'</div><div class="explanation-box show"><div class="exp-label">&#128220; 解析</div>'+q.explanation+'</div></div>';}); C.reviewContent.innerHTML=h; }
function resetAll(){ stopTimer(); S.isExamMode=S.isReviewMode=false; S.currentQuestions=[]; S.currentIndex=0; S.answers=[]; C.timedCheckbox.checked=false; C.examStatus.style.display='none'; C.progressContainer.style.display='none'; C.timerBar.classList.remove('active'); C.resultPanel.classList.remove('show'); C.reviewList.classList.remove('show'); C.container.innerHTML=''; renderAll(); }
C.filterGroup.addEventListener('click',e=>{const btn=e.target.closest('.filter-btn');if(!btn||S.isExamMode)return;applyFilter(btn.dataset.diff);});
document.querySelectorAll('.exam-btn[data-exam]').forEach(b=>{b.addEventListener('click',()=>{startExam(b.dataset.exam);});});
C.reviewBtn.addEventListener('click',showReview);
C.resetBtn.addEventListener('click',resetAll);
renderPageStats();
applyFilter('all');
console.log('阿波菲斯魔法知识测验系统已加载，题库：'+QUESTION_BANK.length+' 题');
</script>
