"你问她是否知道更多关于Robin的事情。她沉默了。“Robin……”她的声音带着悲伤。“他曾经是个人类。一个创造了虚拟世界来逃避现实的年轻人。但这个世界——它活了过来。它开始按照自己的意志运行——而Robin被困在了自己的创作中。”", "“他被困在这里？”", "“不——他选择了留下。因为离开意味着……”她顿了顿。“意味着他必须面对现实世界——那个让他选择逃避的地方。”"], "chs": [{"t": "前往Demon Zone", "n": "demon_entry"}], "pt": ["Nereid", "kim"]}, "desert_oasis": {"t": "绿洲幻影", "loc": "Desert Zone - 绿洲", "zone": "Desert", "text": ["你们在炎热的沙漠中发现了一片绿洲——棕榈树、清澈的水池。但你感到了一股奇怪的魔力波动。这绿洲不是真实的——它是一个幻影。", "你走近了水池——水面反射出的不是你的倒影。倒影中站着的是一个穿着白色连帽斗篷的身影——Robin。", "“你收集了几颗Orb了？”倒影中的Robin开口了。“已经不少了。但你有没有想过——当你集齐全部六颗的时候——你会不会改变主意？”", "“什么意思？”", "“意思是——离开Monline，意味着离开所有你在这里遇到的人。Mark、Kim、Aralu……他们都在这里。你确定他们都想回去吗？”", "水池中的影像消失了。你站在原地，心中多了一颗怀疑的种子。"], "chs": [{"t": "离开绿洲", "n": "pyramid_quest"}], "eff": {"san": -5}, "pt": ["Kim", "kim"]}, "desert_dominic_betrayal": {"t": "背叛", "loc": "Desert Zone - 金字塔入口", "zone": "Desert", "text": ["你们召集了人手，开始围攻金字塔。Dominic站在队伍前——指挥着每一个人。他的计划很周密——通道分配、时间控制、撤退路线。他看起来像个可靠的领袖。", "但Kim靠了过来。“我觉得不对。”她低声说。“Dominic太着急了。他好像……知道一些他不该知道的事情。”", "你的直觉也告诉你有问题。但在你做出反应之前——Dominic按下了金字塔入口处的一块砖石。地面塌陷了。你和Kim掉进了陷阱。", "从陷阱上方传来Dominic的声音：“抱歉。但我需要金字塔中的力量——为了我自己。不是为了让你们回家。”", "他的脚步声远去了。你们被困在了黑暗的井底。"], "chs": [{"t": "想办法爬出去", "n": "pyramid_quest_solo", "eff": {"hp": -10}}, {"t": "寻找其他出口", "n": "desert_explore"}], "eff": {"san": -15}, "pt": ["Kim", "kim"]}, "pyramid_quest_solo": {"t": "独自进入金字塔", "loc": "Desert Zone - 金字塔", "zone": "Desert", "text": ["你和Kim花了几个小时才从陷阱中爬出来。Dominic已经不见了踪影。你们咬牙进入了金字塔——没有他的帮助，但你们有彼此。", "在金字塔的深处，你们听到了战斗的声音——是Dominic。他正在和Sphinx激战。他不是一个简单的背叛者——他确实有实力。Sphinx的爪子划过了他的胸口——但他避开了致命一击。", "最后——Dominic击败了Sphinx。但他没有杀她。他拿走了她身后的Orb——然后他看到了你。“……你们还活着。”他的声音中带着一丝惊讶——和一丝歉意。", "他把Orb扔给了你。“拿着。我不该背叛你们的。”他转身走出了金字塔。", "你握着那颗温热的Orb。那是Orb of the Sun。"], "chs": [{"t": "获得Orb of the Sun", "n": "sphinx_after"}], "items": ["Orb of the Sun"], "eff": {"hp": -5, "san": 10}, "pt": ["Kim", "kim"]}, "mythic_fairy": {"t": "Fairy Quest", "loc": "Mythic Zone - 妖精之森", "zone": "Mythic", "text": ["竹林的深处有一片闪着微光的空地——一只拳头大小的妖精坐在蘑菇上。她有着蝴蝶翅膀和透明的皮肤。她看到你时高兴地飞了起来。", "“人类！你是来帮我做任务的吗？”", "她需要你帮她收集三种花——月光花、泪珠花和永恒蔷薇。分别生长在Mythic Zone的三个不同方向。“如果你帮我——我告诉你一个关于Robin的秘密。”"], "chs": [{"t": "帮她收集花朵", "n": "mythic_fairy_help"}, {"t": "没时间——去神社", "n": "final_robin"}], "pt": ["妖精", "kim"]}, "mythic_fairy_help": {"t": "妖精的秘密", "loc": "Mythic Zone - 妖精之森", "zone": "Mythic", "text": ["你帮妖精收集了三种花。她高兴地在你头顶飞了三圈。“谢谢！作为回报——我告诉你一个秘密。”", "她压低声音——虽然周围没有别人。“Robin的项圈——那颗红色宝石——它里面封印着一个人。一个他最爱的人。那个人教会了他如何创造世界——但也背叛了他。”", "“所以他把那个人封印在了宝石里？”", "妖精点了点头。“如果你打破宝石——那个人会解脱。但Robin也会失去一切。你想清楚了再做决定。”"], "chs": [{"t": "前往神社", "n": "final_robin"}], "pt": ["妖精", "kim"]}, "rand_forest_encounter": {"t": "森林遭遇", "loc": "Forest Zone", "zone": "Forest", "text": ["你在森林中穿行时——草丛中传来了窸窣声。你握紧了武器——但出现的不是怪物。是一个穿着残破冒险者服装的女性。她的手臂上长满了绿色的鳞片——她在转化中。", "“求求你……”她的声音沙哑。“帮帮我。我不想变成怪物。我……我有家人。他们在等我回去。”", "你蹲在她身边。她的鳞片在蔓延——从手臂到肩膀，到脖子。她的瞳孔在变竖。", "“告诉我——”她抓住了你的手。“我的名字。告诉我我的名字——我怕我快要忘记了。”", "你说出了她的名字——她从你之前的对话中告诉过你。她闭上眼睛——深呼吸。鳞片停止了蔓延。", "“……谢谢。”她松开手。“你让我多记住了一会儿。但下次——我可能就不记得了。”她转身消失在了森林中。"], "chs": [{"t": "继续前进", "n": "caste_city"}], "eff": {"san": 5}}, "rand_coastal_shipwreck": {"t": "沉船", "loc": "Coastal Zone", "zone": "Coastal", "text": ["海上漂着一块破碎的船板。船板上趴着一个人——一个穿着水手服的女性。她已经失去了意识。Mark把船靠了过去——你们把她拉上了船。", "她醒来后——惊恐地摸着自己的腿。它们还在。她没有变成Mermaid。“谢谢……”她喘着气，“我被Siren的歌声引诱了。我的船员都跳海了。我……”她哭了起来。", "你们把她送到了Budan港。她会在那里安全——至少现在还是安全的。"], "chs": [{"t": "继续航行", "n": "sea_temple"}], "eff": {"san": 5}, "pt": ["Mark", "mark"]}, "rand_demon_torture": {"t": "城堡地下", "loc": "Demon Zone", "zone": "Demon", "text": ["你在地下室发现了一个被铁链锁住的玩家。他的身体已经半转化了——一条手臂是恶魔的爪子，一只眼睛闪烁着红光。但另一半还是人类。", "他艰难地抬起头。“杀了我。”他说。“我不想完全变成她们的一员。求求你。”", "Aralu拔出了剑。她看着你。“我来。”", "她干净利落地结束了那人的痛苦。你转过头，没有说话。Demon Zone——不是每个人都能完整地走出去。"], "chs": [{"t": "继续前进", "n": "demon_castle_hall"}], "eff": {"san": -10}, "pt": ["Aralu", "aralu"]}, "rand_desolate_survivor": {"t": "幸存者", "loc": "Desolate Zone", "zone": "Desolate", "text": ["你们在一座被封锁的建筑物中找到了一个幸存者——一个把自己关在地下室的中年男性。他抱着一个收音机——一直重复播报着同一段录音。", "“这里是Desolate Zone。还有幸存者。我在……我在……”录音中断了。他听着这段录音——那是他自己录制的。“我已经忘记我在哪里了。”他苦笑着说。"], "chs": [{"t": "带他一起走", "n": "desolate_exit"}, {"t": "让他留在这里——可能更安全", "n": "desolate_mansion"}], "eff": {"san": 5}, "pt": ["Kim", "kim"]}
