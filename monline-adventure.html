<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Monline</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+XiaoWei&family=ZCOOL+QingKe+HuangYou&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--bg2:#111;--card:#1a1a1a;--gold:#d4a843;--red:#c41e3a;--purp:#7c3aed;--grn:#22c55e;--blu:#3b82f6;--org:#f97316;--txt:#e8e0d0;--txt2:#9a9080;--brd:#2a2520;--font-title:"Ma Shan Zheng",cursive;--font-body:"Noto Serif SC",serif;--font-alt:"ZCOOL XiaoWei",serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--bg);color:var(--txt);line-height:2;min-height:100vh;overflow-x:hidden}
canvas#pt{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.w{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:5rem 1rem 2rem}
.ti{text-align:center;padding:3rem 1rem;min-height:85vh;display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative}
.ti h1{font-family:var(--font-title);font-size:4rem;color:var(--gold);text-shadow:0 0 60px rgba(212,168,67,.4);margin-bottom:.3rem}
.ti .sub{color:var(--txt2);font-style:italic;margin-bottom:2rem;font-size:1.1rem}
.ti .d{max-width:650px;color:var(--txt2);margin-bottom:2rem;font-size:.92rem;line-height:1.9}
.btn{font-family:var(--font-title);font-size:1.2rem;padding:.7rem 2rem;border:2px solid var(--gold);background:linear-gradient(135deg,rgba(212,168,67,.15),rgba(212,168,67,.05));color:var(--gold);border-radius:8px;cursor:pointer;transition:.3s;margin:.3rem}
.btn:hover{background:linear-gradient(135deg,rgba(212,168,67,.3),rgba(212,168,67,.1));box-shadow:0 0 20px rgba(212,168,67,.3);transform:translateY(-2px)}
.btn.r{color:var(--red);border-color:var(--red);background:linear-gradient(135deg,rgba(196,30,58,.15),rgba(196,30,58,.05))}
.sts{background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:.6rem;margin-bottom:.7rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:.3rem;font-size:.7rem}
.sts .s{display:flex;align-items:center;gap:.2rem;color:var(--txt2)}
.sts .b{flex:1;height:4px;background:#222;border-radius:2px;overflow:hidden}
.sts .f{height:100%;border-radius:2px;transition:width .5s}
.sts .h{background:linear-gradient(90deg,var(--red),#ff6b6b)}
.sts .s{background:linear-gradient(90deg,var(--blu),#60a5fa)}
.sts .c{background:linear-gradient(90deg,var(--purp),#a78bfa)}
.sts .k{background:linear-gradient(90deg,var(--org),#fb923c)}
.sts .d{background:linear-gradient(90deg,var(--grn),#4ade80)}
.ch{text-align:center;padding:.5rem;border-bottom:2px solid var(--brd);margin-bottom:.7rem}
.ch h2{font-family:var(--font-title);font-size:1.3rem;color:var(--gold)}
.ch .lo{color:var(--txt2);font-size:.8rem;font-style:italic}
.story{background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:1.2rem 1.5rem;margin-bottom:1rem;font-size:.9rem;line-height:2.1;min-height:200px}
.story p{margin-bottom:.8rem;text-indent:2em}
.story .dialog{background:rgba(212,168,67,.08);border-left:3px solid var(--gold);padding:.5rem .8rem;margin:.5rem 0;border-radius:0 6px 6px 0;text-indent:0}
.story .dialog .name{color:var(--gold);font-weight:700;font-size:.85rem}
.story .warn{background:rgba(196,30,58,.1);border-left:3px solid var(--red);padding:.3rem .8rem;margin:.5rem 0;font-size:.85rem;text-indent:0}
.story .narration{font-family:var(--font-alt);font-style:italic;color:var(--txt2)}
.cx{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem}
.cb{background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:.7rem 1rem;color:var(--txt);text-align:left;cursor:pointer;transition:.3s;font-family:var(--font-body);font-size:.88rem}
.cb:hover{border-color:var(--gold);transform:translateX(5px)}
.cb .dng{color:var(--red);font-size:.7rem;margin-left:.4rem}
.en{text-align:center;padding:2rem}
.en h2{font-family:var(--font-title);font-size:2rem;margin-bottom:1rem}
.en.g h2{color:var(--grn)}.en.b h2{color:var(--red)}.en.n h2{color:var(--gold)}
.en .ed{max-width:700px;margin:0 auto 1.5rem;color:var(--txt2);font-size:.92rem;line-height:2.1;text-align:left}
.hd{display:none!important}
.tt{position:fixed;bottom:25px;left:50%;transform:translateX(-50%);background:rgba(212,168,67,.92);color:#0d0d0d;padding:10px 20px;border-radius:8px;z-index:9999;max-width:80vw;text-align:center;font-size:.85rem;opacity:0;transition:opacity .4s}
.portrait{position:fixed;left:20px;bottom:120px;width:120px;height:160px;border-radius:8px;border:2px solid var(--gold);overflow:hidden;z-index:100;opacity:0;transition:opacity .5s;background:var(--card)}
.portrait.show{opacity:1}
.portrait img{width:100%;height:100%;object-fit:cover}
.portrait .label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);color:var(--gold);font-size:.7rem;text-align:center;padding:2px 4px;font-family:var(--font-title)}
@media(max-width:768px){.ti h1{font-size:2.5rem}.w{padding:4.5rem .5rem 1rem}.story{padding:.8rem;font-size:.85rem}.portrait{width:80px;height:107px;left:5px;bottom:100px}}

.scene-bg{position:fixed;top:60px;left:0;width:100%;height:300px;z-index:0;pointer-events:none;opacity:0.15;overflow:hidden}
.scene-bg img{width:100%;height:100%;object-fit:cover;filter:blur(4px)}

</style></head><body>
<canvas id="pt"></canvas>
<div id="sceneBg" class="scene-bg"></div>
<div class="w">
<div id="ti" class="ti">
<h1>Monline</h1>
<div class="sub">在被囚禁的世界里，每一次选择都可能改变你。</div>
<div class="d">
<b style="color:var(--red)">在这个世界，失败者变成怪物娘。</b><br>
你和一群被困的玩家必须穿越六个危险的区域，收集传说中的圣球（Orbs），<br>
面对Monline的统治者——那个神秘而疯狂的<b>Robin</b>。<br><br>
Mark、Kim、Aralu、Dominic……每个人都有自己的故事和秘密。<br>
但记住——在这个世界，信任是一种奢侈品。
</div>
<button class="btn" onclick="ng()">开始冒险</button>
<button class="btn r" onclick="ld()">读取存档</button>
</div>
<div id="gs" class="hd">
<div class="sts" id="sp">STATSBAR</div>
<div class="portrait" id="ptbox"></div>
<div class="ch"><h2 id="ct"></h2><div class="lo" id="cl"></div></div>
<div class="story" id="st"></div>
<div class="cx" id="cx"></div>
</div>
<div id="es" class="en hd"><h2 id="et"></h2><div class="ed" id="ed"></div><button class="btn" onclick="tt()">返回标题</button></div>
</div>
<div class="tt" id="tt"></div>
<script>

var cv=document.getElementById("pt"),cx=cv.getContext("2d");
function rs(){cv.width=window.innerWidth;cv.height=window.innerHeight}
window.addEventListener("resize",rs);rs();
var pt=[];for(var i=0;i<60;i++)pt.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*2+0.5,s:Math.random()*0.5+0.1,o:Math.random()*0.5+0.1});
function an(){cx.clearRect(0,0,cv.width,cv.height);pt.forEach(function(p){p.y-=p.s;if(p.y<-5){p.y=cv.height+5;p.x=Math.random()*cv.width}cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fillStyle="rgba(212,168,67,"+p.o+")";cx.fill()});requestAnimationFrame(an)}
an();
var gs={ch:"start",hp:100,san:100,cor:0,inv:[],fl:{},gen:"m",party:["player"],hist:[],end:[],zone:"",endings:{}};
var PO={mark:"assets/portrait_mark.jpg",robin:"assets/portrait_robin.jpg",aralu:"assets/portrait_aralu.jpg",dominic:"assets/portrait_dominic.jpg",kim:"assets/portrait_kim.jpg"};
function sv(){try{localStorage.setItem("ms",JSON.stringify(gs))}catch(e){}}
function ld(){var s=localStorage.getItem("ms");if(s){gs=JSON.parse(s);sh(gs.ch);return true}alert("无存档");return false}
function C(v){return Math.max(0,Math.min(100,v))}
function up(){["h","s","c"].forEach(function(l){var m={h:"hp",s:"san",c:"cor"}[l];document.getElementById(l+"B").style.width=C(gs[m])+"%";document.getElementById(l+"V").textContent=C(gs[m])});
var gr=gs.inv.length?gs.inv.map(function(i){return i}).join(" | "):"无";document.getElementById("iv").innerHTML=gr;
document.getElementById("zb").textContent=Z[gs.zone]||""}
function ad(i){if(gs.inv.indexOf(i)<0)gs.inv.push(i)}
function ha(i){return gs.inv.indexOf(i)>=0}
function sf(k,v){gs.fl[k]=v}
function gf(k){return gs.fl[k]||false}
function ch(d){if(d.hp)gs.hp=C(gs.hp+(d.hp||0));if(d.san)gs.san=C(gs.san+(d.san||0));if(d.cor&&gs.cor<100)gs.cor=Math.min(100,gs.cor+(d.cor||0));up()}
function tt(){["ti","gs","es"].forEach(function(id){var e=document.getElementById(id);if(e)e.className=e.className==="ti"?"ti":"hd"});document.getElementById("ptbox").className="portrait"}
function nt(m){var t=document.getElementById("tt");t.textContent="\u2726 "+m;t.style.opacity="1";setTimeout(function(){t.style.opacity="0"},5000)}
function pt(name,img){var b=document.getElementById("ptbox");b.innerHTML='<img src="'+PO[img]+'"><div class="label">'+name+'</div>';b.className="portrait show"}
function pt_hide(){document.getElementById("ptbox").className="portrait"}
function D(text){return'<div class="dialog"><span class="name">\u276f\u276f </span>'+text+"</div>"}
var Z={Forest:"森林",Coastal:"海岸",Demon:"恶魔",Desolate:"废都",Desert:"沙漠",Mythic:"神话"};


function sh(id){gs.ch=id;gs.hist.push(id);if(gs.hist.length>80)gs.hist.shift();
var ch=chs[id];if(!ch){console.error("Missing:",id);return}
if(ch.en){var es=document.getElementById("es");es.className="en "+(ch.en==="good"?"g":ch.en==="bad"?"b":"n");
document.getElementById("et").textContent=ch.enm||ch.et||"结局";
var desc=typeof ch.text==="string"?ch.text:Array.isArray(ch.text)?ch.text.join("\n\n"):"";document.getElementById("ed").innerHTML=desc.replace(/\n/g,"<br>");
if(ch.enm&&!gs.end[ch.enm]){gs.end[ch.enm]=true}sv();es.classList.remove("hd");["gs","ti"].forEach(function(i){document.getElementById(i).className="hd"});return}
document.getElementById("ti").className="hd";["es"].forEach(function(i){document.getElementById(i).className="hd"});
document.getElementById("gs").className="";document.getElementById("ct").textContent=ch.t||"?";document.getElementById("cl").textContent=ch.loc||"?";
if(ch.zone)gs.zone=ch.zone;
var st=document.getElementById("st");
if(typeof ch.text==="string")st.innerHTML="<p>"+ch.text+"</p>";
else if(Array.isArray(ch.text))st.innerHTML=ch.text.map(function(t){
if(t[0]==="|")return D(t.slice(1));
if(t[0]==="!")return'<div class="warn">'+t.slice(1)+"</div>";
if(t[0]==="~")return'<p class="narration">'+t.slice(1)+"</p>";
return"<p>"+t+"</p>"}).join("");
if(ch.eff)ch(ch.eff);if(ch.items)ch.items.forEach(function(i){ad(i)});if(ch.sf)sf(ch.sf,true);if(ch.pt)pt(ch.pt[0],ch.pt[1]);
var bx=document.getElementById("cx");bx.innerHTML="";
if(ch.bg){document.getElementById("sceneBg").innerHTML="<img src=\""+ch.bg+"\">"}
if(ch.chs)ch.chs.forEach(function(c,i){var b=document.createElement("button");b.className="cb";
b.innerHTML=c.t+(c.tf?" <span class='dng'>[转化风险]</span>":"");
b.onclick=function(){if(c.eff)ch(c.eff);if(c.n)sh(c.n)};bx.appendChild(b)});
up();sv();window.scrollTo(0,0)}
var chs={
  start:{"t":"觉醒","loc":"Forest Zone - 森林入口","zone":"Forest","text":["你醒来了。","不是在自己的床上。不是在任何一个熟悉的地方。","头顶是被染成暗红色的天空——那不是地球的颜色。空气中弥漫着甜腻的花香，混合着某种古老的、不属于人间的魔力气息。高大的树木环绕着你，树干上闪烁着幽蓝色的磷光。","|\"嘿！你终于醒了！\"","你猛地转头。一个身影从树后探出头来。他穿着铠甲，头上扎着一条醒目的红色头巾，灰白色的头发在阳光下微微发光。","|\"你叫什么名字？别紧张——我也是被吸进来的。我叫Mark。\"","他向伸出手。你握住——他的手是温暖的、真实的。他还活着。你环顾四周。在树林的间隙中，隐约可以看到一座破败的城市的轮廓。","|\"那是Caste City。\"Mark顺着你的目光看去，\"我醒来的时候就在那里。遇见了几个其他被困的人……但他们已经不再记得自己是谁了。\"","他的声音低沉了一分。\"你知道Monline吗？那个传说中能让你体验不同人生的虚拟世界？我们都以为那只是个游戏。\"","\"它是。但也比游戏更可怕。\"","他直视着你的眼睛。\"创造这个世界的人——他叫Robin。他把我们都困在了这里。而那些输掉的人……\"","他顿了顿。\"他们变成了这里的居民。怪物娘。\"","远处传来某种声音——不是野兽，不是风。是一种歌声……甜美的、魅惑的、让人想要循声而去的声音。","|\"不要听。\"Mark低声说，\"那是Siren。她们会让你忘记自己是谁。\"","\"来吧。我知道一些安全的路。在我彻底失去理智之前——我们可以一起找到离开的办法。\""],"sf":"met_mark","pt":["Mark", "mark"],"chs":[{"t":"跟着Mark——去Caste City","n":"caste_city"},{"t":"怀疑他——自己探索","n":"forest_explore_alone","tf":true,"eff":{"san":-5}},{"t":"问他关于Robin的事","n":"ask_about_robin"}]},
  caste_city:{"t":"Caste City","loc":"Forest Zone - Caste City","zone":"Forest","text":["Mark带着你穿过森林，来到了那座破败的城市。","Caste City曾经是一座美丽的中世纪风格城镇——从建筑的风格来看，融合了哥特式和巴洛克式的元素。但现在，藤蔓爬满了石墙，街道上散落着被遗弃的物品。一个喷泉池中央的雕像已经被藤蔓缠绕，看不出原本的模样。","|\"这是我的据点。\"Mark推开了城中心一栋建筑的门。屋内堆满了补给品——罐头、水、和武器。\"虽然简陋，但至少安全。\"","|\"在你昏迷的时候，我出去探索了一圈。\"Mark在桌边坐下，摊开一张手绘地图，\"Forest Zone比想象中更大。有蜂巢、牧场、还有一片叫Breachwood的蜘蛛森林。\"","|\"但最重要的是——\"他指了指地图上的一个区域，\"根据PXE的信息，我们需要收集圣球。那是击败Robin的关键。\"","|\"PXE？\"你问。","|\"一个……实体。像向导一样。\"Mark的表情复杂，\"她知道很多事情。但她的记忆被Robin抹除了一部分。她说我们必须在不同的区域寻找Orbs。\"","门外传来声音——有人在接近。Mark迅速握住了剑柄。"],"sf":"in_caste","pt":["Mark", "mark"],"chs":[{"t":"做好准备——迎接来者","n":"caste_encounter"},{"t":"从窗户观察","n":"caste_observe"}]},
  caste_encounter:{"t":"神秘的访客","loc":"Forest Zone - Caste City","zone":"Forest","text":["门被推开了。","站在门口的并非敌人——是一个戴着蓝绿色帽子的年轻人。他穿着一件防风夹克，背着鼓鼓囊囊的背包，橙色斗篷在风中飘动。他的眼睛是蓝色的，充满好奇的光芒。","|\"Mark！你还活着！\"他高兴地走了进来，然后看到了你，\"哦——新面孔？让我猜猜……你也是被吸进来的？\"","Mark松了口气。\"这是Percy——一个研究员。他在各个区域之间游走，记录这里发生的各种……变化。\"","|\"准确地说，是变身。\"Percy纠正道，他的眼睛亮了起来，\"你知道Monline最迷人的是什么吗？不是它的美丽或恐怖——而是它的转化机制。每一种怪物娘都有独特的转化过程——从生理到心理的全面重塑！\"","他的热情让你感到一丝不适。Percy察觉到了。","|\"抱歉抱歉——职业病。\"他清了清嗓子，\"我给你们带来了重要情报。我发现了安全穿过Breachwood的方法。\"","|\"Arachne——那只蜘蛛女皇——她最近在和Hive的Queen Bee闹矛盾。如果你能找到Queen Bee的Royal Jelly作为贡品——她就会让你通过。\""],"sf":"met_percy","pt":["Percy", "mark"],"chs":[{"t":"去Hive找Queen Bee","n":"forest_hive"},{"t":"直接挑战Arachne的Breachwood","n":"forest_spider","tf":true},{"t":"去Minoh Ranch收集情报","n":"forest_ranch"}]},
  forest_hive:{"t":"蜂巢","loc":"Forest Zone - Hive","zone":"Forest","text":["你按照Percy的建议前往Hive区域。越靠近蜂巢，空气中的甜味就越浓烈。几乎到了令人窒息的程度。","巨大的蜂巢悬挂在三棵巨树的枝干之间。蜂巢表面流淌着金色的蜂蜜，在暗红色的阳光下闪烁着诱人的光芒。","蜜蜂娘在周围飞舞——她们的上半身是美丽的少女，下半身是蜜蜂的体态。透明的翅膀嗡嗡作响。一名金发的蜜蜂娘降落在你们面前。","|\"新朋友！\"她的声音像蜂蜜一样甜，\"你们是来尝蜂蜜的吗？\"","|\"我们需要见Queen Bee。\"Mark直截了当地说。","蜜蜂娘的表情微微变化。\"Queen现在不太高兴。Hornet侵犯了她的领地，她正在气头上。如果你们能帮忙解决那些Hornet……或许她会见你们。\"","她递给你们一块蜂蜜，\"在这期间——尝尝这个。免费的。\"","蜂蜜的甜香充满了你的鼻腔。你的胃在抗议——你已经很久没吃东西了。"],"sf":"met_bee","pt":["蜜蜂娘", "mark"],"chs":[{"t":"接受蜂蜜——增加体力（有转化风险）","n":"honey_eat","tf":true,"eff":{"hp":15}},{"t":"拒绝——保持警惕","n":"honey_refuse","eff":{"san":5}},{"t":"询问更多关于Hornet的信息","n":"honey_ask"}]},
  honey_eat:{"t":"蜂蜜的代价","loc":"Forest Zone - Hive","zone":"Forest","text":["你接过了蜂蜜。","舌尖触碰到的瞬间——世界变得柔软了。那甜味不只是味觉，它渗透了你的每一个细胞。你的身体在微微发光。你感到温暖、安宁、愉悦。","Mark拍了拍你的肩膀。\"嘿——你还好吗？你的眼睛在发光。\"","你低头看自己的手——皮肤上浮现出了淡金色的花纹。那是蜂蜜的花纹。转化因子已经渗入了你的身体。","|\"啊……\"蜜蜂娘微笑着说,\"你已经尝到了转化的滋味。不用担心——一点点不会让你完全改变的。但你会想要更多……对吗？\"","她说对了。你想要更多。"],"eff":{"hp":20,"cor":15},"pt":["Mark", "mark"],"chs":[{"t":"去帮忙消灭Hornet——这样能见到Queen Bee","n":"hornet_cave","tf":true,"eff":{"cor":10}},{"t":"立刻离开这个危险的地方","n":"forest_spider","tf":true,"eff":{"cor":5}}]},
  hornet_cave:{"t":"大黄蜂巢穴","loc":"Forest Zone - Hornet Cave","zone":"Forest","text":["你们在北方的洞穴中找到了Hornet的巢穴。空气中弥漫着刺鼻的信息素。洞壁上布满了尖锐的结晶。","Mark拔出武器。\"准备好了吗？\"","你们与大黄蜂展开了激烈的战斗。黄蜂的尾针擦过你的脸颊，差点刺中。Mark一剑砍下了它的翅膀。最终——你们胜利了。","当你们带着战利品返回蜂巢时，Queen Bee亲自迎接了你们。她比普通的蜜蜂娘大三倍，翅膀闪烁着金光。","|\"你们证明了自己的价值。\"她的声音低沉而嗡嗡作响，\"作为回报，我会告诉你们关于Orb的情报——以及安全通过Forest Zone的方法。\"","|\"Orb of the Trees在森林深处——但被Arachne守护着。你们需要击败她或说服她。\"","|\"至于通过Forest Zone——沿着Breachwood最东边的小路走。那是我领地的边缘，Arachne的手伸不到那里。\""],"eff":{"hp":15,"cor":5},"items":["蜂王浆"],"sf":"beat_hornet","pt":["Queen Bee", "mark"],"chs":[{"t":"前往Breachwood——面对Arachne","n":"forest_spider"}]},
  ask_about_robin:{"t":"关于Robin","loc":"Forest Zone","zone":"Forest","text":["你问Mark关于Robin的事情。","Mark的表情变得严肃。","|\"我知道的不多。PXE说过——Robin曾经也是个普通人。一个程序员。他创造了Monline这个虚拟世界——但后来他把自己也锁在了里面。\"","|\"他不让别人离开。他改变了这个世界——把它变成了自己的乐园。所有进入这里的人……要么成为他的玩物，要么变成怪物娘。\"","Mark握紧了剑柄。\"我听说他戴着一条镶着红色宝石的项圈——那是他力量的来源。如果能把那个破坏掉……他说不定就会失去控制这个世界的能力。\"","\"那我们最好快点行动。\"你说。","Mark点了点头。\"去Caste City吧。我需要补给。然后我们出发去寻找Orb。\""],"pt":["Mark", "mark"],"chs":[{"t":"前往Caste City","n":"caste_city"},{"t":"先探索森林","n":"forest_explore_alone"}]},
  forest_explore_alone:{"t":"独自探索","loc":"Forest Zone","zone":"Forest","text":["你决定先独自探索一下森林。","Mark提醒你要小心，然后给了你一个哨子。\"如果有危险就吹这个，我会来找你。\"","你独自走进了密林深处。树木越来越扭曲。空气中弥漫着一种甜腻而沉重的花香。这种感觉既陌生又熟悉……像是某种召唤。","走了大约十分钟后，你在一片空地上发现了一座小屋。小屋看起来很陈旧，但烟囱里冒着烟——有人在里面。","门上挂着一个木牌：\"欢迎！进来坐坐吧。但别喝太多牛奶。\"——落款是\"Minoh\"。","你犹豫了一下。在这个世界，免费的好意往往是最危险的陷阱。但你的体力确实需要补充了。"],"sf":"explored_alone","pt":["Mark", "mark"],"chs":[{"t":"进入小屋","n":"forest_ranch"},{"t":"返回找Mark","n":"caste_city"}]},
  coastal_boat:{"t":"搁浅的船","loc":"Coastal Zone","zone":"Coastal","text":["你检查了那艘搁浅的小船。船身破旧，但龙骨还完整。船舱里有一张破烂的海图和一本日志。","你翻开日志——字迹已经模糊，但勉强能辨认出最后几行字：","~\"第三天。Siren的歌声越来越近了。我躲在船舱里不敢出去。我的船员们都已经跳海了。我听到他们在海里唱歌。唱得比任何人类都好听。\"","~\"第五天。我快没食物了。但我发现了一件可怕的事——我开始渴望听到那歌声。我不再害怕了。我想加入他们……\"","日志到此为止。最后一页沾着海水的痕迹。","Mark拍了拍你的肩膀。\"这就是Monline的可怕之处。它会让你渴望变成怪物。\""],"pt":["Mark", "mark"],"chs":[{"t":"前往Eurum City","n":"eurum_city"},{"t":"直接出海","n":"coastal_port"}]},
  coastal_port:{"t":"港口","loc":"Coastal Zone","zone":"Coastal","text":["你们来到了港口。海浪拍打着木制码头。几艘停泊的船随着波浪轻轻摇晃。","一个老人坐在码头边——他戴着渔夫帽，叼着烟斗。但他的眼睛……没有瞳孔。一片乳白色。","|\"想要船？\"他开口了，没有转头。\"我在这里等你们很久了。\"","|\"别紧张。我不是敌人。\"他笑了笑，\"我是被Sea Bishop诅咒的可怜人——眼睛虽然瞎了，但我能看到灵魂。你们的灵魂……还很亮。不像那些已经被转化的人。\"","|\"那艘海猫号——是我的船。在我还是人类的时候。\"他指向一艘帆船。\"现在它归你们了。如果你们能活着回来——把船还给我。\""],"items":["海猫号"],"pt":["Mark", "mark"],"chs":[{"t":"出海——寻找Orb","n":"sea_temple"},{"t":"先探索Eurum City","n":"eurum_city"}]},
  be_a1:{"t":"Bad End: Liar Liar","loc":"Forest Zone","zone":"Forest","text":["你说了谎。在Monline里，谎言会变成现实。","你的皮肤开始发痒——那是羽毛在生长。你的四肢正在变得轻盈。你的意识……变得模糊。","当你的脸上的肌肉僵硬成一种永远的微笑时，你终于明白了——说谎的人要吞一千根针。但在Monline，说谎的人要变成一只有着人类意识的鸟。","你展开新生的翅膀飞向了天空。你还记得自己是人类吗？也许下一秒就会忘记。"],"en":"bad","enm":"A1","et":"Liar Liar"},
  be_a5:{"t":"Bad End: Absolute Power","loc":"Forest Zone","zone":"Forest","text":["你挑衅了Arachne。她笑了——那是一种让你的骨髓冻结的笑容。","|\"既然你渴望力量——\"她的蛛丝缠绕了你，\"让我给你绝对的力量。变成我的子民的力量。\"","毒液注入你的身体。你感到自己的下半身在融合……在膨胀……在变成黑色的几丁质外壳。你的眼睛在分裂——变成了八只复眼。","你的意识在挣扎——但毒液正在溶解你的抗拒。你将成为Breachwood的又一个守卫。永远。"],"en":"bad","enm":"A5","et":"Absolute Power"},
  be_c5:{"t":"Bad End: What a Tool","loc":"Demon Zone","zone":"Demon","text":["你沉溺于Succubus的触感。","她的吻吸走了你的意志。你的意识像蜡烛一样融化——你的身体成了她的新玩具。当你在她怀中重新睁开眼时，你的瞳孔变成了心形。你穿着暴露的服装，翅膀从肩胛骨处长出。","|\"欢迎加入姐妹会。\"她微笑着说。","而你发现——你竟然不介意。你甚至渴望她的下一个指令。"],"en":"bad","enm":"C5","et":"What a Tool"},
  be_e1:{"t":"Bad End: Riddle Me This","loc":"Desert Zone","zone":"Desert","text":["Sphinx失望地看着你。\"错误的答案。\"","她的尾巴刺入了你的胸口。你感到的不是疼痛——是重构。你的灵魂在被拆解、重组、装填进一个新的躯壳。","当你再次睁开眼时，你看到了自己的新身体——金色的鳞片、狮子的下半身、巨大的翅膀。你变成了新的Sphinx。","你将在这里守护金字塔，用谜语考验其他玩家——直到有人给出正确的答案，或者……你永远等待下去。"],"en":"bad","enm":"E1","et":"Riddle Me This"},
  be_tempted:{"t":"Bad End: Temptation","loc":"Mythic Zone","zone":"Mythic","text":["你屈服了。你接受了这个世界。","Robin微笑着走到你面前。\"你终于明白了。\"他伸出手指触碰你的额头——一股暖流涌入你的全身。你的身体在发光。在变化。","腐化值与你的意识融合了。你不再抵抗了。你的身体变成了最适合这个世界的形态——长出了翅膀、角、尾巴……你成为了Robin的同伴。","一个永远不会离开他的同伴。永远。"],"en":"bad","enm":"X1","et":"Temptation"},
  demon_entry:{"t":"恶魔之门","loc":"Demon Zone - 入口","zone":"Demon","text":["你穿过了那道暗紫色的传送门。","踏出的第一步——你就感觉到了不同。空气中的温度急剧上升，带着硫磺和灰烬的气息。天空是血红色的，大地龟裂，岩浆在裂缝中流淌。","远处矗立着一座黑色的城堡，它的尖塔刺入血色的天空。更近处——一座阴森的教堂散发着不祥的灰色光芒。","|\"这就是Demon Zone。\"一个声音从你背后传来。","你猛地转身——一个拥有金色长发的女性站在你身后。她的眼中闪烁着红色的光芒，穿着铠甲，手持一把银色的细剑。她的气质像一名高贵的骑士。","|\"我叫Aralu。我是来猎杀恶魔的——也可以猎杀你，如果你是敌人的话。\"她打量着你。\"但你看起来……不像是自愿来到这里的。\"","|\"我是来收集Orb的。\"你说。","Aralu的眼睛亮了一下。\"我也是。但Demon Zone的Orb被藏在城堡深处，由Succubus Queen守护着。我们需要互相帮助——至少到我击败Draculara为止。\""],"sf":"met_aralu","pt":["Aralu", "aralu"],"chs":[{"t":"与Aralu组队","n":"demon_castle"},{"t":"独自探索","n":"demon_church"}]},
  demon_castle:{"t":"黑暗城堡","loc":"Demon Zone - 城堡","zone":"Demon","text":["你跟着Aralu进入了城堡。大厅里悬挂着扭曲的画作——每一幅都在盯着你。壁炉中的火焰是紫色的。","|\"小心Succubus。她们会读取你内心最深处的欲望——然后用它来对付你。\"Aralu警告道。","话音刚落——一个魅魔从走廊尽头出现。她美得令人窒息，每一步都带着致命的优雅。她的目光锁定在你身上。","|\"哦？新来的？\"她的声音像蜜糖一样甜。\"你的灵魂看起来……很美味。\"","你的目光无法从她身上移开。你的脚不受控制地向她走去。","Aralu一把拉住你的手臂。\"别看她！\""],"eff":{"cor":5},"pt":["Aralu", "aralu"],"chs":[{"t":"抵抗诱惑","n":"demon_castle_hall","eff":{"san":-10}},{"t":"……回应她（危险）","n":"be_c5","tf":true}]},
  demon_castle_hall:{"t":"城堡大厅","loc":"Demon Zone - 城堡大厅","zone":"Demon","text":["你和Aralu在城堡中前进。走廊两侧排列着石像——它们不是装饰，而是被石化的冒险者。","你们终于来到了一个大厅。大厅中央悬浮着一颗暗红色的球体——Demon Orb。","但它被一个透明的屏障保护着。在屏障前站着一个身影——她有着紫色的长发和蝙蝠般的翅膀。她的美丽背后是无穷的恶意。","|\"我是Draculara。\"她微笑着——但那笑容中没有温度。\"你就是那个想要我的圣球的人？\"她对Aralu说。","|\"我想要的不只是圣球。\"Aralu拔出了剑,\"我要终结你的统治。\"","Draculara笑了。\"那就来吧。\""],"sf":"met_draculara","pt":["Aralu", "aralu"],"chs":[{"t":"与Draculara战斗","n":"demon_fight"},{"t":"尝试说服她","n":"demon_talk"}]},
  demon_talk:{"t":"说服","loc":"Demon Zone - 城堡大厅","zone":"Demon","text":["你走上前去。","|\"Draculara——你不是非要战斗。你拥有力量——但你的力量来源于恐惧。而不是真正的忠诚。\"","她眯起眼睛。\"你在教训我？\"","|\"我只是说——有更好的统治方式。\"你保持冷静。","Draculara沉默了片刻。然后——她笑了。那是一种复杂的笑容。","|\"有趣。很少有人敢这样对我说话。\"她挥了挥手——屏障消失了。\"带着Orb走吧。总有一天——你会明白统治的必要性。\"","Aralu惊讶地看着你。\"你做到了……\""],"items":["Demon Orb"],"pt":["Aralu", "aralu"],"chs":[{"t":"获取Demon Orb","n":"demon_after"}]},
  desolate_entry:{"t":"废都边缘","loc":"Desolate Zone - 入口","zone":"Desolate","text":["你来到了Desolate Zone的入口。这里曾经是一座繁华的城市——现在只剩废墟。摩天大楼倒塌，街道上长满了灰色的藤蔓。空气中弥漫着死亡的气息。","但就在你踏入这片废土的第一步——一个僵尸从废墟中冲出，直奔你而来！","就在它即将扑到你面前时——一道银光闪过。僵尸的头颅飞了出去。","站在你面前的是一个有着海绿色头发的年轻女性。她的眼睛是红色的——但不是恶魔那种红，而是像火焰一样燃烧的红色。她手里握着一把沾满黑色血液的长刀。","|\"你没事吧？\"她问着，目光却警惕地扫视四周。","|\"谢……谢谢。\"你说。","|\"我叫Kim。\"她露出一个短暂的笑容。\"我在找一个叫Mara的家伙。她引发了这里的僵尸灾难。你见过她吗？\""],"sf":"met_kim","pt":["Kim", "kim"],"chs":[{"t":"和她一起调查","n":"desolate_mansion"},{"t":"独自行动","n":"desolate_streets"}]},
  desolate_mansion:{"t":"宅邸","loc":"Desolate Zone - 宅邸","zone":"Desolate","text":["Kim带着你穿过了废弃的街道，来到一座巨大的维多利亚式宅邸前。这座建筑是这片区域中为数不多还保持着原貌的结构。","|\"Mara就在里面。\"Kim说,\"她曾是一个被困在这里的玩家——但她选择了拥抱黑暗。现在她制造了这一切——僵尸、怪物、腐化……\"","你们推开了宅邸的大门。内部出乎意料地奢华——天鹅绒窗帘、水晶吊灯、古老的挂毯。但空气中弥漫着一种……药物般的气味。","从楼梯上走下来一个身影——她穿着医生般的大褂，手里拿着注射器。她的眼睛半闭着，像是……沉浸在自己的世界里。","|\"哦……新病人。\"她微笑着说——那笑容让人毛骨悚然。\"我是Mara。你们需要……治疗。\""],"pt":["Kim", "kim"],"chs":[{"t":"战斗——击败Mara","n":"desolate_hospital"},{"t":"尝试沟通","n":"desolate_mara_talk"}]},
  desert_entry:{"t":"沙漠入口","loc":"Desert Zone - 入口","zone":"Desert","text":["你和Kim走出了Desolate Zone的传送门——踏入了一片无尽的金色沙海。","烈日当头。热浪扭曲了地平线。远处——一个被黄沙半掩的古老金字塔在阳光下闪烁着金光。","在入口处，你们遇到了一个戴着眼鏡的年轻男性。他正在一块石板上写写画画。当他看到你们时，眼睛亮了起来。","|\"太好了——新人！\"他合上笔记本站了起来。\"我是Dominic。我正在研究这座金字塔的古代封印——并计划围攻它。\"","Kim眯起眼睛。\"围攻金字塔？听起来不像是个好主意。\"","|\"相信我——我知道我在做什么。\"Dominic自信地说,\"但这需要更多人手。如果你们帮我——我告诉你们如何拿到里面的Orb of the Sun。\""],"sf":"met_dominic","pt":["Dominic", "dominic"],"chs":[{"t":"相信Dominic——加入围攻","n":"desert_pyramid"},{"t":"保持谨慎——自己探索","n":"desert_explore"}]},
  mythic_entry:{"t":"神话之地","loc":"Mythic Zone - 入口","zone":"Mythic","text":["你来到了最后一片区域——Mythic Zone。","这里的天空呈现出粉紫色的光芒。道路两侧排列着红色的鸟居，通向山林深处。空气中充满了神圣而沉重的能量。","在道路的尽头——一座巍峨的神社矗立在山巅。那是Monline的核心——Robin的居所。","你体内所有的Orb开始共鸣。它们在回应神社中的最后那颗Orb——或者说是那颗Orb的主人。","~\"你终于来了。\"","一个声音在你脑中响起——不是从前方传来，而是从你内心最深处。","道路前方站着一个穿着白色连帽斗篷的身影。他戴着一条镶着红色宝石的项圈。他的脸隐藏在兜帽的阴影中——但你感觉到了他的微笑。","|\"我是Robin。Monline的创造者。欢迎来到我的世界。\"他张开双臂。\"这里——是我为自己建造的天堂。而你们——是我邀请的客人。永远。留在这里。\""],"sf":"met_robin","pt":["Robin", "robin"],"chs":[{"t":"质问Robin","n":"final_robin"},{"t":"寻找其他出口","n":"mythic_side"}]},
  final_robin:{"t":"最终对峙","loc":"Mythic Zone - 神社","zone":"Mythic","text":["你站在Robin面前。所有的旅途、所有的战斗、所有的选择——都汇聚在这一刻。","Robin缓缓掀起了兜帽。他的面容出乎你的意料——他看起来不像是邪恶的统治者。他看起来……就像一个孤独的年轻人。","|\"我知道你想离开。\"他的声音平静。\"但你不能。因为如果你离开了——我就又变成一个人了。\"","他指着周围的人——那些被转化的人、那些怪物娘。\"她们——她们曾经都想离开。但现在她们很快乐。因为我给了她们归属感。\"","|\"你没有权利替别人做选择。\"你说。","Robin的笑容变得苦涩。\"但你有权利替我做选择吗？你来到我的世界——想要毁掉它。毁掉我唯一拥有的东西。\"","他的手中出现了那颗最后的Orb——Orb of the Sun。金色的光芒照亮了整个神社。","|\"你来拿吧。\"他说,\"如果你能做到的话。\""],"eff":{"san":-15},"pt":["Robin", "robin"],"chs":[{"t":"战斗——抢夺最后的Orb","n":"final_battle"},{"t":"尝试沟通——理解他","n":"final_talk"},{"t":"放弃——接受这里（危险）","n":"be_tempted","tf":true}]},
  final_talk:{"t":"理解","loc":"Mythic Zone - 神社","zone":"Mythic","text":["你没有拔出武器。你向前走了一步。","|\"我来这里不是为了毁掉你的世界。我来这里——是为了理解它。\"","Robin愣住了。","|\"我遇到了Mark。遇到了Kim。遇到了Aralu。遇到了Dominic。\"你说,\"他们每一个人都有故事。你也一样。\"","\"你建造了这个世界——是因为你无法在现实世界找到归属。但把别人困在这里……不是解决办法。\"","Robin低着头。他的手在颤抖。","|\"那我应该怎么办？\"他的声音嘶哑,\"放你们走……然后继续一个人？\""],"eff":{"san":15},"pt":["Robin", "robin"],"chs":[{"t":"\"如果你愿意——我可以做你的朋友。在现实世界里。\"","n":"final_true"},{"t":"\"我不知道……\"","n":"be_tempted","tf":true}]},
  final_true:{"t":"True Ending","loc":"Mythic Zone - 神社","zone":"Mythic","text":["Robin沉默了很久。","然后他抬起头。你看到——他的眼睛湿润了。","|\"从来没有人对我说过这句话。\"他低声说。","他伸出手——掌心中是Orb of the Sun。金色的光芒温暖而柔和。","|\"拿去吧。关闭这扇门。让我——也离开这里。\"","你接过了Orb。六颗Orb在你体内合为一体——你感到一股强大的力量贯通你的全身。Monline世界开始震动——天空出现了裂缝。","你回头看——所有被转化的人都在发生变化——她们在恢复。鳞片褪去、翅膀收缩、尾巴消失。她们在变回人类。","在金色的光芒中——所有人都被送回了现实世界。","你站在Mirane城的废墟中。阳光是真实的蓝色。空气中没有硫磺的味道。远处——你看到了Mark、Kim、Aralu、Dominic——还有Robin。","Robin对你微微一笑。那是一个没有伪装的笑容。","~也许这就是真正的结局——不是逃离一个世界，而是拯救一群灵魂。"],"en":"good","enm":"GOOD","et":"回家"},
  be_a1:{"t":"Bad End: Liar Liar","loc":"Forest Zone","zone":"Forest","text":["你对mansion主人说了谎。蘑菇孢子渗入你的衣服，你的身体在麻痹中转变成了金发碧眼、头脑简单的Bimbo——美丽的装饰品，空洞的灵魂。","你变成了Bimbo。你的意识在消退——每一次心跳都在忘记更多关于\"人类\"的事情。","你的新身体感觉……还不错。也许你本来就不该是人类的。也许——这才是真正的你。","Bad End: Liar Liar"],"en":"bad","enm":"Liar Liar","et":"LIAR LIAR"},

  be_a13:{"t":"Bad End: Cat is Fine","loc":"Forest Zone","zone":"Forest","text":["森林中的野猫娘捉住了你。她们的利爪和魔法将你变成了猫娘——耳朵、尾巴、竖瞳。你在月光下的屋顶上游荡，追着蝴蝶玩耍。记忆中的\"人类\"正在变得遥远。","你变成了Cat Girl。你的意识在消退——每一次心跳都在忘记更多关于\"人类\"的事情。","你的新身体感觉……还不错。也许你本来就不该是人类的。也许——这才是真正的你。","Bad End: Cat is Fine"],"en":"bad","enm":"Cat is Fine","et":"CAT IS FINE"},
  be_a14:{"t":"Bad End: Cat Called","loc":"Forest Zone","zone":"Forest","text":["你被猫娘们带回了她们的聚集地。她们给你穿上了女仆装——猫耳女仆。你在森林中的猫咖里服务其他怪物娘。她们说你很可爱。你开始觉得她们说得对。","你变成了Cat Maid。你的意识在消退——每一次心跳都在忘记更多关于\"人类\"的事情。","你的新身体感觉……还不错。也许你本来就不该是人类的。也许——这才是真正的你。","Bad End: Cat Called"],"en":"bad","enm":"Cat Called","et":"CAT CALLED"},
  be_a15:{"t":"Bad End: Feline Fine","loc":"Forest Zone","zone":"Forest","text":["森林深处的黑豹娘将你视为了猎物——也是伴侣。她的魔力将你变成了和她们一样的黑豹娘。你在黑暗中狩猎，享受着捕猎的快感。作为人的记忆——正在消退。","你变成了Panther Girl。你的意识在消退——每一次心跳都在忘记更多关于\"人类\"的事情。","你的新身体感觉……还不错。也许你本来就不该是人类的。也许——这才是真正的你。","Bad End: Feline Fine"],"en":"bad","enm":"Feline Fine","et":"FELINE FINE"},
  be_a16:{"t":"Bad End: Heavy Petting","loc":"Forest Zone","zone":"Forest","text":["你遇到了森林中的熊娘。她对你很温柔……太温柔了。她的怀抱让你无法挣脱——你被转化成了熊娘。强壮、温暖、嗜睡。你在冬眠中忘记了自己曾经是谁。","你变成了Bear Girl。你的意识在消退——每一次心跳都在忘记更多关于\"人类\"的事情。","你的新身体感觉……还不错。也许你本来就不该是人类的。也许——这才是真正的你。","Bad End: Heavy Petting"],"en":"bad","enm":"Heavy Petting","et":"HEAVY PETTING"},

  forest_bear:{"t":"熊娘之森","loc":"Forest Zone - 熊穴","zone":"Forest","text":["你在森林中遇到了一只巨大的熊娘。她正在河边捕鱼，当看到你时——她友善地挥了挥手。","|\"你好！\"她的声音粗犷但友好,\"你是新来的？真少见。\"","你犹豫着是否要回应。她看起来不像其他怪物娘——她没有攻击性。","|\"我叫Ursa。别担心——我不吃人类。我只吃鱼和浆果。\"她咧嘴一笑，\"如果你想安全通过森林——我建议你避开那些蜘蛛。走河边的路。\"","她给了你一些浆果。\"拿着吧。路上吃。\""],"eff":{"hp":10},"items":["熊娘浆果"],"pt":["Ursa", "mark"],"chs":[{"t":"接受浆果——继续前进","n":"caste_city"},{"t":"邀请她做向导","n":"forest_bear_guide","eff":{"san":10}}]},
  forest_bear_guide:{"t":"熊娘同行","loc":"Forest Zone - 河边","zone":"Forest","text":["Ursa拍掉手上的鱼鳞。\"好吧——我正好闲着。陪你走一段。\"","一路上她和你聊了很多——她也是玩家，被转化得很早，已经不太记得人类世界的样貌了。但她的语气中没有悲伤。反而带着一种奇怪的满足。","|\"你知道吗？当初被转化的时候我很害怕。\"她说,\"但现在——我喜欢这样。强壮、自由、不用为房租发愁。\"","她对你眨了眨眼。\"也许——留下来也不是什么坏事。\"","你没有回答。但她的言语在你心中种下了一颗种子。"],"eff":{"cor":5,"san":5},"pt":["Ursa", "mark"],"chs":[{"t":"继续前往Caste City","n":"caste_city"}]},
  coastal_fisherman:{"t":"海边渔夫","loc":"Coastal Zone - 码头","zone":"Coastal","text":["除了那个盲眼老人，港口还有另一个渔夫——一个年轻女性，正在修补渔网。她有着深棕色的皮肤和强壮的臂膀。","|\"哦——新鲜面孔！\"她看到你时眼睛一亮,\"你是来找船的吗？那个瞎老头的船不太好使——他的海图都是错的。\"","她指向自己的渔船。\"我的海仙女号——比海猫号快多了。\"","|\"有什么条件？\"你问。","|\"帮我把这些渔网修好。然后——它归你了。\"她笑道。"],"pt":["渔夫", "mark"],"chs":[{"t":"帮她修网——换取更好的船","n":"coastal_fix_net"},{"t":"还是用海猫号","n":"sea_temple"}]},
  coastal_fix_net:{"t":"修网","loc":"Coastal Zone - 码头","zone":"Coastal","text":["你花了一个小时帮她修补渔网。在这个过程中她告诉你——这片海域曾经是个度假胜地。","|\"我叫Rumi。曾经是这里的一个潜水教练。\"她指着远方的海面,\"那边——以前有彩色的珊瑚和热带鱼。现在只有Siren和怪物。\"","|\"你为什么不离开？\"你问。","|\"离开不了了。\"她苦笑,\"我已经被海神的魔力污染了很多年。回到人类世界——我可能会变成一滩水。\"","她拍了拍修好的渔网。\"行了。海仙女号是你的了。航行愉快——记住，不要相信那些歌声。\""],"items":["海仙女号"],"pt":["Rumi", "mark"],"chs":[{"t":"驾驶海仙女号出海","n":"sea_temple"}]},
  demon_fight:{"t":"与Draculara之战","loc":"Demon Zone - 城堡大厅","zone":"Demon","text":["你拔出武器——Aralu的银色细剑在你身边闪耀。Draculara张开双臂，她的斗篷化作无数蝙蝠。","战斗持续了很久。Aralu的剑术令人叹为观止——她击退了一波又一波的蝙蝠。但你也没闲着——你找到了Draculara的弱点：她的项圈。","|\"就是现在！\"你喊道。","你和Aralu同时出击——剑光斩断了Draculara的红色项圈。","Draculara尖叫了一声——她的身体开始消散。她不是被击败了——而是被解放了。","|\"谢谢你……\"她最后的声音中带着疲惫,\"我被她控制太久了……\"","Demon Orb从她消散的身体中升起，缓缓飘向你。"],"eff":{"hp":-15,"san":10},"items":["Demon Orb"],"pt":["Aralu", "aralu"],"chs":[{"t":"获取Demon Orb","n":"demon_after"}]},
  demon_after:{"t":"分别","loc":"Demon Zone - 出口","zone":"Demon","text":["Aralu看着手中的Demon Orb，然后把它递给了你。","|\"你拿着吧。\"她说,\"我的战斗已经结束了。\"","|\"你要去哪里？\"你问。","|\"Draculara——她其实是我母亲。\"Aralu的声音变得柔和,\"她曾经是个好人。被恶魔力量腐化了。刚才——当她被解放时——她终于安息了。\"","|\"我要埋葬她。然后——也许我会回到人类世界。\"她微微一笑,\"祝你好运。也许我们会在旅程的终点再见。\"","她转身走向城堡深处。你握着Demon Orb——感到一股黑暗温暖的力量在你体内流动。你又收集到了一颗Orb。"],"eff":{"san":15},"items":["Demon Orb"],"sf":"aralu_left","pt":["Aralu", "aralu"],"chs":[{"t":"前往Desolate Zone","n":"desolate_entry"}]},
  desolate_streets:{"t":"废墟街道","loc":"Desolate Zone - 街道","zone":"Desolate","text":["你和Kim在废弃的街道上穿行。破碎的橱窗中陈列着腐烂的人体模型。一辆报废的汽车横在路中央——车内有一具骷髅，还握着方向盘。","|\"Mara的势力范围很大。\"Kim低声说,\"她几乎控制了整座城市。僵尸、怪物——都是她创造的。\"","远处传来一声尖叫——不是人类的。像是金属摩擦的声音。","|\"那边。\"Kim指着一座大型建筑——购物中心。"],"pt":["Kim", "kim"],"chs":[{"t":"前往购物中心","n":"desolate_mall"},{"t":"继续向宅邸前进","n":"desolate_mansion"}]},
  desolate_mall:{"t":"废弃商场","loc":"Desolate Zone - Mall","zone":"Desolate","text":["你们进入了购物中心。这里曾经灯火辉煌。现在——只有应急灯在闪烁。自动扶梯停了，成为一个巨大的斜坡。","在一楼的服装店里——你们看到了一些\"人\"。她们在试衣服。但她们不是活人——是僵尸。僵尸在购物。","|\"这太诡异了。\"Kim低声说。","僵尸们转头看向你们——然后发出一阵恐怖的尖叫声，向你们冲来。"],"eff":{"hp":-10},"pt":["Kim", "kim"],"chs":[{"t":"战斗——杀出一条路","n":"desolate_mansion"},{"t":"逃跑——从消防通道撤","n":"desolate_streets"}]},
  desolate_mara_talk:{"t":"与Mara对话","loc":"Desolate Zone - 宅邸","zone":"Desolate","text":["你放下武器。Kim惊讶地看着你——但你示意她保持冷静。","|\"Mara——你不是坏人。你只是……迷失了。\"你说。","Mara歪着头。她说迷失不过她从来没有比现在更清醒。她举起注射器说你知道这个世界最伟大的礼物是什么吗是改变。","|\"但代价是什么？\"你问。","她的笑容僵住了一秒。代价——她几乎已经忘记了。","|\"……变不回去。\"她低声说。"],"pt":["Kim", "kim"],"chs":[{"t":"邀请她加入——寻找治愈方法","n":"desolate_mara_join"},{"t":"她太危险了——必须战斗","n":"desolate_hospital","tf":true}]},
  desert_explore:{"t":"独自探索沙漠","loc":"Desert Zone - 沙漠腹地","zone":"Desert","text":["你决定不和Dominic合作——他的眼神中有些你不信任的东西。","你和Kim在沙漠中独自前行。烈日下的黄沙无尽无垠。你们找到了一个古老的村落废墟。墙壁上的壁画描绘着一个戴着红色宝石项圈的身影——Robin。","壁画显示——Robin曾经就是这里的人。这个世界的远古力量选择了作为他的容器。","|\"原来Robin不是这里的创造者。\"Kim低声说,\"他只是——继承了这里。\"","在废墟的地下，你们找到了一个隐藏的房间——里面存放着一种古老的沙漠圣药。"],"items":["沙漠圣药"],"pt":["Kim", "kim"],"chs":[{"t":"带走圣药","n":"desert_get_potion"},{"t":"继续走向金字塔","n":"desert_pyramid"}]},
  desert_get_potion:{"t":"圣药","loc":"Desert Zone - 废墟地下","zone":"Desert","text":["你取走了圣药。它是一种金色的液体——散发着温暖的光芒。","你喝了一小口——一股清凉的能量在你的血管中流动。你的腐化值竟然降低了。","|\"这可以抵抗转化。\"你意识到。","你小心翼翼地装好圣药。这可能是你在后续区域中保持人性的关键。"],"eff":{"cor":-15,"hp":15},"pt":["Kim", "kim"],"chs":[{"t":"前往金字塔","n":"desert_pyramid"}]},
  mythic_side:{"t":"Mythic Zone岔路","loc":"Mythic Zone - 鸟居前","zone":"Mythic","text":["去往神社的路上有多个岔路口。每个路口都通向不同的区域——那里住着被Robin转化的居民。","|\"在去见Robin之前——也许我们应该探索一下这里。\"Kim说。","左边的路通向一片竹林——你听到了狐狸的叫声。中间的路通向一个古老的忍者村。右边的路通向一片黑暗的洞窟——里面传来低沉的咆哮。"],"pt":["Kim", "kim"],"chs":[{"t":"探索竹林——狐仙祠","n":"mythic_fox"},{"t":"前往忍者村","n":"mythic_ninja"},{"t":"探索洞窟","n":"mythic_oni"}]},
  mythic_fox:{"t":"狐仙祠","loc":"Mythic Zone - 竹林","zone":"Mythic","text":["你们步入竹林。空气中漂浮着金色的光点。在竹林的深处有一座小祠。","祠前坐着一只长着九条尾巴的白色狐狸。她正在喝酒——用一个小小的瓷杯。","|\"啊——来客人了。\"她的声音慵懒而迷人,\"我是狐仙。已经被困在这里几百年了——在Robin把这个地方变成他的游乐场之前。\"","|\"你知道怎么击败Robin？\"Kim问。","狐仙放下酒杯。\"Robin只是一个容器。真正的问题——是那颗红色宝石。它叫心之锁。它承载着Monline所有被困者的执念。\"","|\"打破它——Robin就会失去对Monline的控制。\""],"sf":"learned_secret","pt":["狐仙", "robin"],"chs":[{"t":"前往神社——面对Robin","n":"final_robin"},{"t":"先探索其他地方","n":"mythic_ninja"}]},
  mythic_ninja:{"t":"忍者村","loc":"Mythic Zone - 忍者村","zone":"Mythic","text":["你们来到了忍者村。一个穿着黑色忍者服的女性站在木桩上——她的手里剑反射着月光。","|\"我叫Shinobi。\"她自我介绍,\"我曾经是来挑战这里的玩家。现在——我是这里的守护者。\"","|\"你也被困住了？\"你问。","|\"不。\"她微笑,\"我是自愿留下的。因为这里给了我力量。\"她递给你一枚手里剑——上面刻着奇怪的符文。\"拿着它。如果你面对Robin时遇到麻烦——它会帮你。\""],"items":["符文手里剑"],"pt":["Shinobi", "robin"],"chs":[{"t":"前往神社","n":"final_robin"}]},
  mythic_oni:{"t":"鬼之洞窟","loc":"Mythic Zone - 鬼之洞窟","zone":"Mythic","text":["洞窟中住着一只高大的Oni——赤红色的皮肤，巨大的角。她正在打磨战斧。","|\"人类。\"她低沉的声音在洞窟中回响,\"几百年了——你是第一个走进我洞窟的人类。你很勇敢——或者很愚蠢。\"","|\"我要去见Robin。\"你直截了当地说。","她大笑起来——整个洞窟都在震动。\"那个小鬼。他已经很久没有亲自见客了。\"","|\"你想通过这里？——和我喝一杯。\"她把一个巨大的酒碗推到你面前。里面的液体是火红色的。"],"pt":["Oni", "robin"],"chs":[{"t":"接受挑战——喝下","n":"mythic_oni_drink","eff":{"hp":-5,"cor":5}},{"t":"拒绝——准备战斗","n":"mythic_shrine","tf":true}]},
  mythic_oni_drink:{"t":"与鬼共饮","loc":"Mythic Zone - 鬼之洞窟","zone":"Mythic","text":["你接过酒碗——酒味浓烈得像火焰。你喝了一大口——喉咙像被火烧过一样。你剧烈咳嗽起来。","Oni大笑，用巨掌拍了拍你的背。\"好！够胆量！\"她的力道让你差点飞出去。","|\"Robin那丫头——不，那小子——他其实是个好孩子。只是太孤独了。\"她的声音突然变得认真,\"当你见到他时——不要只是战斗。试着理解他。\"","她让开了通往神社的道路。"],"eff":{"hp":-5,"cor":3,"san":5},"pt":["Oni", "robin"],"chs":[{"t":"前往神社","n":"final_robin"}]},
  final_battle:{"t":"最终之战","loc":"Mythic Zone - 神社","zone":"Mythic","text":["你冲向Robin。他站在那里——没有躲避。","你的武器击中了他的项圈。红色的宝石裂开了。","Robin的身体颤抖了一下——整个世界都颤抖了一下。天空裂开了。","|\"你知道你做了什么吗？\"Robin的声音第一次出现了感情——是悲伤。\"这个世界——那些被转化的人——她们会怎样？\"","你愣住了。","|\"她们会消失。\"Robin低声说,\"没有转化就没有存在。她们会在现实世界中变成一片空白——失去所有记忆。\"","你手中的武器悬在半空。如果在战斗中——你杀了Robin——所有被困在这里的人都会消失。包括你自己。"],"eff":{"san":-20},"pt":["Robin", "robin"],"chs":[{"t":"停手——寻找更好的方式","n":"final_talk"},{"t":"必须结束这一切","n":"final_true"}]},
};
