  "be_a1": {
    "t": "Bad End: Liar Liar",
    "loc": "Forest Zone",
    "zone": "Forest",
    "text": [
      "你被Minoh Ranch的主人下了药，醒来时发现自己变成了一头Holstaurus——作为说谎的惩罚。你的男性身体已经消失，取而代之的是一具丰满的、覆盖着斑点的奶牛身体。你的乳房沉重而饱满，充满了温热的牛奶。",
      "你被拴在畜棚里，每天被农场主的Minotaur使用，并被迫产出牛奶。你的思维逐渐模糊——你不再记得自己曾经是一个冒险者。你只知道两件事：产奶和被使用。",
      "Bad End: Liar Liar — 你成了牧场最听话的奶牛。"
    ],
    "en": "bad",
    "scene": "assets/end_a1.jpg",
    "enm": "A1",
    "et": "Liar Liar",
    "long_text": [
      "你站在Minoh Ranch的木屋前。空气中弥漫着干草和牛奶的气味——甜腻的、令人不安的香气。农场主——一个胖胖的中年女人——透过门缝打量着你和你的同伴。",
      "「你认识Caste City的那头奶牛吗？」她问。你的脑海中浮现出了在Caste City遇到的那头Holstaurus。你犹豫了。你不想承认你见过她——那会让你卷入什么麻烦。所以你说了谎。「不，我没见过。」",
      "农场主的眼睛眯了起来。「哦？是吗。」她的声音很平静——太平静了。她转身走进了屋内。「进来喝杯牛奶吧——刚挤的，很新鲜。」",
      "你跟着她走进了屋子。Mark想拦住你——但你摆了摆手。一杯牛奶而已——能有什么问题？",
      "牛奶是温的。带着一股天然的甜味。你喝了一口——然后你的世界开始失去焦点。你的身体越来越轻。你的视线模糊了。你听到农场主的笑声从很远的地方传来。「又一个说谎的小鬼。」",
      "当你醒来时——你不在床上了。你站在畜棚里。你低下头——你的手不是手了。是蹄子。黑色的、分叉的、覆盖着厚厚角质的牛蹄。冷汗——如果牛也会流汗的话——从你的额头上滚落。你抬起手——但你抬起的是两只覆盖着黑白斑点皮毛的前腿。",
      "你的身体彻底变了。你的躯干变得庞大而丰满——乳房沉重地晃荡着，像两个装满了温热液体的皮袋。你的脊椎向外拱起，你的脖子变粗了。你的头发——如果你现在还有头发的话——变成了稀疏的、粗糙的鬃毛。你的耳朵竖立在头顶两侧，可以灵活地转动。",
      "恐惧像冰水一样从你的头顶浇下来。你想尖叫——但从你喉咙里发出的是一声低沉的、拉长的「哞——」。农场主推开了畜棚的门。她拍了拍你的屁股，像在检查一块待售的肉。「好姑娘。你会给我们产很多奶的。」",
      "她牵来了一头Minotaur——粗壮、毛茸茸、喘着粗气。你后退了一步，你的蹄子在干草上打滑。Minotaur的呼吸喷在你的脸上。",
      "那是你作为人类最后的清醒时刻。在那之后——你学会了产奶。你学会了在Minotaur的触碰下屈服。你甚至学会了享受它。你不再记得自己的名字了。你只记得农场主叫你的时候会吹一声口哨——然后你就会哞哞叫着跑过去。",
      "有时候，在挤奶的间隙，你会透过畜棚的缝隙看到外面的世界——天空、树木、远方Caste City的尖顶。你的眼中会闪过一瞬间的清明。然后Minotaur的低吼声传来，那种清明就消散了。",
      "你低下头，继续吃你的干草。奶牛的脑袋不该想那么多。"
    ]
  },

  "be_a3": {
    "t": "Bad End: Honey Trap",
    "loc": "Forest Zone",
    "zone": "Forest",
    "text": [
      "蜜蜂娘把你拖进了蜂巢深处。她们强行给你灌下了蜂蜜——温热、甜腻、带着魔力的蜂蜜。你的身体在灼热中变化——你的四肢变细，皮肤浮现出黄色和黑色的条纹，背上长出了透明的翅膀。",
      "你变成了Bee Girl。你的其他同伴被带到了别处——Mark成了侍女，Aralu成了战斗无人机。你的新工作是酿蜜——以及吸引下一个误入蜂巢的旅行者。",
      "Bad End: Honey Trap — 蜂巢需要更多的工人。"
    ],
    "en": "bad",
    "scene": "assets/end_a3.jpg",
    "enm": "A3",
    "et": "Honey Trap",
    "long_text": [
      "蜜蜂娘在空中盘旋。她的翅膀发出的嗡嗡声是你在这个世界听到的最后的人类语言之外的声音。她的复眼中倒映着你的身影——渺小的、惊恐的、注定要变成同类的猎物。",
      "她的螫针刺入了你的脖颈。不是致命的刺——是转化刺。毒液像蜂蜜一样浓稠，缓慢地推入你的血管。你的视野开始变形——颜色变得更加鲜艳，光线变得更加明亮。你能看到紫外线了。你能闻到每一朵花的香气——隔着几百米。",
      "你的身体在改变。你的皮肤上长出了柔软的、黄色的绒毛，覆盖着黑色的条纹。你的背部裂开了——不是撕裂，是一种温和的、灼热的裂开——两对透明的翅膀从中伸展出来。它们在阳光下反射出彩虹般的光泽。",
      "你的手臂变细了，关节变得灵活。你的手指变成了适合采集花蜜的形状。你的眼睛变大了——变成了巨大的、复眼般的结构，由数千个小平面组成。你能同时看到几乎所有方向。",
      "蜜蜂娘们围着你飞舞，用触角触碰你的新身体——检查你、欢迎你、确认你已经是她们中的一员。她们的触碰在你的新皮肤上留下微弱的电流感。你听到她们的思想——不是语言，是气味和振动构成的交流。",
      "你被带到了蜂巢深处。温暖的、六边形的蜂蜡墙壁包围着你。工蜂们带来了蜂蜜——金黄色的、半透明的、散发着花香。你喝了。那是你尝过的最甜的东西。你的新身体需要它。你喝了更多。",
      "你的记忆开始模糊。你曾是一个来自地球的玩家——你曾想过回家。但现在蜂巢就是你的家。你是Bee Girl。你是采集者、酿造者、蜂巢的守护者。",
      "当新鲜的面孔出现在蜂巢入口时——你和其他蜜蜂娘一起飞了过去。不是攻击。是欢迎。是引诱。你的舞蹈在阳光下闪闪发光。你的信息素在空气中飘散。",
      "又一个猎物上钩了。又一个旅行者将会变成你的姐妹。",
      "蜂巢永远需要更多的工人。"
    ]
  },
  "be_a5": {

    "loc": "Forest Zone",

    "text": [

      "你成了巨大的Arachne——下半身是蜘蛛，上半身是你曾经的模样，但现在覆盖着黑色的甲壳。Arachne对森林感到厌倦后离开了，你接管了这片森林。你的无人机大军在森林中巡逻——你会找到更多的猎物。",

    "en": "bad",
    "scene": "assets/end_a5.jpg",
    "enm": "A5",
    "et": "Absolute Power",
    "long_text": [
      "Arachne的巢穴四周悬挂着雪白的蛛网。那些蛛网上粘着各种生物的干壳——昆虫、鸟类、还有更大一些的东西。八条毛茸茸的长腿从黑暗中伸出来——然后Arachne的美丽上身出现在你的面前。她的皮肤是深紫色的，她的六只眼睛闪闪发光。",
      "「你走得很远。」她的声音低沉而悦耳。她从上到下打量着你——不是在看一个人，是在看一件原材料。「你值得一个奖励。」",

  "be_d1": {

    "loc": "Desolate Zone",
    "zone": "Desolate",
    "text": [
      "你没能逃出僵尸群。你被按倒在地上——不是被咬死，而是被一种冰冷的、缓慢的腐烂所吞噬。你的心跳越来越慢。到第三十七下的时候——它停了。",

    "enm": "D1",
    "et": "The Zombie Whored",
    "long_text": [
      "你没能逃过它们。Desolate Zone的街道上密密麻麻地挤满了僵尸——你和Kim被冲散了。你跑进了一条死胡同。你转过身——它们已经堵住了你的退路。",
      "没有撕咬。没有剧痛。它们只是抓住了你。冰冷的手指在你的皮肤上留下了灰色的污迹。你的身体感觉到了那种缓慢的、温和的腐烂——从你的指尖开始。你的心跳在减慢。一下。两下。你数到了第三十七下。然后它停了。",

      "你加入了街道上的队伍。僵尸们在废弃的建筑之间漫无目的地行走，空洞的眼睛盯着前方。你走在它们中间。你的脚在碎石上拖行。你不知道你要去哪里——你只知道你要走。永恒地走。",

  "be_b1": {
    "t": "Bad End: Coastal B1",
    "loc": "Coastal Zone",
    "zone": "Coastal",
    "text": [
      "Mermaid把你拖入了深海。你的肺部在灼烧——然后你感到了一种奇异的变化。你的双腿融合在一起，变成了银蓝色的鱼尾。你的脖颈两侧长出了鳃裂——你可以在水下呼吸了。你变成了Mermaid。",
      "你在这片海域中游荡，抬头仰望海面上的光影——那是你曾经生活的世界。你永远无法回到陆地了。你只能在深海中度过余生。",
      "Bad End: The Littlest Mermaid — 海洋的美丽也是一种囚笼。"
    ],
    "en": "bad",
    "enm": "B1",
    "et": "The Littlest Mermaid",
    "long_text": [
      "Mermaid的歌声像丝带一样缠绕着你。你的抵抗是徒劳的——她的声音穿透了你的耳朵，直接进入了你的大脑皮层，在你的意志上打了一个蝴蝶结。你跟着她走进了海水。",
      "海水淹没了你的脚踝。膝盖。腰部。你没有挣扎。你感到了一种奇异的平静——就像回到了某个你从未到过的家。Mermaid的手拉着你，带你游向深海。阳光在水面上越来越远。",
      "你的肺部开始灼烧。你需要空气。你开始挣扎——但太晚了。Mermaid把你拉向她，在她的嘴唇贴上你的嘴唇的同时——你感到了撕心裂肺的变化。",
      "你的双腿在灼热的剧痛中并拢、融合、缩短。骨头在融化——你的膝盖和脚踝消失了，你的双腿变成了一条单一的、柔软的、覆盖着银蓝色鳞片的鱼尾。你的脚趾变成了尾鳍——宽阔的、透明的、像薄纱一样的尾鳍。",
      "你在水下呼吸了。你的脖颈两侧裂开了三道缝隙——那是鳃。水不是从你的鼻子进入——它从你的鳃流过，直接进入了你的血液。你不是在呼吸水——你的身体已经学会了从水中提取氧气。",
      "你的耳朵变成了鳍状的突起。你的眼睛变得更大——以适应黑暗的深海。你的手指之间长出了薄薄的蹼。",
      "你不再需要空气了。你不再需要陆地了。",
      "你是一个Mermaid。",
      "Mermaid——你的姐姐现在——拉着你在珊瑚礁之间游动。她带你看了海中的宫殿——残破的、被海藻覆盖的、曾经属于海神的白色大理石宫殿。海龟从你们身边游过，鱼群在你们周围旋转。",
      "你在海面上探出头。透过波浪的间隙——你看到了远处的海岸线。那是你曾经站立的地方。那座沙滩。那座森林。那个世界。",
      "你的手指——覆盖着鳞片的手指——触摸着海面。水珠从你的指尖滑落。你想回去了。你不可能回去了。",
      "你潜回了深海。你的新家很美丽。你的新家是一个由蓝色和银色构成的水晶牢笼。",
      "你在海底坐着，仰望海面上摇曳的光影。你的鱼尾在白色的沙地上轻轻拍打。你等着——等着某一天，有一个人会从海面上跳下来，游向你。",
      "但不是今天。",
      "今天你只是在海底等待。美丽地、永恒地、孤独地等待。"
    ],
    "scene": "assets/end_b1.jpg"
  },
