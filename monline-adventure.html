      "你试图逃离街道上的僵尸群——但你跑错了方向。一只腐烂的手抓住了你的脚踝。你摔倒了——更多的僵尸围了上来。",
      "他们的手指在你的身上留下了污迹。那不是咬伤——是一种缓慢的、温和的腐烂。你的皮肤从指尖开始变灰、失去弹性。你的心跳在减慢。到第三十七下的时候，它停止了。",
      "你站了起来。你的动作变得迟缓。你的大脑中充斥着一种低沉的白噪音——那是死亡的声音。你和其他僵尸一起在街道上漫步，无目的地、永恒地行走。你记得自己曾经活着——但那记忆正在像旧照片一样褪色。"
    ],
    "en": "bad",
    "enm": "D1",
    "et": "The Zombie Whored"
  },
  "be_d2": {
    "t": "Bad End: From My Cold Dead Hands",
    "loc": "Desolate Zone",
    "zone": "Desolate",
    "text": [
      "你在街道上遇到了那只僵尸。不是普通的僵尸——它的手指上戴着一枚警徽，制服上还残留着警长的标志。即使变成了怪物，它手中还紧握着那把枪。你试图绕过它——但它抓住了你的手腕。",
      "它的力量大得惊人。冰冷的手指在你的皮肤上留下了冻伤般的痕迹。你的身体开始僵硬——关节凝固，皮肤变灰，体温下降。你低头看着自己正在变成尸体的手——指甲脱落了，皮肤正在剥落。",
      "你加入了它。你们在废弃的城市中巡逻——两个永远不会下班的警官。你握着枪——但子弹已经生锈了。你也不用保护任何人了。"

    "en": "bad",
    "enm": "D2",
    "et": "From My Cold Dead Hands"

  "be_d3": {
    "t": "Bad End: Let Me Patch You Up",
    "loc": "Desolate Zone",
    "zone": "Desolate",
    "text": [
      "你在废弃医院中被护士僵尸抓住了。她把你按在一张吱嘎作响的手术床上，头顶的无影灯闪着刺眼的白光。她的笑容——一只眼睛混浊，另一只眼睛闪烁着狂热的光芒——告诉你她不是一个普通的护士。",
      "「别怕——让我帮你修好。」她的手术刀在你的皮肤上滑动。你不觉得痛——因为她用了麻药。但她做了别的事情——她在你的身体中植入了什么东西。当你低头看向自己的腹部时——你看到了缝线。粗糙的、黑色的、十字形的缝线。不止一处——你的胸口、大腿、前臂上都有。",
      "你被她打满了补丁——不同颜色的皮肤拼接在一起。她后退一步，欣赏着自己的作品。「完美。」你照了镜子。你是一个弗兰肯斯坦般的怪物——并且你活了。"
    ],
    "en": "bad",
    "enm": "D3",
    "et": "Let Me Patch You Up"
  },

    "text": [

  "be_d5": {

    "loc": "Desolate Zone",
    "zone": "Desolate",
    "text": [

    "text": [
