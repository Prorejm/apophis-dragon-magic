final_robin:{
  t:'Robin',
  loc:'Mythic Zone - 核心',
  zone:'Mythic',
  text:[
    '你走向那个女孩。她看起来只有十六七岁——苍白、瘦弱、孤独。',
    '她的手腕上缠绕着发光的能量锁链。这些锁链连接着上方的核心——她是核心的\'钥匙\'，也是核心的囚徒。',
    '"你是 Robin。"你蹲下来，与她平视。',
    '"你...知道我的名字？"她的眼中闪过一丝惊讶。',
    '"我知道。我们知道了一切——你被困在这里，你在被迫转化人类。这不是你的错。"',
    'Robin 的眼中涌出了泪水。"我...我控制不了它...它太大了...我太弱了..."',
    '"你不弱。"你握住她的手，"你是最坚强的女孩。一个人在黑暗中坚持了这么久。"'],
  chs:[
    {t:'安慰 Robin，承诺带她离开',n:'final_persuade'},
    {t:'直接切断能量锁链',n:'final_confront'}]},
final_persuade:{
  t:'说服与拯救',
  loc:'Mythic Zone - 核心',
  zone:'Mythic',
  text:[
    '"来吧，Robin。跟我们一起走。"你伸出手。',
    '"但是..."Robin 看着手上的锁链，"我离开了，转化就会停止吗？还是会有别人来代替我？"',
    '你沉默了。你无法保证。',
    '"有一个办法。"Dominic 走上前，"如果我们能稳定核心的能量，就不再需要\'钥匙\'。"',
    '"你疯了？"Kim 惊呼，"我们怎么可能稳定一个失控的能量源？"',
    '"用这个。"Dominic 拿出了在旅途中收集的所有能量物品——恶魔地图、古代能量水晶、能量碎片。',
    'Robin 看着你们。她的眼中重新燃起了希望。',
    '"也许...也许真的可以。"她低声说。'],
  chs:[
    {t:'一起稳定核心',n:'final_persuade_done'},
    {t:'先释放 Robin',n:'final_confront'}]},
final_persuade_done:{
  t:'拯救成功 - 新希望',
  loc:'Mythic Zone - 核心',
  zone:'Mythic',
  text:[
    '你们将所有的能量物品围绕核心放置。Dominic 开始吟唱古老的咒语。',
    'Robin 闭上眼睛，将自己的意志与核心连接。',
    '能量开始稳定下来。核心的光芒从刺眼的白变成了温暖的蓝。',
    '锁链从 Robin 的手腕上脱落——她在瞬间恢复了自由。',
    '"我...自由了。"Robin 跌坐在地上，泪水止不住地流下。',
    '"是的。你自由了。"你扶住她。',
    '远处，世界各地的转化现象开始消退。人们在震惊中发现自己恢复了原状。',
    '怪物娘们不知所措地站在街头——她们发现自己已经变回了人类。',
    '但也有一些人——那些选择了成为怪物娘的人——保留了自己的新形态。',
    '转化不再是诅咒——而成了一种选择。',
    '"我们做到了。"Kim 笑着说。',
    '你看着 Robin 重获新生的笑脸。一切冒险都是值得的。'],
  chs:[
    {t:'恭喜通关！',n:'final_robin'}]},
final_confront:{
  t:'直面核心',
  loc:'Mythic Zone - 核心',
  zone:'Mythic',
  text:[
    '你握紧武器，走向核心。',
    '"你要做什么？"Robin 惊恐地问。',
    '"结束这一切。"你举起武器，向核心挥去。',
    '但核心比你想象的更加坚固。能量从核心中爆发，将你弹飞。',
    '"不行的..."Robin 哭泣着说，"核心已经和我绑定在一起了...破坏它也会杀了我。"',
    '你愣住了。',
    '你看着 Robin——她泪流满面，却又在努力微笑。',
    '"所以...唯一的办法是让我们自己找出路。"Kim 轻声说。',
    '你放下武器。也许战斗并不是所有问题的答案。',
    '你转身面对 Robin。"告诉我——我该怎么帮你？"'],
  chs:[
    {t:'重新选择——安慰 Robin',n:'final_persuade'}]},
 be_a1:{t:'Bad End: Liar Liar',loc:'Forest Zone',zone:'Forest',text:'你对 mansion 主人说了谎。被揭穿后她把你变成了 Bimbo——一个愚蠢的金发傻妞。你在客厅作为装饰品存在，漂亮但空洞。',end:'bad',etn:'A1',et:'Liar Liar'},
be_a2:{t:'Bad End: Slime Pool',loc:'Forest Zone',zone:'Forest',text:'你在森林中误入了史莱姆巢穴。黏稠的绿色液体包裹了你，将你同化为一只史莱姆娘。你在沼泽中与其他史莱姆一起蠕动，失去了自我意识。',end:'bad',etn:'A2',et:'Slime Pool'},
be_a3:{t:'Bad End: Harpy Cage',loc:'Forest Zone',zone:'Forest',text:'你被鹰身女妖捕获并带到了树冠上的巢穴。她们将你转化为同类——长出了羽毛和翅膀，永远被困在天空中唱歌引诱路人。',end:'bad',etn:'A3',et:'Harpy Cage'},
be_a4:{t:'Bad End: Centaur\'s Herd',loc:'Forest Zone',zone:'Forest',text:'你对半人马部落俘虏。她们将你变成了半人马，从此在森林中作为她们的同类奔跑。你逐渐忘记了自己曾是人类。',end:'bad',etn:'A4',et:'Centaur\'s Herd'},
be_a5:{t:'Bad End: Dryad\'s Embrace',loc:'Forest Zone',zone:'Forest',text:'你被树精的藤蔓缠住，拉入了古树的躯干中。你的身体与树木融合，变成了树精——作为森林的一部分永远守护这片林地。',end:'bad',etn:'A5',et:'Dryad\'s Embrace'},
be_a6:{t:'Bad End: Fairy Trap',loc:'Forest Zone',zone:'Forest',text:'你被花丛中的妖精光芒吸引。她们将你缩小并变成了妖精娘。你从此在花丛间飞舞，成为妖精王国的一员。',end:'bad',etn:'A6',et:'Fairy Trap'},
be_a7:{t:'Bad End: Spider\'s Web',loc:'Forest Zone',zone:'Forest',text:'你撞上了阿拉克尼的蛛网。毒液注入你的身体，你变成了半蜘蛛的怪物娘。你在黑暗中结网，等待下一个猎物。',end:'bad',etn:'A7',et:'Spider\'s Web'},
be_a8:{t:'Bad End: Wolf Pack',loc:'Forest Zone',zone:'Forest',text:'你在夜间被狼人包围。月圆之夜，你被转化成了狼娘——从此在森林中与狼群一同狩猎，野性取代了理性。',end:'bad',etn:'A8',et:'Wolf Pack'},
be_a9:{t:'Bad End: Elf\'s Curse',loc:'Forest Zone',zone:'Forest',text:'你冒犯了森林精灵的女王。她诅咒你变成精灵娘，却被剥夺了自由意志。你在精灵宫殿中作为仆人永远侍奉。',end:'bad',etn:'A9',et:'Elf\'s Curse'},
be_a10:{t:'Bad End: Mushroom Colony',loc:'Forest Zone',zone:'Forest',text:'你踩到了发光的蘑菇孢子。真菌在你的身体上生长，将你变成了蘑菇娘。你在阴暗潮湿的角落中与其他蘑菇一起生长。',end:'bad',etn:'A10',et:'Mushroom Colony'},
be_a11:{t:'Bad End: Nymph\'s Spring',loc:'Forest Zone',zone:'Forest',text:'你在森林深处的泉水边休息。水中的宁芙将你拉入水中，把你变成了水泽仙女。你在泉水底层永远沉睡。',end:'bad',etn:'A11',et:'Nymph\'s Spring'},
be_a12:{t:'Bad End: Bee Hive',loc:'Forest Zone',zone:'Forest',text:'你试图偷取蜂娘的蜂蜜。蜂群将你包围并蜇刺，你变成了新的蜂娘。你在蜂巢中终身劳作，成为蜂后忠实的仆从。',end:'bad',etn:'A12',et:'Bee Hive'},
be_a13:{t:'Bad End: Rabbit Hole',loc:'Forest Zone',zone:'Forest',text:'你追逐一只奇怪的兔子掉进了树洞。落地时你发现自己变成了兔娘——长着毛茸茸的耳朵和短尾巴。你在兔子洞中与其他兔娘一起生活。',end:'bad',etn:'A13',et:'Rabbit Hole'},
be_a14:{t:'Bad End: Cat\'s Paw',loc:'Forest Zone',zone:'Forest',text:'你被森林中的猫又袭击。她们的魔力将你转化为猫娘——从此在屋檐和树枝间游荡，作为流浪猫娘度过余生。',end:'bad',etn:'A14',et:'Cat\'s Paw'},
be_a15:{t:'Bad End: Fox\'s Trick',loc:'Forest Zone',zone:'Forest',text:'你被九尾狐的幻术迷惑。当幻象消散时，你发现自己长出了狐狸耳朵和尾巴。你在森林中作为狐娘生活，永远分不清真实与幻象。',end:'bad',etn:'A15',et:'Fox\'s Trick'},
be_a16:{t:'Bad End: Moth Light',loc:'Forest Zone',zone:'Forest',text:'你在夜间被飞蛾娘的磷光吸引。她们将你转化为同类——你长出了蛾翼和复眼。你从此在月光下飞舞，追逐永远得不到的光。',end:'bad',etn:'A16',et:'Moth Light'},
be_a17:{t:'Bad End: Forest Queen',loc:'Forest Zone',zone:'Forest',text:'你试图挑战森林女王。她将你击败并转化为她的新玩偶娘。你在她的宫殿中作为装饰品存在，永远失去了自由。',end:'bad',etn:'A17',et:'Forest Queen'},
be_b1:{t:'Bad End: Siren Song',loc:'Coastal Zone',zone:'Coastal',text:'你被塞壬的歌声迷惑，走向了大海。海浪将你吞没，你变成了塞壬娘——从此在礁石上歌唱，引诱路过的水手。',end:'bad',etn:'B1',et:'Siren Song'},
be_b2:{t:'Bad End: Mermaid\'s Grotto',loc:'Coastal Zone',zone:'Coastal',text:'你被人鱼囚禁在海下的洞穴中。她们的魔法将你的双腿化为鱼尾。你成为了人鱼的一员，永远无法返回陆地。',end:'bad',etn:'B2',et:'Mermaid\'s Grotto'},
be_b3:{t:'Bad End: Kraken\'s Embrace',loc:'Coastal Zone',zone:'Coastal',text:'你的船被克拉肯击碎。巨大的触手将你缠绕并拖入深海。你被转化成了克拉肯娘——深海的噩梦，永远在黑暗中游荡。',end:'bad',etn:'B3',et:'Kraken\'s Embrace'},
be_b4:{t:'Bad End: Jellyfish Drift',loc:'Coastal Zone',zone:'Coastal',text:'你被水母群包围，它们的触须蜇刺使你变成了水母娘。你从此在洋流中随波逐流，意识逐渐模糊消散。',end:'bad',etn:'B4',et:'Jellyfish Drift'},
be_b5:{t:'Bad End: Shell Prison',loc:'Coastal Zone',zone:'Coastal',text:'你被贝壳魔物捕获。你的身体被压缩进一个巨大的贝壳中，变成了贝壳娘。你在沙滩上半掩着，等待潮水的到来。',end:'bad',etn:'B5',et:'Shell Prison'},
be_b6:{t:'Bad End: Coral Fusion',loc:'Coastal Zone',zone:'Coastal',text:'你触摸了发光的珊瑚，被其中的魔力感染。你的身体与珊瑚融合，变成了珊瑚娘。你在珊瑚礁中作为生态系统的一部分存在。',end:'bad',etn:'B6',et:'Coral Fusion'},
be_b7:{t:'Bad End: Shark Hunt',loc:'Coastal Zone',zone:'Coastal',text:'你被鲨鱼娘追击并咬伤。伤口转化了你——你长出了鳍和利齿，变成了鲨鱼娘。你在海洋中作为顶级猎手永远游荡。',end:'bad',etn:'B7',et:'Shark Hunt'},
be_b8:{t:'Bad End: Octopus\' Den',loc:'Coastal Zone',zone:'Coastal',text:'你被章鱼娘的触手缠住拖入了她的巢穴。你将她也变成了章鱼娘——多头多臂的怪物，在海底洞穴中纠缠。',end:'bad',etn:'B8',et:'Octopus\' Den'},
be_b9:{t:'Bad End: Seaweed Knot',loc:'Coastal Zone',zone:'Coastal',text:'你被海草缠住无法挣脱。海草的魔力渗透进你的皮肤，你变成了海藻娘。你在海床上扎根，与其他海草一同摇曳。',end:'bad',etn:'B9',et:'Seaweed Knot'},
be_b10:{t:'Bad End: Barnacle Host',loc:'Coastal Zone',zone:'Coastal',text:'你被藤壶魔物附着。它们在你的身上生长，将你变成了藤壶娘。你被固定在码头木桩下，成为藤壶群落的一部分。',end:'bad',etn:'B10',et:'Barnacle Host'},
be_b11:{t:'Bad End: Starfish Touch',loc:'Coastal Zone',zone:'Coastal',text:'你被海星娘接触，她的再生能力传递给了你。你的身体分裂重组，变成了海星娘。你从此失去了原来的形态。',end:'bad',etn:'B11',et:'Starfish Touch'},
be_b12:{t:'Bad End: Crab Claw',loc:'Coastal Zone',zone:'Coastal',text:'你被巨大的蟹娘夹住。她的钳子将你夹碎然后重组——你变成了蟹娘。你在沙滩上横行，成为海岸的新居民。',end:'bad',etn:'B12',et:'Crab Claw'},
be_b13:{t:'Bad End: Eel Shock',loc:'Coastal Zone',zone:'Coastal',text:'你被电鳗娘电击。高压电流改造了你的身体——你变成了电鳗娘。你在浅滩中释放电流，成为其他生物恐惧的存在。',end:'bad',etn:'B13',et:'Eel Shock'},
be_b14:{t:'Bad End: Seahorse Trap',loc:'Coastal Zone',zone:'Coastal',text:'你被海马娘诱骗进入了海草丛。她的魔法使你的身体蜷曲变形——你变成了海马娘，在海中随着波浪轻轻摇晃。',end:'bad',etn:'B14',et:'Seahorse Trap'},
be_b15:{t:'Bad End: Dolphin Play',loc:'Coastal Zone',zone:'Coastal',text:'你被海豚娘群体围住。她们用欢快的叫声迷惑你，将你转化为海豚娘。你在海洋中与她们一同嬉戏，永远保持快乐但失去了人性。',end:'bad',etn:'B15',et:'Dolphin Play'},
be_b16:{t:'Bad End: Whale Song',loc:'Coastal Zone',zone:'Coastal',text:'你听到了巨鲸娘的歌声。那声音穿透了你的灵魂，你的身体开始膨胀变大，变成了鲸娘。你在深海中孤独地唱着歌。',end:'bad',etn:'B16',et:'Whale Song'},
be_b17:{t:'Bad End: Lobster Trap',loc:'Coastal Zone',zone:'Coastal',text:'你被龙虾娘设计的陷阱捕获。她将你转化为了龙虾娘——坚硬的甲壳覆盖了你的身体。你从此在海底爬行。',end:'bad',etn:'B17',et:'Lobster Trap'},
be_b18:{t:'Bad End: Anemone Garden',loc:'Coastal Zone',zone:'Coastal',text:'你进入了海葵娘的触手花园。她的触手蜇刺麻痹了你，将你转化为海葵娘。你扎根在海底，用触手捕捉经过的小鱼。',end:'bad',etn:'B18',et:'Anemone Garden'},
be_b19:{t:'Bad End: Turtle Ride',loc:'Coastal Zone',zone:'Coastal',text:'你骑上了大海龟娘。她潜入了深海，你在水下无法呼吸。她将你转化成了龟娘——你长出了龟甲，从此在海洋中缓慢漂流。',end:'bad',etn:'B19',et:'Turtle Ride'},
be_b20:{t:'Bad End: Sting Ray Glide',loc:'Coastal Zone',zone:'Coastal',text:'你踩到了黄貂鱼魔物。她的毒刺刺入你的脚踝，你被转化成鳐鱼娘。你在海底沙地上滑行，身体变得扁平而宽阔。',end:'bad',etn:'B20',et:'Sting Ray Glide'},
be_b21:{t:'Bad End: Iceberg Prison',loc:'Coastal Zone',zone:'Coastal',text:'你漂流到了冰山上。冰霜魔女将你变成了冰精娘——你的血液冻结，皮肤变得透明。你在冰山中永远沉睡。',end:'bad',etn:'B21',et:'Iceberg Prison'},
be_b22:{t:'Bad End: Tide Pool',loc:'Coastal Zone',zone:'Coastal',text:'你被困在了退潮后的潮汐池中。潮汐魔力将你固定在池底，你变成了潮汐娘。随着潮涨潮落，你的意识也在清醒与模糊间交替。',end:'bad',etn:'B22',et:'Tide Pool'},
be_b23:{t:'Bad End: Coast Witch',loc:'Coastal Zone',zone:'Coastal',text:'你闯入了海岸女巫的小屋。她用魔法将你变成了她的宠物娘。你从此作为女巫的仆从，在海岸边采集材料。',end:'bad',etn:'B23',et:'Coast Witch'},
be_c1:{t:'Bad End: Succubus Kiss',loc:'Demon Zone',zone:'Demon',text:'你被梦魔亲吻了。她的吻吸取了你的生命力，将你转化成了梦魔族。你在魅魔的闺房中作为新姐妹，永远在梦境中狩猎。',end:'bad',etn:'C1',et:'Succubus\' Kiss'},
be_c2:{t:'Bad End: Infernal Pact',loc:'Demon Zone',zone:'Demon',text:'你与恶魔签订了血契。契约将你的灵魂束缚——你变成了恶魔娘。你的皮肤变为暗红色，头上长出了角。你在地狱中作为低级恶魔服役。',end:'bad',etn:'C2',et:'Infernal Pact'},
be_c3:{t:'Bad End: Hellfire Baptism',loc:'Demon Zone',zone:'Demon',text:'你被投入了地狱火中。火焰没有杀死你，而是将你转化成了炎魔娘。你的身体由火焰和岩浆构成，永远在燃烧。',end:'bad',etn:'C3',et:'Hellfire Baptism'},
be_c4:{t:'Bad End: Chains of Torment',loc:'Demon Zone',zone:'Demon',text:'你被痛苦魔女的锁链束缚。锁链上的倒刺刺入你的身体，将你转化为痛苦娘。你在拷问室中作为新的刑具管理者。',end:'bad',etn:'C4',et:'Chains of Torment'},
be_c5:{t:'Bad End: Shadow Merge',loc:'Demon Zone',zone:'Demon',text:'你的影子活了过来并将你吞噬。你在黑暗中失去了身体，变成了影魔娘。你从此在阴影中潜伏，没有实体。',end:'bad',etn:'C5',et:'Shadow Merge'},
be_c6:{t:'Bad End: Blood Feast',loc:'Demon Zone',zone:'Demon',text:'你被吸血鬼恶魔抓住了。她将你转化成了血魔娘——你渴求鲜血，皮肤苍白。你在城堡中作为血族的一员存在。',end:'bad',etn:'C6',et:'Blood Feast'},
be_c7:{t:'Bad End: Abyss Gaze',loc:'Demon Zone',zone:'Demon',text:'你凝视了深渊之眼。你的理智被摧毁，你变成了深渊魔娘。你的身体扭曲变形，充满了不可名状的触手和眼珠。',end:'bad',etn:'C7',et:'Abyss Gaze'},
be_c8:{t:'Bad End: Sin Corruption',loc:'Demon Zone',zone:'Demon',text:'你被七宗罪的魔力侵蚀。你的身体被欲望和贪婪重塑——你变成了罪孽魔娘。你的存在本身就是一种堕落。',end:'bad',etn:'C8',et:'Sin Corruption'},
be_c9:{t:'Bad End: Imp Servant',loc:'Demon Zone',zone:'Demon',text:'你被小恶魔群包围。她们将你变成了新的小恶魔娘——小巧可爱但邪恶。你在地狱中作为高阶恶魔的跑腿。',end:'bad',etn:'C9',et:'Imp Servant'},
be_c10:{t:'Bad End: Dark Priestess',loc:'Demon Zone',zone:'Demon',text:'你被黑暗祭司俘虏。邪恶的仪式将你转化成了黑暗祭司娘。你作为黑暗神的仆从，在地狱神殿中献祭生命。',end:'bad',etn:'C10',et:'Dark Priestess'},
be_c11:{t:'Bad End: Tentacle Pit',loc:'Demon Zone',zone:'Demon',text:'你掉入了触手坑中。无数触手缠绕你的身体，将你转化为触手魔娘。你的身体变得柔软而多触手，成为坑中的一部分。',end:'bad',etn:'C11',et:'Tentacle Pit'},
be_c12:{t:'Bad End: Baphomet\'s Curse',loc:'Demon Zone',zone:'Demon',text:'你冒犯了巴弗灭特。她将你变成了羊魔娘——长出了羊角和蹄子。你在恶魔集会中作为低等祭品存在。',end:'bad',etn:'C12',et:'Baphomet\'s Curse'},
be_c13:{t:'Bad End: Soul Forge',loc:'Demon Zone',zone:'Demon',text:'你被扔进了灵魂熔炉。熔炉的火焰没有摧毁你，而是将你重塑为钢铁魔娘。你的身体由熔化的金属和灵魂构成。',end:'bad',etn:'C13',et:'Soul Forge'},
be_c14:{t:'Bad End: Lilim Swarm',loc:'Demon Zone',zone:'Demon',text:'你被莉莉姆的孩子们淹没。她们撕碎了你又重组了你——你变成了莉莉姆娘，作为她们的姐妹在地狱中游荡。',end:'bad',etn:'C14',et:'Lilim Swarm'},
be_c15:{t:'Bad End: Despair Aura',loc:'Demon Zone',zone:'Demon',text:'你被绝望光环笼罩。你的希望被剥夺，你转化成了绝望魔娘。你散发出令人沮丧的气息，使所有靠近你的人都陷入绝望。',end:'bad',etn:'C15',et:'Despair Aura'},
be_c16:{t:'Bad End: Pride Fall',loc:'Demon Zone',zone:'Demon',text:'你的傲慢触怒了傲慢魔王。她将你打回原形并重铸——你变成了傲慢魔娘，但在阶位上永远低于她。',end:'bad',etn:'C16',et:'Pride Fall'},
be_c17:{t:'Bad End: Envy\'s Mirror',loc:'Demon Zone',zone:'Demon',text:'你照了嫉妒魔女的魔镜。镜子中的倒影将你拉入镜中——你变成了镜像魔娘。你在镜子世界中存在，永远渴望外界。',end:'bad',etn:'C17',et:'Envy\'s Mirror'},
be_c18:{t:'Bad End: Wrath Arena',loc:'Demon Zone',zone:'Demon',text:'你被扔进了愤怒竞技场。在无尽的战斗中，你的愤怒吞噬了你——你变成了狂战魔娘。你在竞技场中永远战斗。',end:'bad',etn:'C18',et:'Wrath Arena'},
be_c19:{t:'Bad End: Gluttony\'s Feast',loc:'Demon Zone',zone:'Demon',text:'你被暴食魔女邀请参加宴会。你吃下了被诅咒的食物——你的身体开始膨胀变形，变成了暴食魔娘。你永远在吃却永远填不饱。',end:'bad',etn:'C19',et:'Gluttony\'s Feast'},
be_c20:{t:'Bad End: Greed Vault',loc:'Demon Zone',zone:'Demon',text:'你触摸了贪婪魔王的宝藏。财宝的诅咒将你变成了贪婪魔娘——你的身体与金币融合。你在宝库中永远守护着财富。',end:'bad',etn:'C20',et:'Greed Vault'},
be_c21:{t:'Bad End: Lust Boudoir',loc:'Demon Zone',zone:'Demon',text:'你进入了欲望魔女的闺房。她的香气使你沉迷——你变成了欲望魔娘。你在闺房中作为她的玩物，失去了所有羞耻心。',end:'bad',etn:'C21',et:'Lust Boudoir'},
be_c22:{t:'Bad End: Hell Hound Pack',loc:'Demon Zone',zone:'Demon',text:'你被地狱猎犬群追击。它们咬住你并将你转化为地狱犬娘。你四肢着地，长出了獠牙和皮毛，在冥界中追逐灵魂。',end:'bad',etn:'C22',et:'Hell Hound Pack'},
be_c23:{t:'Bad End: Soul Eater',loc:'Demon Zone',zone:'Demon',text:'你被噬魂魔攻击。她吞噬了你的灵魂并注入了恶魔精华——你变成了噬魂魔娘。你渴求更多的灵魂来填补空虚。',end:'bad',etn:'C23',et:'Soul Eater'},
be_c24:{t:'Bad End: Nightmare Weave',loc:'Demon Zone',zone:'Demon',text:'你陷入了噩梦魔女的织网。她在你的梦中将你转化成了噩梦魔娘——你的身体由噩梦物质构成。你在梦境与现实间游荡。',end:'bad',etn:'C24',et:'Nightmare Weave'},
be_c25:{t:'Bad End: Demon Contract',loc:'Demon Zone',zone:'Demon',text:'你试图与恶魔做交易但被欺骗了。契约将你变成了契约魔娘——你作为恶魔的代理人，被迫去欺骗其他人签订契约。',end:'bad',etn:'C25',et:'Demon Contract'},
be_c26:{t:'Bad End: Void Drift',loc:'Demon Zone',zone:'Demon',text:'你被吸入了一个虚空裂缝。虚无的能量将你转化为虚空魔娘——你的身体半透明，在虚空中漂浮，与现实隔绝。',end:'bad',etn:'C26',et:'Void Drift'},
be_c27:{t:'Bad End: Chaos Spawn',loc:'Demon Zone',zone:'Demon',text:'混沌能量淹没了你。你被随机重组——化为了混沌魔娘。你的形态不断变化，不稳定且不可预测。',end:'bad',etn:'C27',et:'Chaos Spawn'},
be_c28:{t:'Bad End: Soul Bind',loc:'Demon Zone',zone:'Demon',text:'你被灵魂绑定魔法击中。你的灵魂被束缚在一个恶魔玩偶中——你变成了人偶魔娘。你作为恶魔的玩偶被操控。',end:'bad',etn:'C28',et:'Soul Bind'},
be_c29:{t:'Bad End: Hell Gate Keeper',loc:'Demon Zone',zone:'Demon',text:'你被困在了地狱之门中。门的魔力将你转化为了门卫魔娘。你被锁在地狱入口，永远看守着这道门。',end:'bad',etn:'C29',et:'Hell Gate Keeper'},
be_c30:{t:'Bad End: Familiar Bond',loc:'Demon Zone',zone:'Demon',text:'高阶恶魔将你变成了她的使魔。你缩小了身形，获得了兽耳和尾巴，作为恶魔的使魔娘永远侍奉她。',end:'bad',etn:'C30',et:'Familiar Bond'},
be_c31:{t:'Bad End: Cursed Armor',loc:'Demon Zone',zone:'Demon',text:'你穿上了被诅咒的铠甲。铠甲与你的血肉融合——你变成了铠甲魔娘。你在城堡中作为活体铠甲永远巡逻。',end:'bad',etn:'C31',et:'Cursed Armor'},
be_c32:{t:'Bad End: Poison Bite',loc:'Demon Zone',zone:'Demon',text:'你被毒蛇魔女咬伤。毒素改造了你的身体——你变成了毒魔娘。你的血液和唾液都充满了致命的毒液。',end:'bad',etn:'C32',et:'Poison Bite'},
be_c33:{t:'Bad End: Rune Brand',loc:'Demon Zone',zone:'Demon',text:'你在身上刻下了禁忌的符文。符文吸收了你的魔力并将你转化成了符文魔娘。你的身体上布满了发光的诅咒符文。',end:'bad',etn:'C33',et:'Rune Brand'},
be_c34:{t:'Bad End: Doom Prophecy',loc:'Demon Zone',zone:'Demon',text:'你听到了命运魔女的预言。预言成真了——你被转化成了命运魔娘。你看到了所有人的死亡，却无法改变任何事。',end:'bad',etn:'C34',et:'Doom Prophecy'},
be_c35:{t:'Bad End: Banshee Wail',loc:'Demon Zone',zone:'Demon',text:'女妖的哀嚎震碎了你的理智。你变成了报丧女妖娘——你的哭声预示着死亡。你在荒废的城堡中永远哀嚎。',end:'bad',etn:'C35',et:'Banshee Wail'},
be_c36:{t:'Bad End: Demon Queen\'s Throne',loc:'Demon Zone',zone:'Demon',text:'你被带到了恶魔女王面前。她对你感兴趣并将你转化为她的侍女娘。你在王座旁伺候，成为了恶魔王廷的一部分。',end:'bad',etn:'C36',et:'Demon Queen\'s Throne'},
be_c37:{t:'Bad End: Corruption Seed',loc:'Demon Zone',zone:'Demon',text:'一颗腐化种子注入了你的心脏。它在你体内生根发芽——你的身体被腐化植物的根茎穿透，变成了腐化植物娘。',end:'bad',etn:'C37',et:'Corruption Seed'},
be_c38:{t:'Bad End: Eternal Flame',loc:'Demon Zone',zone:'Demon',text:'你触碰了永恒之火。火焰永远燃烧着你的身体却不将你烧尽——你变成了永恒火炬娘。你在冥界的火炬台上永远燃烧。',end:'bad',etn:'C38',et:'Eternal Flame'},
be_d1:{t:'Bad End: Ghostly Possession',loc:'Desolate Zone',zone:'Desolate',text:'你被怨灵附身。幽灵占据了你的身体，你的灵魂被挤出——你变成了幽灵娘。你在废墟中永远徘徊。',end:'bad',etn:'D1',et:'Ghostly Possession'},
be_d2:{t:'Bad End: Zombie Plague',loc:'Desolate Zone',zone:'Desolate',text:'你被僵尸咬伤了。尸毒蔓延全身——你变成了僵尸娘。你的身体开始腐烂，在废墟中无意识地游荡。',end:'bad',etn:'D2',et:'Zombie Plague'},
be_d3:{t:'Bad End: Skeleton Dance',loc:'Desolate Zone',zone:'Desolate',text:'你被骷髅兵团包围。她们剥离了你的血肉，你变成了骷髅娘。你的骨骼在月光下咔咔作响，在墓地中跳舞。',end:'bad',etn:'D3',et:'Skeleton Dance'},
be_d4:{t:'Bad End: Wraith\'s Touch',loc:'Desolate Zone',zone:'Desolate',text:'幽灵碰触了你。它的冰冷之手穿透了你的胸膛——你变成了幽灵娘。你的身体变得半透明，对生者的世界逐渐失去感知。',end:'bad',etn:'D4',et:'Wraith\'s Touch'},
be_d5:{t:'Bad End: Vampire\'s Kiss',loc:'Desolate Zone',zone:'Desolate',text:'你在废墟中被吸血鬼袭击了。她将你转化成了吸血鬼娘——你惧怕阳光，渴求鲜血。你在废弃教堂的地下棺椁中休眠。',end:'bad',etn:'D5',et:'Vampire\'s Kiss'},
be_d6:{t:'Bad End: Mummy Wrap',loc:'Desolate Zone',zone:'Desolate',text:'你触动了古墓的机关。绷带自动缠绕你的身体——你变成了木乃伊娘。你在石棺中沉睡千年。',end:'bad',etn:'D6',et:'Mummy Wrap'},
be_d7:{t:'Bad End: Lich\'s Phylactery',loc:'Desolate Zone',zone:'Desolate',text:'巫妖将你的灵魂封入了命匣。你变成了巫妖娘——你的肉体腐朽但灵魂不朽。你作为不死者永远存在。',end:'bad',etn:'D7',et:'Lich\'s Phylactery'},
be_d8:{t:'Bad End: Bone Pit',loc:'Desolate Zone',zone:'Desolate',text:'你掉入了骨坑。无数白骨在你的身体上生长——你变成了骨魔娘。你的身体由骨骼构成，在骨坑中与其他亡灵为伴。',end:'bad',etn:'D8',et:'Bone Pit'},
be_d9:{t:'Bad End: Grave Dirt',loc:'Desolate Zone',zone:'Desolate',text:'你被活埋了。墓地的阴气渗透了你的身体——你变成了墓地娘。你的身体散发着泥土和腐败的气味。',end:'bad',etn:'D9',et:'Grave Dirt'},
be_d10:{t:'Bad End: Crypt Keeper',loc:'Desolate Zone',zone:'Desolate',text:'你被地下墓穴的守护者捕获。她将你转化为新的墓穴守护娘。你在黑暗中永远守护着死者的安息之地。',end:'bad',etn:'D10',et:'Crypt Keeper'},
be_d11:{t:'Bad End: Plague Doctor',loc:'Desolate Zone',zone:'Desolate',text:'瘟疫医生对你进行了可怕的实验。你被转化成了瘟疫娘——你的身体携带致命的疾病，所到之处皆是瘟疫。',end:'bad',etn:'D11',et:'Plague Doctor'},
be_d12:{t:'Bad End: Tomb Raider\'s Curse',loc:'Desolate Zone',zone:'Desolate',text:'你盗取了古墓的宝物。诅咒降临——你变成了陪葬娘。你的身体被珠宝和黄金覆盖，在墓室中作为陪葬品存在。',end:'bad',etn:'D12',et:'Tomb Raider\'s Curse'},
be_d13:{t:'Bad End: Banshee Lament',loc:'Desolate Zone',zone:'Desolate',text:'你听到了女妖的哀歌。歌声撕裂了你的灵魂——你变成了哀嚎女妖娘。你在荒原上永远为死者哭泣。',end:'bad',etn:'D13',et:'Banshee Lament'},
be_d14:{t:'Bad End: Corpse Flower',loc:'Desolate Zone',zone:'Desolate',text:'你走进了尸体花丛。花朵的根须扎入你的身体——你变成了尸体花娘。你扎根在腐尸堆上，散发着腐臭的香气。',end:'bad',etn:'D14',et:'Corpse Flower'},
be_d15:{t:'Bad End: Dark Water',loc:'Desolate Zone',zone:'Desolate',text:'你饮用了被诅咒的黑暗之水。水中的亡灵侵蚀了你——你变成了溺亡娘。你的身体肿胀发白，永远滴着水。',end:'bad',etn:'D15',et:'Dark Water'},
be_d16:{t:'Bad End: Shade Merge',loc:'Desolate Zone',zone:'Desolate',text:'一个暗影灵体与你融合。你的身体变成了影子——你变成了暗影娘。你在没有光的地方存在，永远渴望着温暖。',end:'bad',etn:'D16',et:'Shade Merge'},
be_d17:{t:'Bad End: Carrion Feast',loc:'Desolate Zone',zone:'Desolate',text:'你被食尸鬼群围住。她们分食了你的身体然后重组——你变成了食尸鬼娘。你在墓地中啃食腐肉。',end:'bad',etn:'D17',et:'Carrion Feast'},
be_d18:{t:'Bad End: Tombstone Eternal',loc:'Desolate Zone',zone:'Desolate',text:'你被刻上了墓碑的诅咒。你的身体逐渐石化——你变成了墓碑娘。你在墓园中作为墓碑永远矗立。',end:'bad',etn:'D18',et:'Tombstone Eternal'},
be_d19:{t:'Bad End: Will-o\'-Wisp',loc:'Desolate Zone',zone:'Desolate',text:'你追逐鬼火迷失在沼泽中。鬼火将你转化成了鬼火娘——你的身体发出幽蓝的光芒，在沼泽上引诱新的旅人。',end:'bad',etn:'D19',et:'Will-o\'-Wisp'},
be_d20:{t:'Bad End: Funeral Procession',loc:'Desolate Zone',zone:'Desolate',text:'你加入了亡灵的行列。送葬队伍将你带入了冥界——你变成了送葬娘。你在葬礼上行进，永远走在死亡之后。',end:'bad',etn:'D20',et:'Funeral Procession'},
be_d21:{t:'Bad End: Spider Crypt',loc:'Desolate Zone',zone:'Desolate',text:'你进入了蜘蛛地穴。洞穴中的蜘蛛女王将你转化为蜘蛛娘。你在黑暗的洞穴中织网，等待猎物。',end:'bad',etn:'D21',et:'Spider Crypt'},
be_d22:{t:'Bad End: Rotting Embrace',loc:'Desolate Zone',zone:'Desolate',text:'腐烂魔女拥抱了你。她的腐败之力传染给你——你变成了腐烂娘。你的身体不断腐败又再生。',end:'bad',etn:'D22',et:'Rotting Embrace'},
be_d23:{t:'Bad End: Hollow Vessel',loc:'Desolate Zone',zone:'Desolate',text:'你的灵魂被抽离了身体。你的躯壳变成了空洞娘——一个空壳，等待着新的灵魂入住。你在废墟中漫无目的地行走。',end:'bad',etn:'D23',et:'Hollow Vessel'},
be_d24:{t:'Bad End: Necromancer\'s Toy',loc:'Desolate Zone',zone:'Desolate',text:'死灵法师将你变成了她的玩偶娘。你的身体被缝线拼接，关节被替换成了球体。你在她的工作室中作为收藏品。',end:'bad',etn:'D24',et:'Necromancer\'s Toy'},
be_d25:{t:'Bad End: Cold Grave',loc:'Desolate Zone',zone:'Desolate',text:'你被冻死在荒原上。冰霜亡灵将你转化成了冰尸娘。你的身体被冰封，在永冻土中永远安眠。',end:'bad',etn:'D25',et:'Cold Grave'},
be_d26:{t:'Bad End: Soul Lantern',loc:'Desolate Zone',zone:'Desolate',text:'你的灵魂被装入了灯笼中。你的身体变成了灯笼娘——你的火焰灵魂在灯笼中燃烧，为亡灵引路。',end:'bad',etn:'D26',et:'Soul Lantern'},
be_d27:{t:'Bad End: Puppet String',loc:'Desolate Zone',zone:'Desolate',text:'木偶魔女的丝线连接了你的四肢。你变成了提线木偶娘。她操控你的每一个动作，你无法违抗。',end:'bad',etn:'D27',et:'Puppet String'},
be_d28:{t:'Bad End: Drowned Bell',loc:'Desolate Zone',zone:'Desolate',text:'你听到了沉没教堂的钟声。钟声将你拖入了水底——你变成了溺钟娘。你在水下的钟楼中敲响永恒的钟声。',end:'bad',etn:'D28',et:'Drowned Bell'},
be_d29:{t:'Bad End: Ashen Remains',loc:'Desolate Zone',zone:'Desolate',text:'你被焚烧在了废墟中。灰烬凝聚成了你的新身体——你变成了灰烬娘。你的身体随风飘散又重新聚合。',end:'bad',etn:'D29',et:'Ashen Remains'},
be_d30:{t:'Bad End: Withered Harvest',loc:'Desolate Zone',zone:'Desolate',text:'你进入了枯萎的农田。收割者将你变成了稻草娘。你在荒芜的田野中站立，成为乌鸦的栖息地。',end:'bad',etn:'D30',et:'Withered Harvest'},
be_d31:{t:'Bad End: Rat King',loc:'Desolate Zone',zone:'Desolate',text:'你被鼠群淹没。老鼠在你身上啃噬并筑巢——你变成了鼠娘。你在地下管道中与老鼠们生活。',end:'bad',etn:'D31',et:'Rat King'},
be_d32:{t:'Bad End: Cursed Painting',loc:'Desolate Zone',zone:'Desolate',text:'你注视了一幅被诅咒的画像。你的身体被拉入了画中——你变成了画中娘。你在画框中的世界里永远被困。',end:'bad',etn:'D32',et:'Cursed Painting'},
be_d33:{t:'Bad End: Scarecrow\'s Field',loc:'Desolate Zone',zone:'Desolate',text:'你在黄昏时分进入了稻草人的田地。她们将你变成了新的稻草娘。你在田野中作为稻草人守护着荒地。',end:'bad',etn:'D33',et:'Scarecrow\'s Field'},
be_d34:{t:'Bad End: Rusted Chains',loc:'Desolate Zone',zone:'Desolate',text:'你被生锈的铁链锁在了废弃监狱中。铁锈的诅咒将你转化成了囚徒娘。你在监狱中永远服刑。',end:'bad',etn:'D34',et:'Rusted Chains'},
be_d35:{t:'Bad End: Forgotten Library',loc:'Desolate Zone',zone:'Desolate',text:'你进入了遗忘图书馆。书中的文字爬上了你的身体——你变成了书灵娘。你在图书馆中作为藏书的一部分。',end:'bad',etn:'D35',et:'Forgotten Library'},
be_d36:{t:'Bad End: Candle Wax',loc:'Desolate Zone',zone:'Desolate',text:'你被蜡烛魔女抓住了。她将你熔解并塑形——你变成了蜡烛娘。你的头顶燃烧着永不熄灭的火焰。',end:'bad',etn:'D36',et:'Candle Wax'},
be_d37:{t:'Bad End: Rust Blade',loc:'Desolate Zone',zone:'Desolate',text:'你被生锈的剑刺中。剑中的诅咒将你转化成了剑灵娘。你的身体由锈铁构成，在废弃城堡中作为武器魂灵存在。',end:'bad',etn:'D37',et:'Rust Blade'},
be_d38:{t:'Bad End: Broken Clock',loc:'Desolate Zone',zone:'Desolate',text:'你触碰了停摆的钟楼时钟。时间在你身上停止——你变成了时钟娘。你在钟楼中永远重复着同一刻。',end:'bad',etn:'D38',et:'Broken Clock'},
be_d39:{t:'Bad End: Abandoned Well',loc:'Desolate Zone',zone:'Desolate',text:'你掉入了废弃的水井。井中的亡灵将你转化为井中娘。你在井底仰望天空，永远无法爬出。',end:'bad',etn:'D39',et:'Abandoned Well'},
be_d40:{t:'Bad End: Guillotine\'s Edge',loc:'Desolate Zone',zone:'Desolate',text:'你被送上了断头台。刀刃落下后你的意识却没有消失——你变成了断头娘。你的头被捧在手中，在刑场上徘徊。',end:'bad',etn:'D40',et:'Guillotine\'s Edge'},
be_d41:{t:'Bad End: Gallows Tree',loc:'Desolate Zone',zone:'Desolate',text:'你被吊在了绞刑树上。绳索的魔力将你转化成了吊死鬼娘。你的脖子上永远套着绳索，在树下摇晃。',end:'bad',etn:'D41',et:'Gallows Tree'},
be_d42:{t:'Bad End: Cremation Urn',loc:'Desolate Zone',zone:'Desolate',text:'你的骨灰被装入了骨灰瓮中。你的意识寄宿在瓮中——你变成了瓮灵娘。你在灵骨塔中作为亡魂的容器。',end:'bad',etn:'D42',et:'Cremation Urn'},
be_d43:{t:'Bad End: Cataract Cave',loc:'Desolate Zone',zone:'Desolate',text:'你进入了瀑布洞穴。水滴的声音将你催眠——醒来时你变成了水灵娘。你在洞穴的积水中永远徘徊。',end:'bad',etn:'D43',et:'Cataract Cave'},
be_d44:{t:'Bad End: Moss Grave',loc:'Desolate Zone',zone:'Desolate',text:'你的身体在古老的墓地上被青苔覆盖。你变成了青苔娘。你与墓碑和青苔融为一体，成为自然的一部分。',end:'bad',etn:'D44',et:'Moss Grave'},
be_d45:{t:'Bad End: Leech Pool',loc:'Desolate Zone',zone:'Desolate',text:'你涉入了充满水蛭的水池。水蛭吸干了你的血液并将你变成了水蛭娘。你在污水中寄生。',end:'bad',etn:'D45',et:'Leech Pool'},
be_d46:{t:'Bad End: Gargoyle Stare',loc:'Desolate Zone',zone:'Desolate',text:'你与石像鬼对视。她的石化凝视将你变成了石像鬼娘。你在废弃教堂的屋顶上蹲守，成为新的滴水兽。',end:'bad',etn:'D46',et:'Gargoyle Stare'},
be_d47:{t:'Bad End: Dust Mote',loc:'Desolate Zone',zone:'Desolate',text:'你被尘埃魔女的魔法击中。你的身体变成了灰尘——你变成了尘埃娘。你在废弃的房屋中漂浮。',end:'bad',etn:'D47',et:'Dust Mote'},
be_d48:{t:'Bad End: Spiderweb Shawl',loc:'Desolate Zone',zone:'Desolate',text:'你披上了蜘蛛网披肩。蛛网与你的皮肤融合——你变成了蛛网娘。你在角落中结网。',end:'bad',etn:'D48',et:'Spiderweb Shawl'},
be_d49:{t:'Bad End: Broken Mirror',loc:'Desolate Zone',zone:'Desolate',text:'你打碎了一面古镜。镜子的碎片刺入你的身体——你变成了镜碎片娘。你的身体由镜片拼接而成。',end:'bad',etn:'D49',et:'Broken Mirror'},
be_d50:{t:'Bad End: Rusty Nail',loc:'Desolate Zone',zone:'Desolate',text:'你踩到了生锈的钉子。铁锈感染了你的全身——你变成了铁锈娘。你的身体被铁锈覆盖，腐化蔓延。',end:'bad',etn:'D50',et:'Rusty Nail'},
be_d51:{t:'Bad End: Thorn Vine',loc:'Desolate Zone',zone:'Desolate',text:'荆棘藤蔓缠绕了你的身体。尖刺刺入你的皮肤——你变成了荆棘娘。你在废墟中作为带刺的屏障生长。',end:'bad',etn:'D51',et:'Thorn Vine'},
be_d52:{t:'Bad End: Fog Veil',loc:'Desolate Zone',zone:'Desolate',text:'浓雾包围了你。雾中的幽灵将你转化成了雾娘。你的身体由雾气构成，在清晨的荒原上飘荡。',end:'bad',etn:'D52',et:'Fog Veil'},
be_d53:{t:'Bad End: Cursed Ring',loc:'Desolate Zone',zone:'Desolate',text:'你戴上了一枚被诅咒的戒指。戒指与你融为一体——你变成了戒指娘。你的灵魂被封印在戒指中。',end:'bad',etn:'D53',et:'Cursed Ring'},
be_d54:{t:'Bad End: Withered Hand',loc:'Desolate Zone',zone:'Desolate',text:'枯手从坟墓中伸出抓住了你的脚踝。它们的腐朽之力将你转化为干枯娘。你的皮肤变得如树皮般干裂。',end:'bad',etn:'D54',et:'Withered Hand'},
be_d55:{t:'Bad End: Poisoned Chalice',loc:'Desolate Zone',zone:'Desolate',text:'你饮下了毒杯中的酒。毒药将你转化成了毒酒娘。你的身体散发出甜腻而致命的气味。',end:'bad',etn:'D55',et:'Poisoned Chalice'},
be_d56:{t:'Bad End: Tattered Doll',loc:'Desolate Zone',zone:'Desolate',text:'你捡起了废弃的布偶。布偶的诅咒将你变成了布偶娘。你的身体由碎布和棉花填充，在垃圾堆中被遗弃。',end:'bad',etn:'D56',et:'Tattered Doll'},
be_d57:{t:'Bad End: Shattered Bell',loc:'Desolate Zone',zone:'Desolate',text:'你敲响了破碎的钟。钟声将你转化成了碎钟娘。你的耳中永远回响着破碎的钟声。',end:'bad',etn:'D57',et:'Shattered Bell'},
be_d58:{t:'Bad End: Fading Photograph',loc:'Desolate Zone',zone:'Desolate',text:'你在一张老照片中看到了自己。照片将你吸入——你变成了照片娘。你的身体逐渐褪色，面容越来越模糊。',end:'bad',etn:'D58',et:'Fading Photograph'},
be_d59:{t:'Bad End: Buried Locket',loc:'Desolate Zone',zone:'Desolate',text:'你在废墟中挖出了一个旧挂坠。挂坠打开后你的灵魂被吸入——你变成了挂坠娘。你在挂坠中的照片里永远微笑。',end:'bad',etn:'D59',et:'Buried Locket'},
be_d60:{t:'Bad End: Glass Eye',loc:'Desolate Zone',zone:'Desolate',text:'你被玻璃眼魔女盯上了。她的视线将你转化成了玻璃娘。你的身体变得透明易碎。',end:'bad',etn:'D60',et:'Glass Eye'},
be_d61:{t:'Bad End: Bone Flute',loc:'Desolate Zone',zone:'Desolate',text:'你吹响了骨笛。笛声操控了你的身体——你变成了骨笛娘。你的骨骼化作了乐器，永远奏响亡灵的旋律。',end:'bad',etn:'D61',et:'Bone Flute'},
be_d62:{t:'Bad End: Funeral Wreath',loc:'Desolate Zone',zone:'Desolate',text:'你把花圈戴在了头上。花圈的死亡魔力将你转化成了花圈娘。你在葬礼上作为祭品存在。',end:'bad',etn:'D62',et:'Funeral Wreath'},
be_d63:{t:'Bad End: Church Pew',loc:'Desolate Zone',zone:'Desolate',text:'你在废弃教堂的长椅上睡着了。醒来时你发现自己变成了长椅娘。你在教堂中与木椅融为一体。',end:'bad',etn:'D63',et:'Church Pew'},
be_d64:{t:'Bad End: Sacrificial Altar',loc:'Desolate Zone',zone:'Desolate',text:'你被绑在了祭祀台上。仪式的力量将你转化成了祭品娘。你的身体上刻满了祭文。',end:'bad',etn:'D64',et:'Sacrificial Altar'},
be_d65:{t:'Bad End: Dried Flower',loc:'Desolate Zone',zone:'Desolate',text:'你将一朵干花夹在了书中。花的干枯之力将你转化成了干花娘。你的身体脆弱易碎，夹在书页之间。',end:'bad',etn:'D65',et:'Dried Flower'},
be_d66:{t:'Bad End: Wax Seal',loc:'Desolate Zone',zone:'Desolate',text:'滚烫的封蜡滴在了你的皮肤上。蜡与你的身体融合——你变成了蜡封娘。你在密封的信件上作为印记存在。',end:'bad',etn:'D66',et:'Wax Seal'},
be_d67:{t:'Bad End: Quill Pen',loc:'Desolate Zone',zone:'Desolate',text:'你被羽毛笔刺伤。墨水中毒将你转化成了墨水娘。你的身体由黑色的墨汁构成，在纸上流动。',end:'bad',etn:'D67',et:'Quill Pen'},
be_d68:{t:'Bad End: Hourglass Sand',loc:'Desolate Zone',zone:'Desolate',text:'你被关进了巨大的沙漏中。流沙掩埋了你——你变成了沙漏娘。你的身体化为沙粒，永远在玻璃中流动。',end:'bad',etn:'D68',et:'Hourglass Sand'},
be_d69:{t:'Bad End: Spider Legs',loc:'Desolate Zone',zone:'Desolate',text:'蜘蛛的腿从你的身体两侧长了出来。你变成了半人半蛛的形态，在废弃仓库的角落里织网捕食。',end:'bad',etn:'D69',et:'Spider Legs'},
be_d70:{t:'Bad End: Haunted Mirror',loc:'Desolate Zone',zone:'Desolate',text:'你在鬼屋的镜子中看到了自己死后的模样。镜子将你转化成了镜灵娘。你被困在镜中世界。',end:'bad',etn:'D70',et:'Haunted Mirror'},
be_d71:{t:'Bad End: Cursed Music Box',loc:'Desolate Zone',zone:'Desolate',text:'你打开了被诅咒的音乐盒。盒中的旋律将你的灵魂困住——你变成了音乐盒娘。你在盒中旋转跳舞。',end:'bad',etn:'D71',et:'Cursed Music Box'},
be_d72:{t:'Bad End: Old Key',loc:'Desolate Zone',zone:'Desolate',text:'你捡起了一把旧钥匙。钥匙的魔力将你转化成了钥匙娘。你的身体变成了钥匙的形状，被挂在钥匙环上。',end:'bad',etn:'D72',et:'Old Key'},
be_d73:{t:'Bad End: Funeral Veil',loc:'Desolate Zone',zone:'Desolate',text:'你戴上了葬礼的面纱。面纱遮住了你的视线——你变成了新娘亡魂娘。你穿着婚纱在荒芜的教堂中等待。',end:'bad',etn:'D73',et:'Funeral Veil'},
be_d74:{t:'Bad End: Moth-Eaten Cloak',loc:'Desolate Zone',zone:'Desolate',text:'你披上了被虫蛀的斗篷。飞蛾从斗篷中飞出——你变成了蛾娘。你的翅膀被虫蛀出了破洞。',end:'bad',etn:'D74',et:'Moth-Eaten Cloak'},
be_d75:{t:'Bad End: Decayed Throne',loc:'Desolate Zone',zone:'Desolate',text:'你坐在了腐朽的王座上。王座的诅咒将你转化成了废王娘。你坐在一片废墟中，统治着不存在的王国。',end:'bad',etn:'D75',et:'Decayed Throne'},
be_d76:{t:'Bad End: Shattered Crown',loc:'Desolate Zone',zone:'Desolate',text:'你捡起了破碎的王冠。王冠的碎片刺入你的头骨——你变成了碎冠娘。你作为落魄的统治者流浪。',end:'bad',etn:'D76',et:'Shattered Crown'},
be_d77:{t:'Bad End: Chained Library',loc:'Desolate Zone',zone:'Desolate',text:'你被锁在了图书馆的书架上。书的诅咒将你变成了被锁书娘。你在锁链中阅读着无尽的知识。',end:'bad',etn:'D77',et:'Chained Library'},
be_d78:{t:'Bad End: Candle Holder',loc:'Desolate Zone',zone:'Desolate',text:'你变成了人形烛台娘。你的手臂上托着燃烧的蜡烛，蜡油滴落在你的皮肤上。你在黑暗中被当作光源使用。',end:'bad',etn:'D78',et:'Candle Holder'},
be_d79:{t:'Bad End: Broken Harp',loc:'Desolate Zone',zone:'Desolate',text:'你触碰了断弦的竖琴。琴弦割伤了你的手指——你变成了断琴娘。你在废弃的音乐厅中低鸣。',end:'bad',etn:'D79',et:'Broken Harp'},
be_d80:{t:'Bad End: Crumbling Statue',loc:'Desolate Zone',zone:'Desolate',text:'你在一尊碎裂的雕像前驻足。雕像的碎片向你飞来——你变成了碎像娘。你的身体在不断地碎裂。',end:'bad',etn:'D80',et:'Crumbling Statue'},
be_d81:{t:'Bad End: Wind Chime',loc:'Desolate Zone',zone:'Desolate',text:'你的身体被挂在了屋檐下作为风铃。每当风吹过，你发出清脆的声音。你变成了风铃娘。',end:'bad',etn:'D81',et:'Wind Chime'},
be_d82:{t:'Bad End: Rusty Gate',loc:'Desolate Zone',zone:'Desolate',text:'你变成了墓地大门的一部分。你的身体延伸为生锈的铁栅栏——你变成了铁门娘。你永远守护着墓地的入口。',end:'bad',etn:'D82',et:'Rusty Gate'},
be_d83:{t:'Bad End: Fetish Doll',loc:'Desolate Zone',zone:'Desolate',text:'你被巫毒教的诅咒变成了巫毒娃娃娘。你的身体由麻布和针线构成，被钉在祭坛上。',end:'bad',etn:'D83',et:'Fetish Doll'},
be_d84:{t:'Bad End: Desolate Wanderer',loc:'Desolate Zone',zone:'Desolate',text:'你在荒原上漫无目的地行走直到倒下。大地将你吸收——你变成了荒原娘。你的身体与荒地融为一体。',end:'bad',etn:'D84',et:'Desolate Wanderer'},
be_e1:{t:'Bad End: Lamia\'s Coil',loc:'Desert Zone',zone:'Desert',text:'你被拉米亚的尾巴缠住了。她的蛇吻注入了转化毒液——你的双腿融合成了蛇尾，变成了拉米亚娘。你在沙漠中滑行。',end:'bad',etn:'E1',et:'Lamia\'s Coil'},
be_e2:{t:'Bad End: Mummy\'s Tomb',loc:'Desert Zone',zone:'Desert',text:'你在金字塔中被木乃伊捕获。绷带缠绕了你的全身——你变成了木乃伊娘。你在石棺中等待来世。',end:'bad',etn:'E2',et:'Mummy\'s Tomb'},
be_e3:{t:'Bad End: Scorpion Sting',loc:'Desert Zone',zone:'Desert',text:'你被巨大的沙漠蝎娘蜇伤。毒液将你变成了蝎娘——你长出了蝎尾和钳子。你在沙漠中潜伏在沙下。',end:'bad',etn:'E3',et:'Scorpion Sting'},
be_e4:{t:'Bad End: Sunstroke Delirium',loc:'Desert Zone',zone:'Desert',text:'你在烈日下中暑倒下。沙漠的热量将你转化成了热浪娘——你的身体由灼热的空气构成，扭曲了视线。',end:'bad',etn:'E4',et:'Sunstroke Delirium'},
be_e5:{t:'Bad End: Sandstorm Prison',loc:'Desert Zone',zone:'Desert',text:'沙尘暴困住了你。风沙侵蚀了你的身体——你变成了沙暴娘。你的身体由沙粒构成，在沙漠中永远旋转。',end:'bad',etn:'E5',et:'Sandstorm Prison'},
be_e6:{t:'Bad End: Oasis Siren',loc:'Desert Zone',zone:'Desert',text:'你被沙漠绿洲的幻象迷惑。绿洲中的精灵将你变成了绿洲娘——你扎根在水源边，引诱新的旅人。',end:'bad',etn:'E6',et:'Oasis Siren'},
be_e7:{t:'Bad End: Anubis Judgment',loc:'Desert Zone',zone:'Desert',text:'你闯入了胡狼神的圣地。她将你转化成了胡狼娘——你长出了胡狼的头和尾巴。你在沙漠神庙中作为守卫。',end:'bad',etn:'E7',et:'Anubis Judgment'},
be_e8:{t:'Bad End: Basilisk Gaze',loc:'Desert Zone',zone:'Desert',text:'你与蛇怪对视。她的目光将你部分石化——你变成了蛇怪娘。你的眼睛同样具有石化之力。',end:'bad',etn:'E8',et:'Basilisk Gaze'},
be_e9:{t:'Bad End: Scarab Swarm',loc:'Desert Zone',zone:'Desert',text:'圣甲虫群覆盖了你的身体。它们在你的皮肤下筑巢——你变成了圣甲虫娘。你的身体内部有无数甲虫蠕动。',end:'bad',etn:'E9',et:'Scarab Swarm'},
be_e10:{t:'Bad End: Nomad\'s Curse',loc:'Desert Zone',zone:'Desert',text:'你激怒了沙漠游牧部落的萨满。她的诅咒将你变成了沙漠游荡娘。你在沙漠中永远流浪。',end:'bad',etn:'E10',et:'Nomad\'s Curse'},
be_e11:{t:'Bad End: Cactus Trap',loc:'Desert Zone',zone:'Desert',text:'你跌入了仙人掌丛中。尖刺刺入你的身体——你变成了仙人掌娘。你的身体表面长满了刺。',end:'bad',etn:'E11',et:'Cactus Trap'},
be_e12:{t:'Bad End: Dune Dweller',loc:'Desert Zone',zone:'Desert',text:'你被沙丘下的生物拖入了地下。你在沙中变成了沙居娘。你在沙丘之下穿行，永远不见天日。',end:'bad',etn:'E12',et:'Dune Dweller'},
be_e13:{t:'Bad End: Pharaoh\'s Concubine',loc:'Desert Zone',zone:'Desert',text:'你被法老的亡魂选中。她将你转化成了法老妃娘。你在金字塔中作为法老的陪葬品永远沉睡。',end:'bad',etn:'E13',et:'Pharaoh\'s Concubine'},
be_e14:{t:'Bad End: Genie Lamp',loc:'Desert Zone',zone:'Desert',text:'你擦拭了一盏油灯。灯中的精灵将你吸入了灯中——你变成了灯灵娘。你在油灯中作为奴仆存在。',end:'bad',etn:'E14',et:'Genie Lamp'},
be_e15:{t:'Bad End: Camel Saddle',loc:'Desert Zone',zone:'Desert',text:'你被驼队抓住并变成了驼娘。你的背上长出了驼峰，在沙漠中作为驮兽使用。',end:'bad',etn:'E15',et:'Camel Saddle'},
be_e16:{t:'Bad End: Dried Riverbed',loc:'Desert Zone',zone:'Desert',text:'你沿着干涸的河床行走。河床的干旱诅咒将你变成了干涸娘。你的身体龟裂如河床。',end:'bad',etn:'E16',et:'Dried Riverbed'},
be_e17:{t:'Bad End: Mirage Dancer',loc:'Desert Zone',zone:'Desert',text:'你被沙漠舞娘的舞姿迷惑。她将你转化成了新的舞娘。你在沙丘上永远跳舞。',end:'bad',etn:'E17',et:'Mirage Dancer'},
be_e18:{t:'Bad End: Cobra Hood',loc:'Desert Zone',zone:'Desert',text:'眼镜蛇娘咬住了你的脖子。毒液将你变成了眼镜蛇娘——你的颈部扩张成了蛇的伞状。',end:'bad',etn:'E18',et:'Cobra Hood'},
be_e19:{t:'Bad End: Dust Devil',loc:'Desert Zone',zone:'Desert',text:'你被小型的沙尘龙卷风卷起。旋转的沙粒重塑了你的身体——你变成了沙卷风娘。',end:'bad',etn:'E19',et:'Dust Devil'},
be_e20:{t:'Bad End: Fossil Bed',loc:'Desert Zone',zone:'Desert',text:'你躺在了化石层上。远古化石的魔力将你变成了化石娘。你的身体一半变成了石头。',end:'bad',etn:'E20',et:'Fossil Bed'},
be_e21:{t:'Bad End: Merchant\'s Slave',loc:'Desert Zone',zone:'Desert',text:'你被沙漠商人捕获并贩卖。魔法的项圈将你变成了奴隶娘。你在集市上被买卖。',end:'bad',etn:'E21',et:'Merchant\'s Slave'},
be_e22:{t:'Bad End: Sultan\'s Harem',loc:'Desert Zone',zone:'Desert',text:'你被苏丹的仆人带入了后宫。后宫魔法的香气将你转化成了后宫娘。你在丝绸和香水中被禁锢。',end:'bad',etn:'E22',et:'Sultan\'s Harem'},
be_e23:{t:'Bad End: Tumbleweed',loc:'Desert Zone',zone:'Desert',text:'你的身体变得干枯卷曲，被风吹着在沙漠中滚动。你变成了风滚草娘。你在荒漠上无止境地漂泊。',end:'bad',etn:'E23',et:'Tumbleweed'},
be_e24:{t:'Bad End: Vulture\'s Circle',loc:'Desert Zone',zone:'Desert',text:'秃鹫在你的头顶盘旋。它们等待你死去——但你没有死，而是变成了秃鹫娘。你长出了翅膀和喙。',end:'bad',etn:'E24',et:'Vulture\'s Circle'},
be_e25:{t:'Bad End: Lizard Tail',loc:'Desert Zone',zone:'Desert',text:'你被沙漠蜥蜴娘咬断了尾巴。你长出了新的蜥蜴尾巴——你变成了蜥蜴娘。你在岩石上晒太阳。',end:'bad',etn:'E25',et:'Lizard Tail'},
be_e26:{t:'Bad End: Curse of the Sands',loc:'Desert Zone',zone:'Desert',text:'你触动了沙漠中的古代诅咒。沙子开始在你的身体里生长——你变成了沙化娘。你的身体逐渐沙化崩解。',end:'bad',etn:'E26',et:'Curse of the Sands'},
be_e27:{t:'Bad End: Glassblower\'s Workshop',loc:'Desert Zone',zone:'Desert',text:'你被沙漠中的玻璃工匠捕获。她将你熔化成玻璃——你变成了玻璃娘。你的身体透明而脆弱。',end:'bad',etn:'E27',et:'Glassblower\'s Workshop'},
be_e28:{t:'Bad End: Salt Lake',loc:'Desert Zone',zone:'Desert',text:'你进入了盐湖。盐水蒸发后在你的身体上结晶——你变成了盐晶娘。你站在盐湖中，身体覆盖着盐。',end:'bad',etn:'E28',et:'Salt Lake'},
be_e29:{t:'Bad End: Oracle\'s Cave',loc:'Desert Zone',zone:'Desert',text:'你进入了沙漠中的先知洞穴。先知将你转化成预言娘。你的眼睛可以看到未来但无法改变。',end:'bad',etn:'E29',et:'Oracle\'s Cave'},
be_e30:{t:'Bad End: Thirst Eternal',loc:'Desert Zone',zone:'Desert',text:'你在沙漠中永远口渴却找不到水。干渴诅咒将你转化成了永渴娘。你的喉咙永远燃烧。',end:'bad',etn:'E30',et:'Thirst Eternal'},
be_e31:{t:'Bad End: Jackal Pack',loc:'Desert Zone',zone:'Desert',text:'你被胡狼群包围。她们将你转化成了胡狼娘——你长出了黄褐色的皮毛和尖耳朵。你在沙漠中与胡狼一同嚎叫。',end:'bad',etn:'E31',et:'Jackal Pack'},
