<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monline Adventure - 怪物娘冒险</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600;700&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--bg2:#111;--card:#1a1a1a;--gold:#d4a843;--red:#c41e3a;--purp:#7c3aed;--grn:#22c55e;--blu:#3b82f6;--org:#f97316;--pink:#ec4899;--teal:#14b8a6;--txt:#e8e0d0;--txt2:#9a9080;--brd:#2a2520}
body{font-family:'Noto Serif SC',serif;background:var(--bg);color:var(--txt);line-height:1.8;min-height:100vh;overflow-x:hidden}
#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.nav{position:fixed;top:0;left:0;right:0;background:rgba(10,10,10,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--brd);z-index:1000;padding:.5rem 1rem;display:flex;align-items:center;gap:.5rem;overflow-x:auto}
.nav-b{font-family:'Ma Shan Zheng',cursive;font-size:1.3rem;color:var(--gold);margin-right:1rem;flex-shrink:0}
.nav-l{color:var(--txt2);text-decoration:none;padding:.4rem .8rem;border-radius:4px;font-size:.85rem;transition:.3s;white-space:nowrap}
.nav-l:hover,.nav-l.active{color:var(--gold);background:rgba(212,168,67,.1)}
.wrap{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:5rem 1rem 2rem}
.title{text-align:center;padding:3rem 1rem;min-height:85vh;display:flex;flex-direction:column;justify-content:center;align-items:center}
.title h1{font-family:'Ma Shan Zheng',cursive;font-size:3.5rem;color:var(--gold);text-shadow:0 0 40px rgba(212,168,67,.3);margin-bottom:.3rem}
.title .sub{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--purp);font-style:italic;margin-bottom:1.5rem}
.title .desc{max-width:600px;color:var(--txt2);margin-bottom:2rem;font-size:.95rem}
.btn{font-family:'Ma Shan Zheng',cursive;font-size:1.2rem;padding:.7rem 2rem;border:2px solid var(--gold);background:linear-gradient(135deg,rgba(212,168,67,.15),rgba(212,168,67,.05));color:var(--gold);border-radius:8px;cursor:pointer;transition:.3s;margin:.4rem}
.btn:hover{background:linear-gradient(135deg,rgba(212,168,67,.3),rgba(212,168,67,.1));box-shadow:0 0 20px rgba(212,168,67,.3);transform:translateY(-2px)}
.btn.r{border-color:var(--red);color:var(--red);background:linear-gradient(135deg,rgba(196,30,58,.15),rgba(196,30,58,.05))}
.btn.r:hover{box-shadow:0 0 20px rgba(196,30,58,.3)}
.btn.t{border-color:var(--teal);color:var(--teal);background:linear-gradient(135deg,rgba(20,184,166,.15),rgba(20,184,166,.05))}
.btn.p{border-color:var(--purp);color:var(--purp);background:linear-gradient(135deg,rgba(124,58,237,.15),rgba(124,58,237,.05))}
.btn.s{border-color:var(--org);color:var(--org);background:linear-gradient(135deg,rgba(249,115,22,.15),rgba(249,115,22,.05))}
.stats{background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:.8rem;margin-bottom:.8rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:.5rem}
.stat{display:flex;align-items:center;gap:.4rem}
.stat-l{font-size:.72rem;color:var(--txt2);min-width:44px}
.stat-b{flex:1;height:6px;background:#222;border-radius:3px;overflow:hidden}
.stat-f{height:100%;border-radius:3px;transition:width .5s}
.stat-f.h{background:linear-gradient(90deg,var(--red),#ff6b6b)}
.stat-f.s{background:linear-gradient(90deg,var(--blu),#60a5fa)}
.stat-f.c{background:linear-gradient(90deg,var(--purp),#a78bfa)}
.stat-f.k{background:linear-gradient(90deg,var(--org),#fb923c)}
.stat-f.d{background:linear-gradient(90deg,var(--grn),#4ade80)}
.stat-v{font-size:.78rem;min-width:28px;text-align:right}
.inv{background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:.7rem;margin-bottom:.8rem}
.inv h3{font-family:'Ma Shan Zheng',cursive;color:var(--gold);font-size:.95rem;margin-bottom:.3rem}
.inv-g{display:flex;flex-wrap:wrap;gap:.3rem}
.inv-i{background:#222;border:1px solid var(--brd);border-radius:4px;padding:.2rem .5rem;font-size:.78rem;color:var(--txt2)}
.inv-i.got{border-color:var(--gold);color:var(--gold)}
.chap-h{text-align:center;padding:.8rem;border-bottom:2px solid var(--brd);margin-bottom:.8rem}
.chap-h h2{font-family:'Ma Shan Zheng',cursive;font-size:1.4rem;color:var(--gold)}
.chap-h .loc{color:var(--txt2);font-size:.82rem;font-style:italic}
.story{background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:1.2rem 1.5rem;margin-bottom:1rem;font-size:.95rem;line-height:2;min-height:150px}
.story p{margin-bottom:.7rem}
.zone-b{display:inline-block;padding:.15rem .5rem;border-radius:4px;font-size:.7rem;margin-left:.4rem}
.zone-b.f{background:rgba(34,197,94,.2);color:#4ade80}
.zone-b.w{background:rgba(59,130,246,.2);color:#60a5fa}
.zone-b.d{background:rgba(196,30,58,.2);color:#ff6b6b}
.zone-b.z{background:rgba(107,114,128,.2);color:#9ca3af}
.zone-b.s{background:rgba(249,115,22,.2);color:#fb923c}
.zone-b.m{background:rgba(124,58,237,.2);color:#a78bfa}
.choices{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem}
.cbtn{background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:.8rem 1.2rem;color:var(--txt);text-align:left;cursor:pointer;transition:.3s;font-family:'Noto Serif SC',serif;font-size:.9rem}
.cbtn:hover{border-color:var(--gold);background:linear-gradient(135deg,rgba(212,168,67,.1),rgba(212,168,67,.02));transform:translateX(5px)}
.cbtn .cl{color:var(--gold);font-weight:700;margin-right:.3rem}
.end{text-align:center;padding:2rem}
.end h2{font-family:'Ma Shan Zheng',cursive;font-size:2rem;margin-bottom:1rem}
.end.g h2{color:var(--grn)}.end.b h2{color:var(--red)}.end.n h2{color:var(--gold)}
.end .d{max-width:600px;margin:0 auto 1.5rem;color:var(--txt2);font-size:.95rem;line-height:2}
.gal{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.6rem;margin:1rem 0}
.gal-c{background:var(--card);border:1px solid var(--brd);border-radius:6px;padding:.6rem;font-size:.82rem;text-align:center}
.gal-c.f{border-color:var(--gold);color:var(--gold)}
.gal-c.l{color:var(--txt2)}
.hidden{display:none!important}
#saveMsg{position:fixed;bottom:1rem;right:1rem;background:var(--gold);color:#000;padding:.5rem 1rem;border-radius:6px;font-size:.8rem;z-index:2000;opacity:0;transition:opacity .5s}
#saveMsg.show{opacity:1}
@media(max-width:768px){
.title h1{font-size:2.2rem}.wrap{padding:4.5rem .5rem 1rem}.story{padding:.8rem;font-size:.85rem}.stats{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<nav class="nav"><span class="nav-b">阿波菲斯</span><a href="index.html" class="nav-l">主书</a><a href="monline-adventure.html" class="nav-l active">Monline</a><a href="monster-girl-adventure.html" class="nav-l">怪物娘</a><a href="apophis-adventure.html" class="nav-l">龙之冒险</a></nav>
<div class="wrap">
<div id="titleScr" class="title">
  <h1>Monline</h1>
  <div class="sub">A Tale of Transformation and Survival</div>
  <div class="desc">
    你和同伴 Kim 与 Dominic 被困在了 Monline 世界。这里的规则很简单——失败者将被转化为怪物娘，永远失去自我。<br>
    穿越森林、海岸、恶魔领域、废都、沙漠，最终到达神话之地的核心。保持人性走到最后，否则沦为 Bad End 的牺牲品。
  </div>
  <div>
    <button class="btn" onclick="startGame()">开始冒险</button>
    <button class="btn r" onclick="loadGame()">读取存档</button>
    <button class="btn t" onclick="showEndings()">已收集结局</button>
    <button class="btn p" onclick="showEndingsAll()">全部结局</button>
  </div>
  <div style="margin-top:1rem;color:var(--txt2);font-size:.7rem;opacity:.5">Monline HTML Adventure v1.0</div>
</div>
<div id="gameScr" class="hidden">
  <div class="stats" id="stPanel">
    <div class="stat"><span class="stat-l">生命</span><div class="stat-b"><div class="stat-f h" id="hBar"></div></div><span class="stat-v" id="hVal"></span></div>
    <div class="stat"><span class="stat-l">理智</span><div class="stat-b"><div class="stat-f s" id="sBar"></div></div><span class="stat-v" id="sVal"></span></div>
    <div class="stat"><span class="stat-l">腐化</span><div class="stat-b"><div class="stat-f c" id="cBar"></div></div><span class="stat-v" id="cVal"></span></div>
    <div class="stat"><span class="stat-l">Kim</span><div class="stat-b"><div class="stat-f k" id="kBar"></div></div><span class="stat-v" id="kVal"></span></div>
    <div class="stat"><span class="stat-l">Dom</span><div class="stat-b"><div class="stat-f d" id="dBar"></div></div><span class="stat-v" id="dVal"></span></div>
  </div>
  <div class="inv"><h3>背包 <span id="zBadge" class="zone-b"></span></h3><div class="inv-g" id="invG"></div></div>
  <div class="chap-h"><h2 id="cTitle">序章</h2><div class="loc" id="cLoc">Mirane 城</div></div>
  <div class="story" id="story"></div>
  <div class="choices" id="choices"></div>
  <div style="text-align:center;margin-top:.5rem">
    <button class="btn" onclick="save()" style="font-size:.8rem;padding:.3rem 1rem">保存进度</button>
    <button class="btn r" onclick="toTitle()" style="font-size:.8rem;padding:.3rem 1rem">返回标题</button>
  </div>
</div>
<div id="endScr" class="end hidden"><h2 id="eTitle"></h2><div class="d" id="eDesc"></div><button class="btn" onclick="toTitle()">返回标题</button></div>
<div id="galScr" class="hidden" style="padding:1rem">
  <h2 style="font-family:'Ma Shan Zheng',cursive;color:var(--gold);text-align:center">结局画廊</h2>
  <div style="text-align:center;margin:.5rem 0;color:var(--txt2);font-size:.85rem">
    <span id="galCount">已收集: 0 / 0</span>
  </div>
  <div class="gal" id="galG"></div>
  <div style="text-align:center;margin-top:1rem">
    <button class="btn" onclick="toTitle()">返回标题</button>
  </div>
</div>
</div>
<div id="saveMsg">进度已保存</div>
<script>

// ===== PARTICLES =====
const c=document.getElementById('particles'),ctx=c.getContext('2d');
function resizeC(){c.width=window.innerWidth;c.height=window.innerHeight}
window.addEventListener('resize',resizeC);resizeC();
const pa=[];
for(let i=0;i<60;i++){pa.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2+1,s:Math.random()*0.5+0.2,o:Math.random()*0.5+0.1})}
function anim(){ctx.clearRect(0,0,c.width,c.height);pa.forEach(pt=>{pt.y-=pt.s;if(pt.y<-5){pt.y=c.height+5;pt.x=Math.random()*c.width}ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2);ctx.fillStyle='rgba(212,168,67,'+pt.o+')';ctx.fill()});requestAnimationFrame(anim)}
anim();

// ===== GAME STATE =====
let gs={
  ch:'start',hp:100,san:100,cor:0,kim:100,dom:100,inv:[],fl:{},hist:[],end:[],zone:''
};
const ZONES={
  Forest:{label:'森林',cls:'f'},
  Coastal:{label:'海岸',cls:'w'},
  Demon:{label:'恶魔',cls:'d'},
  Desolate:{label:'废都',cls:'z'},
  Desert:{label:'沙漠',cls:'s'},
  Mythic:{label:'神话',cls:'m'}
};

function saveMsg(t){
  const el=document.getElementById('saveMsg');
  el.textContent=t||'进度已保存';
  el.classList.add('show');
  setTimeout(function(){el.classList.remove('show')},2000);
}

function save(){
  localStorage.setItem('monSave',JSON.stringify(gs));
  localStorage.setItem('monAuto',JSON.stringify(gs));
  saveMsg('进度已保存');
}
function load(){
  const s=localStorage.getItem('monSave');
  if(s){
    try{gs=JSON.parse(s);showCh(gs.ch);saveMsg('存档已读取');return true}
    catch(e){alert('存档损坏');return false}
  }
  alert('没有存档');
  return false;
}
function autoLoad(){
  const s=localStorage.getItem('monAuto');
  if(s){
    try{gs=JSON.parse(s);showCh(gs.ch);return true}
    catch(e){return false}
  }
  return false;
}
function loadGame(){load()}

function upStats(){
  var C=function(v){return Math.max(0,Math.min(100,Math.round(v)))};
  gs.hp=C(gs.hp);gs.san=C(gs.san);gs.cor=C(gs.cor);gs.kim=C(gs.kim);gs.dom=C(gs.dom);
  var map={h:'hp',s:'san',c:'cor',k:'kim',d:'dom'};
  ['h','s','c','k','d'].forEach(function(l){
    document.getElementById(l+'Bar').style.width=gs[map[l]]+'%';
  });
  document.getElementById('hVal').textContent=gs.hp;
  document.getElementById('sVal').textContent=gs.san;
  document.getElementById('cVal').textContent=gs.cor;
  document.getElementById('kVal').textContent=gs.kim;
  document.getElementById('dVal').textContent=gs.dom;
  var gr=document.getElementById('invG');
  if(gs.inv.length===0){
    gr.innerHTML='<span class="inv-i">无</span>';
  }else{
    gr.innerHTML=gs.inv.map(function(i){return '<span class="inv-i got">'+i+'</span>'}).join('');
  }
  var b=document.getElementById('zBadge');
  var zi=ZONES[gs.zone];
  if(zi){
    b.textContent=zi.label;
    b.className='zone-b '+zi.cls;
    b.style.display='inline';
  }else{
    b.style.display='none';
  }
}

function addI(i){if(!gs.inv.includes(i)){gs.inv.push(i);upStats()}}
function hasI(i){return gs.inv.includes(i)}
function setF(k,v){gs.fl[k]=v}
function getF(k){return gs.fl[k]||false}
function chg(d){
  if(d&&d.hp!==undefined){gs.hp+=d.hp}
  if(d&&d.san!==undefined){gs.san+=d.san}
  if(d&&d.cor!==undefined){gs.cor+=d.cor}
  if(d&&d.kim!==undefined){gs.kim+=d.kim}
  if(d&&d.dom!==undefined){gs.dom+=d.dom}
  upStats()
}

function toTitle(){
  document.getElementById('titleScr').classList.remove('hidden');
  document.getElementById('gameScr').classList.add('hidden');
  document.getElementById('endScr').classList.add('hidden');
  document.getElementById('galScr').classList.add('hidden');
}

function showCh(id){
  if(!id)return;
  gs.ch=id;
  gs.hist.push(id);
  if(gs.hist.length>50)gs.hist.shift();
  var ch=chs[id];
  if(!ch){console.error('Missing chapter:',id);return}
  if(ch.end){
    showEnd(ch.end,ch.et,ch.etn,ch.text);
    if(ch.etn&&!gs.end.includes(ch.etn)){
      gs.end.push(ch.etn);
      save();
    }
    return;
  }
  document.getElementById('titleScr').classList.add('hidden');
  document.getElementById('endScr').classList.add('hidden');
  document.getElementById('galScr').classList.add('hidden');
  document.getElementById('gameScr').classList.remove('hidden');
  document.getElementById('cTitle').textContent=ch.t||'未知';
  document.getElementById('cLoc').textContent=ch.loc||'未知';
  if(ch.zone){gs.zone=ch.zone}
  var st=document.getElementById('story');
  if(typeof ch.text==='string'){
    st.innerHTML='<p>'+ch.text+'</p>';
  }else if(Array.isArray(ch.text)){
    st.innerHTML=ch.text.map(function(t){return '<p>'+t+'</p>'}).join('');
  }else{
    st.innerHTML='<p>...</p>';
  }
  if(ch.eff){chg(ch.eff)}
  if(ch.items){ch.items.forEach(function(i){addI(i)})}
  if(ch.sf){setF(ch.sf,true)}
  var bx=document.getElementById('choices');
  bx.innerHTML='';
  if(ch.chs){
    ch.chs.forEach(function(c,i){
      if(!c.con||c.con(gs)){
        var b=document.createElement('button');
        b.className='cbtn';
        b.innerHTML='<span class="cl">'+String.fromCharCode(65+i)+'.</span> '+c.t;
        b.onclick=function(){
          if(c.eff){chg(c.eff)}
          showCh(c.n)
        };
        bx.appendChild(b);
      }
    });
  }
  upStats();
  save();
  window.scrollTo(0,0);
}

function showEnd(type,t,nt,text){
  document.getElementById('gameScr').classList.add('hidden');
  document.getElementById('galScr').classList.add('hidden');
  var es=document.getElementById('endScr');
  es.className='end '+(type||'n');
  document.getElementById('eTitle').textContent=nt||t||'结局';
  if(typeof text==='string'){
    document.getElementById('eDesc').textContent=text;
  }else if(Array.isArray(text)){
    document.getElementById('eDesc').textContent=text.join(' ');
  }else{
    document.getElementById('eDesc').textContent='...';
  }
  es.classList.remove('hidden');
}

function startGame(){
  gs={
    ch:'start',hp:100,san:100,cor:0,kim:100,dom:100,
    inv:[],fl:{},hist:[],end:[],zone:''
  };
  showCh('start');
}

function showEndings(){
  document.getElementById('titleScr').classList.add('hidden');
  document.getElementById('gameScr').classList.add('hidden');
  document.getElementById('endScr').classList.add('hidden');
  var g=document.getElementById('galScr');
  g.classList.remove('hidden');
  var gr=document.getElementById('galG');
  var cnt=0,tot=alEnds.length;
  gr.innerHTML=alEnds.map(function(e){
    var f=gs.end.includes(e.n);
    if(f)cnt++;
    var cls=f?'gal-c f':'gal-c l';
    var title=f?e.t:'???';
    var num=f?e.n:'?';
    var zone=f?e.z:'';
    return '<div class="'+cls+'">'+num+'<br>'+title+'<br><small>'+zone+'</small></div>';
  }).join('');
  document.getElementById('galCount').textContent='已收集: '+cnt+' / '+tot;
}

function showEndingsAll(){
  document.getElementById('titleScr').classList.add('hidden');
  document.getElementById('gameScr').classList.add('hidden');
  document.getElementById('endScr').classList.add('hidden');
  var g=document.getElementById('galScr');
  g.classList.remove('hidden');
  var gr=document.getElementById('galG');
  gr.innerHTML=alEnds.map(function(e){
    var f=gs.end.includes(e.n);
    return '<div class="gal-c '+(f?'f':'l')+'">'+
      e.n+'<br>'+
      (f?e.t:e.t)+'<br><small>'+
      (f?e.z:e.z)+'</small></div>';
  }).join('');
  document.getElementById('galCount').textContent='全部: '+alEnds.length+' 个结局';
}


const alEnds=[
{n:'A1',t:'Liar Liar',z:'Forest'},{n:'A2',t:'Addiction',z:'Forest'},
{n:'A3',t:'Honey Trap',z:'Forest'},{n:'A4',t:'A True Honor',z:'Forest'},
{n:'A5',t:'Absolute Power',z:'Forest'},{n:'A6',t:'Slice of Life',z:'Forest'},
{n:'A7',t:'Fluid Hunt',z:'Forest'},{n:'A8',t:'Stay Awhile',z:'Forest'},
{n:'A9',t:'Hooters',z:'Forest'},{n:'A10',t:'Ribbiting Existence',z:'Forest'},
{n:'A11',t:'Sweet Behind',z:'Forest'},{n:'A12',t:'Pillars to Temple',z:'Forest'},
{n:'A13',t:'Cat is Fine Too',z:'Forest'},{n:'A14',t:'Cat Called',z:'Forest'},
{n:'A15',t:'Feline Fine',z:'Forest'},{n:'A16',t:'Heavy Petting',z:'Forest'},
{n:'A17',t:"Cat's Meow",z:'Forest'},
{n:'B1',t:'Littlest Mermaid',z:'Coastal'},{n:'B2',t:'Beneath the Light',z:'Coastal'},
{n:'B3',t:'Under da Sea',z:'Coastal'},{n:'B4',t:'Plenty of Fish',z:'Coastal'},
{n:'B5',t:'Catch of a Lifetime',z:'Coastal'},{n:'B6',t:'Charybdis Chow',z:'Coastal'},
{n:'B7',t:'Boredom',z:'Coastal'},{n:'B8',t:'Outlet of Love',z:'Coastal'},
{n:'B9',t:'Deep Dark Depths',z:'Coastal'},{n:'B10',t:'Die with Dignity',z:'Coastal'},
{n:'B11',t:'The Saviour',z:'Coastal'},{n:'B12',t:'Magic Cucumber',z:'Coastal'},
{n:'B13',t:'Kappativated',z:'Coastal'},{n:'B14',t:'One Track Mind',z:'Coastal'},
{n:'B15',t:'Sisters in Crime',z:'Coastal'},{n:'B16',t:'Backup Singer',z:'Coastal'},
{n:'B17',t:'Flow Rider',z:'Coastal'},{n:'B18',t:'Clean Slate',z:'Coastal'},
{n:'B19',t:'Coconut Grass',z:'Coastal'},{n:'B20',t:'Humans is Stupid',z:'Coastal'},
{n:'B21',t:'Saltwater Sweetie',z:'Coastal'},{n:'B22',t:'Love Beneath Gaslight',z:'Coastal'},

{n:'C1',t:'Impressive',z:'Demon'},{n:'C2',t:'Imprisoned',z:'Demon'},
{n:'C3',t:'Good Impression',z:'Demon'},{n:'C4',t:"Predator's Prey",z:'Demon'},

forest_fly_cross:{t:'飞越森林',loc:'Forest Zone - 空中',zone:'Forest',text:[
  'Kim 不情愿地交出了她的帽子。鹰身女妖开心地戴上，然后抓起你们飞向海岸。',
  '从空中俯瞰，森林的全貌令人震撼。巨大的树木形成了一片绿色的海洋，中间点缀着各种奇怪的结构。',
  '"我看到了！"Dominic 指着远方，"Coastal Zone 的海岸线！"',
  '几分钟后，你们被轻轻地放在海滩上。鹰身女妖拍了拍翅膀，消失在天空中。',
  '"我的帽子..."Kim 叹了口气，"不过至少我们安全了。"'],
  eff:{kim:-5,dom:5},items:['鹰身女妖的羽毛'],chs:[{t:'探索海岸',n:'coastal_entry'}]
},
forest_harpy_fight:{t:'与鹰身女妖战斗',loc:'Forest Zone',zone:'Forest',text:[
  '你拔出武器准备战斗。鹰身女妖尖叫着俯冲下来。',
  '战斗非常激烈——她的爪子和喙都非常锋利。',
  '最终，你们用巧妙的配合击退了她。她尖叫着飞走了。',
  '"赢了。但浪费了不少体力。"Dominic 喘着气说。'],
  eff:{hp:-20},chs:[{t:'继续前往森林边缘',n:'forest_exit'}]
},
forest_milk_drink:{t:'牛奶的效果',loc:'Forest Zone - Minoh Ranch',zone:'Forest',text:[
  '你喝下了牛奶。味道甘甜，带着淡淡的香草味。',
  '"好喝！"Kim 一口气喝完了一杯。',
  '但几分钟后，你们感到身体发热，皮肤开始变得敏感。',
  '"我告诉过你们不要喝太多。"Minoh 尴尬地说，"这牛奶有轻微的转化效果。"',
  '你看了看自己的手——皮肤还好。但 Kim 的头上...好像长出了小小的牛角？',
  '"天哪。"Kim 摸了摸自己的额头，"我长了角？"'],
  eff:{hp:20,cor:10},chs:[
  {t:'继续旅程',n:'forest_deep'},
  {t:'让 Kim 休息一下',n:'forest_rest'}
]},
forest_rest:{t:'休息',loc:'Forest Zone',zone:'Forest',text:[
  '你们在树下休息了一会儿。Kim 的牛角似乎缩小了一些。',
  '"我会一直是这个状态吗？"她担心地问。',
  '"不会。"Dominic 安慰她，"只要离开这个区域应该就会消退。"',
  '"希望你是对的。"Kim 低声说。'],
  eff:{san:5,kim:-5},chs:[{t:'深入森林',n:'forest_deep'}]
},
forest_hive:{t:'蜂巢区域',loc:'Forest Zone - Hive',zone:'Forest',text:[
  '你们来到了一个巨大的蜂巢下方。蜂巢挂在树上，直径超过两米。',
  '空气中弥漫着甜腻的蜂蜜味。',
  '蜜蜂娘在空中飞舞。她们的下半身是蜂的体态，上半身则是人类女性的身体。',
  '"不要惊动它们。"Dominic 低声说，"被蜇到可不是开玩笑的。"'],
  chs:[
  {t:'悄悄绕过去',n:'forest_deep'},
  {t:'尝试偷一些蜂蜜',n:'forest_honey_steal'},
  {t:'与蜜蜂娘交谈',n:'forest_bee_talk'}
]},
forest_bee_talk:{t:'蜜蜂娘对话',loc:'Forest Zone - Hive',zone:'Forest',text:[
  '你走向一只蜜蜂娘，举起双手表示友善。',
  '她降落在你面前，翅膀嗡嗡作响。"人类？你们不怕我们吗？"',
  '"我们只是路过。"你说，"不想惹麻烦。"',
  '她咯咯笑了。"那你走错路了。这里是 Queen Bee 的领地。她不喜欢不请自来的客人。"',
  '"我们怎么才能安全通过？"',
  '"去见 Queen。"她说，"让她相信你们没有恶意。"',
  '她带领你们进入蜂巢的内部。'],
  items:['蜂蜡'],chs:[{t:'跟随进入蜂巢',n:'forest_bee_queen'},{t:'趁机会逃走',n:'forest_deep'}]
},
forest_bee_queen:{t:'蜂后',loc:'Forest Zone - 蜂巢内部',zone:'Forest',text:[
  '蜂巢内部是一个错综复杂的六边形迷宫。蜜蜂娘们在各个通道间穿梭。',
  '在蜂巢的最深处，你们见到了 Queen Bee。她比普通蜜蜂娘大三倍，翅膀闪烁着金色的光芒。',
  '"人类。"她的声音低沉而威严，"很少有人能活着到达我这里。你想要什么？"',
  '"只是通过你的领地。"你回答。',
  '"通过？"她笑了，"可以。但你们必须为我的蜂巢做出贡献。蜂蜜、花粉...或者新的蜜蜂娘。"',
  '她的目光在 Kim 身上停留了片刻。'],
  chs:[
  {t:'答应收集蜂蜜',n:'forest_bee_quest'},
  {t:'拒绝并准备战斗',n:'forest_bee_fight'},
  {t:'提出用情报交换',n:'forest_bee_info'}
]},
forest_bee_quest:{t:'蜂蜜任务',loc:'Forest Zone - 蜂巢',zone:'Forest',text:[
  '你们在森林中寻找最珍贵的花蜜。经过几个小时的搜索，你找到了一个隐藏的花谷。',
  '花朵巨大，色彩艳丽。蜜蜂娘们兴奋地在其中飞舞。',
  '你们收集了足够的花蜜带回蜂巢。Queen Bee 非常满意。',
  '"你们可以安全通过了。"她打开了一条通道，"前方就是森林深处。小心 Arachne——她是个难缠的对手。"'],
  eff:{hp:-5,san:10},items:['皇家蜂蜜'],chs:[{t:'前往森林深处',n:'forest_deep'}]
},
forest_bee_fight:{t:'与蜂后战斗',loc:'Forest Zone - 蜂巢',zone:'Forest',text:[
  '战斗在蜂巢内部爆发。蜜蜂娘们从四面八方涌来。',
  '你们奋力战斗，但敌人的数量太多了。',
  '在危急关头，Dominic 点燃了一个蜂蜡火把，烟雾驱散了蜜蜂。',
  '你们趁乱逃出了蜂巢。虽然没有打败 Queen Bee，但至少活着出来了。'],
  eff:{hp:-25,san:-10},chs:[{t:'逃离蜂巢区域',n:'forest_deep'}]
},
forest_bee_info:{t:'情报交易',loc:'Forest Zone - 蜂巢',zone:'Forest',text:[
  '"我知道关于 Robin 的事。"你说，"她不只是打开了门...她本身就是一个钥匙。"',
  'Queen Bee 的表情变了。"继续说。"',
  '"如果你让我们通过，我承诺在到达 Mythic Zone 后会封住通往这里的能量泄漏。"',
  'Queen Bee 沉思了一会儿。"好吧。但如果你说谎...我会亲自找到你。"',
  '她为你们打开了通道。'],
  eff:{san:5},chs:[{t:'通过蜂巢',n:'forest_deep'}]
},
forest_honey_steal:{t:'偷蜂蜜',loc:'Forest Zone - Hive',zone:'Forest',text:[
  '你小心翼翼地接近蜂巢，用容器偷了一些蜂蜜。',
  '但就在你成功的那一刻，一只蜜蜂娘发现了你。',
  '"有小偷！"她尖叫道。',
  '蜂群立刻骚动起来。你们拔腿就跑！',
  '在被蜇了好几下后，你们终于逃出了蜂群的范围。虽然拿到了蜂蜜，但代价不小。'],
  eff:{hp:-10,cor:5},items:['偷来的蜂蜜'],chs:[{t:'继续前进',n:'forest_deep'}]
},
forest_deep:{t:'森林深处',loc:'Forest Zone - 深处',zone:'Forest',text:[
  '越往森林深处走，树木就越奇怪。有些树干上长着人脸般的节疤。',
  '"你们有没有感觉被注视着？"Kim 不安地问。',
  '你没有回答，因为你也感觉到了。那是某种无形的视线。',
  '突然，一道蛛网从天而降，将你们困在其中！',
  '从树上降下一个身影——她有着人类的上半身，但下半身是巨大的蜘蛛身体。',
  '"又一个猎物。"她微笑着，"我是 Arachne。这座森林的女王。"'],
  chs:[
  {t:'战斗',n:'forest_spider_fight'},
  {t:'尝试谈判',n:'forest_spider_talk'}
]},
forest_spider_fight:{t:'蛛后之战',loc:'Forest Zone - Arachne 巢穴',zone:'Forest',text:[
  '你拔出武器，准备战斗。Arachne 发出刺耳的笑声。',
  '"愚蠢的人类！"她喷出蛛丝，将 Dominic 缠住。',
  'Kim 冲上去攻击，但 Arachne 的节肢轻松挡住了她的攻击。',
  '你们陷入了苦战。Arachne 的毒牙在月光下闪烁着寒光。'],
  chs:[
  {t:'继续战斗',n:'forest_spider_continue'},
  {t:'投降',n:'be_a5'}
]},
forest_spider_continue:{t:'苦战',loc:'Forest Zone',zone:'Forest',text:[
  '你们拼尽全力战斗。Kim 用火把烧断了蛛丝，Dominic 挣脱了束缚。',
  '三人合力，你们终于击退了 Arachne。',
  '"咳咳...你们比我想象的强。"Arachne 爬回树上，"前方还有更多危险。祝你们好运..."',
  '她消失在树冠中。'],
  eff:{hp:-15},chs:[{t:'继续前进',n:'forest_exit'}]
},
forest_spider_talk:{t:'与 Arachne 谈判',loc:'Forest Zone - Arachne 巢穴',zone:'Forest',text:[
  '"我们不是来和你战斗的。"你说，"我们只是要穿越这片森林。"',
  'Arachne 歪着头，似乎在思考。',
  '"穿越森林？去 Coastal Zone？"她问。',
  '"是的。"',
  '"好吧。我可以放你们走。"她收回蛛丝，"但我有个条件——帮我清除森林里的 Greenworm。它侵犯了我的领地。"'],
  chs:[
  {t:'接受条件',n:'forest_worm_hunt'},
  {t:'拒绝条件',n:'forest_spider_fight'}
]},
forest_worm_hunt:{t:'Greenworm 狩猎',loc:'Forest Zone',zone:'Forest',text:[
  '你们在森林中找到了 Greenworm——一只巨大的绿色毛虫，足有汽车大小。',
  '战斗比想象的简单。Greenworm 行动迟缓，你们轻松击败了它。',
  'Arachne 信守承诺，为你们打开了通往森林边缘的道路。'],
  eff:{hp:-5},items:['蛛后信物'],chs:[{t:'前往森林边缘',n:'forest_exit'}]
},
forest_exit:{t:'森林边缘',loc:'Forest Zone - 出口',zone:'Forest',text:[
  '你们终于到达了森林的边缘。前方是一片开阔的海岸线。',
  '海风迎面吹来，带来咸湿的气息。蓝天白云，海浪拍打礁石。',
  '"我们做到了。"Kim 笑着说，"我们穿过了森林。"',
  '"这只是一个开始。"Dominic 指着远处，"Coastal Zone 在等着我们。"',
  '你们回头看了一眼森林，然后转身走向海岸。'],
  chs:[{t:'前往 Coastal Zone',n:'coastal_entry'}]
},
forest_fairy:{t:'妖精花丛',loc:'Forest Zone - 妖精花丛',zone:'Forest',text:[
  '你们被那些发光的花朵吸引，走进了一片美丽的空地。',
  '花朵中间坐着一个小小的人形生物——背上有透明的翅膀。',
  '"哦？人类？"她飞起来，好奇地围着你们转，"你们在这里做什么？这是 Fairy Circle。"',
  '"我们在找通过森林的路。"你回答。',
  '"通过森林有很多路。"她笑着说，"但我可以告诉你一条安全的——如果你帮我一个忙。"'],
  chs:[
  {t:'接受妖精的任务',n:'forest_fairy_quest'},
  {t:'不相信妖精',n:'forest_deep'},
  {t:'抓住妖精',n:'be_a10'}
]},
forest_fairy_quest:{t:'妖精的任务',loc:'Forest Zone - 妖精花丛',zone:'Forest',text:[
  '"我需要一种只在月光下开放的月光花。"妖精说，"在森林北边的蘑菇圈里。"',
  '你们前往蘑菇圈。巨大的蘑菇像小房子一样耸立。',
  '在最大的蘑菇下面，你们找到了发着银光的月光花。',
  '当你们把花交给妖精时，她开心地笑了。',
  '"谢谢！作为回报——这条路通往森林边缘。"她指向一条几乎看不见的小径。'],
  items:['月光花'],chs:[{t:'走妖精的小径',n:'forest_fairy_path'},{t:'还是走大路',n:'forest_deep'}]
},
forest_fairy_path:{t:'妖精小径',loc:'Forest Zone - 妖精小径',zone:'Forest',text:[
  '妖精的小径蜿蜒穿过森林。路旁不时出现小小的发光蘑菇。',
  '这条路上没有遇到任何危险——仿佛整个森林都在为你们让路。',
  '小径的尽头直接通向森林边缘。你们几乎不敢相信自己的运气。'],
  eff:{san:10},chs:[{t:'走出森林',n:'forest_exit'}]
},
forest_glade:{t:'森林空地',loc:'Forest Zone - 空地',zone:'Forest',text:[
  '你们来到一片美丽的林间空地。阳光透过树冠洒下斑驳的光影。',
  '空地中央有一个小池塘，水质清澈见底。',
  '"这是个休息的好地方。"Kim 说，"你们不觉得吗？"',
  '但 Dominic 注意到池塘边有一些脚印——不是人类的。'],
  chs:[
  {t:'在池塘边休息',n:'forest_pond'},
  {t:'追踪脚印',n:'forest_cabin'},
  {t:'继续赶路',n:'forest_deep'}
]},
forest_pond:{t:'森林池塘',loc:'Forest Zone - 池塘',zone:'Forest',text:[
  '你们在池塘边喝水休息。水很甜，带着一丝矿物质的味道。',
  '但正在这时，池塘的水面开始冒泡。一个身影从水底升起。',
  '那是一个有着鱼尾和人类上半身的生物——但她不是美人鱼。她的鳞片是淡绿色的，眼睛像青蛙一样突出。',
  '"这是...我的池塘。"她咕哝着说。'],
  chs:[
  {t:'道歉并离开',n:'forest_deep'},
  {t:'与她交谈',n:'forest_pond_talk'},
  {t:'攻击她',n:'be_a10'}
]},
forest_pond_talk:{t:'池塘对话',loc:'Forest Zone - 池塘',zone:'Forest',text:[
  '"抱歉，我们不知道这是你的池塘。"你说。',
  '她眨了眨突出的眼睛。"很少有人类会道歉。"',
  '"我们能通过这里去海岸吗？"',
  '"可以。"她指向东北方，"那边有一条路。但小心——那里有一只大蜘蛛。Arachne。她很危险。"',
  '你感谢了她的指引。她潜回水中，消失在池塘深处。'],
  chs:[{t:'前往东北方',n:'forest_spider_talk'},{t:'换个方向',n:'forest_deep'}]
},
forest_cabin:{t:'废弃小屋',loc:'Forest Zone - 废弃小屋',zone:'Forest',text:[
  '你们追踪脚印来到了一座破旧的小屋。屋顶塌了一半，门歪斜着。',
  '里面似乎有人居住——有新鲜的灰烬和食物残渣。',
  '"有人在这里生活。"Dominic 检查了灰烬，"是今天早上的火。"',
  '你们搜查小屋，找到了一些有用的物品。角落里放着一把生锈的剑和一瓶药水。',
  '"这可能是前一个冒险者留下的。"Kim 说着拿起药瓶闻了闻，"治疗药水，还能用。"'],
  items:['生锈的铁剑','治疗药水'],chs:[
  {t:'继续深入森林',n:'forest_deep'},
  {t:'探索小屋地下室',n:'forest_cellar'}
]},
forest_cellar:{t:'小屋地下室',loc:'Forest Zone - 废弃小屋地下室',zone:'Forest',text:[
  '你们发现小屋地板下有一个暗门。打开后露出一段向下的阶梯。',
  '地下室阴暗潮湿，角落里放着一些破旧的箱子。',
  '打开箱子后，你们发现了一些古老的文献和地图。',
  '"这些都是关于 Monline 世界的记录。"Dominic 兴奋地说，"有人曾经研究过这里的转化机制。"',
  '在一本笔记中，你们读到："起源能量源于 Mythic Zone 的核心。Robin 是钥匙，也是门。"'],
  items:['古老文献'],chs:[{t:'带上文献离开',n:'forest_deep'}]
},
forest_north:{t:'森林北路',loc:'Forest Zone - 北部',zone:'Forest',text:[
  '你们沿着森林的北部边缘前进。这里的树木更加古老，树干上覆盖着厚厚的青苔。',
  '空气变得更加潮湿。远处传来流水声。',
  '"前方有一条河。"Dominic 指着地图，"过了那条河应该就快到森林边缘了。"',
  '但当你们到达河边时，发现桥已经断了。',
  '河水中有什么东西在游动——银色的鳞片在阳光下闪烁。'],
  chs:[
  {t:'尝试修桥',n:'forest_bridge'},
  {t:'沿着河流走',n:'forest_river'},
  {t:'游泳过河',n:'forest_swim'}
]},
forest_bridge:{t:'修桥',loc:'Forest Zone - 断桥',zone:'Forest',text:[
  '你们花了半个小时修理断桥。用藤蔓和木材重新加固。',
  '在修桥的过程中，你们注意到河中的生物——那是几条水蛇娘。她们好奇地看着你们工作。',
  '"她们没有攻击我们。"Kim 说。',
  '"也许她们也对人类感兴趣。"Dominic 回答。',
  '桥修好后，你们安全地过了河。'],
  eff:{hp:-5,dom:5},chs:[{t:'继续前进',n:'forest_south'}]
},
forest_river:{t:'沿河而行',loc:'Forest Zone - 河岸',zone:'Forest',text:[
  '你们沿着河岸向下游走去。河水清澈，能看到河底的鹅卵石。',
  '走了大约一公里后，你们发现了一个小瀑布。',
  '瀑布后面似乎有一个洞穴入口。',
  '"一个隐藏的洞穴。"Kim 兴奋地说，"也许里面有有用的东西。"'],
  chs:[
  {t:'探索瀑布洞穴',n:'forest_cave'},
  {t:'继续沿河走',n:'forest_south'}
]},
forest_cave:{t:'瀑布洞穴',loc:'Forest Zone - 瀑布洞穴',zone:'Forest',text:[
  '你们穿过瀑布的水帘，进入了洞穴内部。',
  '洞穴出乎意料地宽敞。洞壁上镶嵌着发光的矿石，照亮了整个空间。',
  '在洞穴深处，你们发现了一个小型祭坛。祭坛上放着一个发光的蓝色宝石。',
  '"这看起来是某种能量结晶。"Dominic 小心翼翼地拿起宝石。',
  '当你们离开洞穴时，发现外面已经天黑了。月光洒在河面上，美得不真实。'],
  items:['能量水晶'],chs:[{t:'在洞穴过夜',n:'forest_cave_rest'},{t:'趁月光赶路',n:'forest_south'}]
},
forest_cave_rest:{t:'洞穴休息',loc:'Forest Zone - 瀑布洞穴',zone:'Forest',text:[
  '你们在洞穴里过了一夜。篝火的温暖让你们睡得很好。',
  '第二天早晨，你们被鸟鸣声唤醒。',
  '走出洞穴时，你们发现洞口附近有一些足迹——像是大型犬科动物的。',
  '"狼人？"Kim 担忧地说。',
  '"或许是森林中的其他居民。"Dominic 说，"我们最好尽快离开这里。"'],
  eff:{hp:20,san:20},chs:[{t:'继续旅程',n:'forest_south'}]
},
forest_swim:{t:'游泳过河',loc:'Forest Zone - 河流',zone:'Forest',text:[
  '你决定游泳过河。河水比看起来冷得多。',
  '游到河中央时，你感到有东西碰到了你的腿。',
  '你低头一看——一条水蛇娘正缠绕着你的脚踝。',
  '"别动。"Kim 低声说，"不要激怒她。"',
  '你保持不动。水蛇娘绕着你游了一圈，然后放开了你。她似乎只是好奇。',
  '你们安全地游到了对岸。'],
  eff:{hp:-10,cor:5},chs:[{t:'继续前进',n:'forest_south'}]
},
forest_south:{t:'森林南路',loc:'Forest Zone - 南部',zone:'Forest',text:[
  '你们来到了森林的南部区域。这里的树木更加稀疏，阳光更多地洒在地面上。',
  '地面上长满了野花和浆果。看起来比森林其他地方安全得多。',
  '"也许我们快到了。"Kim 说。',
  '但 Dominic 发现了一些不寻常的迹象——地面上有拖拽的痕迹，像是某种大型生物经过。',
  '痕迹通向一片茂密的灌木丛。你们能听到灌木丛中传来低沉的呼吸声。'],
  chs:[
  {t:'调查灌木丛',n:'forest_guardian'},
  {t:'绕道而行',n:'forest_exit'}
]},
forest_guardian:{t:'森林守护者',loc:'Forest Zone - 守护者之地',zone:'Forest',text:[
  '你们拨开灌木，发现了一个巨大的生物——她有着鹿的上半身和人的下半身，或者说...半人半鹿。',
  '她的鹿角像树枝一样分叉，绿色的眼睛充满了智慧。',
  '"我是这片森林的守护者。"她的声音低沉而温柔，"你们通过了重重考验才来到这里。"',
  '"考验？"你疑惑地问。',
  '"从踏入森林的那一刻起，你们就在接受考验。"守护者说，"你们的选择决定了你们的命运。"',
  '"那么...我们通过了吗？"Kim 问。',
  '守护者微笑了。"你们保持了自己的意志和善良。这比什么都重要。"'],
  chs:[
  {t:'向守护者请教',n:'forest_guardian_advice'},
  {t:'询问 Robin 的事',n:'forest_guardian_robin'},
  {t:'请求帮助离开森林',n:'forest_guardian_exit'}
]},
forest_guardian_advice:{t:'守护者的建议',loc:'Forest Zone - 守护者之地',zone:'Forest',text:[
  '"Monline 世界是一面镜子。"守护者说，"它映照出每个人内心的渴望和恐惧。"',
  '"那些被转化的人，是因为他们的内心被某种欲望吞噬了。"',
  '"保持你们的内心坚定。不要被腐化。"她看着你说，"腐化值是一条危险的路径。"',
  '"前往海岸后，你们会遇到更多诱惑。Siren 的歌声、Mermaid 的美丽...它们都在试图动摇你们。"',
  '她给了你们一片金色的叶子。"带上它。在你们最需要的时候，它会指引方向。"'],
  eff:{san:15},items:['金色树叶'],chs:[{t:'告别守护者',n:'forest_guardian_exit'}]
},
forest_guardian_robin:{t:'关于 Robin',loc:'Forest Zone - 守护者之地',zone:'Forest',text:[
  '"Robin..."守护者的眼神变得悲伤，"她是我的孩子。或者说，曾经是。"',
  '"她怎么了？"Kim 问。',
  '"她太孤独了。Monline 世界是她创造的避风港——但她用错了方法。"',
  '"她不是坏人。"守护者说，"她只是一个需要被理解的孩子。"',
  '"但她的行为正在毁灭两个世界。"Dominic 严肃地说。',
  '"是的。"守护者低下头，"所以请...阻止她。但不要伤害她。"'],
  eff:{san:10,kim:5,dom:5},chs:[{t:'告别守护者',n:'forest_guardian_exit'}]
},
forest_guardian_exit:{t:'森林出口',loc:'Forest Zone - 守护者之地',zone:'Forest',text:[
  '守护者为你们打开了一条通往森林边缘的道路。',
  '"走吧。Coastal Zone 在等着你们。"她微笑着说，"记住——保持本心。"',
  '你们感激地向她告别，然后踏上了新的旅程。',
  '森林在你们身后渐渐远去，前方是广阔的大海和未知的冒险。'],
  eff:{san:10},chs:[{t:'前往海岸',n:'coastal_entry'}]
},

// ===== COASTAL ZONE =====
coastal_entry:{t:'海岸入口',loc:'Coastal Zone - 海滩',zone:'Coastal',text:[
  '你们踏上了金色的沙滩。海洋在阳光下闪闪发光。',
  '"这看起来像个度假胜地。"Kim 说。',
  '"直到你看到海里的东西。"Dominic 指向海面——一群鱼尾人身的生物正在远处游弋。',
  '"Mermaid。"他解释道，"她们美丽的歌声会引诱水手跳海。"',
  '海滩上还有一个小镇——Eurum City。也许是获取补给和情报的好去处。'],
  chs:[
  {t:'前往 Eurum City',n:'coastal_city'},
  {t:'沿着海岸线走',n:'coastal_shore'},
  {t:'尝试与 Mermaid 交流',n:'coastal_mermaid'}
]},
coastal_city:{t:'Eurum City',loc:'Coastal Zone - Eurum City',zone:'Coastal',text:[
  'Eurum City 是一座古老的海港城市。建筑充满地中海风格，但街头空无一人。',
  '"所有人都去哪了？"Kim 问。',
  '"被转化了。"Dominic 指着街角——一个曾经的渔夫坐在那里，下半身已经变成了章鱼触手。',
  '他转过头来，用迷茫的眼神看着你们。',
  '"船...我的船..."他喃喃自语。',
  '你们继续深入城市。在市中心广场上，你们发现了一个公告板。'],
  chs:[
  {t:'查看公告板',n:'coastal_board'},
  {t:'搜索港口',n:'coastal_port'},
  {t:'探索城市建筑',n:'coastal_explore'}
]},
coastal_board:{t:'公告板',loc:'Coastal Zone - Eurum City',zone:'Coastal',text:[
  '公告板上贴满了寻人启事和警告。',
  '"小心海里的歌声——她已经带走了我的丈夫。"',
  '"如果你看到我的女儿——她有一头红发和一条美人鱼的尾巴——请告诉她妈妈爱她。"',
  '这些纸条让人心碎。每一张都代表一个被 Monline 世界吞噬的家庭。',
  '在最下面，有一张较新的纸条：',
  '"通往 Demon Zone 的传送门在灯塔附近。想去的人请小心。——Nerissa"'],
  chs:[
  {t:'去灯塔',n:'coastal_lighthouse'},
  {t:'去港口找船',n:'coastal_port'}
]},
coastal_explore:{t:'探索城市',loc:'Coastal Zone - Eurum City',zone:'Coastal',text:[
  '你们探索了 Eurum 城的建筑。大多数房屋都空着，有些保持着人们匆忙离开时的样子。',
  '在一座教堂里，你们发现了一个避难所——几个幸存者躲藏在这里。',
  '"你们也是人类？"一个老妇人惊讶地问，"天哪，我们以为已经没有人类幸存了。"',
  '她告诉你们关于海岸区域的信息——哪里安全，哪里危险。',
  '"灯塔那里有一个传送门。"她说，"但守护者是 Scylla——一个六头海妖。你们需要特殊的方法才能通过。"'],
  eff:{san:10},chs:[
  {t:'前往灯塔',n:'coastal_lighthouse'},
  {t:'去港口',n:'coastal_port'}
]},
coastal_port:{t:'港口',loc:'Coastal Zone - 港口',zone:'Coastal',text:[
  '港口停泊着几艘船。其中一艘看起来还能用。',
  '一个老人坐在码头上钓鱼。他的鱼线通向海中，但没有鱼饵。',
  '"你们想要船？"他没有回头就问，"海上有 Kraken。还有 Siren。还有不知名的东西。"',
  '"但我们没有其他选择。"你说。',
  '老人叹了口气，指向一艘小船："那艘海猫号是我的船。如果你能活着回来...再还给我。"'],
  items:['海猫号'],chs:[
  {t:'出航',n:'coastal_sea'},
  {t:'先探索海岸',n:'coastal_shore'},
  {t:'问问老人更多信息',n:'coastal_fisherman'}
]},
coastal_fisherman:{t:'渔夫的故事',loc:'Coastal Zone - 港口',zone:'Coastal',text:[
  '老人点了一根烟。"这片海...三年前还不是这样的。"',
  '"三年前？"',
  '"对。那时候 Robin 还没打开那扇门。海里有鱼，有海豚，有正常的海鸥。"',
  '"现在海里都是什么？"Kim 问。',
  '"美人鱼、塞壬、海妖...还有更糟的东西。"老人深深吸了一口烟，"但最可怕的不是它们。"',
  '"是什么？"',
  '"是孤独。"老人看着远方，"那些怪物娘...她们其实都是人类变的。她们还记得自己是人，但她们已经回不去了。"'],
  eff:{san:-5},chs:[
  {t:'驾船出海',n:'coastal_sea'},
  {t:'沿着海岸探索',n:'coastal_shore'}
]},
coastal_shore:{t:'海岸线',loc:'Coastal Zone - 海岸线',zone:'Coastal',text:[
  '你们沿着金色的沙滩行走。海浪轻轻拍打着海岸。',
  '沙滩上散布着各种被冲上来的东西——贝壳、海星、破碎的木板...还有一只搁浅的水母娘。',
  '她有着半透明的水母伞盖和人类的上半身。看到你们时，她虚弱地伸出触手。',
  '"水...请给我水..."她低声说。'],
  chs:[
  {t:'帮助水母娘',n:'coastal_jellyfish'},
  {t:'忽略她继续走',n:'coastal_town'},
  {t:'攻击她',n:'be_b3'}
]},
coastal_jellyfish:{t:'水母娘',loc:'Coastal Zone - 海滩',zone:'Coastal',text:[
  '你把水壶里的水倒在水母娘身上。她的伞盖恢复了光泽。',
  '"谢谢..."她挣扎着坐起来，"我被海浪冲上来了。我叫 Marina。"',
  '"你怎么会在这里？"',
  '"我在逃避 Siren 的追捕。"她低声说，"Siren 是这片海域的统治者。她用歌声控制所有海洋生物。"',
  '"也包括美人鱼？"',
  '"是的。除非你找到能抵抗歌声的方法——比如灯塔中的古老号角。"'],
  items:['Marina 的珍珠'],chs:[
  {t:'前往灯塔',n:'coastal_lighthouse'},
  {t:'带 Marina 一起走',n:'coastal_jellyfish_together'}
]},
coastal_jellyfish_together:{t:'与水母娘同行',loc:'Coastal Zone - 海滩',zone:'Coastal',text:[
  'Marina 感激地跟着你们。她可以用触手感知海流，帮助你们避开危险。',
  '"我知道一个安全的路线。"她说，"沿着礁石走，可以绕过 Siren 的领地。"',
  '但她也警告："那条路经过 Kraken 的巢穴。Kraken 正在沉睡，只要我们安静通过就没事。"'],
  eff:{dom:5},chs:[
  {t:'走安全路线',n:'coastal_reef'},
  {t:'还是走海路',n:'coastal_sea'}
]},
coastal_town:{t:'渔村',loc:'Coastal Zone - 渔村',zone:'Coastal',text:[
  '你们沿着海岸线走到了一个小渔村。',
  '村子里似乎还有人居住。几栋房子的烟囱冒着烟。',
  '一个中年妇女在院子里晒鱼干。看到你们时，她惊讶地放下手中的活。',
  '"人类？活的人类？"她跑过来，"天哪，我以为我是这片海岸最后的人类了！"',
  '她叫 Elena，是渔村里唯一的幸存者。其他人要么逃走了，要么已经被转化了。'],
  chs:[
  {t:'向 Elena 打听消息',n:'coastal_village_info'},
  {t:'请求住宿',n:'coastal_village_rest'}
]},
coastal_village_info:{t:'渔村情报',loc:'Coastal Zone - 渔村',zone:'Coastal',text:[
  'Elena 给你们倒了一些热汤。',
  '"这片海域最危险的是 Siren。"她说，"她的歌声可以让你忘记一切，只想跳进海里。"',
  '"只有两种方法可以抵抗——一是用灯塔里的古老号角吹出反制声波，二是找到传说中的塞壬之石。"',
  '"灯塔在悬崖上，但那里被 Scylla 守护着。"',
  '"Scylla？"',
  '"对。六头海妖。她原本是人，被 Robin 变成了怪物。"Elena 叹了口气，"真是讽刺。"'],
  eff:{san:10},items:['热汤'],chs:[
  {t:'前往灯塔',n:'coastal_lighthouse'},
  {t:'寻找塞壬之石',n:'coastal_temple'}
]},
coastal_village_rest:{t:'渔村休息',loc:'Coastal Zone - 渔村',zone:'Coastal',text:[
  'Elena 为你们安排了住宿。虽然条件简陋，但至少有温暖的床和热饭。',
  '晚上，你们听到远处海面上传来悠扬的歌声——那是 Siren 在唱歌。',
  '歌声很美，但带着一种诡异的诱惑力。Kim 差点走出去，被 Dominic 拉住了。',
  '"堵住耳朵。"Dominic 警告说。',
  '你们在歌声中度过了一个不安的夜晚。'],
  eff:{hp:20,san:5},chs:[
  {t:'前往灯塔',n:'coastal_lighthouse'},
  {t:'去海神殿',n:'coastal_temple'}
]},
coastal_lighthouse:{t:'灯塔',loc:'Coastal Zone - 灯塔',zone:'Coastal',text:[
  '你们来到了悬崖上的灯塔。这是一座古老的石塔，有三十米高。',
  '但通往灯塔的路被一只巨大的生物挡住了——她有六个脖子，每个脖子上长着不同的头。',
  '"Scylla..."Dominic 低声说。',
  'Scylla 的六个头同时转向你们。每张脸上都带着不同的表情——愤怒、悲伤、好奇、饥饿、渴望、疯狂。',
  '"又来了...人类。"中间的头说，"你们想要通过？"',
  '"是的。"你回答。'],
  chs:[
  {t:'与 Scylla 战斗',n:'coastal_scylla_fight'},
  {t:'尝试与 Scylla 对话',n:'coastal_scylla_talk'},
  {t:'偷偷绕过',n:'coastal_scylla_sneak'}
]},
coastal_scylla_talk:{t:'与 Scylla 对话',loc:'Coastal Zone - 灯塔',zone:'Coastal',text:[
  '"我们不想战斗。"你说，"我们只是想去灯塔。"',
  'Scylla 的六个头互相看了看。',
  '"灯塔？"左边的头说，"那里有什么？"',
  '"古老的号角。"Dominic 回答，"用来对抗 Siren 的歌声。"',
  '"Siren..."右边的头发出悲伤的声音，"我曾经也是她的受害者。"',
  '中间的头说："我可以让你们过去。但你们要答应我——找到打败 Robin 的方法。我不要永远做怪物。"'],
  chs:[
  {t:'答应 Scylla',n:'coastal_lighthouse_enter'},
  {t:'不承诺，强行通过',n:'coastal_scylla_fight'}
]},
coastal_scylla_fight:{t:'与 Scylla 战斗',loc:'Coastal Zone - 灯塔',zone:'Coastal',text:[
  '战斗非常艰难。Scylla 的六个头可以独立攻击，从各个方向发动进攻。',
  '你们拼尽全力才勉强击退了她。',
  '"够了..."Scylla 退后，"你们很强。过去吧。"',
  '她让开了通往灯塔的路。你们气喘吁吁地走进了灯塔。'],
  eff:{hp:-30},chs:[{t:'进入灯塔',n:'coastal_lighthouse_enter'}]
},
coastal_scylla_sneak:{t:'潜行绕过',loc:'Coastal Zone - 灯塔',zone:'Coastal',text:[
  '你们试图趁 Scylla 不注意时溜过去。',
  '但她的六个头从不同方向观察着四周，根本没有死角。',
  '"想偷偷过去？"一只头冷笑着说。',
  '被发现后，你们别无选择——只能战斗或谈判。'],
  chs:[
  {t:'战斗',n:'coastal_scylla_fight'},
  {t:'谈判',n:'coastal_scylla_talk'}
]},
coastal_lighthouse_enter:{t:'灯塔内部',loc:'Coastal Zone - 灯塔内部',zone:'Coastal',text:[
  '你们进入了灯塔。螺旋楼梯通向顶端。',
  '灯塔内部布满了灰尘和蜘蛛网。显然已经很久没有人来过了。',
  '在塔顶，你们找到了一个巨大的号角——金色的，刻满了古老的符文。',
  '"这就是古老号角。"Dominic 激动地说，"它的声音可以驱散 Siren 的魔法。"',
  '但当你们拿起号角时，一个声音从背后传来。',
  '"那是我的。"'],
  chs:[
  {t:'转身面对说话者',n:'coastal_lighthouse_guardian'},
  {t:'不管三七二十一逃离',n:'coastal_escape'}
]},
coastal_lighthouse_guardian:{t:'灯塔守护者',loc:'Coastal Zone - 灯塔顶部',zone:'Coastal',text:[
  '你们转过身——那是一个穿着长袍的女性。她的眼睛是海蓝色的，皮肤上覆盖着细小的鳞片。',
  '"我是 Nerissa。"她说，"灯塔的守护者。"',
  '"你也是被转化的人类？"Kim 问。',
  '"不。我是自愿成为守护者的。"Nerissa 说，"为了阻止 Siren 的歌声扩散到内陆。"',
  '"我们需要号角来对抗 Siren。"你说。',
  '"我知道。"Nerissa 点头，"但号角需要力量的代价。吹响它的人会失去一部分生命力。"',
  '她看着你们："你们愿意付出这个代价吗？"'],
  chs:[
  {t:'愿意付出代价',n:'coastal_horn_take'},
  {t:'寻找其他方法',n:'coastal_temple'}
]},
coastal_horn_take:{t:'获得号角',loc:'Coastal Zone - 灯塔顶部',zone:'Coastal',text:[
  '你接过号角。它比你想象的重得多。',
  'Nerissa 教了你吹奏的方法。当你吹响号角时，低沉而洪亮的声音传遍了大海。',
  '远处的海面上，Siren 的歌声戛然而止。',
  '"有效了！"Kim 欢呼道。',
  '但你感到一阵虚弱——正如 Nerissa 所说，号角消耗了你的生命力。',
  '"现在你可以安全出海了。"Nerissa 微笑着说。'],
  eff:{hp:-15},items:['古老号角'],chs:[
  {t:'出海',n:'coastal_sea'},
  {t:'先调整一下再出发',n:'coastal_village_rest'}
]},
coastal_mermaid:{t:'与美人鱼相遇',loc:'Coastal Zone - 美人鱼礁石',zone:'Coastal',text:[
  '你们走向美人鱼出没的礁石区域。',
  '几条美人鱼正在礁石上休息。她们有着五彩斑斓的鱼尾和美丽的上半身。',
  '看到你们时，她们没有逃跑，反而好奇地靠近。',
  '"人类..."一条红发的美人鱼说，"你们不怕我们吗？"',
  '"我们为什么要怕？"你反问。',
  '"因为我们会唱歌。"她笑着说，"我们的歌声会让你们永远留在海里。"',
  '但她的笑容带着苦涩。"不过，我们其实也不想这样。这是诅咒——Robin 的诅咒。"'],
  chs:[
  {t:'询问美人鱼诅咒',n:'coastal_mermaid_curse'},
  {t:'请求她们帮助出海',n:'coastal_mermaid_help'},
  {t:'保持距离离开',n:'coastal_shore'}
]},
coastal_mermaid_curse:{t:'美人鱼的诅咒',loc:'Coastal Zone - 美人鱼礁石',zone:'Coastal',text:[
  '"Robin 的诅咒让我们无法离开这片海域。"红发美人鱼说，"我们被束缚在这里。"',
  '"我的名字叫 Coral。我曾经是一名海洋生物学家。"',
  '"现在你变成了自己研究的对象。"Dominic 说。',
  'Coral 苦笑。"是的。讽刺吧。"',
  '"如果你能拿到海神殿中的三叉戟，就能暂时解除诅咒。"她说，"这样我们就可以帮你们穿越这片海。"'],
  chs:[
  {t:'前往海神殿',n:'coastal_temple'},
  {t:'抱歉，我们得走了',n:'coastal_sea'}
]},
coastal_mermaid_help:{t:'美人鱼的帮助',loc:'Coastal Zone - 美人鱼礁石',zone:'Coastal',text:[
  '"你们想出海？"Coral 问，"但你们没有船吧？"',
  '"我们有海猫号。"你说。',
  '"那条老船..."Coral 说，"它需要一个好舵手。我可以帮你们指引方向——避开暗礁和漩涡。"',
  '她送给你们一个海螺。"吹响它，我就会来帮你们。"'],
  items:['美人鱼海螺'],chs:[{t:'出海',n:'coastal_sea'}]
},
coastal_temple:{t:'海神殿',loc:'Coastal Zone - 海神殿',zone:'Coastal',text:[
  '你们找到了海神殿——一座建在悬崖上的古老白色大理石建筑。',
  '殿前的柱子上刻满了海洋生物的浮雕。',
  '神殿内部有一个巨大的水池，水池中央矗立着一座三叉戟的雕塑。',
  '"那应该就是传说中的三叉戟。" Dominoc 指着雕塑说。',
  '但水池中有什么东西在游动——巨大的阴影在水面下盘旋。'],
  chs:[
  {t:'进入水池拿三叉戟',n:'coastal_temple_enter'},
  {t:'寻找其他入口',n:'coastal_temple_side'},
  {t:'离开',n:'coastal_shore'}
]},
coastal_temple_enter:{t:'神殿试炼',loc:'Coastal Zone - 海神殿',zone:'Coastal',text:[
  '你跳入水池。冷水让你打了个激灵。',
  '水下的生物向你们游来——那是一只巨大的海蛇，足有十米长。',
  '但海蛇没有攻击你们。它在你们身边绕了一圈，然后游向三叉戟。',
  '它用头指了指三叉戟，似乎在说"拿吧"。',
  '你小心翼翼地游过去，拔起了三叉戟。',
  '当三叉戟被拔出的那一刻，整个神殿震动了一下。你感到一股强大的力量涌入体内。'],
  items:['海神三叉戟'],chs:[{t:'离开神殿',n:'coastal_mermaid_curse'}]
},
coastal_temple_side:{t:'侧门',loc:'Coastal Zone - 海神殿',zone:'Coastal',text:[
  '你们找到了一个侧门，通往神殿的地下室。',
  '地下室里堆满了贡品和古老的器物。',
  '在一个石台上，你们发现了一个贝壳盒子。打开后，里面是一颗发光的蓝色珍珠。',
  '"Selene 之泪。"Dominic 认出它来，"传说这是月神滴落的眼泪，可以治愈一切诅咒。"'],
  items:['Selene 之泪'],chs:[{t:'返回神殿大厅',n:'coastal_temple_enter'}]
},
coastal_sea:{t:'出海',loc:'Coastal Zone - 海面',zone:'Coastal',text:[
  '你们驾驶着海猫号出海。海面平静，海风吹拂。',
  '但你们知道这只是暴风雨前的宁静。',
  '远处的海面上，你们看到了一个巨大的漩涡。在漩涡的中心，一张巨大的脸正在注视着你们——那是 Charybdis。',
  '与此同时，从船舷另一侧，数个触手升出水面——那是 Kraken。'],
  chs:[
  {t:'转向避开漩涡',n:'coastal_escape'},
  {t:'准备战斗',n:'coastal_fight'},
  {t:'吹响美人鱼海螺',n:'coastal_mermaid_help_sea'},
  {t:'吹响古老号角',n:'coastal_horn_sea'}
]},
coastal_mermaid_help_sea:{t:'美人鱼助航',loc:'Coastal Zone - 海面',zone:'Coastal',text:[
  '你吹响了海螺。片刻后，Coral 带着几条美人鱼从水中跃出。',
  '"你们遇到麻烦了！"她说，"Charybdis 在前方，Kraken 在右边！"',
  '"我们该往哪走？"Kim 焦急地问。',
  '"跟我来！"Coral 在前面引路，"我知道一条安全的通道！"',
  '你们跟着美人鱼，在礁石和漩涡之间灵活穿行。最终安全地离开了危险区域。'],
  eff:{dom:5},chs:[{t:'向美人鱼道谢',n:'coastal_reef'}]
},
coastal_horn_sea:{t:'号角退敌',loc:'Coastal Zone - 海面',zone:'Coastal',text:[
  '你吹响了古老号角。低沉的声音在海面上回荡。',
  'Kraken 的触手退缩了——它不喜欢号角的声音。',
  'Charybdis 的漩涡也变小了一些。',
  '趁着海怪们被号角震慑的时机，你们加速驶过了危险区域。'],
  eff:{hp:-10},chs:[{t:'继续航行',n:'coastal_reef'}]
},
coastal_escape:{t:'躲避漩涡',loc:'Coastal Zone - 海面',zone:'Coastal',text:[
  '你们奋力划桨，试图避开 Charybdis 的漩涡。',
  '但海流的力量太强了。海猫号被漩涡的边缘卷住，开始打转。',
  '就在危急关头，Dominic 扔下一个锚，卡住了船身。',
  '你们用尽全力划桨，终于挣脱了漩涡的吸力。'],
  eff:{hp:-15,dom:10},chs:[{t:'继续航行',n:'coastal_reef'}]
},
coastal_fight:{t:'与 Kraken 战斗',loc:'Coastal Zone - 海面',zone:'Coastal',text:[
  'Kraken 的触手从四面八方袭来。你们用剑和火把战斗。',
  '这是一场艰苦卓绝的海战。海洋被染成了墨色——那是 Kraken 的血液。',
  '最终，你们砍断了最后一根触手。Kraken 发出了愤怒的咆哮，然后沉入海底。',
  '胜利让你们筋疲力尽，但你们活了下来。'],
  eff:{hp:-25,san:-10},items:['Kraken 的触手'],chs:[{t:'继续航行',n:'coastal_reef'}]
},
coastal_reef:{t:'珊瑚礁',loc:'Coastal Zone - 珊瑚礁',zone:'Coastal',text:[
  '你们来到了一个美丽的珊瑚礁区域。海水清澈见底，色彩斑斓的珊瑚和鱼群构成了一幅绝美的画面。',
  '但这里也有危险——一条巨大的海蛇正在礁石间游动。',
  '幸运的是，海蛇对你们不感兴趣，它只是懒洋洋地从船底游过。',
  '在礁石的中央，你们看到了一座小岛——岛上有一座废弃的灯塔。'],
  chs:[
  {t:'上岛探索',n:'coastal_island'},
  {t:'继续前进',n:'coastal_exit'}
]},
coastal_island:{t:'神秘小岛',loc:'Coastal Zone - 神秘小岛',zone:'Coastal',text:[
  '你们登上了小岛。岛上的植物茂盛，但看起来已经荒废多年。',
  '在岛中央，你们发现了一个被遗忘的祭坛。祭坛上放着一本古老的书籍。',
  '"《海洋之歌》——记录了所有海洋生物的语言。"Dominic 翻了几页，"这太珍贵了。"',
  '正当你们准备离开时，沙滩上出现了几个身影——那是几个海盗娘。她们用弯刀指着你们。',
  '"这座岛是我们的。"领头的一个说。'],
  chs:[
  {t:'与海盗娘谈判',n:'coastal_pirate_talk'},
  {t:'战斗',n:'coastal_pirate_fight'},
  {t:'用宝物交换自由',n:'coastal_pirate_bribe'}
]},
coastal_pirate_talk:{t:'海盗谈判',loc:'Coastal Zone - 神秘小岛',zone:'Coastal',text:[
  '"我们没有恶意。"你举起双手，"我们只是路过。"',
  '"路过？"海盗头目笑了，"这座岛不是路。它是我们的家。"',
  '"我们马上就走。"你说。',
  '"走可以。"她打量着你们，"但要留下买路财——或者帮我们做一件事。"',
  '"什么事？"',
  '"帮我们找到 Captain Silver 的宝藏。据说他把自己变成了怪物娘，藏在了某个洞穴里。"'],
  chs:[
  {t:'答应帮忙找宝藏',n:'coastal_pirate_quest'},
  {t:'拒绝，支付买路财',n:'coastal_pirate_bribe'}
]},
coastal_pirate_fight:{t:'与海盗战斗',loc:'Coastal Zone - 神秘小岛',zone:'Coastal',text:[
  '你们与海盗娘展开战斗。她们虽然看起来轻浮，但战斗起来非常凶猛。',
  '经过一番激战，你们击败了海盗们。她们抱头鼠窜地逃走了。',
  '"呼..."Kim 擦了擦汗，"这里的人怎么都这么能打？"'],
  eff:{hp:-20},items:['海盗弯刀'],chs:[{t:'离开小岛',n:'coastal_exit'}]
},
coastal_pirate_bribe:{t:'买路钱',loc:'Coastal Zone - 神秘小岛',zone:'Coastal',text:[
  '你把身上的一些值钱物品交给了海盗娘。',
  '她检查了一下，满意地点了点头。"行。你们可以从这里安全离开。"',
  '但就在你们准备走时，一个海盗娘发现了你的古老号角。',
  '"那个号角...给我看看。"'],
  chs:[
  {t:'给她看号角',n:'coastal_pirate_horn'},
  {t:'拒绝，准备战斗',n:'coastal_pirate_fight'}
]},
coastal_pirate_horn:{t:'号角的秘密',loc:'Coastal Zone - 神秘小岛',zone:'Coastal',text:[
  '你给海盗头目看了号角。她仔细端详了很久。',
  '"这是古老的号角。"她惊讶地说，"我爷爷曾经讲过它的故事。它能控制海洋。"',
  '"我们知道。我们用它来对抗 Siren。"',
  '"对抗 Siren？"她的表情变得严肃，"那你们需要更多帮助。"',
  '她吹了一个口哨。几只海豚从海中跃出。',
  '"它们会为你们导航。"她说，"海豚不会被 Siren 的歌声影响。"'],
  items:['海豚向导'],chs:[{t:'离开小岛',n:'coastal_exit'}]
},
coastal_pirate_quest:{t:'海盗任务',loc:'Coastal Zone - 海盗洞穴',zone:'Coastal',text:[
  '你们在海盗娘的带领下来到了一个隐藏的洞穴。',
  '洞穴深处堆满了金银财宝——但中央坐着一个穿着船长服的女人。她的左手是一只钩子，右腿是一根木棍。',
  '"Captain Silver？"海盗头目惊讶地问。',
  '"正是我。"船长笑着说，"我等你很久了。"',
  '"你已经..."',
  '"对。我被转化了——但我选择成为怪物娘。"船长拍了拍木腿，"这样反而更适合海上生活。"',
  '她给了海盗头目一份藏宝图，然后转向你们："你们是要穿越这片海的人吧？"',
  '"是的。"你回答。'],
  chs:[
  {t:'向 Silver 船长请教',n:'coastal_silver_advice'},
  {t:'告辞离开',n:'coastal_exit'}
]},
coastal_silver_advice:{t:'船长的建议',loc:'Coastal Zone - 海盗洞穴',zone:'Coastal',text:[
  '"前方是 Siren 的领地。"Silver 船长说，"她的歌声能穿透一切防御——除非你有真爱之吻。"',
  '"真...爱之吻？"Kim 脸红了一下。',
  '"哈哈，开玩笑的。"船长笑了，"但认真地说——你需要专注于某个你珍视的记忆。歌声是在利用你的孤独。"',
  '"当你听到歌声时，不要去想海，想去你在陆地上最重要的东西。"',
  '她给了你们一瓶朗姆酒。"喝了它，能暖身子。"'],
   eff:{san:10},items:['船长的朗姆酒'],chs:[{t:'出航',n:'coastal_exit'}]
},
coastal_exit:{t:'穿越海岸',loc:'Coastal Zone - 边界',zone:'Coastal',text:[
  '经过漫长的航行，你们终于看到了海岸线的尽头。',
  '前方是一片紫色的迷雾——那是 Demon Zone 的边界。',
  '"我们做到了。"Kim 疲惫地说，"我们穿越了海岸。"',
  '"但这只是开始。"Dominic 看着迷雾，"Demon Zone...我听说过那里的传说。"',
  '你们回头看了一眼大海。夕阳将海面染成了金色。',
  '然后，你们转身走进了迷雾中。',
  '"下一站——Demon Zone。"你说。'],
  chs:[{t:'进入 Demon Zone',n:'demon_entry'}]
},

// ===== DEMON ZONE =====
demon_entry:{
  t:'恶魔领域入口',
  loc:'Demon Zone - 边界',
  zone:'Demon',
  text:[
    '紫色的迷雾在你们面前翻滚涌动，空气中弥漫着硫磺和铁锈的气味。',
    '"这里就是 Demon Zone。"Dominic 的声音变得低沉，"传说中，这里是怪物转化能量的来源地之一。"',
    '迷雾渐渐散去，映入眼帘的是一片荒凉的大地。暗红色的天空下，黑色的山脉延伸向远方。',
    '远处，一座巨大的城堡耸立在悬崖之上，城堡的尖塔刺破了暗红色的云层。',
    '一条由熔岩形成的护城河环绕着城堡，河面上漂浮着幽蓝的火焰。',
    '"看起来...不太好客。"Kim 吞了吞口水。'],
  chs:[
    {t:'前往恶魔城堡',n:'demon_castle_gate'},
    {t:'探索附近的洞穴',n:'demon_imp_cave'}]},
demon_castle_gate:{
  t:'恶魔城堡大门',
  loc:'Demon Zone - 恶魔城堡大门',
  zone:'Demon',
  text:[
    '你们穿过熔岩桥，来到城堡的大门前。大门由黑色的钢铁铸成，上面雕刻着扭曲的面孔。',
    '大门两侧站着两个身穿黑色盔甲的守卫——她们是恶魔娘，头上长着弯曲的角，背后有蝙蝠般的翅膀。',
    '"站住。"左边的守卫用低沉的声音说，"这里是 Lilith 大人的领地。来者何人？"',
    '"我们是旅行者。"你尽量保持冷静，"我们只是路过。"',
    '"路过？"右边的守卫冷笑了一声，"没有人能路过 Lilith 的城堡。要么成为客人，要么成为晚餐。"'],
  chs:[
    {t:'请求觐见 Lilith',n:'demon_castle_hall'},
    {t:'强闯大门',n:'demon_castle_gate_fight'}]},
demon_castle_gate_fight:{
  t:'大门之战',
  loc:'Demon Zone - 恶魔城堡大门',
  zone:'Demon',
  text:[
    '你拔出武器冲向守卫。战斗瞬间爆发。',
    '恶魔守卫的力气惊人，她们的利爪可以撕裂钢铁。但你们的配合更加默契。',
    '经过一番苦战，你们终于击败了守卫。她们化为黑烟消散了。',
    '"大门开了。"Dominic 推开了沉重的铁门。',
    '城堡内部比你们想象的更加华丽——暗红色的地毯、悬挂的水晶灯、墙壁上的古老壁画。',
    '但同时也更加危险——大厅中正坐着一位女人，她的美丽令人窒息。'],
  chs:[
    {t:'面对城堡主人',n:'demon_castle_hall'}],
  eff:{hp:-20}},
demon_castle_hall:{
  t:'恶魔城堡大厅',
  loc:'Demon Zone - 恶魔城堡大厅',
  zone:'Demon',
  text:[
    '城堡大厅金碧辉煌，却在暗色调中透露出一种诡异的美感。',
    '大厅中央的王座上坐着一位女性——她有深紫色的长发，头顶一对弯曲的山羊角，琥珀色的眼睛里闪烁着智慧的光芒。',
    '她穿着一件深红色的长袍，袍子上绣着金色的符文。两条修长的腿交叠在一起，末端是分趾的蹄子。',
    '"欢迎来到我的城堡，旅行者们。"她的声音低沉而富有磁性，"我是 Lilith，这座城堡的主人。"',
    '"你不打算攻击我们？"Kim 警惕地问。',
    '"攻击？"Lilith 笑了，"为什么我要攻击远道而来的客人？我可不是那些野蛮的低等恶魔。"'],
  chs:[
    {t:'询问关于 Monster 转化的事',n:'demon_castle_throne'},
    {t:'询问关于 Mythic Zone',n:'demon_castle_throne'}]},
demon_castle_throne:{
  t:'王座对话',
  loc:'Demon Zone - 恶魔城堡王座',
  zone:'Demon',
  text:[
    '"Monster 转化？"Lilith 靠在王座上，眼神变得深邃，"那是 Mythic Zone 的阴谋。"',
    '"什么阴谋？"你追问。',
    '"很久以前，Mythic 核心的能量发生了泄漏。那股能量寻找宿主，将人类转化为怪物娘。',
    '但这不是偶然的——有人在控制这一切。那个人...或者说那个东西...就在 Mythic Core 里。"',
    '"你是说 Robin？"Dominic 问。',
    'Lilith 的眼中闪过一丝惊讶。"你们知道 Robin？有意思...她确实与核心有关。她是钥匙。"',
    '"我们怎样才能到达 Mythic Core？"你问。',
    '"穿过 Demon Zone，经过 Desolate Zone，越过 Desert Zone。"Lilith 站起身，"我会帮助你们——但是有条件。"'],
  chs:[
    {t:'接受 Lilith 的条件',n:'demon_succubus_queen'},
    {t:'拒绝，自己探索',n:'demon_dark_forest'}]},
demon_succubus_queen:{
  t:'Succubus 女王',
  loc:'Demon Zone - 女王寝宫',
  zone:'Demon',
  text:[

    '"Sphinx——狮身人面兽。她是金字塔的守护者。"Zahra 的表情变得严肃，"她喜欢谜语。如果你答不上来...后果很严重。"',

desert_pyramid_gate:{
  t:'金字塔大门',
  loc:'Desert Zone - 金字塔入口',
  zone:'Desert',
  text:[

  text:[

desert_sphinx_wrong:{

desert_pyramid_hall:{
  t:'金字塔大厅',
  loc:'Desert Zone - 金字塔内部',
  zone:'Desert',
  text:[

desert_mummy_tomb:{
  t:'木乃伊墓室',
  loc:'Desert Zone - 金字塔墓室',
  zone:'Desert',
  text:[
    '你们来到了一个宽敞的墓室。中央的石棺上镶嵌着黄金和宝石。',

desert_mummy_tomb_talk:{

  loc:'Desert Zone - 金字塔墓室',

  text:[

desert_anubis_temple:{
  t:'Anubis 神殿',
  loc:'Desert Zone - 金字塔神殿',
  zone:'Desert',
  text:[

  text:[

desert_manticore_answer2:{

mythic_entry:{

  loc:'Mythic Zone - 神话之门',
  zone:'Mythic',
  text:[
    '穿过传送门，你们来到了一个与之前完全不同的世界。',

    '"这里...好美。"Kim 惊叹道，"简直不像是一个危险的地方。"',

  chs:[

mythic_torii:{
  t:'鸟居之谜',
  loc:'Mythic Zone - 红色鸟居',
  zone:'Mythic',
  text:[
    '你们仔细检查了鸟居。柱子上刻着古老的日文。',
    'Dominic 解读着上面的文字:"通过此门者，需放下心中杂念。纯净之心才能通过最后的试炼。"',
    '鸟居的顶部镶嵌着一颗透明的宝石。当你凝视它时，你看到了自己的倒影——以及你内心深处最真实的渴望。',

mythic_shrine:{

  loc:'Mythic Zone - 古老神社',
  zone:'Mythic',
  text:[
    '神社的建筑风格融合了日本和欧洲的元素。朱红色的柱子和白色的墙壁相得益彰。',
    '神社前的石阶上坐着一位穿着巫女服的女性。她的头上长着狐狸耳朵，身后有九条金色的尾巴。',
    '"欢迎来到 Mythic Zone。"她的声音悦耳动听，"我是这里的管理者——九尾狐 Kitsune。"',
    '"你是...被转化的？"Kim 问。',
    'Kitsune 微笑了。"我是自愿的。早在人类出现之前，我就已经是妖怪了。Mythic Core 的能量只是让我变得更强大。"',
    '"我们要去 Mythic Core。"你直接说。',

  zone:'Mythic',
  text:[

  loc:'Mythic Zone - 鬼之洞穴',

  text:[

mythic_fairy_forest:{

  loc:'Mythic Zone - 妖精森林',
  zone:'Mythic',
  text:[
    '洞穴的出口连接着一片奇幻的森林。森林中的植物发出柔和的荧光。',
