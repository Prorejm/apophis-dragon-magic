<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Georgia', 'SimSun', serif;
  background: #0a0a0f;
  color: #d4d4d0;
  overflow: hidden;
  height: 100vh;
  user-select: none;
}

/* ===== NAV ===== */
.nav-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 48px;
  background: linear-gradient(180deg, #1a1a24 0%, #121218 100%);
  border-bottom: 1px solid #2a2a3a;
  display: flex;
  align-items: center;
  padding: 0 20px;
  z-index: 1000;
  gap: 4px;
}
.nav-bar a {
  color: #888;
  text-decoration: none;
  padding: 6px 14px;
  font-size: 13px;
  border-radius: 4px;
  transition: all .2s;
}
.nav-bar a:hover { color: #d4a843; background: rgba(212,168,67,0.1); }
.nav-bar a.active { color: #d4a843; background: rgba(212,168,67,0.15); border-bottom: 2px solid #d4a843; }
.nav-spacer { flex: 1; }
.nav-title { color: #d4a843; font-size: 14px; font-weight: bold; letter-spacing: 2px; }

/* ===== GAME CONTAINER ===== */
#game-container {
  position: fixed;
  top: 48px; left: 0; right: 0; bottom: 0;
  background: #0a0a0f;
  overflow: hidden;
}
#game-canvas {
  display: block;
  width: 100%;
  height: 100%;
}

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed;
  top: 48px; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 500;
}
.modal-overlay.active { display: flex; }
.modal-box {
  background: linear-gradient(135deg, #1a1a24 0%, #0e0e14 100%);
  border: 1px solid #d4a84344;
  border-radius: 12px;
  padding: 30px 40px;
  max-width: 600px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 0 60px rgba(212,168,67,0.1);
  position: relative;
}
.modal-box h2 {
  color: #d4a843;
  text-align: center;
  margin-bottom: 20px;
  font-size: 22px;
  letter-spacing: 3px;
}
.modal-box p, .modal-box li {
  color: #b0b0b0;
  line-height: 1.7;
  font-size: 14px;
}
.modal-box ul { list-style: none; padding: 0; }
.modal-box li { padding: 4px 0; border-bottom: 1px solid #1a1a2a; }
.modal-box li:last-child { border-bottom: none; }
.modal-close {
  display: block;
  margin: 20px auto 0;
  padding: 10px 30px;
  background: #d4a843;
  color: #0a0a0f;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
  font-weight: bold;
  transition: all .2s;
}
.modal-close:hover { background: #e4b853; transform: scale(1.03); }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: #0a0a0f; }
::-webkit-scrollbar-thumb { background: #d4a84344; border-radius: 2px; }

/* ===== GAME OVER ===== */
.game-over-title { color: #c41e3a; font-size: 28px; text-align: center; margin-bottom: 10px; }
.game-win-title { color: #d4a843; font-size: 28px; text-align: center; margin-bottom: 10px; }
.stat-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #1a1a2a; }
.stat-row:last-child { border-bottom: none; }
.stat-label { color: #888; }
.stat-value { color: #d4a843; font-weight: bold; }

/* ===== CARD REWARD ===== */
.reward-cards {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin: 15px 0;
}
.reward-card-slot {
  width: 140px;
  height: 200px;
  border: 2px solid #d4a84333;
  border-radius: 8px;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  overflow: hidden;
  background: #12121a;
}
.reward-card-slot:hover {
  border-color: #d4a843;
  transform: translateY(-8px);
  box-shadow: 0 8px 30px rgba(212,168,67,0.2);
}
.reward-card-slot canvas {
  width: 100%;
  height: 100%;
  display: block;
}
.reward-info {
  text-align: center;
  color: #d4a843;
  margin: 10px 0;
  font-size: 15px;
}

/* ===== SHOP ===== */
.shop-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin: 15px 0;
}
.shop-item {
  border: 1px solid #2a2a3a;
  border-radius: 8px;
  padding: 10px;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
  background: #12121a;
}
.shop-item:hover {
  border-color: #d4a843;
  transform: translateY(-3px);
  box-shadow: 0 4px 20px rgba(212,168,67,0.15);
}
.shop-item-name { color: #d4a843; font-size: 13px; margin-bottom: 4px; }
.shop-item-desc { color: #888; font-size: 11px; margin-bottom: 6px; }
.shop-item-price { color: #e4b853; font-size: 14px; font-weight: bold; }
.shop-item-sold { color: #666; font-style: italic; }
.shop-gold { text-align: center; color: #e4b853; font-size: 16px; margin-bottom: 10px; }

/* ===== SIGIL FORGE ===== */
.forge-grid {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin: 15px 0;
}
.forge-card-slot {
  width: 120px;
  height: 170px;
  border: 2px solid #2a2a3a;
  border-radius: 8px;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  overflow: hidden;
  background: #12121a;
}
.forge-card-slot:hover {
  border-color: #a855f7;
  transform: translateY(-5px);
  box-shadow: 0 4px 20px rgba(168,85,247,0.2);
}
.forge-card-slot canvas {
  width: 100%;
  height: 100%;
  display: block;
}
.forge-info { text-align: center; color: #a855f7; margin: 10px 0; font-size: 14px; }

/* ===== MAP NODES ===== */
.map-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 30px;
  padding: 20px 0;
}
.map-floor {
  display: flex;
  gap: 50px;
  justify-content: center;
  position: relative;
}
.map-node {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all .3s;
  border: 2px solid #2a2a3a;
  background: #12121a;
  font-size: 11px;
  text-align: center;
  position: relative;
}
.map-node:hover:not(.completed):not(.locked) {
  transform: scale(1.15);
  box-shadow: 0 0 30px rgba(212,168,67,0.3);
}
.map-node.enemy { border-color: #c41e3a; }
.map-node.elite { border-color: #a855f7; }
.map-node.rest { border-color: #22c55e; }
.map-node.shop { border-color: #e4b853; }
.map-node.sigil { border-color: #a855f7; }
.map-node.boss { border-color: #ff4444; width: 100px; height: 100px; font-size: 13px; }
.map-node.completed { opacity: 0.5; cursor: default; }
.map-node.locked { opacity: 0.3; cursor: default; }
.map-node.current { animation: pulse-node 1.5s infinite; border-color: #d4a843; }
@keyframes pulse-node {
  0%, 100% { box-shadow: 0 0 10px rgba(212,168,67,0.3); }
  50% { box-shadow: 0 0 30px rgba(212,168,67,0.6); }
}
.map-connector {
  position: absolute;
  top: 50%;
  left: 100%;
  width: 50px;
  height: 2px;
  background: #2a2a3a;
}
.map-node-icon { font-size: 20px; line-height: 1; }
.map-node-label { font-size: 10px; color: #888; margin-top: 2px; }
.map-floor-label {
  color: #d4a843;
  text-align: center;
  font-size: 14px;
  letter-spacing: 2px;
  margin-bottom: 5px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .modal-box { padding: 20px; max-width: 95%; }
  .reward-card-slot { width: 110px; height: 160px; }
  .shop-item { padding: 8px; }
  .forge-card-slot { width: 100px; height: 140px; }
  .map-node { width: 60px; height: 60px; font-size: 10px; }
  .map-node.boss { width: 80px; height: 80px; }
  .map-floor { gap: 25px; }
}

@keyframes fadeIn {
  0%{opacity:0;}
  100%{opacity:1;}
}

/* ====== ENHANCED ANIMATION SYSTEM ====== */
@keyframes floatGlow {
  0%,100%{transform:translateY(0);filter:drop-shadow(0 0 5px rgba(212,168,67,0.3));}
  50%{transform:translateY(-6px);filter:drop-shadow(0 0 20px rgba(212,168,67,0.6));}
}
@keyframes spinGlow {
  0%{transform:rotate(0deg);filter:drop-shadow(0 0 8px rgba(212,168,67,0.3));}
  50%{filter:drop-shadow(0 0 30px rgba(212,168,67,0.7));}
  100%{transform:rotate(360deg);filter:drop-shadow(0 0 8px rgba(212,168,67,0.3));}
}
@keyframes borderPulse {
  0%,100%{border-color:rgba(212,168,67,0.3);box-shadow:0 0 5px rgba(212,168,67,0.05);}
  50%{border-color:rgba(212,168,67,0.7);box-shadow:0 0 25px rgba(212,168,67,0.2);}
}
@keyframes shimmerText {
  0%{background-position:-200% center;}
  100%{background-position:200% center;}
}
@keyframes breatheScale {
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.04);}
}
@keyframes slideUpReveal {
  0%{opacity:0;transform:translateY(30px);}
  100%{opacity:1;transform:translateY(0);}
}
@keyframes goldSparkle {
  0%,100%{opacity:0;transform:scale(0) rotate(0deg);}
  50%{opacity:1;transform:scale(1) rotate(180deg);}
}
@keyframes rippleIn {
  0%{transform:scale(0);opacity:0.8;}
  100%{transform:scale(2);opacity:0;}
}
@keyframes rotateIn3D {
  0%{transform:perspective(800px) rotateY(90deg);opacity:0;}
  100%{transform:perspective(800px) rotateY(0deg);opacity:1;}
}
.gold-shimmer-text{
  background:linear-gradient(90deg, #d4a843, #fff8dc, #d4a843, #b8912e, #d4a843);
  background-size:200% 100%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:shimmerText 3s ease-in-out infinite;
}
.gold-border-anim{border:1px solid rgba(212,168,67,0.3);animation:borderPulse 3s ease-in-out infinite;}
.gold-border-anim:hover{animation:borderPulse 1s ease-in-out infinite;}
.float-anim{animation:floatGlow 4s ease-in-out infinite;}
.float-anim-delayed{animation:floatGlow 5s ease-in-out 1s infinite;}
.scale-anim{animation:breatheScale 6s ease-in-out infinite;}
.rotate-anim{animation:spinGlow 8s linear infinite;}
.reveal-anim{animation:slideUpReveal 0.6s ease-out;}
.reveal-delay-1{animation:slideUpReveal 0.6s ease-out 0.1s both;}
.reveal-delay-2{animation:slideUpReveal 0.6s ease-out 0.2s both;}
.reveal-delay-3{animation:slideUpReveal 0.6s ease-out 0.3s both;}
.reveal-delay-4{animation:slideUpReveal 0.6s ease-out 0.4s both;}


/* Interactive card tilt effect */
.card-tilt{transition:transform 0.3s ease, box-shadow 0.3s ease;}
.card-tilt:hover{transform:perspective(1000px) rotateX(2deg) rotateY(2deg) scale(1.02);box-shadow:0 15px 40px rgba(212,168,67,0.15);}
.btn-ripple{position:relative;overflow:hidden;}
.btn-ripple::after{content:'';position:absolute;width:100%;padding-top:100%;border-radius:50%;background:rgba(255,255,255,0.15);transform:scale(0);left:var(--x,50%);top:var(--y,50%);transform-origin:center;transition:transform 0.5s;pointer-events:none;}
.btn-ripple:active::after{transform:scale(3);}
.star-twinkle{animation:twinkle 2s ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:0.4;}50%{opacity:1;}}
.glow-hover{transition:all 0.3s;}
.glow-hover:hover{filter:drop-shadow(0 0 15px rgba(212,168,67,0.5));transform:scale(1.05);}
.fade-in-section{animation:slideUpReveal 0.6s ease-out both;}
.fade-in-section:nth-child(2){animation-delay:0.1s;}
.fade-in-section:nth-child(3){animation-delay:0.2s;}
.fade-in-section:nth-child(4){animation-delay:0.3s;}
.fade-in-section:nth-child(5){animation-delay:0.4s;}


/* ====== MOBILE NAV TOGGLE ====== */
.nav-toggle{display:none;background:none;border:none;color:#d4a843;font-size:1.5rem;cursor:pointer;padding:0.25rem 0.5rem;flex-shrink:0;font-family:var(--font-display,cursive);}

// Helper to create a card instance
function createCard(cardId, upgraded=false) {
  const base = CARD_DB[cardId];
  if (!base) return null;
  const card = { ...base, uid: CardUID++, upgraded };
  // Apply upgrade
  if (upgraded) {
    card.damage = Math.floor((card.damage || 0) * 2);
    card.block = Math.floor((card.block || 0) * 2);
    if (card.extras) {
      const ex = card.extras;
      if (ex.poison) ex.poison *= 2;
      if (ex.vulnerable) ex.vulnerable *= 2;
      if (ex.weak) ex.weak *= 2;
      if (ex.heal) ex.heal *= 2;
      if (ex.draw) ex.draw *= 2;
      if (ex.energyGain) ex.energyGain *= 2;
      if (ex.multihit) ex.multihit *= 2;
      if (ex.strengthBuff) ex.strengthBuff *= 2;
      if (ex.endBlock) ex.endBlock *= 2;
      if (ex.selfDamage) ex.selfDamage *= 2;
      if (ex.nextBlock) ex.nextBlock *= 2;
    }
  }
  return card;
}

function cloneCard(card) {
  return { ...card, extras: card.extras ? { ...card.extras } : undefined, uid: CardUID++ };

  // Generate map
  generateMap();

// ============================================================
// MAP GENERATION
// ============================================================
function generateMap() {
  G.encounters = [];
  for (let f = 0; f < G.maxFloor; f++) {
    const floor = [];
    const isLast = f === G.maxFloor - 1;
    for (let n = 0; n < G.nodesPerFloor; n++) {
      if (isLast && n === 1) {
        floor.push({ type:'boss', enemyId:'apophis_boss', completed:false });
      } else {
        const type = pick(ENCOUNTER_TYPES);
        floor.push({ type, enemyId: type === 'enemy' ? pick(COMMON_ENEMY_IDS) : (type === 'elite' ? pick(['elemental_giant','fallen_knight','void_lord']) : null), completed:false });
      }
    }
    G.encounters.push(floor);
  }
  G.floor = 0;
  G.currentNode = 0;
  G.completedNodes = [];
}

// ============================================================
// COMBAT ENGINE
// ============================================================
function startCombat(encounter) {
  const isBoss = encounter.type === 'boss';
  let enemyDef;
  if (isBoss) {
    enemyDef = { ...ENEMY_DB.apophis_boss, hp:15, maxHp:15 };
  } else {
    const base = ENEMY_DB[encounter.enemyId];
    enemyDef = base ? { ...base } : { ...ENEMY_DB.small_snake };
  }
  enemyDef.block = 0;
  enemyDef.weak = 0;
  enemyDef.vulnerable = 0;
  enemyDef.poison = 0;
  enemyDef.strength = 0;

  G.combat = {
    enemy: enemyDef,
    turnCount: 0,
    isBoss,
    ended: false,
  };
  G.turnCount = 0;
  G.block = 0;
  G.energy = 3;
  G.maxEnergy = 3;
  G.strength = 0;
  G.powers = {};
  G.poison = 0;
  G.weak = 0;
  G.vulnerable = 0;
  G.cardsPlayedThisTurn = 0;
  G.cardsPlayedThisCombat = 0;
  G.emergencyHealUsed = false;
  G.timeHourglassCounter = 0;
  G.firstAttackUsed = false;

  // Apply relics
  G.relics.forEach(r => {
    if (r.effect === 'startEnergy') G.maxEnergy = 3 + r.value;
    if (r.effect === 'startDamage') {
      G.combat.enemy.hp -= r.value;
    }
  });

  // Build draw pile
  G.drawPile = [];
  G.discardPile = [];
  G.hand = [];
  G.deck.forEach(c => G.drawPile.push(cloneCard(c)));
  shuffle(G.drawPile);

  // Start draw
  let startDraw = 5;
  G.relics.forEach(r => { if (r.effect === 'startDraw') startDraw += r.value; });
  drawCards(startDraw);

  G.phase = 'combat';
  G.energy = G.maxEnergy;
  G.turnCount = 0;

  // Start of combat relics
  applyStartOfCombatRelics();

  closeModal();
}

function applyStartOfCombatRelics() {
  G.relics.forEach(r => {
    if (r.effect === 'perTurnBlock') G.block += r.value;
  });
}

function drawCards(n) {
  for (let i = 0; i < n; i++) {
    if (G.drawPile.length === 0) {
      if (G.discardPile.length === 0) break;
      G.drawPile = shuffle(G.discardPile);
      G.discardPile = [];
    }
    if (G.drawPile.length > 0) {
      G.hand.push(G.drawPile.pop());
    }
  }
  if (G.hand.length > 10) {
    // Discard excess (keep 10)
    while (G.hand.length > 10) {
      G.discardPile.push(G.hand.pop());
    }
  }
}

function startPlayerTurn() {
  G.turnCount++;
  G.block = 0;
  G.energy = G.maxEnergy;
  G.cardsPlayedThisTurn = 0;
  G.weak = Math.max(0, G.weak - 1);
  G.vulnerable = Math.max(0, G.vulnerable - 1);
  G.poison = Math.max(0, G.poison - 1);

  // Apply poison damage to player
  if (G.poison > 0) {
    G.hp -= G.poison;
  }

  // Relic: perTurnBlock
  G.relics.forEach(r => {
    if (r.effect === 'perTurnBlock') G.block += r.value;
  });

  // Power: undying_will
  if (G.powers['undying_will']) {
    G.block += 3;
  }

  // Relic: time_hourglass
  G.timeHourglassCounter++;
  if (G.timeHourglassCounter >= 3) {
    G.energy += 1;
    G.timeHourglassCounter = 0;
  }

  drawCards(5);
  checkGameOver();
}

function endPlayerTurn() {
  // Discard hand
  while (G.hand.length > 0) {
    G.discardPile.push(G.hand.pop());
  }
  // Resolve end-of-turn effects
  if (G.powers['seven_heads_descend']) {
    const dmg = G.cardsPlayedThisTurn;
    if (G.combat && G.combat.enemy && G.combat.enemy.hp > 0) {
      const finalDmg = dmg + G.strength;
      G.combat.enemy.hp -= Math.max(0, finalDmg);
      G.damageDealt += finalDmg;
    }
  }
  // Enemy turn
  enemyTurn();
}

function enemyTurn() {
  const enemy = G.combat.enemy;
  if (!enemy || enemy.hp <= 0) return;

  const pattern = enemy.pattern;
  const idx = (G.turnCount - 1) % pattern.length;
  const action = pattern[idx];

  // Enemy turn count
  if (enemy.poison > 0) {
    enemy.hp -= enemy.poison;
    if (enemy.hp <= 0) { onEnemyDefeated(); return; }
  }
  if (enemy.weak > 0) enemy.weak--;
  if (enemy.vulnerable > 0) enemy.vulnerable--;

  // Enemy action
  let dmg = action.damage || 0;
  if (action.multihit) dmg = dmg * action.multihit;
  if (enemy.weak > 0) dmg = Math.max(0, Math.floor(dmg * 0.75));
  if (enemy.vulnerable > 0) dmg = Math.floor(dmg * 1.5);
  dmg += enemy.strength || 0;

  if (action.heal) enemy.hp += action.heal;

  // Apply damage to player
  let playerDmg = dmg;
  if (G.block > 0) {
    const blocked = Math.min(G.block, playerDmg);
    G.block -= blocked;
    playerDmg -= blocked;
  }
  if (playerDmg > 0) {
    G.hp -= playerDmg;
    G.damageTaken += playerDmg;
  }

  // Apply debuffs from enemy
  if (action.weak) G.weak += action.weak;
  if (action.vulnerable) G.vulnerable += action.vulnerable;

  // Weak/Vulnerable decay for enemy
  if (enemy.weak > 0) enemy.weak = Math.max(0, enemy.weak - 1);
  if (enemy.vulnerable > 0) enemy.vulnerable = Math.max(0, enemy.vulnerable - 1);

  checkGameOver();
  if (G.phase === 'combat') {
    startPlayerTurn();
  }
}

function checkGameOver() {
  if (G.hp <= 0) {
    G.hp = 0;
    // Emergency heal relic
    if (!G.emergencyHealUsed) {
      G.relics.forEach(r => {
        if (r.effect === 'emergencyHeal' && G.hp <= 3 && !G.emergencyHealUsed) {
          G.hp += r.value;
          G.emergencyHealUsed = true;
        }
      });
      if (G.hp > 0) return; // Saved!
    }
    // Game over
    G.phase = 'gameover';
    showGameOver();
    return;
  }
  if (G.combat && G.combat.enemy && G.combat.enemy.hp <= 0) {
    onEnemyDefeated();
  }
}

function onEnemyDefeated() {
  G.enemiesDefeated++;
  G.combat.ended = true;

  // Post-combat relic heal
  G.relics.forEach(r => {
    if (r.effect === 'postHeal') G.hp = Math.min(G.maxHp, G.hp + r.value);
  });

  if (G.combat.isBoss) {
    G.phase = 'victory';
    showVictory();
  } else {
    // Reward phase
    const goldReward = rand(5, 12);
    G.gold += goldReward;
    G.rewardGold = goldReward;

    // Generate 3 random cards
    G.rewardCards = [];
    const pool = shuffle([...ALL_NON_STARTER]);
    for (let i = 0; i < 3 && i < pool.length; i++) {
      G.rewardCards.push(createCard(pool[i], false));
    }
    showCardReward();
  }
}

// ============================================================
// PLAY CARD
// ============================================================
function playCard(cardIndex) {
  if (G.phase !== 'combat') return;
  if (!G.combat || G.combat.ended) return;
  if (G.hand.length <= cardIndex) return;

  const card = G.hand[cardIndex];
  if (G.energy < card.cost) return;

  G.energy -= card.cost;
  G.cardsPlayedThisTurn++;
  G.cardsPlayedThisCombat++;

  // Remove from hand
  G.hand.splice(cardIndex, 1);

  // Apply card effects
  let dmg = card.damage || 0;
  let blk = card.block || 0;
  const extras = card.extras || {};

  // Block damage (混沌爆破) - convert block to damage first
  if (extras.blockDamage) {
    dmg = G.block;
  }

  // Strength
  dmg += G.strength;

  // Relic: attackPlus
  if (card.type === 'attack') {
    G.relics.forEach(r => { if (r.effect === 'attackPlus') dmg += r.value; });
  }

  // Relic: zeroCostPlus
  if (card.cost === 0) {
    G.relics.forEach(r => { if (r.effect === 'zeroCostPlus') dmg += r.value; });
  }

  // Relic: firstDouble
  if (!G.firstAttackUsed && card.type === 'attack' && dmg > 0) {
    G.relics.forEach(r => {
      if (r.effect === 'firstDouble') {
        dmg *= 2;
        G.firstAttackUsed = true;
      }
    });
  }

  // Multihit
  const hits = extras.multihit || 1;

  // Self damage
  if (extras.selfDamage) {
    G.hp -= extras.selfDamage;
  }

  // Heal
  if (extras.heal) {
    G.hp = Math.min(G.maxHp, G.hp + extras.heal);
  }

  // Energy gain
  if (extras.energyGain) {
    G.energy += extras.energyGain;
  }

  // Draw
  if (extras.draw) {
    drawCards(extras.draw);
  }

  // Apply damage to enemy
  if (extras.aoe) {
    // AOE: just damage to the single enemy (in our case always single enemy)
    for (let h = 0; h < hits; h++) {
      const finalDmg = Math.max(0, dmg);
      G.combat.enemy.hp -= finalDmg;
      G.damageDealt += finalDmg;
    }
  } else {
    for (let h = 0; h < hits; h++) {
      let hitDmg = dmg;
      if (G.vulnerable > 0) hitDmg = Math.floor(hitDmg * 1.5);
      hitDmg = Math.max(0, hitDmg);
      G.combat.enemy.hp -= hitDmg;
      G.damageDealt += hitDmg;
    }
  }

  // Apply block
  if (blk > 0) {
    G.block += blk;
  }

  // Apply debuffs
  if (extras.poison) {
    G.combat.enemy.poison = (G.combat.enemy.poison || 0) + extras.poison;
  }
  if (extras.vulnerable) {
    G.combat.enemy.vulnerable = (G.combat.enemy.vulnerable || 0) + extras.vulnerable;
  }
  if (extras.weak) {
    G.combat.enemy.weak = (G.combat.enemy.weak || 0) + extras.weak;
  }

  // Power cards
  if (card.type === 'power') {
    if (extras.strengthBuff) G.strength += extras.strengthBuff;
    if (extras.doubleStrength) G.strength *= 2;
    if (extras.endBlock) G.powers['undying_will'] = true;
    if (extras.headDamage) G.powers['seven_heads_descend'] = true;
    // Dragon Fury
    if (extras.strengthBuff) G.powers['dragon_fury'] = true;
  }

  // Next turn block
  if (extras.nextBlock) {
    // Simplified: add to current block
    G.block += extras.nextBlock;
  }

  // Put card in discard
  G.discardPile.push(card);

  // Check enemy death
  checkGameOver();

  // Relic: goldPerCard
  G.relics.forEach(r => {
    if (r.effect === 'goldPerCard') G.gold += r.value;
  });
}

  for (let f = 0; f < G.encounters.length; f++) {

      const enc = G.encounters[f][n];
      const key = `${f}-${n}`;
      const completed = enc.completed;
      const isCurrent = f === G.floor && n === G.currentNode && !completed;
      const locked = f > G.floor || (f === G.floor && n > G.currentNode) || completed;

      let cls = 'map-node';
      if (enc.type === 'enemy') cls += ' enemy';
      else if (enc.type === 'elite') cls += ' elite';
      else if (enc.type === 'rest') cls += ' rest';
      else if (enc.type === 'shop') cls += ' shop';
      else if (enc.type === 'sigil') cls += ' sigil';
      else if (enc.type === 'boss') cls += ' boss';
      if (completed) cls += ' completed';
      if (locked && !completed) cls += ' locked';
      if (isCurrent) cls += ' current';

      let icon = '';
      let label = '';
      if (enc.type === 'enemy' || enc.type === 'elite') {
        const eid = enc.enemyId;
        if (eid === 'small_snake') { icon = '🐍'; label = '小蛇怪'; }
        else if (eid === 'shadow_bat') { icon = '🦇'; label = '暗影蝙蝠'; }
        else if (eid === 'chaos_servant') { icon = '👤'; label = '混沌仆从'; }
        else if (eid === 'hell_hound') { icon = '🐕'; label = '地狱犬'; }

        else if (eid === 'thorn_golem') { icon = '🗿'; label = '荆棘魔像'; }
        else if (eid === 'fallen_knight') { icon = '⚔️'; label = '堕落骑士'; }
        else if (eid === 'void_lord') { icon = '👁️'; label = '虚空领主'; }

  </p>`;

  openModal(html);
}

function enterNode(floor, nodeIndex) {
  if (floor !== G.floor || nodeIndex !== G.currentNode) return;
  const enc = G.encounters[floor][nodeIndex];
  if (enc.completed) return;

  enc.completed = true;

  if (enc.type === 'enemy' || enc.type === 'elite' || enc.type === 'boss') {
    startCombat(enc);
  } else if (enc.type === 'rest') {
    G.hp = Math.min(G.maxHp, G.hp + 3);
    advanceNode();
    showMap();
  } else if (enc.type === 'shop') {
    enterShop();
  } else if (enc.type === 'sigil') {
    enterSigilForge();
  }
}

function advanceNode() {
  G.currentNode++;
  if (G.currentNode >= G.encounters[G.floor].length) {
    G.currentNode = 0;
    G.floor++;
    if (G.floor >= G.maxFloor) {
      // Victory should have been triggered
    }
  }
}

function buyCard(index) {
  const card = G.shopCards[index];
  if (!card || card.sold) return;
  const price = card.cost <= 1 ? 15 : card.cost === 2 ? 20 : 30;
  if (G.gold < price) { showToast('金币不足！'); return; }
  G.gold -= price;
  card.sold = true;
  G.deck.push(cloneCard(card));
  renderShop();
}

function buyRelic(index) {
  const relic = G.shopRelics[index];
  if (!relic || relic.sold) return;
  const price = 50 + index * 15;
  if (G.gold < price) { showToast('金币不足！'); return; }
  // Check if already owned
  if (G.relics.find(r => r.id === relic.id)) { showToast('已拥有该遗物！'); return; }
  G.gold -= price;
  relic.sold = true;
  G.relics.push({ ...relic });
  // Apply passive relic effects
  if (relic.effect === 'maxHp') { G.maxHp += relic.value; G.hp += relic.value; }
  renderShop();
}

function removeCardFromDeck() {
  if (G.gold < 25) { showToast('金币不足！'); return; }
  if (G.deck.length <= 3) { showToast('卡组太少！'); return; }
  G.gold -= 25;
  // Show deck to pick which to remove
  showDeckForRemoval();
}

function showDeckForRemoval() {
  let html = '<h2>选择要移除的卡牌</h2>';
  html += '<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:15px 0;">';

  openModal(html);
}

function confirmRemoveCard(index) {
  G.deck.splice(index, 1);

}

  advanceNode();

}

let toastEl = null;
function showToast(msg) {
  if (!toastEl) {
    toastEl = document.createElement('div');
    toastEl.style.cssText = 'position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1a1a24;border:1px solid #d4a843;color:#d4a843;padding:10px 24px;border-radius:6px;z-index:2000;font-size:14px;transition:opacity .3s;opacity:0;';
    document.body.appendChild(toastEl);
  }
  toastEl.textContent = msg;
  toastEl.style.opacity = '1';
  setTimeout(() => { toastEl.style.opacity = '0'; }, 1500);
}

// ============================================================
// Particle system
let particles = [];
class Particle {
  constructor() {
    this.x = randf(0, canvas.width);
    this.y = randf(0, canvas.height);
    this.vx = randf(-0.3, 0.3);
    this.vy = randf(-0.3, 0.3);
    this.size = randf(0.5, 2);
    this.alpha = randf(0.1, 0.4);
    this.life = randf(100, 300);
    this.maxLife = this.life;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life--;
    this.alpha = (this.life / this.maxLife) * 0.4;
    if (this.life <= 0) {
      this.x = randf(0, canvas.width);
      this.y = randf(0, canvas.height);
      this.life = randf(100, 300);
      this.maxLife = this.life;
      this.alpha = randf(0.1, 0.4);
    }
  }
  draw() {
    ctx.fillStyle = `rgba(212,168,67,${this.alpha})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function initParticles(count) {
  particles = [];
  for (let i = 0; i < count; i++) particles.push(new Particle());
}

// ---- Combat Rendering ----
function renderCombat() {
  const W = canvas.width, H = canvas.height;

  // Background gradient
  const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W*0.7);
  grad.addColorStop(0, '#1a1a2e');
  grad.addColorStop(0.5, '#0e0e18');
  grad.addColorStop(1, '#050508');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Particles
  particles.forEach(p => { p.update(); p.draw(); });

  // === TOP HUD ===
  const topY = 10;

  // HP bar
  ctx.fillStyle = '#c41e3a';
  ctx.font = '13px Georgia, serif';
  ctx.textAlign = 'left';
  ctx.fillText('❤', 15, topY + 13);
  const hpBarW = 150, hpBarH = 12, hpBarX = 35;
  ctx.fillStyle = '#2a1a1a';
  ctx.fillRect(hpBarX, topY, hpBarW, hpBarH);
  const hpPct = G.hp / G.maxHp;
  ctx.fillStyle = hpPct > 0.5 ? '#22c55e' : hpPct > 0.25 ? '#e4b853' : '#c41e3a';
  ctx.fillRect(hpBarX, topY, hpBarW * hpPct, hpBarH);
  ctx.strokeStyle = '#d4a84344';
  ctx.lineWidth = 1;
  ctx.strokeRect(hpBarX, topY, hpBarW, hpBarH);
  ctx.fillStyle = '#fff';
  ctx.font = '10px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText(`${G.hp}/${G.maxHp}`, hpBarX + hpBarW/2, topY + 10);

  // Energy
  ctx.textAlign = 'left';
  ctx.fillStyle = '#d4a843';
  ctx.font = '13px Georgia, serif';
  ctx.fillText('♦', hpBarX + hpBarW + 20, topY + 13);
  ctx.fillStyle = '#fff';
  ctx.font = '12px Georgia, serif';
  ctx.fillText(`${G.energy}/${G.maxEnergy}`, hpBarX + hpBarW + 36, topY + 13);

  // Gold
  ctx.fillStyle = '#e4b853';
  ctx.font = '12px Georgia, serif';
  ctx.fillText('★', hpBarX + hpBarW + 70, topY + 13);
  ctx.fillStyle = '#fff';
  ctx.fillText(G.gold, hpBarX + hpBarW + 85, topY + 13);

  // Block indicator
  if (G.block > 0) {
    ctx.fillStyle = '#60a5fa';
    ctx.font = '12px Georgia, serif';
    ctx.textAlign = 'left';
    ctx.fillText(`🛡 ${G.block}`, 15, topY + 32);
  }

  // Status effects
  let statusX = 100;
  if (G.weak > 0) {
    ctx.fillStyle = '#a855f7';
    ctx.font = '11px Georgia, serif';
    ctx.fillText(`虚弱 ${G.weak}`, statusX, topY + 32);
    statusX += 60;
  }
  if (G.vulnerable > 0) {
    ctx.fillStyle = '#f97316';
    ctx.font = '11px Georgia, serif';
    ctx.fillText(`易伤 ${G.vulnerable}`, statusX, topY + 32);
    statusX += 60;
  }
  if (G.poison > 0) {
    ctx.fillStyle = '#22c55e';
    ctx.font = '11px Georgia, serif';
    ctx.fillText(`毒 ${G.poison}`, statusX, topY + 32);
    statusX += 50;
  }
  if (G.strength > 0) {
    ctx.fillStyle = '#ef4444';
    ctx.font = '11px Georgia, serif';
    ctx.fillText(`力量 ${G.strength}`, statusX, topY + 32);
  }

  // === ENEMY ===
  const enemy = G.combat.enemy;
  if (enemy) {
    const eX = W/2, eY = H * 0.3;
    // Enemy sprite
    drawEnemySprite(ctx, enemy, eX, eY, G.combat.isBoss ? 80 : 55);

    // Enemy name and HP
    ctx.fillStyle = G.combat.isBoss ? '#ff4444' : '#d4a843';
    ctx.font = G.combat.isBoss ? '18px Georgia, serif' : '15px Georgia, serif';
    ctx.textAlign = 'center';
    ctx.fillText(enemy.name, eX, eY - 55 - (G.combat.isBoss ? 30 : 0));

    // Enemy HP bar
    const eHpBarW = G.combat.isBoss ? 200 : 140;
    const eHpBarH = 10;
    const eHpBarX = eX - eHpBarW/2;
    const eHpBarY = eY - 40 - (G.combat.isBoss ? 30 : 0);
    ctx.fillStyle = '#2a1a1a';
    ctx.fillRect(eHpBarX, eHpBarY, eHpBarW, eHpBarH);
    const eHpPct = Math.max(0, enemy.hp / enemy.maxHp);
    ctx.fillStyle = eHpPct > 0.5 ? '#ef4444' : eHpPct > 0.25 ? '#f97316' : '#c41e3a';
    ctx.fillRect(eHpBarX, eHpBarY, eHpBarW * eHpPct, eHpBarH);
    ctx.strokeStyle = '#d4a84333';
    ctx.lineWidth = 1;
    ctx.strokeRect(eHpBarX, eHpBarY, eHpBarW, eHpBarH);
    ctx.fillStyle = '#fff';
    ctx.font = '9px Georgia, serif';
    ctx.fillText(`${Math.max(0,enemy.hp)}/${enemy.maxHp}`, eX, eHpBarY + 9);

    // Enemy intent
    const patIdx = (G.turnCount - 1) % enemy.pattern.length;
    const pat = enemy.pattern[patIdx];
    if (pat) {
      let intentText = pat.desc || '';
      ctx.fillStyle = '#f97316';
      ctx.font = '11px Georgia, serif';
      ctx.fillText(`意图: ${intentText}`, eX, eHpBarY - 12);
    }

    // Enemy status effects
    let eStatusY = eHpBarY - 25;
    if (enemy.weak > 0) {
      ctx.fillStyle = '#a855f7';
      ctx.font = '10px Georgia, serif';
      ctx.fillText(`虚弱 ${enemy.weak}`, eX - 40, eStatusY);
    }
    if (enemy.vulnerable > 0) {
      ctx.fillStyle = '#f97316';
      ctx.font = '10px Georgia, serif';
      ctx.fillText(`易伤 ${enemy.vulnerable}`, eX + 20, eStatusY);
    }
    if (enemy.poison > 0) {
      ctx.fillStyle = '#22c55e';
      ctx.font = '10px Georgia, serif';
      ctx.fillText(`毒 ${enemy.poison}`, eX + 60, eStatusY);
    }
  }

  // === DECK & DISCARD INFO ===
  ctx.fillStyle = '#666';
  ctx.font = '11px Georgia, serif';
  ctx.textAlign = 'left';
  ctx.fillText(`抽牌堆: ${G.drawPile.length}`, 15, H - 140);
  ctx.fillText(`弃牌堆: ${G.discardPile.length}`, 15, H - 125);

  // === HAND CARDS ===
  const handY = H - 120;
  const cardW = 90, cardH = 130;
  const totalW = G.hand.length * (cardW + 6) - 6;
  const startX = Math.max(10, (W - totalW) / 2);

  G.hand.forEach((card, i) => {
    const cx = startX + i * (cardW + 6);
    const canPlay = G.energy >= card.cost;
    drawCardFace(ctx, card, cx, handY, cardW, cardH, i, canPlay, i === hoveredCard);
  });

  // === END TURN BUTTON ===
  const btnX = W - 110, btnY = H - 100, btnW = 100, btnH = 36;
  ctx.fillStyle = '#d4a843';
  ctx.fillRect(btnX, btnY, btnW, btnH);
  ctx.fillStyle = '#0a0a0f';
  ctx.font = 'bold 13px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('结束回合', btnX + btnW/2, btnY + btnH/2);
  ctx.strokeStyle = '#d4a84366';
  ctx.lineWidth = 1;
  ctx.strokeRect(btnX, btnY, btnW, btnH);

  // === FLOOR INFO ===
  ctx.fillStyle = '#444';
  ctx.font = '10px Georgia, serif';
  ctx.textAlign = 'right';
  ctx.fillText(`第 ${G.floor+1} 层`, W - 10, 22);

  ctx.textBaseline = 'alphabetic';
}

// ---- Enemy Sprite Drawing ----
function drawEnemySprite(c, enemy, x, y, size) {
  const s = size;
  c.save();
  c.translate(x, y);

  switch (enemy.id) {
    case 'small_snake':
      // Snake body - wavy line
      c.strokeStyle = '#22c55e';
      c.lineWidth = 4;
      c.beginPath();
      for (let i = -s; i <= s; i += 5) {
        const px = i, py = Math.sin(i * 0.15) * 10;
        i === -s ? c.moveTo(px, py) : c.lineTo(px, py);
      }
      c.stroke();
      // Head - circle
      c.fillStyle = '#22c55e';
      c.beginPath();
      c.arc(s * 0.6, Math.sin(s * 0.6 * 0.15) * 10, 6, 0, Math.PI * 2);
      c.fill();
      c.fillStyle = '#ff4444';
      c.beginPath();
      c.arc(s * 0.7, Math.sin(s * 0.7 * 0.15) * 10 - 2, 2, 0, Math.PI * 2);
      c.fill();
      break;

    case 'shadow_bat':
      c.fillStyle = '#a855f7';
      // Wings
      c.beginPath();
      c.moveTo(0, -5);
      c.quadraticCurveTo(-s, -s*0.5, -s*0.3, 5);
      c.quadraticCurveTo(0, 0, s*0.3, 5);
      c.quadraticCurveTo(s, -s*0.5, 0, -5);
      c.fill();
      // Body
      c.fillStyle = '#6b21a8';
      c.beginPath();
      c.arc(0, 0, 6, 0, Math.PI * 2);
      c.fill();
      // Eyes
      c.fillStyle = '#ff4444';
      c.beginPath();
      c.arc(-3, -2, 2, 0, Math.PI * 2);
      c.arc(3, -2, 2, 0, Math.PI * 2);
      c.fill();
      break;

    case 'chaos_servant':
      c.fillStyle = '#7c3aed';
      // Body
      c.fillRect(-8, -s*0.3, 16, s*0.6);
      // Head
      c.beginPath();
      c.arc(0, -s*0.3 - 8, 8, 0, Math.PI * 2);
      c.fill();
      // Eyes
      c.fillStyle = '#ff4444';
      c.beginPath();
      c.arc(-3, -s*0.3 - 8, 2, 0, Math.PI * 2);
      c.arc(3, -s*0.3 - 8, 2, 0, Math.PI * 2);
      c.fill();
      // Shield aura
      c.strokeStyle = 'rgba(124,58,237,0.3)';
      c.lineWidth = 2;
      c.beginPath();
      c.arc(0, 0, s*0.5, 0, Math.PI * 2);
      c.stroke();
      break;

    case 'hell_hound':
      c.fillStyle = '#ef4444';
      // Body (oval)
      c.beginPath();
      c.ellipse(0, 3, s*0.3, s*0.25, 0, 0, Math.PI * 2);
      c.fill();
      // Head
      c.beginPath();
      c.arc(s*0.3, -5, 8, 0, Math.PI * 2);
      c.fill();
      // Eyes
      c.fillStyle = '#fbbf24';
      c.beginPath();
      c.arc(s*0.33, -7, 2, 0, Math.PI * 2);
      c.arc(s*0.27, -7, 2, 0, Math.PI * 2);
      c.fill();
      // Fire breath
      c.fillStyle = '#f97316';
      c.beginPath();
      c.moveTo(s*0.4, -3);
      c.lineTo(s*0.7, -8);
      c.lineTo(s*0.5, -1);
      c.lineTo(s*0.7, 2);
      c.fill();
      break;

    case 'wizard_apprentice':
      // Robe
      c.fillStyle = '#3b82f6';
      c.beginPath();
      c.moveTo(-10, s*0.4);
      c.lineTo(-6, -s*0.2);
      c.lineTo(6, -s*0.2);
      c.lineTo(10, s*0.4);
      c.fill();
      // Head
      c.fillStyle = '#fbbf24';
      c.beginPath();
      c.arc(0, -s*0.2 - 7, 7, 0, Math.PI * 2);
      c.fill();
      // Hat
      c.fillStyle = '#1e40af';
      c.beginPath();
      c.moveTo(-8, -s*0.2 - 7);
      c.lineTo(8, -s*0.2 - 7);
      c.lineTo(0, -s*0.4 - 15);
      c.fill();
      // Magic glow
      c.fillStyle = 'rgba(59,130,246,0.2)';
      c.beginPath();
      c.arc(0, 0, s*0.4, 0, Math.PI * 2);
      c.fill();
      break;

    case 'thorn_golem':
      // Body
      c.fillStyle = '#78716c';
      c.fillRect(-10, -s*0.2, 20, s*0.5);
      // Head
      c.fillStyle = '#a8a29e';
      c.beginPath();
      c.arc(0, -s*0.2 - 8, 9, 0, Math.PI * 2);
      c.fill();
      // Thorns
      c.fillStyle = '#22c55e';
      for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2;
        const tx = Math.cos(angle) * 16;
        const ty = Math.sin(angle) * 10 - 5;
        c.beginPath();
        c.moveTo(tx - 3, ty);
        c.lineTo(tx, ty - 8);
        c.lineTo(tx + 3, ty);
        c.fill();
      }
      // Shield
      c.strokeStyle = '#78716c';
      c.lineWidth = 2;
      c.beginPath();
      c.arc(0, 0, s*0.45, 0, Math.PI * 2);
      c.stroke();
      break;

    case 'fallen_knight':
      // Armor body
      c.fillStyle = '#6b7280';
      c.fillRect(-8, -s*0.3, 16, s*0.6);
      // Helmet
      c.fillStyle = '#4b5563';
      c.beginPath();
      c.arc(0, -s*0.3 - 8, 9, 0, Math.PI * 2);
      c.fill();
      // Visor slit
      c.fillStyle = '#ef4444';
      c.fillRect(-4, -s*0.3 - 9, 8, 2);
      // Sword
      c.strokeStyle = '#9ca3af';
      c.lineWidth = 2;
      c.beginPath();
      c.moveTo(12, -s*0.1);
      c.lineTo(22, -s*0.35);
      c.stroke();
      c.fillStyle = '#d4a843';
      c.fillRect(10, -s*0.1 - 1, 4, 3);
      break;

    case 'void_lord':
      // Dark aura
      c.fillStyle = 'rgba(88,28,135,0.3)';
      c.beginPath();
      c.arc(0, 0, s*0.6, 0, Math.PI * 2);
      c.fill();
      // Body
      c.fillStyle = '#581c87';
      c.beginPath();
      c.ellipse(0, 0, s*0.25, s*0.35, 0, 0, Math.PI * 2);
      c.fill();
      // Eyes (many)
      c.fillStyle = '#fbbf24';
      for (let i = 0; i < 3; i++) {
        c.beginPath();
        c.arc(-6 + i*6, -5, 2, 0, Math.PI * 2);
        c.fill();
      }
      break;

    case 'elemental_giant':
      // Large body
      c.fillStyle = '#f97316';
      c.beginPath();
      c.ellipse(0, 5, s*0.4, s*0.35, 0, 0, Math.PI * 2);
      c.fill();
      // Head
      c.fillStyle = '#ef4444';
      c.beginPath();
      c.arc(0, -s*0.25, s*0.3, 0, Math.PI * 2);
      c.fill();
      // Eyes
      c.fillStyle = '#fbbf24';
      c.beginPath();
      c.arc(-6, -s*0.28, 3, 0, Math.PI * 2);
      c.arc(6, -s*0.28, 3, 0, Math.PI * 2);
      c.fill();
      // Fire crown
      c.fillStyle = '#f97316';
      for (let i = 0; i < 5; i++) {
        const fx = -12 + i*6;
        c.beginPath();
        c.moveTo(fx, -s*0.4);
        c.lineTo(fx+3, -s*0.5);
        c.lineTo(fx+6, -s*0.4);
        c.fill();
      }
      break;

    case 'apophis_boss':
    default:
      // Boss - Apophis (dragon/serpent)
      const colors = ['#ef4444', '#dc2626', '#b91c1c', '#991b1b'];
      // Multiple heads (7 heads)
      for (let h = 0; h < 5; h++) {
        const angle = (h / 5) * Math.PI - Math.PI/2;
        const hx = Math.cos(angle) * s * 0.5;
        const hy = Math.sin(angle) * s * 0.4 - s * 0.1;
        const headSize = 12 + h * 2;
        // Neck
        c.strokeStyle = colors[h % colors.length];
        c.lineWidth = 5;
        c.beginPath();
        c.moveTo(0, s*0.2);
        c.quadraticCurveTo(hx*0.5, hy + s*0.2, hx, hy);
        c.stroke();
        // Head
        c.fillStyle = colors[h % colors.length];
        c.beginPath();
        c.arc(hx, hy, headSize/2, 0, Math.PI * 2);
        c.fill();
        // Eye
        c.fillStyle = '#fbbf24';
        c.beginPath();
        c.arc(hx + (hx > 0 ? 3 : -3), hy - 2, 3, 0, Math.PI * 2);
        c.fill();
        // Glow
        c.shadowColor = '#ef4444';
        c.shadowBlur = 15;
        c.fillStyle = 'rgba(239,68,68,0.1)';
        c.beginPath();
        c.arc(hx, hy, headSize, 0, Math.PI * 2);
        c.fill();
        c.shadowBlur = 0;
      }
      // Body
      c.fillStyle = '#991b1b';
      c.beginPath();
      c.ellipse(0, s*0.2, s*0.3, s*0.2, 0, 0, Math.PI * 2);
      c.fill();
      // Boss title glow
      c.shadowColor = '#ef4444';
      c.shadowBlur = 30;
      c.fillStyle = 'rgba(239,68,68,0.05)';
      c.beginPath();
      c.arc(0, 0, s*0.8, 0, Math.PI * 2);
      c.fill();
      c.shadowBlur = 0;
      break;
  }

  c.restore();
}

// ---- Card Face Drawing ----
function drawCardFace(c, card, x, y, w, h, index, canPlay, hovered) {
  c.save();

  // Card background
  const grad = c.createLinearGradient(x, y, x, y + h);
  if (card.type === 'attack') {
    grad.addColorStop(0, '#2a1a1a');
    grad.addColorStop(0.5, '#1a1a22');
    grad.addColorStop(1, '#1a0e0e');
  } else if (card.type === 'skill') {
    grad.addColorStop(0, '#1a1a2e');
    grad.addColorStop(0.5, '#1a1a22');
    grad.addColorStop(1, '#0e0e1e');
  } else if (card.type === 'power') {
    grad.addColorStop(0, '#2e1a2e');
    grad.addColorStop(0.5, '#1a1a22');
    grad.addColorStop(1, '#1a0e1e');
  } else {
    grad.addColorStop(0, '#1a1a24');
    grad.addColorStop(0.5, '#121218');
    grad.addColorStop(1, '#0a0a0f');
  }
  c.fillStyle = grad;
  c.roundRect(x, y, w, h, 6);
  c.fill();

  // Border
  c.strokeStyle = hovered ? '#d4a843' : (canPlay ? '#d4a84366' : '#2a2a3a');
  c.lineWidth = hovered ? 2 : 1;
  c.roundRect(x, y, w, h, 6);
  c.stroke();

  // Glow on hover
  if (hovered) {
    c.shadowColor = '#d4a843';
    c.shadowBlur = 20;
    c.strokeStyle = 'rgba(212,168,67,0.3)';
    c.roundRect(x, y, w, h, 6);
    c.stroke();
    c.shadowBlur = 0;
  }

  // Cost crystal (top-left)
  c.fillStyle = '#d4a843';
  c.font = 'bold 12px Georgia, serif';
  c.textAlign = 'center';
  c.textBaseline = 'middle';

  // Cost background
  c.fillStyle = card.cost === 0 ? '#22c55e' : '#d4a843';
  c.beginPath();
  c.moveTo(x + 14, y + 8);
  c.lineTo(x + 20, y + 12);
  c.lineTo(x + 14, y + 16);
  c.lineTo(x + 8, y + 12);
  c.closePath();
  c.fill();

  c.fillStyle = '#0a0a0f';
  c.font = 'bold 10px Georgia, serif';
  c.fillText(card.cost, x + 14, y + 13);

  // Card name
  c.fillStyle = card.upgraded ? '#a855f7' : '#d4a843';
  c.font = 'bold 10px Georgia, serif';
  c.textAlign = 'center';
  c.textBaseline = 'top';
  c.fillText(card.name + (card.upgraded ? '★' : ''), x + w/2, y + 6);

  // Divider
  c.strokeStyle = '#d4a84333';
  c.lineWidth = 0.5;
  c.beginPath();
  c.moveTo(x + 8, y + 22);
  c.lineTo(x + w - 8, y + 22);
  c.stroke();

  // Card type icon & damage/block indicators
  let iconY = y + 28;
  if (card.type === 'attack' && card.damage > 0) {
    c.fillStyle = '#ef4444';
    c.font = '11px Georgia, serif';
    c.textAlign = 'center';
    c.fillText(`⚔ ${card.damage}`, x + w/2, iconY);
    iconY += 15;
  }
  if (card.block > 0) {
    c.fillStyle = '#60a5fa';
    c.font = '11px Georgia, serif';
    c.textAlign = 'center';
    c.fillText(`🛡 ${card.block}`, x + w/2, iconY);
    iconY += 15;
  }

  // Description
  c.fillStyle = '#b0b0b0';
  c.font = '8px Georgia, serif';
  c.textAlign = 'center';
  c.textBaseline = 'top';

  // Word wrap description
  const desc = card.desc || '';
  const maxChars = 14;
  let descLine = '';
  let descY = y + h - 32;
  for (let i = 0; i < desc.length; i++) {
    descLine += desc[i];
    if (descLine.length >= maxChars || i === desc.length - 1) {
      c.fillText(descLine, x + w/2, descY);
      descY += 11;
      descLine = '';
    }
  }

  // Sigil decoration (bottom border)
  c.strokeStyle = '#d4a84322';
  c.lineWidth = 0.5;
  const sigilY = y + h - 8;
  for (let i = 0; i < 5; i++) {
    const sx = x + 10 + i * (w - 20) / 4;
    c.beginPath();
    c.arc(sx, sigilY, 2, 0, Math.PI * 2);
    c.stroke();
  }

  c.restore();
}

// ---- Mouse Interaction ----
let hoveredCard = -1;
let mouseX = 0, mouseY = 0;

function getCardAtPos(mx, my) {
  const handY = canvas.height - 120;
  const cardW = 90, cardH = 130;
  const totalW = G.hand.length * (cardW + 6) - 6;
  const startX = Math.max(10, (canvas.width - totalW) / 2);

  for (let i = G.hand.length - 1; i >= 0; i--) {
    const cx = startX + i * (cardW + 6);
    if (mx >= cx && mx <= cx + cardW && my >= handY && my <= handY + cardH) {
      return i;
    }
  }
  return -1;
}

function isEndTurnBtn(mx, my) {
  const W = canvas.width, H = canvas.height;
  const btnX = W - 110, btnY = H - 100, btnW = 100, btnH = 36;
  return mx >= btnX && mx <= btnX + btnW && my >= btnY && my <= btnY + btnH;
}

// ---- Canvas Event Listeners ----
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
  mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
  if (G.phase === 'combat') {
    hoveredCard = getCardAtPos(mouseX, mouseY);
  } else {
    hoveredCard = -1;
  }
});

canvas.addEventListener('click', (e) => {
  if (G.phase !== 'combat') return;
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const my = (e.clientY - rect.top) * (canvas.height / rect.height);

  // Check end turn button
  if (isEndTurnBtn(mx, my)) {
    doEndTurn();
    return;
  }

  // Check card click
  const idx = getCardAtPos(mx, my);
  if (idx >= 0 && G.energy >= G.hand[idx].cost) {
    playCard(idx);
  }
});

canvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  if (G.phase === 'combat') {
    doEndTurn();
  }
});

// ---- Game Loop ----
function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.textBaseline = 'alphabetic';

  if (G.phase === 'combat') {
    renderCombat();
  } else {
    // Background with particles for non-combat phases
    const grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.width*0.7);
    grad.addColorStop(0, '#1a1a2e');
    grad.addColorStop(0.5, '#0e0e18');
    grad.addColorStop(1, '#050508');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
  }

  requestAnimationFrame(gameLoop);
}

// ---- Initialize ----
initParticles(80);
showIntro();
gameLoop();

// Handle resize
window.addEventListener('resize', () => {
  resizeCanvas();
});

// Expose functions globally for onclick handlers
window.startGame = startGame;
window.enterNode = enterNode;
window.startCombat = startCombat;
window.buyCard = buyCard;
window.buyRelic = buyRelic;
window.removeCardFromDeck = removeCardFromDeck;
window.confirmRemoveCard = confirmRemoveCard;
window.leaveShop = leaveShop;
window.enterShop = enterShop;
window.upgradeCard = upgradeCard;
window.leaveForge = leaveForge;
window.chooseRewardCard = chooseRewardCard;
window.doEndTurn = doEndTurn;
window.showToast = showToast;
window.closeModal = closeModal;

// roundRect polyfill for Canvas
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (r > w/2) r = w/2;
    if (r > h/2) r = h/2;
    this.beginPath();
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x, y, x + r, y);
    this.closePath();
    return this;
  };
}

console.log('Apophis Dragon Adventure loaded!');
</script>
<script>

// Mobile nav toggle
document.addEventListener('DOMContentLoaded', function() {
  var navBar = document.getElementById('navBar');
  if (!navBar) return;
  // Add toggle button
  var toggle = document.createElement('button');
  toggle.className = 'nav-toggle';
  toggle.innerHTML = '&#9776;';
  toggle.setAttribute('aria-label', 'Toggle navigation');
  toggle.onclick = function() {
    navBar.classList.toggle('open');
    this.innerHTML = navBar.classList.contains('open') ? '&#10005;' : '&#9776;';
  };
  navBar.appendChild(toggle);
  // Close nav when clicking a link
  navBar.querySelectorAll('.nav-link').forEach(function(link) {
    link.addEventListener('click', function() {
      navBar.classList.remove('open');
      toggle.innerHTML = '&#9776;';
    });
  });
});

</script>
